<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
:root{--a:#f43f5e;--ad:#e11d48;--ar:244,63,94}
*{box-sizing:border-box}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2236;border-radius:2px}
body{background:#14040a;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ═══ ATMOSPHERE ═══ */
.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,#180008 0%,#14040a 40%,#14040a 60%,#1a0010 100%)}
#fxC{position:fixed;inset:0;z-index:1;pointer-events:none}
.scan{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.01) 3px,rgba(0,0,0,.01) 4px)}

/* ═══ CANDY CRUSH PATH ═══ */
.map-wrap{max-width:440px;margin:0 auto;padding:0 12px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-done{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 6px rgba(var(--ar),.4));stroke-linecap:round}
.path-active{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 8px rgba(var(--ar),.5));stroke-linecap:round;stroke-dasharray:10 6;animation:dashAnim 1s linear infinite}
.path-locked{stroke:rgba(255,255,255,.06);stroke-width:3;fill:none;stroke-linecap:round}
@keyframes dashAnim{to{stroke-dashoffset:-32}}

/* ═══ NODE ═══ */
.node{position:absolute;z-index:15;cursor:pointer;transition:transform .25s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.node:active{transform:translate(-50%,-50%) scale(.9)!important}
.node.locked{cursor:not-allowed;filter:saturate(.2) brightness(.5)}
.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}

.node-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative;transition:all .3s;
  box-shadow:0 4px 15px rgba(0,0,0,.4)}

/* Completed node */
.nc-done{background:radial-gradient(circle at 35% 35%,rgba(var(--ar),.9),rgba(var(--ar),.6) 60%,rgba(var(--ar),.4));border:3px solid rgba(var(--ar),.7);
  box-shadow:0 0 20px rgba(var(--ar),.4),0 4px 15px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.3)}
.nc-done::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.25),transparent 60%);pointer-events:none}

/* Active node */
.nc-active{background:radial-gradient(circle at 35% 35%,rgba(var(--ar),.7),rgba(var(--ar),.4) 60%,rgba(var(--ar),.2));border:3px solid var(--a);
  animation:activePulse 2s ease-in-out infinite;
  box-shadow:0 0 30px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.2)}
.nc-active::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.3),transparent 60%);pointer-events:none}
@keyframes activePulse{0%,100%{box-shadow:0 0 30px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4);transform:scale(1)}50%{box-shadow:0 0 50px rgba(var(--ar),.7),0 0 80px rgba(var(--ar),.2);transform:scale(1.08)}}

/* Locked node */
.nc-locked{background:radial-gradient(circle at 35% 35%,#2a2f3a,#1a1f2a 60%,#111620);border:3px solid #1f2530;
  box-shadow:0 4px 15px rgba(0,0,0,.5),inset 0 -3px 6px rgba(0,0,0,.3)}

/* Boss node bigger */
.node-boss .node-circle{width:78px;height:78px;font-size:1.8rem}
.boss-tag{position:absolute;top:-6px;right:-6px;font-size:8px;font-weight:900;font-family:'Orbitron',sans-serif;border-radius:999px;padding:2px 8px;z-index:20;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a}
.boss-tag.locked{background:#1f2530;color:#555}

/* Node label */
.node-lbl{text-align:center;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.node-lbl.lbl-done{color:rgba(var(--ar),.7)}.node-lbl.lbl-active{color:var(--a)}.node-lbl.lbl-locked{color:#333}

/* Stars */
.node-stars{text-align:center;font-size:10px;margin-top:2px}
.star-on{color:#fbbf24}.star-off{color:#333}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-box{background:linear-gradient(135deg,#0c1019,#111827,#0c1019);border:1px solid rgba(var(--ar),.2);border-radius:24px;padding:28px;max-width:400px;width:calc(100% - 2rem);box-shadow:0 0 60px rgba(var(--ar),.06),0 25px 50px rgba(0,0,0,.5)}

/* ═══ MUSIC BTN ═══ */
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--ar),.2);background:rgba(10,15,26,.9);color:var(--a);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.2)}
.mu-btn.off{color:#444;border-color:#1f2530}

/* ═══ RESPONSIVE ═══ */
@media(max-width:374px){.node-circle{width:52px;height:52px;font-size:1.15rem}.node-boss .node-circle{width:64px;height:64px}.node-lbl{font-size:8px}.map-wrap{max-width:340px}}
@media(min-width:375px) and (max-width:480px){.node-circle{width:58px;height:58px;font-size:1.3rem}.node-boss .node-circle{width:70px;height:70px}}
@media(min-width:769px){.map-wrap{max-width:500px}.node-circle{width:70px;height:70px;font-size:1.6rem}.node-boss .node-circle{width:86px;height:86px;font-size:2rem}}
@media(hover:none){.node:active{transform:translate(-50%,-50%) scale(.92)!important}}

/* ═══ MUSIC VISUALIZER ═══ */
.viz{display:flex;align-items:flex-end;gap:2px;height:16px}
.viz span{width:3px;border-radius:1px;background:var(--a);animation:vb 1s ease-in-out infinite}
.viz span:nth-child(1){animation-delay:0s;height:30%}.viz span:nth-child(2){animation-delay:.12s;height:55%}
.viz span:nth-child(3){animation-delay:.24s;height:40%}.viz span:nth-child(4){animation-delay:.36s;height:70%}
.viz span:nth-child(5){animation-delay:.08s;height:25%}.viz span:nth-child(6){animation-delay:.2s;height:50%}
.viz span:nth-child(7){animation-delay:.32s;height:35%}
.viz.off span{animation:none!important;height:3px!important;opacity:.3}
@keyframes vb{0%,100%{height:15%}50%{height:100%}}

/* ═══ NODE ENTRY STAGGER ═══ */
.node{opacity:0;animation:nodeEntry .6s ease-out forwards}
@keyframes nodeEntry{from{opacity:0;transform:translate(-50%,-50%) scale(.3) translateY(20px)}to{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}}

/* ═══ COMPLETED: sparkle ring + dots ═══ */
.sparkle-ring{position:absolute;inset:-8px;border-radius:50%;border:1.5px solid transparent;background:conic-gradient(from 0deg,transparent,rgba(var(--ar),.4),transparent,rgba(var(--ar),.2),transparent) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:sparkleRot 4s linear infinite;pointer-events:none}
@keyframes sparkleRot{to{transform:rotate(360deg)}}
.sparkle-dot{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(var(--ar),.7);box-shadow:0 0 4px rgba(var(--ar),.5);pointer-events:none;animation:sparkleFly 2.5s ease-in-out infinite}
@keyframes sparkleFly{0%,100%{opacity:0;transform:translate(0,0) scale(.5)}50%{opacity:1;transform:translate(var(--sx),var(--sy)) scale(1)}}

/* ═══ ACTIVE: pulse rings + glow ═══ */
.pulse-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(var(--ar),.3);animation:pulseExpand 2.5s ease-out infinite;pointer-events:none}
.pulse-ring:nth-child(2){animation-delay:.8s}.pulse-ring:nth-child(3){animation-delay:1.6s}
@keyframes pulseExpand{0%{inset:-4px;opacity:.7}100%{inset:-28px;opacity:0}}
.glow-breath{position:absolute;inset:-15px;border-radius:50%;background:radial-gradient(circle,rgba(var(--ar),.15),transparent 70%);animation:glowB 2s ease-in-out infinite;pointer-events:none}
@keyframes glowB{0%,100%{transform:scale(.9);opacity:.4}50%{transform:scale(1.15);opacity:.8}}

/* ═══ LOCKED: scan + chains ═══ */
.lock-scan{position:absolute;inset:0;border-radius:50%;overflow:hidden;pointer-events:none}
.lock-scan::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:lockSweep 3s ease-in-out infinite}
@keyframes lockSweep{0%{top:-2px}50%{top:100%}100%{top:-2px}}
.lock-chains{position:absolute;inset:-4px;border-radius:50%;border:2px dashed rgba(255,255,255,.06);animation:chainSpin 8s linear infinite;pointer-events:none}
@keyframes chainSpin{to{transform:rotate(360deg)}}

/* ═══ CLICK BURST ═══ */
.click-burst{position:fixed;pointer-events:none;z-index:9999}
.burst-ring{position:absolute;border-radius:50%;border:2px solid rgba(var(--ar),.5);animation:burstGrow .6s ease-out forwards;transform:translate(-50%,-50%)}
@keyframes burstGrow{0%{width:0;height:0;opacity:1}100%{width:120px;height:120px;opacity:0}}
.burst-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--a);animation:burstFly .5s ease-out forwards;transform:translate(-50%,-50%)}
@keyframes burstFly{0%{transform:translate(-50%,-50%);opacity:1}100%{transform:translate(calc(-50% + var(--bx)),calc(-50% + var(--by)));opacity:0}}

/* ═══ MODAL ANIM ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);animation:mFade .3s ease}
@keyframes mFade{from{opacity:0}to{opacity:1}}
.modal-box{animation:mPop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes mPop{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:none}}

</style>
</head>
<body class="text-white min-h-screen">

<!-- HEADER -->
<header class="border-b border-white/5 bg-black/70 backdrop-blur-xl sticky top-0 z-[60]">

<script>
var A='#f43f5e',AR='244,63,94',WN=6;
var levels=window._wL=[{"n": 76, "t": "SMC Concepts", "d": "Dinero inteligente.", "xp": 200}, {"n": 77, "t": "Liquidez Int/Ext", "d": "Pools de liquidez.", "xp": 250}, {"n": 78, "t": "Order Blocks", "d": "Zonas bancarias.", "xp": 250}, {"n": 79, "t": "FVG", "d": "Fair Value Gaps.", "xp": 250}, {"n": 80, "t": "BOS & ChoCh", "d": "Confirmaciones reales.", "xp": 250}, {"n": 81, "t": "Wyckoff Acum", "d": "Esquema acumulación.", "xp": 250}, {"n": 82, "t": "Wyckoff Dist", "d": "Esquema distribución.", "xp": 250}, {"n": 83, "t": "Killzones", "d": "London y NY Open.", "xp": 200}, {"n": 84, "t": "Modelo Institucional", "d": "Framework completo.", "xp": 300}, {"n": 85, "t": "Multi-temporal", "d": "HTF a LTF sniper.", "xp": 250}, {"n": 86, "t": "Mitigación", "d": "Re-entrada precisa.", "xp": 250}, {"n": 87, "t": "Manipulación", "d": "Captura de liquidez.", "xp": 250}, {"n": 88, "t": "R:R 1:5+", "d": "Ratios extremos.", "xp": 250}, {"n": 89, "t": "Backtesting SMC", "d": "Datos históricos.", "xp": 200}, {"n": 90, "t": "⚡ BOSS: Cacería", "d": "Operación SMC completa.", "xp": 500, "boss": "BOSS"}];
var icons=["🧠", "💧", "🏦", "⚖️", "🔀", "📥", "📤", "⏰", "🏛️", "🎯", "💉", "🕵️", "📐", "🔬", "🏆"];
levels.forEach(function(l){l.s=CURRICULUM.getLevelStatus(l.n)});

// Stats
var cc=levels.filter(function(l){return l.s==='completed'}).length;
var cx=levels.reduce(function(a,l){return a+(l.s==='completed'?l.xp:0)},0);
document.getElementById('comp-ct').textContent=cc+'/'+levels.length;
document.getElementById('xp-ct').textContent=cx.toLocaleString()+' XP';
document.getElementById('prog-bar').style.width=Math.round(cc/levels.length*100)+'%';

// ═══ CANDY CRUSH SERPENTINE LAYOUT ═══
var N=levels.length;
var MAP_W,NODE_H=110,PAD_TOP=40;
var nodePos=[]; // {x,y} in px

function calcPositions(){
  MAP_W=document.getElementById('mapWrap').offsetWidth;
  nodePos=[];
  var margin=50;
  var usable=MAP_W-margin*2;
  for(var i=0;i<N;i++){
    // Serpentine: row groups of ~3, zigzag left-right
    var row=Math.floor(i/3);
    var col=i%3;
    var goingRight=row%2===0;
    var xNorm=goingRight?col/(3-1||1):(3-1-col)/(3-1||1);
    // Smooth with sine
    var rawX=margin+xNorm*usable;
    // Add some wave
    var wave=Math.sin(i*0.8)*usable*0.12;
    var x=Math.max(margin,Math.min(MAP_W-margin,rawX+wave));
    var y=PAD_TOP+(N-1-i)*NODE_H;
    nodePos.push({x:x,y:y});
  }
}
calcPositions();

// Set container height
var totalH=PAD_TOP+N*NODE_H+60;
document.getElementById('nodesLayer').style.height=totalH+'px';
document.getElementById('pathSvg').setAttribute('height',totalH);
document.getElementById('pathSvg').style.height=totalH+'px';

// ═══ DRAW SVG PATH ═══
function drawPaths(){
  calcPositions();
  var svg=document.getElementById('pathSvg');
  svg.innerHTML='';
  for(var i=0;i<N-1;i++){
    var a_=nodePos[i],b_=nodePos[i+1];
    var sA=levels[i].s,sB=levels[i+1].s;
    var cls=(sA==='completed'&&sB==='completed')?'path-done':(sA==='completed'&&sB==='active')?'path-active':'path-locked';
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    var midY=(a_.y+b_.y)/2;
    path.setAttribute('d','M '+a_.x+' '+a_.y+' C '+a_.x+' '+midY+', '+b_.x+' '+midY+', '+b_.x+' '+b_.y);
    path.setAttribute('class',cls);
    svg.appendChild(path);
  }
}
drawPaths();
window.addEventListener('resize',function(){drawPaths();placeNodes()});

// ═══ PLACE NODES ═══
function placeNodes(){
  calcPositions();var layer=document.getElementById('nodesLayer');layer.innerHTML='';
  for(var i=0;i<N;i++){
    var lv=levels[i],p=nodePos[i],isBoss=!!lv.boss;
    var nd=document.createElement('div');
    nd.className='node'+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');
    nd.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;transform:translate(-50%,-50%);animation-delay:'+(i*80)+'ms';

    var circCls=lv.s==='completed'?'nc-done':(lv.s==='active'?'nc-active':'nc-locked');
    var content=lv.s==='completed'?'✓':(lv.s==='active'?(icons[i]||'🔥'):'<span class="material-symbols-outlined text-gray-600" style="font-size:1.2em">lock</span>');
    var bossTag='';
    if(isBoss)bossTag='<span class="boss-tag'+(lv.s==='locked'?' locked':'')+'">'+lv.boss+'</span>';
    var starHtml=lv.s==='completed'?'<span class="star-on">⭐</span><span class="star-on">⭐</span><span class="star-on">⭐</span>':'<span class="star-off">☆</span><span class="star-off">☆</span><span class="star-off">☆</span>';
    var lblCls=lv.s==='completed'?'lbl-done':(lv.s==='active'?'lbl-active':'lbl-locked');

    var inner='<div style="position:relative;display:flex;flex-direction:column;align-items:center">';
    // COMPLETED: sparkle ring + dots
    if(lv.s==='completed'){
      inner+='<div class="sparkle-ring"></div>';
      for(var sp=0;sp<3;sp++){var ang=sp*2.09;inner+='<div class="sparkle-dot" style="top:50%;left:50%;--sx:'+Math.cos(ang)*20+'px;--sy:'+Math.sin(ang)*20+'px;animation-delay:'+(sp*.7)+'s"></div>'}
    }
    // ACTIVE: pulse rings + glow
    if(lv.s==='active'){inner+='<div class="glow-breath"></div><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div>'}
    // LOCKED: chains
    if(lv.s==='locked'){inner+='<div class="lock-chains"></div>'}
    inner+='<div class="node-circle '+circCls+'" style="position:relative">'+content+bossTag;
    if(lv.s==='locked')inner+='<div class="lock-scan"></div>';
    inner+='</div><div class="node-stars">'+starHtml+'</div><div class="node-lbl '+lblCls+'">'+lv.n+'</div></div>';
    nd.innerHTML=inner;

    var tE=lv.t.replace(/'/g,"\\'");var dE=lv.d.replace(/'/g,"\\'");
    if(lv.s!=='locked')nd.setAttribute('onclick',"clickNode(event,"+lv.n+",'"+tE+"','"+dE+"','"+lv.s+"',"+lv.xp+")");
    else nd.setAttribute('onclick','sfxL()');
    layer.appendChild(nd);
  }
}

// ═══ AUDIO ═══
var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);
  // Ambient drone
  [0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    o.type=i<2?'sine':'triangle';o.frequency.value=44*Math.pow(2,s/12);
    f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;
    o.connect(f);f.connect(g);g.connect(mg);o.start();
    var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});
  // Melody
  var sc=[0, 2, 3, 5, 7, 8, 10],ni=0;
  (function play(){if(!sOn){setTimeout(play,2000);return}
    var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);
    var fr=44*2*Math.pow(2,semi/12);
    var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;
    g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);
    o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;
    setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}
function sfxC(){sfx(880,.1);setTimeout(function(){sfx(660,.07)},35)}
function sfxL(){sfx(150,.15)}
function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.08:0;
  var v=document.getElementById('vizE');if(v)v.classList.toggle('off',!sOn);
  var l=document.getElementById('muLbl');if(l)l.textContent=sOn?'♫ ON':'♫ OFF';
  var b=document.getElementById('muBtn');if(b){b.className='mu-btn'+(sOn?'':' off');b.textContent=sOn?'🔊':'🔇'}}
document.addEventListener('click',function(){initA()},{once:true});

// ═══ CLICK BURST EFFECT ═══
function clickBurst(e){
  var c=document.createElement('div');c.className='click-burst';
  c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';
  var r=document.createElement('div');r.className='burst-ring';c.appendChild(r);
  for(var i=0;i<8;i++){var d=document.createElement('div');d.className='burst-dot';
    var ang=i*(Math.PI*2/8);d.style.setProperty('--bx',(Math.cos(ang)*40)+'px');
    d.style.setProperty('--by',(Math.sin(ang)*40)+'px');c.appendChild(d)}
  document.body.appendChild(c);setTimeout(function(){c.remove()},700)}

function clickNode(e,n,t,d,s,xp){clickBurst(e);sfxO();setTimeout(function(){openM(n,t,d,s,xp)},150)}

// HUNT WORLD — Radar sweep + blood particles
(function(){
  var cv=document.getElementById('fxC'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;
  function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
  addEventListener('resize',rs);rs();
  var angle=0;function f(){x.clearRect(0,0,W,H);
    angle+=.008;var cx=W*.5,cy=H*.4,r=Math.min(W,H)*.35;
    // Radar sweep
    x.save();x.globalAlpha=.04;
    x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,angle,angle+.8);x.closePath();
    x.fillStyle='rgba(244,63,94,.4)';x.fill();x.restore();
    // Ring
    x.beginPath();x.arc(cx,cy,r,0,6.28);x.strokeStyle='rgba(244,63,94,.05)';x.lineWidth=1;x.stroke();
    requestAnimationFrame(f)}f()})();
</script>
