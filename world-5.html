<style>
:root{
  --g:#14b8a6;  --gr:20,184,166;   --gd:#0d9488;
  --gb:#2dd4bf; --gs:#0f766e;
  --b:#1e40af;  --br:30,64,175;    --bl:#0a1628;
  --c:#8b5cf6;  --cr:139,92,246;
  --a:#14b8a6;  --ar:20,184,166;   --ad:#0d9488;
  --v:#8b5cf6;  --vr:139,92,246;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#080d18;border-radius:2px}
html,body{height:100%;background:#020a0d}
body{overflow-x:hidden;-webkit-font-smoothing:antialiased;font-family:'Rajdhani',sans-serif;color:#fff}

/* ── CANVAS STACK ── */
#cvRoom{position:fixed;inset:0;z-index:1;pointer-events:none}
#cvHolo{position:fixed;inset:0;z-index:2;pointer-events:none}
#cvFx{position:fixed;inset:0;z-index:3;pointer-events:none}
.scanfilm{position:fixed;inset:0;z-index:4;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(3,6,13,.014) 3px,rgba(3,6,13,.014) 4px)}

/* ── TACTICAL HUD PANELS ── */
.hud{position:fixed;z-index:7;pointer-events:none;font-family:'Share Tech Mono',monospace}
.hbox{background:rgba(3,6,13,.92);backdrop-filter:blur(18px);border-radius:6px;padding:8px 11px}
.hud-tl{top:17%;left:9px;border:1px solid rgba(var(--gr),.25);border-left:2px solid rgba(var(--gr),.55)}
.hud-tr{top:22%;right:9px;border:1px solid rgba(var(--gr),.2);border-right:2px solid rgba(var(--gr),.45)}
.hud-bl{bottom:28%;left:9px;border:1px solid rgba(var(--cr),.2);border-left:2px solid rgba(var(--cr),.4)}
.hlbl{font-size:6.5px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.hlbl-g{color:rgba(var(--gr),.5)}.hlbl-c{color:rgba(var(--cr),.5)}
.hval{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;line-height:1.2}
.hval-g{color:var(--g)}.hval-c{color:var(--c)}
.htiny{font-size:7px;opacity:.35;margin-top:2px;letter-spacing:1px}
.hbar{width:46px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:4px;overflow:hidden}
.hfill{height:100%;border-radius:1px;animation:hbp 3s ease-in-out infinite}
.hfill-g{background:var(--g);width:74%}.hfill-g2{background:var(--gs);width:88%;animation-delay:.6s}.hfill-c{background:var(--c);width:55%;animation-delay:1.2s}
@keyframes hbp{0%,100%{opacity:.4}50%{opacity:1}}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:60;border-bottom:1px solid rgba(var(--gr),.08);background:rgba(3,6,13,.96);backdrop-filter:blur(24px)}

/* ── HERO ── */
.hero-wrap{position:relative;z-index:10;text-align:center;padding:26px 16px 12px}
.world-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 20px;border-radius:4px;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3.5px;text-transform:uppercase;
  background:rgba(var(--gr),.05);border:1px solid rgba(var(--gr),.22);color:var(--g);margin-bottom:14px;
  box-shadow:0 0 30px rgba(var(--gr),.07),inset 0 0 20px rgba(var(--gr),.03)}
.wbd{width:6px;height:6px;background:var(--g);transform:rotate(45deg);
  box-shadow:0 0 10px var(--g),0 0 20px rgba(var(--gr),.5);animation:wbp 2s ease-in-out infinite}
@keyframes wbp{0%,100%{opacity:.3;transform:rotate(45deg) scale(.6)}50%{opacity:1;transform:rotate(45deg) scale(1.5)}}
.hero-icon{font-size:3.8rem;display:block;margin-bottom:10px;
  filter:drop-shadow(0 0 28px rgba(var(--gr),.9)) drop-shadow(0 0 70px rgba(var(--gr),.4));
  animation:hfl 4s ease-in-out infinite}
@keyframes hfl{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-9px) scale(1.05)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;text-transform:uppercase;
  letter-spacing:3px;color:#fff;
  text-shadow:0 0 30px rgba(var(--gr),1),0 0 80px rgba(var(--gr),.5),0 0 160px rgba(var(--gr),.2),0 2px 4px rgba(0,0,0,1)}
.hero-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(var(--gr),.3);margin-top:6px}

/* ── MAP PATHS ── */
.map-wrap{max-width:440px;margin:0 auto;padding:0 14px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-done{stroke:var(--g);stroke-width:3;fill:none;stroke-linecap:round;
  filter:drop-shadow(0 0 5px rgba(var(--gr),.8)) drop-shadow(0 0 12px rgba(var(--gr),.4))}
.path-active{stroke:var(--gb);stroke-width:3;fill:none;stroke-linecap:round;
  filter:drop-shadow(0 0 10px rgba(var(--gr),1)) drop-shadow(0 0 24px rgba(var(--gr),.6));
  stroke-dasharray:8 5;animation:dsh .85s linear infinite}
.path-locked{stroke:rgba(255,255,255,.05);stroke-width:2;fill:none;stroke-linecap:round}
@keyframes dsh{to{stroke-dashoffset:-26}}

/* ── NODES — COMMAND STATIONS ── */
.node{position:absolute;z-index:15;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.node:not(.locked):hover .nfw{filter:brightness(1.35)}
.node:not(.locked):hover{transform:translate(-50%,-50%) scale(1.1)!important}
.node:active{transform:translate(-50%,-50%) scale(.85)!important}
.node.locked{cursor:not-allowed}
.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}

/* Tactical bracket frame — 4 corner L-brackets */
.nfw{position:relative;display:inline-flex;align-items:center;justify-content:center}
.brk{position:absolute;width:12px;height:12px;pointer-events:none}
.brk::before,.brk::after{content:'';position:absolute;background:var(--g)}
.brk::before{width:100%;height:1.5px;top:0;left:0}
.brk::after{width:1.5px;height:100%;top:0;left:0}
.brk-tl{top:-7px;left:-7px}
.brk-tr{top:-7px;right:-7px;transform:scaleX(-1)}
.brk-bl{bottom:-7px;left:-7px;transform:scaleY(-1)}
.brk-br{bottom:-7px;right:-7px;transform:scale(-1)}
.node.locked .brk::before,.node.locked .brk::after{background:rgba(255,255,255,.08)}
.node-boss .brk{width:16px;height:16px}
.node-boss .brk-tl{top:-9px;left:-9px}.node-boss .brk-tr{top:-9px;right:-9px}
.node-boss .brk-bl{bottom:-9px;left:-9px}.node-boss .brk-br{bottom:-9px;right:-9px}

/* Rotating tactical scan ring on active nodes */
.scan-ring{position:absolute;border-radius:50%;pointer-events:none;
  top:50%;left:50%;transform:translate(-50%,-50%)}
.sr-a{width:82px;height:82px;border:1px solid rgba(var(--gr),.7);
  box-shadow:0 0 16px rgba(var(--gr),.2),inset 0 0 10px rgba(var(--gr),.05);
  animation:rot 4s linear infinite}
.sr-b{width:96px;height:96px;border:1px dashed rgba(var(--gr),.3);
  animation:rot 7s linear infinite reverse;animation-delay:-.3s}
@keyframes rot{to{transform:translate(-50%,-50%) rotate(360deg)}}
.sr-a::after{content:'';position:absolute;width:5px;height:5px;border-radius:50%;
  background:var(--gb);box-shadow:0 0 10px var(--gb),0 0 20px rgba(var(--gr),.8);
  top:-2.5px;left:50%;margin-left:-2.5px}
.node-boss .sr-a{width:100px;height:100px}.node-boss .sr-b{width:118px;height:118px}

/* Node circles */
.nc{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.35rem;position:relative}
.nc-done{background:radial-gradient(circle at 33% 28%,#1e3a6e,rgba(var(--gr),.35) 55%,#08111f);
  border:2px solid rgba(var(--gr),.6);
  box-shadow:0 0 26px rgba(var(--gr),.28),0 0 60px rgba(var(--gr),.08),0 8px 24px rgba(0,0,0,.9),inset 0 1px 5px rgba(var(--gr),.12)}
.nc-done::after{content:'';position:absolute;inset:3px;border-radius:50%;
  background:radial-gradient(circle at 27% 22%,rgba(255,255,255,.22),transparent 52%);pointer-events:none}
.nc-active{background:radial-gradient(circle at 33% 28%,#1a3060,rgba(var(--gr),.5) 48%,#08111f);
  border:2px solid var(--gb);animation:nap 2s ease-in-out infinite;
  box-shadow:0 0 40px rgba(var(--gr),.55),0 0 90px rgba(var(--gr),.18),0 8px 24px rgba(0,0,0,.9)}
.nc-active::after{content:'';position:absolute;inset:3px;border-radius:50%;
  background:radial-gradient(circle at 27% 22%,rgba(255,255,255,.28),transparent 52%);pointer-events:none}
@keyframes nap{0%,100%{box-shadow:0 0 34px rgba(var(--gr),.44),0 8px 24px rgba(0,0,0,.9);transform:scale(1)}
  50%{box-shadow:0 0 70px rgba(var(--gr),.75),0 0 140px rgba(var(--gr),.2),0 0 220px rgba(var(--gr),.06);transform:scale(1.07)}}
.nc-locked{background:radial-gradient(circle at 33% 28%,#0d1526,#060c1a 58%,#030810);
  border:2px solid rgba(255,255,255,.05);box-shadow:0 8px 24px rgba(0,0,0,.95)}
.node-boss .nc{width:78px;height:78px;font-size:1.8rem}
.boss-tag{position:absolute;top:-10px;right:-10px;font-size:7px;font-weight:900;
  font-family:'Orbitron',sans-serif;border-radius:2px;padding:2px 8px;z-index:20;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--gd),var(--g));color:#03060d;
  box-shadow:0 0 18px rgba(var(--gr),.55),0 0 36px rgba(var(--gr),.2)}
.boss-tag.locked{background:#0d1526;color:#1a2240;box-shadow:none}

.nread{margin-top:4px;text-align:center}
.nrl{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--gr),.48),transparent);width:58px;margin:0 auto}
.nrs{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--gr),.16),transparent);width:36px;margin:3px auto 0}
.node.locked .nrl,.node.locked .nrs{background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent)}
.node-lbl{text-align:center;margin-top:4px;font-family:'Share Tech Mono',monospace;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.lbl-done{color:rgba(var(--gr),.48)}.lbl-active{color:var(--gb)}.lbl-locked{color:#0e1528}
.node-stars{text-align:center;font-size:10px;margin-top:1px}
.son{color:var(--g)}.soff{color:#0a1020}

/* ── QUEST BOX ── */
.quest-box{border-radius:6px;padding:13px 15px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(var(--gr),.05),rgba(0,0,0,.7));
  border:1px solid rgba(var(--gr),.15);backdrop-filter:blur(18px);
  box-shadow:inset 0 1px 0 rgba(var(--gr),.08),0 0 40px rgba(var(--gr),.04)}
.qico{flex-shrink:0;width:44px;height:44px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(var(--gr),.06);border:1px solid rgba(var(--gr),.18);animation:nap 2s ease-in-out infinite}
.qlbl{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(var(--gr),.4);text-transform:uppercase;letter-spacing:3px}
.qtitle{font-size:13px;color:#2dd4bf;font-weight:700;margin-top:1px}
.qbtn{flex-shrink:0;padding:9px 13px;border-radius:4px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:9px;cursor:pointer;border:none;background:linear-gradient(135deg,var(--gd),var(--gb));color:#03060d;box-shadow:0 0 22px rgba(var(--gr),.42),0 0 50px rgba(var(--gr),.12);transition:all .2s}
.qbtn:hover{transform:scale(1.06);box-shadow:0 0 38px rgba(var(--gr),.7)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(20px)}
.modal-box{background:linear-gradient(145deg,#08101e,#03060d,#08101e);border:1px solid rgba(var(--gr),.2);border-radius:8px;padding:28px;max-width:400px;width:calc(100% - 2rem);box-shadow:0 0 120px rgba(var(--gr),.06),0 40px 80px rgba(0,0,0,.95),inset 0 1px 0 rgba(var(--gr),.1)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--gr),.2);background:rgba(3,6,13,.96);color:var(--g);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--gr),.35)}
.mu-btn.off{color:#0e1528;border-color:#0a1020}

@media(max-width:374px){.nc{width:50px;height:50px;font-size:1.1rem}.node-boss .nc{width:64px;height:64px}.node-lbl{font-size:8px}.hero-title{font-size:1.2rem}}
@media(min-width:769px){.nc{width:70px;height:70px;font-size:1.6rem}.node-boss .nc{width:88px;height:88px;font-size:2rem}.hero-title{font-size:2rem}.map-wrap{max-width:500px}}
/* ── TOWER ENTRY/EXIT OVERLAY ── */
#tower-entry{position:fixed;inset:0;z-index:195;display:flex;align-items:center;justify-content:center;background:#000;pointer-events:none;opacity:1;transition:opacity .5s ease}
#tower-entry.done{opacity:0}
#tower-entry svg{width:80px;height:280px;opacity:.25}
#tower-entry .te-seg{fill:rgba(255,255,255,.04);transition:all .3s ease}
#tower-entry .te-seg.lit{fill:rgba(var(--ar),.25);filter:drop-shadow(0 0 6px rgba(var(--ar),.4))}
#tower-entry .te-seg.target{fill:rgba(var(--ar),.6);filter:drop-shadow(0 0 14px rgba(var(--ar),.7)) drop-shadow(0 0 28px rgba(var(--ar),.3));animation:tePulse .8s ease-in-out infinite}
@keyframes tePulse{0%,100%{opacity:.8}50%{opacity:1}}
#tower-entry .te-line{stroke:var(--a);stroke-width:2;fill:none;stroke-dasharray:4 3;transition:all .6s cubic-bezier(.4,0,.2,1)}
.te-floor-label{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:clamp(12px,3vw,18px);font-weight:900;color:var(--a);letter-spacing:4px;text-transform:uppercase;opacity:0;transition:opacity .4s ease .3s;text-shadow:0 0 20px rgba(var(--ar),.5)}
#tower-entry.zooming .te-floor-label{opacity:1}
#tower-entry.zooming{transform:scale(4);transition:transform 1s cubic-bezier(.4,0,.2,1),opacity .4s ease .8s}
#tower-entry.zooming.done{opacity:0}
</style>
</head>

<canvas id="cvRoom"></canvas>
<canvas id="cvHolo"></canvas>

<!-- TACTICAL HUD -->

<!-- HEADER -->
<header>
<div class="flex items-center justify-between px-4 md:px-8 py-3">
  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded font-black text-xs uppercase tracking-widest transition hover:scale-105" style="background:rgba(var(--gr),.06);border:1px solid rgba(var(--gr),.2);color:var(--g)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="hidden sm:inline">Mundos</span></a>

<!-- MODAL -->
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeM()">
<div class="modal-box">
  <div class="flex items-center justify-between mb-4">
    <span id="m-badge" class="inline-flex items-center gap-1.5 px-3 py-1 rounded text-[10px] font-black uppercase tracking-wider"></span>
    <button onclick="closeM()" style="color:#0e1528;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#0e1528'"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="text-5xl text-center mb-3" id="m-icon"></div>

// ══════════════════════════════════════════════
// CANVAS 1 — ESPACIO ALGORÍTMICO
// Geometría sagrada, módulos de cálculo,
// matrix de energía, ejes de simetría
// ══════════════════════════════════════════════
(function(){
  var cv=document.getElementById('cvRoom'),ctx=cv.getContext('2d');
  var W,H,T=0,dpr=Math.min(devicePixelRatio||1,2);
  var isMobile=window.innerWidth<600;

  function resize(){W=innerWidth;H=innerHeight;isMobile=W<600;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize);

  function gl(c,b){ctx.shadowColor=c;ctx.shadowBlur=b}
  function ng(){ctx.shadowBlur=0}

  // ── ATMÓSFERA ──
  function drawAtmosphere(){
    // Glow teal desde el centro
    var g1=ctx.createRadialGradient(W*0.5,H*0.4,0,W*0.5,H*0.4,W*0.7);
    g1.addColorStop(0,'rgba(20,184,166,0.06)');
    g1.addColorStop(0.5,'rgba(20,184,166,0.025)');
    g1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
    // Glow violeta desde esquinas
    var corners=[[0,0],[W,0],[0,H],[W,H]];
    corners.forEach(function(c){
      var g2=ctx.createRadialGradient(c[0],c[1],0,c[0],c[1],W*0.55);
      g2.addColorStop(0,'rgba(139,92,246,0.04)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
    });
  }

  // ── GEOMETRÍA SAGRADA ──
  // 5 círculos concéntricos con vértices conectados
  var GEO_RINGS=[
    {r:0.15, n:6,  speed:1},
    {r:0.25, n:8,  speed:1.5},
    {r:0.35, n:10, speed:2},
    {r:0.45, n:12, speed:2.5},
    {r:0.55, n:16, speed:3}
  ];

  function drawSacredGeometry(){
    var cx=W*0.5, cy=H*0.38;
    var base=Math.min(W,H);

    GEO_RINGS.forEach(function(ring,ri){
      var radius=base*ring.r;
      var angle=T*0.003*ring.speed;
      var opBase=0.35-ri*0.055;
      var verts=[];

      // Calcular vértices
      for(var vi=0;vi<ring.n;vi++){
        var a=angle+vi*(Math.PI*2/ring.n);
        verts.push({x:cx+Math.cos(a)*radius, y:cy+Math.sin(a)*radius});
      }

      // Dibujar polígono
      gl('rgba(20,184,166,0.6)',8-ri);
      ctx.strokeStyle='rgba(20,184,166,'+opBase+')';
      ctx.lineWidth=1.2-ri*0.15;
      ctx.beginPath();
      verts.forEach(function(v,vi2){
        if(vi2===0)ctx.moveTo(v.x,v.y);
        else ctx.lineTo(v.x,v.y);
      });
      ctx.closePath();ctx.stroke();ng();

      // Puntos en vértices
      verts.forEach(function(v){
        ctx.fillStyle='rgba(20,184,166,'+(opBase+0.15)+')';
        ctx.beginPath();ctx.arc(v.x,v.y,1.5-ri*0.15,0,Math.PI*2);ctx.fill();
      });

      // Conectar con anillo adyacente (interior)
      if(ri>0){
        var prevRing=GEO_RINGS[ri-1];
        var prevRadius=base*prevRing.r;
        var prevAngle=T*0.003*prevRing.speed;
        var prevN=prevRing.n;
        ctx.strokeStyle='rgba(20,184,166,'+(opBase*0.4)+')';
        ctx.lineWidth=0.5;
        // Conectar cada vértice actual con el más cercano del anillo interior
        for(var vi3=0;vi3<Math.min(ring.n,isMobile?6:ring.n);vi3++){
          var a1=angle+vi3*(Math.PI*2/ring.n);
          var x1=cx+Math.cos(a1)*radius;
          var y1=cy+Math.sin(a1)*radius;
          // Vértice más cercano del anillo interior
          var closestIdx=Math.round(vi3*prevN/ring.n)%prevN;
          var a2=prevAngle+closestIdx*(Math.PI*2/prevN);
          var x2=cx+Math.cos(a2)*prevRadius;
          var y2=cy+Math.sin(a2)*prevRadius;
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        }
      }
    });

    // Punto central pulsante
    var pulse=(Math.sin(T*0.04)+1)/2;
    gl('rgba(20,184,166,0.9)',15+pulse*10);
    ctx.fillStyle='rgba(20,184,166,'+(0.5+pulse*0.4)+')';
    ctx.beginPath();ctx.arc(cx,cy,3+pulse*2,0,Math.PI*2);ctx.fill();ng();
  }

  // ── MÓDULOS DE CÁLCULO ──
  var MODULES=[
    {xf:0.04, yf:0.08, w:0.14, h:0.14, label:'PROC_01',    col:'rgba(20,184,166,'},
    {xf:0.82, yf:0.10, w:0.14, h:0.12, label:'NEURAL_NET', col:'rgba(139,92,246,'},
    {xf:0.04, yf:0.55, w:0.13, h:0.13, label:'ALGO_CORE',  col:'rgba(20,184,166,'},
    {xf:0.83, yf:0.52, w:0.13, h:0.14, label:'MATRIX_SYN', col:'rgba(139,92,246,'},
    {xf:0.35, yf:0.72, w:0.12, h:0.10, label:'DATA_BUS',   col:'rgba(20,184,166,'},
    {xf:0.56, yf:0.74, w:0.12, h:0.10, label:'QUANT_AI',   col:'rgba(139,92,246,'}
  ];

  function drawModules(){
    var modCount=isMobile?4:MODULES.length;
    for(var mi=0;mi<modCount;mi++){
      var m=MODULES[mi];
      var mx=W*m.xf, my=H*m.yf, mw=W*m.w, mh=H*m.h;

      // Fondo del módulo
      ctx.fillStyle='rgba(2,10,13,0.75)';
      ctx.fillRect(mx,my,mw,mh);

      // Borde neón
      gl(m.col+'0.7)',8);
      ctx.strokeStyle=m.col+'0.3)';ctx.lineWidth=1;
      ctx.strokeRect(mx,my,mw,mh);ng();

      // Barra de encabezado
      ctx.fillStyle=m.col+'0.08)';
      ctx.fillRect(mx,my,mw,10);
      ctx.font='6px "Orbitron",monospace';
      ctx.fillStyle=m.col+'0.6)';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(m.label,mx+mw/2,my+5);

      // Onda sinusoidal dentro del módulo
      ctx.strokeStyle=m.col+'0.5)';ctx.lineWidth=1;
      ctx.beginPath();
      var waveY=my+mh*0.55;
      var waveAmp=mh*0.18;
      for(var wx=0;wx<mw;wx+=2){
        var wy=waveY+Math.sin((wx/mw)*Math.PI*4+T*0.05+mi)*waveAmp;
        if(wx===0)ctx.moveTo(mx+wx,wy);
        else ctx.lineTo(mx+wx,wy);
      }
      ctx.stroke();

      // Barra de progreso cíclica (abajo del módulo)
      var progW=((T*0.5+mi*80)%200)/200;
      ctx.fillStyle=m.col+'0.15)';
      ctx.fillRect(mx+3,my+mh-6,mw-6,3);
      gl(m.col+'0.9)',4);
      ctx.fillStyle=m.col+'0.6)';
      ctx.fillRect(mx+3,my+mh-6,(mw-6)*progW,3);ng();

      // Esquinas decorativas
      var corners2=[[mx,my],[mx+mw,my],[mx,my+mh],[mx+mw,my+mh]];
      corners2.forEach(function(c2){
        gl(m.col+'0.8)',6);
        ctx.fillStyle=m.col+'0.7)';
        ctx.fillRect(c2[0]-1.5,c2[1]-1.5,3,3);ng();
      });
    }
  }

  // ── MATRIX DE ENERGÍA (grid de puntos) ──
  var GRID_COLS=12, GRID_ROWS=8;
  var activeGrid=[];
  // Inicializar puntos activos (~20%)
  for(var gi=0;gi<GRID_COLS*GRID_ROWS;gi++){
    activeGrid.push(Math.random()<0.2);
  }
  // Cambiar puntos activos cada ~3s
  var lastGridSwap=0;

  function drawEnergyMatrix(){
    var gx0=W*0.2, gy0=H*0.06;
    var gw=W*0.6, gh=H*0.25;
    var cellW=gw/GRID_COLS, cellH=gh/GRID_ROWS;

    // Cambiar puntos activos periódicamente
    if(T-lastGridSwap>180){
      lastGridSwap=T;
      for(var si=0;si<GRID_COLS*GRID_ROWS;si++){
        if(Math.random()<0.08)activeGrid[si]=!activeGrid[si];
      }
    }

    for(var gy=0;gy<GRID_ROWS;gy++){
      for(var gx2=0;gx2<GRID_COLS;gx2++){
        var idx=gy*GRID_COLS+gx2;
        var px3=gx0+gx2*cellW+cellW/2;
        var py3=gy0+gy*cellH+cellH/2;
        var isActive=activeGrid[idx];
        var phase=Math.sin(T*0.03+gx2*0.5+gy*0.7);
        var brightness=(phase+1)/2;

        if(isActive){
          // Punto activo — teal brillante
          gl('rgba(20,184,166,0.8)',6);
          ctx.fillStyle='rgba(20,184,166,'+(0.4+brightness*0.5)+')';
          ctx.beginPath();ctx.arc(px3,py3,2,0,Math.PI*2);ctx.fill();ng();
        } else {
          // Punto inactivo — violeta tenue
          ctx.fillStyle='rgba(139,92,246,'+(0.06+brightness*0.08)+')';
          ctx.beginPath();ctx.arc(px3,py3,1.2,0,Math.PI*2);ctx.fill();
        }
      }
    }

    // Conectar puntos activos cercanos
    ctx.strokeStyle='rgba(20,184,166,0.08)';ctx.lineWidth=0.5;
    for(var ai=0;ai<GRID_COLS*GRID_ROWS;ai++){
      if(!activeGrid[ai])continue;
      var ay2=Math.floor(ai/GRID_COLS), ax2=ai%GRID_COLS;
      // Revisar vecinos (derecha y abajo)
      var neighbors=[ai+1,ai+GRID_COLS];
      neighbors.forEach(function(ni){
        if(ni>=GRID_COLS*GRID_ROWS||!activeGrid[ni])return;
        var ny=Math.floor(ni/GRID_COLS),nx=ni%GRID_COLS;
        if(Math.abs(nx-ax2)>1)return;
        var px4=gx0+ax2*cellW+cellW/2, py4=gy0+ay2*cellH+cellH/2;
        var px5=gx0+nx*cellW+cellW/2, py5=gy0+ny*cellH+cellH/2;
        ctx.beginPath();ctx.moveTo(px4,py4);ctx.lineTo(px5,py5);ctx.stroke();
      });
    }
  }

  // ── EJES DE SIMETRÍA ──
  function drawSymmetryAxes(){
    var cx2=W*0.5, cy2=H*0.38;
    // 4 líneas diagonales desde el centro hacia las esquinas
    var targets=[[0,0],[W,0],[0,H],[W,H]];
    ctx.setLineDash([8,12]);
    targets.forEach(function(t2){
      gl('rgba(139,92,246,0.4)',6);
      ctx.strokeStyle='rgba(139,92,246,0.06)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(t2[0],t2[1]);ctx.stroke();
    });
    ctx.setLineDash([]);ng();
  }

  function frame(){
    T++;
    ctx.clearRect(0,0,W,H);
    drawAtmosphere();
    drawSymmetryAxes();
    drawEnergyMatrix();
    drawSacredGeometry();
    drawModules();
    requestAnimationFrame(frame);
  }
  resize();frame();
})();

// ══════════════════════════════════════════════
// CANVAS 2 — FLUJO DE DATOS
// Data streams tipo Matrix, nodos de procesamiento,
// ondas de cálculo expansivas
// ══════════════════════════════════════════════
(function(){
  var cv=document.getElementById('cvHolo'),ctx=cv.getContext('2d');
  var W,H,T=0,dpr=Math.min(devicePixelRatio||1,2);
  var isMobile=window.innerWidth<600;

  function resize(){W=innerWidth;H=innerHeight;isMobile=W<600;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize);resize();

  // ── DATA STREAMS (Matrix rain) ──
  var CHARS='0123456789ABCDEF+-x~=<>{}[]()'.split('');
  var STREAMS=[];
  var streamCount=isMobile?8:14;
  for(var i=0;i<streamCount;i++){
    STREAMS.push({
      x:W*0.05+Math.random()*W*0.9,
      y:Math.random()*-200,
      speed:0.6+Math.random()*1.2,
      len:8+Math.floor(Math.random()*12),
      col:Math.random()>0.35?'rgba(20,184,166,':'rgba(139,92,246,'
    });
  }

  // ── NODOS DE PROCESAMIENTO ──
  var NODES=[];
  var nodeCount=isMobile?4:7;
  for(var ni2=0;ni2<nodeCount;ni2++){
    NODES.push({
      x:W*0.1+Math.random()*W*0.8,
      y:H*0.1+Math.random()*H*0.7,
      r:3+Math.random()*3,
      activeAt:Math.floor(Math.random()*300),
      wavesR:[],
      col:ni2%2===0?'rgba(20,184,166,':'rgba(139,92,246,'
    });
  }

  function frame(){
    T++;ctx.clearRect(0,0,W,H);

    // Dibujar data streams
    ctx.font='10px "Share Tech Mono",monospace';
    ctx.textAlign='center';
    STREAMS.forEach(function(s){
      s.y+=s.speed;
      if(s.y>H+100){s.y=-100;s.x=W*0.05+Math.random()*W*0.9;}

      // Cabeza del stream (brillante)
      ctx.shadowColor=s.col+'0.9)';ctx.shadowBlur=8;
      ctx.fillStyle=s.col+'0.85)';
      var headChar=CHARS[Math.floor(Math.random()*CHARS.length)];
      ctx.fillText(headChar,s.x,s.y);ctx.shadowBlur=0;

      // Cola del stream (desvanecimiento)
      for(var ti=1;ti<s.len;ti++){
        var ty2=s.y-ti*12;
        if(ty2<0)break;
        var alpha=0.5*(1-ti/s.len);
        ctx.fillStyle=s.col+alpha+')';
        ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)],s.x,ty2);
      }
    });

    // Dibujar nodos de procesamiento
    NODES.forEach(function(nd2,ni3){
      var pulse2=(Math.sin(T*0.04+ni3*1.2)+1)/2;

      // Activación periódica (~cada 3s)
      if(T%180===nd2.activeAt%180){
        nd2.wavesR.push(0); // Nueva onda expansiva
      }

      // Círculo base del nodo
      ctx.shadowColor=nd2.col+'0.8)';ctx.shadowBlur=8+pulse2*6;
      ctx.fillStyle=nd2.col+(0.5+pulse2*0.4)+')';
      ctx.beginPath();ctx.arc(nd2.x,nd2.y,nd2.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;

      // Anillo exterior
      ctx.strokeStyle=nd2.col+'0.25)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.arc(nd2.x,nd2.y,nd2.r+4+pulse2*2,0,Math.PI*2);ctx.stroke();

      // Ondas expansivas
      var wavesVivas=[];
      nd2.wavesR.forEach(function(wr){
        var newR=wr+1.2;
        if(newR<120){
          wavesVivas.push(newR);
          var wOp=0.3*(1-newR/120);
          ctx.strokeStyle=nd2.col+wOp+')';ctx.lineWidth=1;
          ctx.beginPath();ctx.arc(nd2.x,nd2.y,newR,0,Math.PI*2);ctx.stroke();
        }
      });
      nd2.wavesR=wavesVivas;
    });

    // Conexiones entre nodos
    ctx.strokeStyle='rgba(20,184,166,0.06)';ctx.lineWidth=0.6;
    for(var na=0;na<NODES.length;na++){
      for(var nb=na+1;nb<NODES.length;nb++){
        var dx=NODES[na].x-NODES[nb].x, dy=NODES[na].y-NODES[nb].y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<W*0.35){
          var lineOp=0.04*(1-dist/(W*0.35));
          var pulseLine=(Math.sin(T*0.02+na+nb)+1)/2;
          ctx.strokeStyle='rgba(20,184,166,'+(lineOp+pulseLine*0.03)+')';
          ctx.beginPath();ctx.moveTo(NODES[na].x,NODES[na].y);ctx.lineTo(NODES[nb].x,NODES[nb].y);ctx.stroke();
        }
      }
    }

    requestAnimationFrame(frame);
  }
  frame();
})();

// ══════════════════════════════════════════════
// CANVAS 3 — PARTÍCULAS GEOMÉTRICAS
// Triángulos, hexágonos, destellos y líneas
// ══════════════════════════════════════════════
(function(){
  var cv=document.getElementById('cvFx'),ctx=cv.getContext('2d');
  var W,H,T=0,dpr=Math.min(devicePixelRatio||1,2);
  var isMobile=window.innerWidth<600;

  function resize(){W=innerWidth;H=innerHeight;isMobile=W<600;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize);resize();

  // Partículas geométricas
  var PARTS=[];
  var partCount=isMobile?35:70;
  for(var pi2=0;pi2<partCount;pi2++)PARTS.push(mkPart({}));

  function mkPart(p){
    var rnd=Math.random();
    if(rnd<0.4)p.type='tri';
    else if(rnd<0.7)p.type='hex';
    else if(rnd<0.9)p.type='dot';
    else p.type='line';

    p.x=Math.random()*W;
    p.y=Math.random()*H;
    p.vx=(Math.random()-0.5)*0.3;
    p.vy=(Math.random()-0.5)*0.25;
    p.r=p.type==='tri'?(3+Math.random()*3):(p.type==='hex'?(2+Math.random()*2):(1+Math.random()*1.5));
    p.rot=Math.random()*Math.PI*2;
    p.rotV=(Math.random()-0.5)*0.02;
    p.life=0;
    p.maxLife=200+Math.random()*400;
    p.delay=Math.random()*120;
    p.col=Math.random()>0.4?'rgba(20,184,166,':'rgba(139,92,246,';
    if(p.type==='dot')p.col='rgba(224,242,254,'; // Blanco energético
    return p;
  }

  function drawTriangle(x,y,r,rot){
    ctx.beginPath();
    for(var vi2=0;vi2<3;vi2++){
      var a2=rot+vi2*(Math.PI*2/3);
      var vx2=x+Math.cos(a2)*r, vy2=y+Math.sin(a2)*r;
      if(vi2===0)ctx.moveTo(vx2,vy2);else ctx.lineTo(vx2,vy2);
    }
    ctx.closePath();
  }

  function drawHexagon(x,y,r,rot){
    ctx.beginPath();
    for(var vi3=0;vi3<6;vi3++){
      var a3=rot+vi3*(Math.PI/3);
      var vx3=x+Math.cos(a3)*r, vy3=y+Math.sin(a3)*r;
      if(vi3===0)ctx.moveTo(vx3,vy3);else ctx.lineTo(vx3,vy3);
    }
    ctx.closePath();
  }

  function frame(){
    T++;ctx.clearRect(0,0,W,H);

    PARTS.forEach(function(p){
      if(T<p.delay)return;
      p.life++;
      if(p.life>p.maxLife){mkPart(p);p.delay=0;return;}

      var pr2=p.life/p.maxLife;
      var fadeIn=pr2<0.1?pr2/0.1:1;
      var fadeOut=pr2>0.85?(1-(pr2-0.85)/0.15):1;
      var al2=fadeIn*fadeOut;

      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;

      // Rebote en bordes
      if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
      if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;

      if(p.type==='tri'){
        ctx.shadowColor=p.col+'0.7)';ctx.shadowBlur=4;
        ctx.strokeStyle=p.col+(al2*0.55)+')';ctx.lineWidth=0.8;
        drawTriangle(p.x,p.y,p.r,p.rot);
        ctx.stroke();ctx.shadowBlur=0;
      } else if(p.type==='hex'){
        ctx.shadowColor=p.col+'0.6)';ctx.shadowBlur=3;
        ctx.strokeStyle=p.col+(al2*0.45)+')';ctx.lineWidth=0.7;
        drawHexagon(p.x,p.y,p.r,p.rot);
        ctx.stroke();ctx.shadowBlur=0;
      } else if(p.type==='dot'){
        var sparkle=(Math.sin(T*0.1+p.x+p.y)+1)/2;
        ctx.shadowColor=p.col+'0.9)';ctx.shadowBlur=p.r*4;
        ctx.fillStyle=p.col+(al2*(0.3+sparkle*0.6))+')';
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*0.8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      } else {
        // Línea horizontal viajera
        ctx.strokeStyle=p.col+(al2*0.3)+')';ctx.lineWidth=0.6;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+12+Math.random()*8,p.y);ctx.stroke();
      }
    });

    requestAnimationFrame(frame);
  }
  frame();
})();

// ══════════════════════════════════════════════
// MAP — STRATEGIC STATION NODES & PATHS
// ══════════════════════════════════════════════
var N=levels.length,MAP_W,NODE_H=110,PAD_TOP=40,nodePos=[];
function calcPositions(){
  MAP_W=document.getElementById('mapWrap').offsetWidth;nodePos=[];
  var margin=52,usable=MAP_W-margin*2;
  for(var i=0;i<N;i++){
    var row=Math.floor(i/3),col=i%3,goingRight=row%2===0;
    var xNorm=goingRight?col/2:(2-col)/2;
    var rawX=margin+xNorm*usable,wave=Math.sin(i*0.8)*usable*0.12;
    nodePos.push({x:Math.max(margin,Math.min(MAP_W-margin,rawX+wave)),y:PAD_TOP+(N-1-i)*NODE_H});}}
calcPositions();
var totalH=PAD_TOP+N*NODE_H+60;
document.getElementById('nodesLayer').style.height=totalH+'px';
document.getElementById('pathSvg').setAttribute('height',totalH);
document.getElementById('pathSvg').style.height=totalH+'px';

function drawPaths(){
  calcPositions();var svg=document.getElementById('pathSvg');svg.innerHTML='';
  for(var i=0;i<N-1;i++){
    var a_=nodePos[i],b_=nodePos[i+1],sA=levels[i].s,sB=levels[i+1].s;
    var cls=(sA==='completed'&&sB==='completed')?'path-done':(sA==='completed'&&sB==='active')?'path-active':'path-locked';
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    var midY=(a_.y+b_.y)/2;
    path.setAttribute('d','M '+a_.x+' '+a_.y+' C '+a_.x+' '+midY+', '+b_.x+' '+midY+', '+b_.x+' '+b_.y);
    path.setAttribute('class',cls);svg.appendChild(path);}}
drawPaths();
window.addEventListener('resize',function(){drawPaths();placeNodes();});

function placeNodes(){
  calcPositions();var layer=document.getElementById('nodesLayer');layer.innerHTML='';
  for(var i=0;i<N;i++){
    var lv=levels[i],p=nodePos[i],isBoss=!!lv.boss;
    var nd=document.createElement('div');
    nd.className='node'+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');
    nd.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;transform:translate(-50%,-50%)';
    var circCls=lv.s==='completed'?'nc-done':(lv.s==='active'?'nc-active':'nc-locked');
    var content=lv.s==='completed'?'✓':(lv.s==='active'?(icons[i]||'♟️'):'<span class="material-symbols-outlined" style="font-size:1.15em;color:#0e1528">lock</span>');
    var bossTag=isBoss?'<span class="'+(lv.s==='locked'?'boss-tag locked':'boss-tag')+'">'+lv.boss+'</span>':'';
    var scanRings=lv.s==='active'?'<div class="scan-ring sr-b"></div><div class="scan-ring sr-a"></div>':'';
    var starHtml=lv.s==='completed'?'<span class="son">★</span><span class="son">★</span><span class="son">★</span>':'<span class="soff">☆</span><span class="soff">☆</span><span class="soff">☆</span>';
    var lblCls=lv.s==='completed'?'lbl-done':(lv.s==='active'?'lbl-active':'lbl-locked');
    var tE=lv.t.replace(/'/g,"\\'"),dE=lv.d.replace(/'/g,"\\'");
    if(lv.s!=='locked')nd.setAttribute('onclick',"openM("+lv.n+",'"+tE+"','"+dE+"','"+lv.s+"',"+lv.xp+")");
    else nd.setAttribute('onclick','sfxL()');
    nd.innerHTML=
      '<div style="display:flex;flex-direction:column;align-items:center;position:relative">'+
        '<div class="nfw">'+
          '<span class="brk brk-tl"></span><span class="brk brk-tr"></span>'+
          '<span class="brk brk-bl"></span><span class="brk brk-br"></span>'+
          scanRings+
          '<div class="nc '+circCls+'" style="position:relative">'+content+bossTag+'</div>'+
        '</div>'+
        '<div class="nread"><div class="nrl"></div><div class="nrs"></div></div>'+
        '<div class="node-stars">'+starHtml+'</div>'+
        '<div class="node-lbl '+lblCls+'">'+lv.n+'</div>'+
      '</div>';
    layer.appendChild(nd);}}
placeNodes();

var actLv=levels.find(function(l){return l.s==='active'});
if(actLv){
  var ai=levels.findIndex(function(l){return l.s==='active'});
  var tE2=actLv.t.replace(/'/g,"\\'"),dE2=actLv.d.replace(/'/g,"\\'");
  document.getElementById('quest').innerHTML=
    '<div class="quest-box">'+
    '<div class="qico">'+(icons[ai]||'♟️')+'</div>'+
    '<div style="flex:1"><div class="qlbl">ESTACIÓN ACTIVA</div><div class="qtitle">'+actLv.t+'</div></div>'+
    '<button onclick="openM('+actLv.n+',\''+tE2+'\',\''+dE2+'\',\'active\','+actLv.xp+')" class="qbtn">▶ EJECUTAR</button>'+
    '</div>';}

// ══════════════════════════════════════════════
// AUDIO — deep cinematic war room tone
// ══════════════════════════════════════════════
var actx,mg,sOn=true;
(function(){function u(){if(actx&&actx.state==='suspended')actx.resume();var c=new(AudioContext||webkitAudioContext)();var b=c.createBuffer(1,1,22050);var s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);if(c.state==='suspended')c.resume();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();
function initA(){if(actx){if(actx.state==='suspended')actx.resume();return;}actx=new(AudioContext||webkitAudioContext)();if(actx.state==='suspended')actx.resume();mg=actx.createGain();mg.gain.value=.065;mg.connect(actx.destination);
  // Low sub + warm harmonics
  [[0,0.008,'sine'],[7,0.007,'sawtooth'],[14,0.005,'triangle']].forEach(function(s,i){
    var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    o.type=s[2];o.frequency.value=44*Math.pow(2,s[0]/12);
    f.type='lowpass';f.frequency.value=250+i*80;f.Q.value=1.2;
    g.gain.value=s[1];o.connect(f);f.connect(g);g.connect(mg);o.start();
    var lfo=actx.createOscillator(),lg=actx.createGain();
    lfo.frequency.value=.03+i*.008;lg.gain.value=1.5;
    lfo.connect(lg);lg.connect(o.frequency);lfo.start();});
  // Melodic — dorian/minor feel for gravitas
  var sc=[0,2,3,7,9,12,14],ni=0;
  (function play(){if(!sOn){setTimeout(play,2200);return;}
    var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);
    var fr=44*2*Math.pow(2,semi/12);
    var o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle';o.frequency.value=fr;
    g.gain.setValueAtTime(.012,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+3.2);
    o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+3.2);
    ni++;setTimeout(play,2000+Math.random()*1600);})();}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d);}
function sfxL(){sfx(100,.16);}
function sfxO(){[330,440,550].forEach(function(f,i){setTimeout(function(){sfx(f,.18);},i*60);});}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.065:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇';}
document.addEventListener('click',function(){initA();},{once:true});

function openM(n,t,d,s,xp){sfxO();
  var ic=icons[levels.findIndex(function(l){return l.n===n})]||'♟️';
  document.getElementById('m-icon').textContent=ic;
  var b=document.getElementById('m-badge'),c=document.getElementById('m-cta'),nx=document.getElementById('m-next');
  var nxt=levels.find(function(l){return l.n===n+1});
  if(s==='completed'){
    b.textContent='✓ EJECUTADO';b.style.cssText='background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.25)';
    document.getElementById('m-stars').textContent='★★★';
    c.textContent='🔄 REPASAR';c.style.cssText='background:rgba(34,197,94,.08);color:#22c55e;border:1px solid rgba(34,197,94,.2);width:100%;padding:12px;border-radius:4px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';
    c.onclick=function(){location.href='leccion.html?world=5&level='+n};
    if(nxt){nx.classList.remove('hidden');nx.textContent='▶ SIGUIENTE';nx.style.cssText='background:linear-gradient(135deg,var(--gd),var(--gb));color:#03060d;width:100%;padding:12px;border-radius:4px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';nx.onclick=function(){location.href='leccion.html?world=5&level='+nxt.n};}
    else nx.classList.add('hidden');
  }else if(s==='active'){
    b.innerHTML='<span style="display:inline-block;width:6px;height:6px;background:var(--gb);transform:rotate(45deg);animation:nap 1s infinite;margin-right:4px"></span>EN OPERACIÓN';
    b.style.cssText='background:rgba(var(--gr),.08);color:var(--gb);border:1px solid rgba(var(--gr),.22)';
    document.getElementById('m-stars').textContent='★★★';
    c.textContent='▶ EJECUTAR';c.style.cssText='background:linear-gradient(135deg,var(--gd),var(--gb));color:#03060d;width:100%;padding:12px;border-radius:4px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';
    c.onclick=function(){location.href='leccion.html?world=5&level='+n;};nx.classList.add('hidden');
  }else{
    b.textContent='🔒 CLASIFICADO';b.style.cssText='background:rgba(107,114,128,.08);color:#6b7280;border:1px solid rgba(107,114,128,.15)';
    document.getElementById('m-stars').textContent='☆☆☆';c.style.display='none';nx.classList.add('hidden');}
  document.getElementById('m-title').textContent='Nivel '+n+': '+t;
  document.getElementById('m-desc').textContent=d;
  document.getElementById('m-xp').textContent='+'+xp+' XP';
  document.getElementById('modal').classList.remove('hidden');}
function closeM(){document.getElementById('modal').classList.add('hidden');document.getElementById('m-cta').style.display='';}
</script>
