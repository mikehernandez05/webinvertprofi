<style>

body{background:#020a14;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;

.atmo::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(14,165,233,.03),transparent 40%),radial-gradient(circle at 70% 80%,rgba(2,132,199,.04),transparent 40%)}
#fxC{position:fixed;inset:0;z-index:1;pointer-events:none}
.scan{position:fixed;inset:0;z-index:80;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.01) 3px,rgba(0,0,0,.01) 4px)}

/* ═══ GLOBE/MACRO DECORATIONS ═══ */
.world-deco{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.globe-ring{position:absolute;border-radius:50%;border:1px solid rgba(var(--ar),.04);top:50%;left:50%;transform:translate(-50%,-50%)}

.gr-2{width:280px;height:280px;animation:globeR 18s linear infinite reverse;border-style:dashed;border-color:rgba(var(--ar),.025)}
.gr-3{width:200px;height:200px;animation:globeR 30s linear infinite;border-width:2px;border-color:rgba(var(--ar),.02)}

/* Latitude lines */
.lat-line{position:fixed;z-index:3;pointer-events:none;height:1px;left:0;right:0;background:linear-gradient(90deg,transparent,rgba(var(--ar),.04) 30%,rgba(var(--ar),.04) 70%,transparent);opacity:.5}
.lat-1{top:25%}.lat-2{top:50%}.lat-3{top:75%}

/* Map dots */
.map-dot{position:fixed;z-index:4;pointer-events:none;width:4px;height:4px;border-radius:50%;background:rgba(var(--ar),.15);animation:mapDotPulse 3s ease-in-out infinite}
.md-1{top:28%;left:18%;animation-delay:0s}.md-2{top:35%;right:25%;animation-delay:.8s}
.md-3{top:55%;left:30%;animation-delay:1.6s}.md-4{top:70%;right:15%;animation-delay:2.4s}
.md-5{top:40%;left:65%;animation-delay:.4s}
@keyframes mapDotPulse{0%,100%{opacity:.15;box-shadow:none}50%{opacity:.6;box-shadow:0 0 8px rgba(var(--ar),.3)}}

/* Connection lines between dots */
.conn-line{position:fixed;z-index:3;pointer-events:none;height:1px;opacity:.03;background:rgba(var(--ar),.5);transform-origin:left center}

.world-hero{position:relative;z-index:10;padding:20px 16px 12px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 16px;border-radius:999px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(135deg,rgba(var(--ar),.1),rgba(var(--ar),.03));border:1px solid rgba(var(--ar),.2);color:var(--a);box-shadow:0 0 20px rgba(var(--ar),.08)}
.hero-badge .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Macro dashboard */
.macro-dash{margin:12px auto;max-width:320px;border-radius:14px;padding:10px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;

.mi-up{color:#22c55e}.mi-down{color:#ef4444}.mi-neutral{color:var(--a)}

#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-done{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 6px rgba(var(--ar),.4));stroke-linecap:round}
.path-active{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 8px rgba(var(--ar),.5));stroke-linecap:round;stroke-dasharray:10 6;animation:dashAnim 1s linear infinite}
.path-locked{stroke:rgba(255,255,255,.06);stroke-width:3;fill:none;stroke-linecap:round}

.node{position:absolute;z-index:15;cursor:pointer;transition:transform .25s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.node:active{transform:translate(-50%,-50%) scale(.9)!important}.node.locked{cursor:not-allowed;filter:saturate(.2) brightness(.5)}.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}

.nc-active{background:radial-gradient(circle at 35% 35%,#7dd3fc,rgba(var(--ar),.5) 50%,#0c4a6e);border:3px solid var(--a);animation:activePulse 2s ease-in-out infinite;box-shadow:0 0 30px rgba(var(--ar),.6),0 0 60px rgba(var(--ar),.15),0 4px 15px rgba(0,0,0,.4)}
.nc-active::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.35),transparent 60%);pointer-events:none}
@keyframes activePulse{0%,100%{box-shadow:0 0 30px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4);transform:scale(1)}50%{box-shadow:0 0 50px rgba(var(--ar),.7),0 0 80px rgba(var(--ar),.2);transform:scale(1.08)}}
.nc-locked{background:radial-gradient(circle at 35% 35%,#1a2530,#101820 60%,#060e14);border:3px solid #1a2530;box-shadow:0 4px 15px rgba(0,0,0,.6),inset 0 -3px 6px rgba(0,0,0,.4)}
.node-boss .node-circle{width:78px;height:78px;font-size:1.8rem}
.boss-tag{position:absolute;top:-6px;right:-6px;font-size:8px;font-weight:900;font-family:'Orbitron',sans-serif;border-radius:999px;padding:2px 8px;z-index:20;letter-spacing:.5px;background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;box-shadow:0 0 12px rgba(var(--ar),.4)}

.node-lbl{text-align:center;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}

.node-stars{text-align:center;font-size:10px;margin-top:2px}.star-on{color:#fbbf24}.star-off{color:#333}
.quest-box{border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(var(--ar),.06),rgba(0,0,0,.4));border:1px solid rgba(var(--ar),.12);backdrop-filter:blur(10px)}
.quest-box .quest-icon{font-size:1.4rem;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(var(--ar),.06);border:1px solid rgba(var(--ar),.12)}
.quest-box .quest-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--ar),.4);text-transform:uppercase;letter-spacing:3px}
.quest-box .quest-title{font-size:13px;color:#ccc;font-weight:700}
.quest-box .quest-btn{padding:8px 16px;border-radius:12px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:10px;cursor:pointer;border:none;background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;box-shadow:0 0 15px rgba(var(--ar),.3);transition:all .2s}
.quest-box .quest-btn:hover{transform:scale(1.05)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-box{background:linear-gradient(135deg,#061420,#081828,#061420);border:1px solid rgba(var(--ar),.25);border-radius:24px;padding:28px;max-width:400px;width:calc(100% - 2rem);box-shadow:0 0 80px rgba(var(--ar),.08),0 25px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(var(--ar),.1)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--ar),.2);background:rgba(2,10,20,.9);color:var(--a);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.3)}.mu-btn.off{color:#444;border-color:#1f2530}
header{border-image:linear-gradient(90deg,transparent,rgba(var(--ar),.3),transparent) 1}
@media(max-width:374px){.node-circle{width:52px;height:52px;font-size:1.15rem}.node-boss .node-circle{width:64px;height:64px}.node-lbl{font-size:8px}.map-wrap{max-width:340px}.hero-title{font-size:1.3rem}}
@media(min-width:375px) and (max-width:480px){.node-circle{width:58px;height:58px;font-size:1.3rem}.node-boss .node-circle{width:70px;height:70px}}

@media(hover:none){.node:active{transform:translate(-50%,-50%) scale(.92)!important}}
</style>
</head>

<script>
var A='#0ea5e9',AR='14,165,233',WN=5;
var levels=window._wL=[{"n": 61, "t": "Macroeconomía", "d": "El sol del sistema.", "xp": 200}, {"n": 62, "t": "Ciclo de Deuda", "d": "Ray Dalio decodificado.", "xp": 250}, {"n": 63, "t": "FED y Tasas", "d": "La herramienta más poderosa.", "xp": 200}, {"n": 64, "t": "Inflación", "d": "IPC y deflación.", "xp": 200}, {"n": 65, "t": "DXY", "d": "El rey de las divisas.", "xp": 200}, {"n": 66, "t": "Geopolítica", "d": "Guerras y commodities.", "xp": 250}, {"n": 67, "t": "Bonos", "d": "Renta fija.", "xp": 200}, {"n": 68, "t": "Opciones I", "d": "Calls, Puts, primas.", "xp": 250}, {"n": 69, "t": "Futuros", "d": "Contratos billonarios.", "xp": 250}, {"n": 70, "t": "Psicología 1%", "d": "Dominio del ego.", "xp": 200}, {"n": 71, "t": "Sesgos Cognitivos", "d": "El enemigo interno.", "xp": 200}, {"n": 72, "t": "Bio-Hacking", "d": "El cuerpo del trader.", "xp": 200}, {"n": 73, "t": "Fiscal", "d": "Planificación fiscal.", "xp": 200}, {"n": 74, "t": "Real Estate", "d": "Diversificación real.", "xp": 200}, {"n": 75, "t": "⚡ BOSS: Tesis Macro", "d": "Tesis macroeconómica.", "xp": 500, "boss": "BOSS"}];
var icons=["🌞", "🔄", "🏛️", "📊", "💵", "🌍", "📜", "🎲", "📈", "🧠", "🪞", "🧬", "📋", "🏠", "🏆"];

document.getElementById('comp-ct').textContent=cc+'/'+levels.length;document.getElementById('xp-ct').textContent=cx.toLocaleString()+' XP';document.getElementById('prog-bar').style.width=Math.round(cc/levels.length*100)+'%';
var N=levels.length,MAP_W,NODE_H=110,PAD_TOP=40,nodePos=[];
function calcPositions(){MAP_W=document.getElementById('mapWrap').offsetWidth;nodePos=[];var margin=50,usable=MAP_W-margin*2;for(var i=0;i<N;i++){var row=Math.floor(i/3),col=i%3,goingRight=row%2===0;var xNorm=goingRight?col/2:(2-col)/2;var rawX=margin+xNorm*usable,wave=Math.sin(i*0.8)*usable*0.12;nodePos.push({x:Math.max(margin,Math.min(MAP_W-margin,rawX+wave)),y:PAD_TOP+(N-1-i)*NODE_H})}}

function drawPaths(){calcPositions();var svg=document.getElementById('pathSvg');svg.innerHTML='';for(var i=0;i<N-1;i++){var a_=nodePos[i],b_=nodePos[i+1],sA=levels[i].s,sB=levels[i+1].s;var cls=(sA==='completed'&&sB==='completed')?'path-done':(sA==='completed'&&sB==='active')?'path-active':'path-locked';var path=document.createElementNS('http://www.w3.org/2000/svg','path');var midY=(a_.y+b_.y)/2;path.setAttribute('d','M '+a_.x+' '+a_.y+' C '+a_.x+' '+midY+', '+b_.x+' '+midY+', '+b_.x+' '+b_.y);path.setAttribute('class',cls);svg.appendChild(path)}}
drawPaths();window.addEventListener('resize',function(){drawPaths();placeNodes()});
function placeNodes(){calcPositions();var layer=document.getElementById('nodesLayer');layer.innerHTML='';for(var i=0;i<N;i++){var lv=levels[i],p=nodePos[i],isBoss=!!lv.boss;var nd=document.createElement('div');nd.className='node'+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');nd.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;transform:translate(-50%,-50%)';var circCls=lv.s==='completed'?'nc-done':(lv.s==='active'?'nc-active':'nc-locked');var content=lv.s==='completed'?'✓':(lv.s==='active'?(icons[i]||'🔥'):'<span class="material-symbols-outlined text-gray-600" style="font-size:1.2em">lock</span>');var bossTag='';if(isBoss){bossTag='<span class="'+(lv.s==='locked'?'boss-tag locked':'boss-tag')+'">'+lv.boss+'</span>'}var starHtml=lv.s==='completed'?'<span class="star-on">⭐</span><span class="star-on">⭐</span><span class="star-on">⭐</span>':'<span class="star-off">☆</span><span class="star-off">☆</span><span class="star-off">☆</span>';var lblCls=lv.s==='completed'?'lbl-done':(lv.s==='active'?'lbl-active':'lbl-locked');var tE=lv.t.replace(/'/g,"\\'"),dE=lv.d.replace(/'/g,"\\'");if(lv.s!=='locked')nd.setAttribute('onclick',"openM("+lv.n+",'"+tE+"','"+dE+"','"+lv.s+"',"+lv.xp+")");else nd.setAttribute('onclick','sfxL()');nd.innerHTML='<div style="position:relative;display:flex;flex-direction:column;align-items:center"><div class="node-circle '+circCls+'" style="position:relative">'+content+bossTag+'</div><div class="node-stars">'+starHtml+'</div><div class="node-lbl '+lblCls+'">'+lv.n+'</div></div>';layer.appendChild(nd)}}
placeNodes();
var actLv=levels.find(function(l){return l.s==='active'});if(actLv){var tE2=actLv.t.replace(/'/g,"\\'"),dE2=actLv.d.replace(/'/g,"\\'");document.getElementById('quest').innerHTML='<div class="quest-box"><div class="quest-icon">🌍</div><div class="flex-1"><div class="quest-label">NIVEL ACTUAL</div><div class="quest-title">'+actLv.t+'</div></div><button onclick="openM('+actLv.n+',\''+tE2+'\',\''+dE2+'\',\'active\','+actLv.xp+')" class="quest-btn">▶ JUGAR</button></div>'}
var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);[0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o.type=i<2?'sine':'triangle';o.frequency.value=58*Math.pow(2,s/12);f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;o.connect(f);f.connect(g);g.connect(mg);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});var sc=[0,2,4,5,7,9,11],ni=0;(function play(){if(!sOn){setTimeout(play,2000);return}var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);var fr=58*2*Math.pow(2,semi/12);var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}
function sfxC(){sfx(880,.1);setTimeout(function(){sfx(660,.07)},35)}function sfxL(){sfx(150,.15)}function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.08:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇'}
document.addEventListener('click',function(){initA()},{once:true});
function openM(n,t,d,s,xp){sfxO();var ic=icons[levels.findIndex(function(l){return l.n===n})]||'🔥';document.getElementById('m-icon').textContent=ic;var b=document.getElementById('m-badge'),c=document.getElementById('m-cta'),nx=document.getElementById('m-next');var nxt=levels.find(function(l){return l.n===n+1});if(s==='completed'){b.textContent='✓ COMPLETADO';b.style.cssText='background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.25)';document.getElementById('m-stars').textContent='⭐⭐⭐';c.textContent='🔄 REPASAR';c.style.cssText='background:rgba(34,197,94,.08);color:#22c55e;border:1px solid rgba(34,197,94,.2);width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';c.onclick=function(){location.href='leccion.html?world=5&level='+n};if(nxt){nx.classList.remove('hidden');nx.textContent='▶ SIGUIENTE';nx.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';nx.onclick=function(){location.href='leccion.html?world=5&level='+nxt.n}}else nx.classList.add('hidden')}else if(s==='active'){b.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--a);animation:activePulse 1s infinite;margin-right:4px"></span> EN PROGRESO';b.style.cssText='background:rgba(var(--ar),.1);color:var(--a);border:1px solid rgba(var(--ar),.2)';document.getElementById('m-stars').textContent='⭐⭐⭐';c.textContent='▶ JUGAR';c.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';c.onclick=function(){location.href='leccion.html?world=5&level='+n};nx.classList.add('hidden')}else{b.textContent='🔒 BLOQUEADO';b.style.cssText='background:rgba(107,114,128,.08);color:#6b7280;border:1px solid rgba(107,114,128,.15)';document.getElementById('m-stars').textContent='☆☆☆';c.style.display='none';nx.classList.add('hidden')}document.getElementById('m-title').textContent='Nivel '+n+': '+t;document.getElementById('m-desc').textContent=d;document.getElementById('m-xp').textContent='+'+xp+' XP';document.getElementById('modal').classList.remove('hidden')}
function closeM(){document.getElementById('modal').classList.add('hidden');document.getElementById('m-cta').style.display=''}

// ═══ WORLD FX — FLOATING GLOBE PARTICLES ═══
(function(){var cv=document.getElementById('fxC'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',rs);rs();
  var pts=[];for(var i=0;i<30;i++)pts.push({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*2.5,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,ph:Math.random()*6.28,sp:.01+Math.random()*.015});
  function f(){x.clearRect(0,0,W,H);
    pts.forEach(function(p){p.ph+=p.sp;p.x+=p.vx+Math.sin(p.ph)*.3;p.y+=p.vy+Math.cos(p.ph)*.3;
      if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;
      var a=.15+.1*Math.sin(p.ph*2);x.beginPath();x.arc(p.x,p.y,p.s,0,6.28);x.fillStyle='rgba(14,165,233,'+a+')';x.fill();
      x.beginPath();x.arc(p.x,p.y,p.s*4,0,6.28);x.fillStyle='rgba(14,165,233,'+(a*.06)+')';x.fill()});
    // Connection lines between nearby particles
    for(var i=0;i<pts.length;i++){for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);x.strokeStyle='rgba(14,165,233,'+(0.03*(1-d/120))+')';x.lineWidth=1;x.stroke()}}}
    requestAnimationFrame(f)}f()})();
</script>
