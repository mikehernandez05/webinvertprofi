var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);[0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o.type=i<2?'sine':'triangle';o.frequency.value=44*Math.pow(2,s/12);f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;o.connect(f);f.connect(g);g.connect(mg);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});var sc=[0,2,3,5,7,8,10],ni=0;(function play(){if(!sOn){setTimeout(play,2000);return}var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);var fr=44*2*Math.pow(2,semi/12);var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}
function sfxC(){sfx(880,.1);setTimeout(function(){sfx(660,.07)},35)}function sfxL(){sfx(150,.15)}function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.08:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇'}

// ═══ WORLD FX — RADAR SWEEP + RED PARTICLES ═══
(function(){var cv=document.getElementById('fxC'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',rs);rs();
  var angle=0;var targets=[];for(var i=0;i<12;i++)targets.push({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*2,ph:Math.random()*6.28,sp:.005+Math.random()*.01});
  function f(){x.clearRect(0,0,W,H);angle+=.006;
    // Radar sweep
    var cx=W*.5,cy=H*.4,r=Math.min(W,H)*.3;
    x.save();x.globalAlpha=.03;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,angle,angle+.6);x.closePath();
    var g=x.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'rgba(244,63,94,.4)');g.addColorStop(1,'rgba(244,63,94,0)');x.fillStyle=g;x.fill();x.restore();
    // Scope circle
    x.beginPath();x.arc(cx,cy,r,0,6.28);x.strokeStyle='rgba(244,63,94,.03)';x.lineWidth=1;x.stroke();
    // Floating targets
    targets.forEach(function(t){t.ph+=t.sp;t.x+=Math.sin(t.ph)*.3;t.y+=Math.cos(t.ph)*.3;
      if(t.x<-20)t.x=W+20;if(t.x>W+20)t.x=-20;if(t.y<-20)t.y=H+20;if(t.y>H+20)t.y=-20;
      var a=.15+.1*Math.sin(t.ph*2);x.beginPath();x.arc(t.x,t.y,t.s,0,6.28);x.fillStyle='rgba(244,63,94,'+a+')';x.fill();
      x.beginPath();x.arc(t.x,t.y,t.s*4,0,6.28);x.fillStyle='rgba(244,63,94,'+(a*.06)+')';x.fill()});
    requestAnimationFrame(f)}f()})();
