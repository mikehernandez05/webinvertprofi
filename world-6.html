<style>
:root{
  --a:#2563eb;--ad:#1d4ed8;--ar:37,99,235;
  --gold:#CBA052;--goldr:203,160,82;
  --bg:#010814;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:#e2e8f0;font-family:'Rajdhani',sans-serif;overflow:hidden}

/* === MAIN SCROLL === */
#mainScroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:1}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* === ENTRY/EXIT === */
body.entering #mainScroll{opacity:0}
body.entered #mainScroll{animation:fadeIn .6s ease-out forwards}
body.exiting #mainScroll{transition:all .45s;opacity:0;transform:scale(.97);filter:blur(2px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* === HEADER === */
.hdr{position:sticky;top:0;z-index:60;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(6,10,20,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.hdr-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.5);text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:1px;transition:color .2s}
.hdr-back:hover{color:var(--a)}
.hdr-stats{display:flex;align-items:center;gap:12px;font-family:'Share Tech Mono',monospace;font-size:.72rem;color:rgba(255,255,255,.45)}
.prog-track{height:4px;background:rgba(255,255,255,.03)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ad),var(--a));transition:width .6s;border-radius:0 2px 2px 0;box-shadow:0 0 8px rgba(var(--ar),.3)}

/* === HERO === */
.hero-wrap{text-align:center;padding:20px 16px 12px;position:relative;z-index:5}
.hero-badge{display:inline-block;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:3px;color:var(--a);background:rgba(var(--ar),.07);border:1px solid rgba(var(--ar),.18);padding:4px 16px;border-radius:4px;margin-bottom:8px}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(var(--ar),.25)}
.hero-sub{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:rgba(var(--ar),.5);letter-spacing:2px;margin-top:4px}

/* === QUEST === */
.quest-box{display:flex;align-items:center;gap:12px;background:rgba(var(--ar),.05);border:1px solid rgba(var(--ar),.12);border-radius:10px;padding:10px 14px;margin:0 16px 8px}
.quest-icon{font-size:1.6rem}
.quest-label{font-family:'Share Tech Mono',monospace;font-size:.5rem;color:rgba(var(--ar),.4);letter-spacing:2px}
.quest-title{font-family:'Orbitron',sans-serif;font-size:.75rem;color:#fff;margin-top:2px}
.quest-btn{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:2px;color:#fff;background:linear-gradient(135deg,var(--ad),var(--a));border:none;padding:8px 16px;border-radius:6px;cursor:pointer;white-space:nowrap;box-shadow:0 0 12px rgba(var(--ar),.25);transition:all .2s}
.quest-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.4);transform:translateY(-1px)}

/* === MAP === */
.map-wrap{position:relative;width:100%;max-width:500px;margin:0 auto;padding:10px 0 140px;z-index:5}
.map-inner{position:relative}
#pathSvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#nodesLayer{position:relative;z-index:5}

/* ============================
   HEX NODES — ENHANCED NEON
   ============================ */
.node{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;z-index:5;
  transition:filter .2s,transform .2s;
}
.node:hover{filter:brightness(1.3)!important;transform:translate(-50%,-50%) scale(1.08)!important}
.node:active{transform:translate(-50%,-50%) scale(.88)!important}
.node.locked{cursor:default}
.node.locked:hover{filter:none!important;transform:translate(-50%,-50%)!important}

/* hex container */
.hex-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.hex-outer{position:relative}

/* hex shape */
.hex-node{
  position:relative;width:72px;height:66px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;font-weight:700;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  z-index:2;transition:all .2s;
}
.hex-node::before,.hex-node::after{
  content:'';position:absolute;inset:0;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}
.hex-node::before{z-index:-2}
.hex-node::after{z-index:-1}

/* NEON BORDER */
.hex-border{
  position:absolute;inset:-4px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  z-index:1;
}

/* --- COMPLETED --- */
.hex-done{color:#fff;text-shadow:0 0 6px rgba(var(--ar),.5)}
.hex-done::before{background:linear-gradient(135deg,rgba(var(--ar),.4),rgba(var(--ar),.1))}
.hex-done::after{background:radial-gradient(circle at 40% 35%,rgba(var(--ar),.1),#0d1117 72%)}
.node-done .hex-border{background:linear-gradient(135deg,rgba(var(--ar),.5),rgba(var(--ar),.15))}
.node-done{filter:drop-shadow(0 0 6px rgba(var(--ar),.35)) drop-shadow(0 0 18px rgba(var(--ar),.12))}

/* --- ACTIVE --- */
.hex-active{color:#fff;text-shadow:0 0 14px rgba(var(--ar),1)}
.hex-active::before{background:linear-gradient(135deg,rgba(var(--ar),.6),rgba(var(--ar),.18))}
.hex-active::after{background:radial-gradient(circle at 40% 35%,rgba(var(--ar),.18),#0d1117 60%)}
.node-active .hex-border{background:linear-gradient(135deg,rgba(var(--ar),.85),rgba(var(--ar),.4));animation:borderPulse 2s ease-in-out infinite}
.node-active{
  filter:drop-shadow(0 0 14px rgba(var(--ar),.7)) drop-shadow(0 0 40px rgba(var(--ar),.3)) drop-shadow(0 0 65px rgba(var(--ar),.12));
  animation:hexPulse 2.4s ease-in-out infinite;
}
@keyframes hexPulse{
  0%,100%{filter:drop-shadow(0 0 14px rgba(var(--ar),.7)) drop-shadow(0 0 40px rgba(var(--ar),.3)) drop-shadow(0 0 65px rgba(var(--ar),.12))}
  50%{filter:drop-shadow(0 0 22px rgba(var(--ar),.95)) drop-shadow(0 0 55px rgba(var(--ar),.45)) drop-shadow(0 0 85px rgba(var(--ar),.18))}
}
@keyframes borderPulse{0%,100%{opacity:.7}50%{opacity:1}}

/* --- LOCKED --- */
.hex-locked{color:rgba(255,255,255,.18)}
.hex-locked::before{background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01))}
.hex-locked::after{background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.015),#0d1117 72%)}
.node-locked .hex-border{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}
.node-locked{filter:saturate(.1) brightness(.32)}

/* Scan ring */
.hex-scan{position:absolute;inset:-8px;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);z-index:1;overflow:hidden}
.hex-scan::before{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 0%,rgba(var(--ar),.85) 6%,transparent 14%);
  animation:hexScan 2.8s linear infinite;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}
@keyframes hexScan{to{transform:rotate(360deg)}}

/* Outer glow ring */
.hex-glow{
  position:absolute;inset:-16px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  background:rgba(var(--ar),.06);animation:glowPulse 2.4s ease-in-out infinite;z-index:0;
}
@keyframes glowPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.85;transform:scale(1.08)}}

/* Energy ripple on click */
.hex-ripple{
  position:absolute;inset:-20px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  background:rgba(var(--ar),.3);z-index:0;opacity:0;
  transform:scale(.6);pointer-events:none;
}
.hex-ripple.go{animation:rippleOut .5s ease-out forwards}
@keyframes rippleOut{0%{opacity:.6;transform:scale(.7)}100%{opacity:0;transform:scale(1.4)}}

/* Labels */
.hex-tick{width:2px;height:12px;background:rgba(var(--ar),.2);margin:4px auto 0}
.node-stars{font-size:.55rem;letter-spacing:1px;opacity:.7;text-align:center;margin-top:2px}
.node-lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;text-align:center;letter-spacing:.5px;white-space:nowrap;margin-top:1px}
.lbl-done{color:rgba(var(--ar),.6)}
.lbl-active{color:rgba(var(--ar),.95);text-shadow:0 0 8px rgba(var(--ar),.4)}
.lbl-locked{color:rgba(255,255,255,.12)}

/* Boss */
.node-boss .hex-node{width:90px;height:82px;font-size:1.8rem}
.node-boss .hex-border{inset:-5px}
.node-boss .hex-scan{inset:-10px}
.node-boss .hex-glow{inset:-20px}
.boss-tag{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:.42rem;letter-spacing:2px;color:var(--a);background:rgba(var(--ar),.08);border:1px solid rgba(var(--ar),.25);padding:1px 8px;border-radius:3px;white-space:nowrap}

/* === ENERGY PATHS === */
.path-done{stroke:rgba(var(--ar),.45);stroke-width:2.5;fill:none;filter:drop-shadow(0 0 4px rgba(var(--ar),.25))}
.path-active{stroke:rgba(var(--ar),.8);stroke-width:3;fill:none;stroke-dasharray:12 8;animation:dashFlow 1.2s linear infinite;filter:drop-shadow(0 0 6px rgba(var(--ar),.5))}
.path-locked{stroke:rgba(255,255,255,.05);stroke-width:1.5;fill:none;stroke-dasharray:4 6}
.path-glow-done{stroke:rgba(var(--ar),.12);stroke-width:10;fill:none;filter:url(#eGlow)}
.path-glow-active{stroke:rgba(var(--ar),.22);stroke-width:14;fill:none;filter:url(#eGlow);animation:pathGlowPulse 2s ease-in-out infinite}
.path-glow-locked{stroke:rgba(255,255,255,.012);stroke-width:6;fill:none;filter:url(#eGlow)}
.energy-dot{fill:rgba(var(--ar),1);filter:drop-shadow(0 0 6px rgba(var(--ar),.8))}
@keyframes dashFlow{to{stroke-dashoffset:-20}}
@keyframes pathGlowPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* === TOWER INDICATOR === */
.tower-ind{position:fixed;bottom:20px;left:10px;z-index:55;display:flex;flex-direction:column;align-items:center;gap:3px}
.tower-segs{display:flex;flex-direction:column;gap:2px}
.tower-seg{width:16px;height:7px;border-radius:2px;background:rgba(255,255,255,.06);cursor:pointer;transition:all .3s}
.tower-seg.below{background:rgba(var(--ar),.15)}
.tower-seg.cur{background:var(--a);box-shadow:0 0 8px rgba(var(--ar),.5);animation:tPulse 2.5s ease-in-out infinite}
@keyframes tPulse{0%,100%{box-shadow:0 0 6px rgba(var(--ar),.4)}50%{box-shadow:0 0 14px rgba(var(--ar),.7)}}
.tower-num{font-family:'Orbitron',sans-serif;font-size:.55rem;color:var(--a)}
.tower-lbl{font-family:'Share Tech Mono',monospace;font-size:.35rem;color:rgba(var(--ar),.35);letter-spacing:2px}

/* === MODAL === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal-box{background:linear-gradient(180deg,#111827,#0d1117);border:1px solid rgba(var(--ar),.2);border-radius:16px;padding:24px;max-width:380px;width:100%;text-align:center;transform:scale(.88) translateY(20px);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 0 50px rgba(var(--ar),.1),0 0 100px rgba(0,0,0,.5)}
.modal-bg.show .modal-box{transform:scale(1) translateY(0)}
.m-badge{display:inline-block;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:2px;padding:3px 12px;border-radius:20px}
.m-icon{font-size:3rem;margin:12px 0 8px}
.m-title{font-family:'Orbitron',sans-serif;font-size:.95rem;color:#fff;margin-bottom:6px}
.m-desc{font-size:.82rem;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:12px}
.m-stars{font-size:1rem;margin-bottom:6px;letter-spacing:4px}
.m-xp{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:rgba(var(--ar),.6);margin-bottom:14px}
.m-cta{width:100%;font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:2px;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.m-cta:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(var(--ar),.4)}
.m-next{width:100%;font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:1px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:10px;border-radius:8px;cursor:pointer;transition:all .2s}
.m-next:hover{background:rgba(255,255,255,.08);color:#fff}

/* === TOWER ENTRY OVERLAY === */
#tower-entry{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity .5s}
#tower-entry svg{width:80px;height:280px}
.te-seg{fill:rgba(255,255,255,.04);stroke:rgba(255,255,255,.06);stroke-width:.5;transition:all .3s}
.te-seg.lit{fill:rgba(var(--ar),.12);stroke:rgba(var(--ar),.35)}
.te-seg.target{fill:rgba(var(--ar),.25);stroke:var(--a);stroke-width:1;animation:tePulse .7s ease-in-out 2}
@keyframes tePulse{50%{fill:rgba(var(--ar),.45);filter:drop-shadow(0 0 8px rgba(var(--ar),.5))}}
.te-line{stroke:rgba(var(--ar),.5);stroke-width:1.5;transition:y2 .6s cubic-bezier(.4,0,.2,1)}
.te-floor-label{font-family:'Orbitron',sans-serif;font-size:.75rem;color:var(--a);letter-spacing:3px;opacity:0;transition:opacity .4s}
.te-floor-label.show{opacity:1}
#tower-entry.zooming{transform:scale(5);transition:transform .8s cubic-bezier(.4,0,.2,1),opacity .3s ease .6s}
#tower-entry.done{opacity:0;pointer-events:none}

#eFlash{position:fixed;inset:0;z-index:199;background:radial-gradient(circle,rgba(var(--ar),.15),transparent 70%);opacity:0;pointer-events:none}
#eFlash.go{animation:flashOut .7s ease-out forwards}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
#exitOv{position:fixed;inset:0;z-index:150;background:#000;opacity:0;pointer-events:none;transition:opacity .4s}
#exitOv.show{opacity:1}

/* Mute */
.mute-btn{position:fixed;bottom:20px;right:10px;z-index:55;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(var(--ar),.12);color:rgba(255,255,255,.35);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

/* HUD */
.hud-panel{position:fixed;z-index:50;font-family:'Share Tech Mono',monospace;background:rgba(0,0,0,.5);border:1px solid rgba(var(--ar),.12);border-radius:5px;padding:6px 10px;backdrop-filter:blur(4px);pointer-events:none}
.hud-tl{top:75px;left:8px}
.hud-tr{top:75px;right:8px}
.hud-label{font-size:.45rem;color:rgba(var(--ar),.4);letter-spacing:2px;text-transform:uppercase}
.hud-val{font-size:.9rem;color:var(--a);font-weight:700}
.hud-val span{font-size:.5rem;opacity:.5}
.hud-bar{width:50px;height:2px;background:rgba(255,255,255,.04);border-radius:1px;margin-top:3px}
.hud-fill{height:100%;background:var(--a);border-radius:1px;animation:hudF 4s ease-in-out infinite alternate}
@keyframes hudF{from{width:50%}to{width:85%}}
@media(max-width:768px){.hud-panel{display:none}}

/* Responsive */
@media(max-width:374px){
  .hex-node{width:58px;height:53px;font-size:1rem}
  .hex-border{inset:-3px}
  .node-boss .hex-node{width:72px;height:66px;font-size:1.3rem}
  .hero-title{font-size:1rem}
}
@media(min-width:375px)and(max-width:480px){
  .hex-node{width:66px;height:60px;font-size:1.15rem}
  .hex-border{inset:-3px}
  .node-boss .hex-node{width:80px;height:73px;font-size:1.45rem}
}
@media(min-width:769px){
  .hex-node{width:84px;height:77px;font-size:1.6rem}
  .hex-border{inset:-5px}
  .node-boss .hex-node{width:100px;height:92px;font-size:2rem}
  .map-wrap{max-width:540px}
}
</style>
</head>

  /* MATRIX RAIN */
  ctx.save();ctx.font='9px "Share Tech Mono",monospace';
  for(var i=0;i<matrixCols.length;i++){var mc=matrixCols[i];mc.y+=mc.sp;if(mc.y>H*2+60)mc.y=-40;for(var j=0;j<mc.chars.length;j++){var cy4=mc.y+j*14-scrollY*.25;if(cy4<-10||cy4>H+10)continue;ctx.fillStyle='rgba('+ar+','+(mc.chars[j].o*.12)+')';ctx.fillText(mc.chars[j].c,mc.x,cy4);}}
  ctx.restore();

  /* CLOUDS */
  for(var ci=0;ci<6;ci++){var cx3=W*(.1+ci*.16)+Math.sin(t*.12+ci*1.5)*18;var cy5=H*(.02+ci*.018)-sOff*.08;var rx=W*(.1+ci*.015);var ry=rx*.35;var cg=ctx.createRadialGradient(cx3,cy5,0,cx3,cy5,rx);cg.addColorStop(0,'rgba('+ar+',.08)');cg.addColorStop(.4,'rgba('+ar+',.04)');cg.addColorStop(.7,'rgba(200,180,140,.02)');cg.addColorStop(1,'transparent');ctx.save();ctx.scale(1,ry/rx);ctx.fillStyle=cg;ctx.fillRect(cx3-rx,(cy5-ry)*(rx/ry),rx*2,ry*2*(rx/ry));ctx.restore();}

  }catch(e){}
}

/* ====== NODES ====== */
var NODE_H=120,PAD_TOP=30;
var positions=[];

function calcPositions(){
  positions=[];
  var wrap=document.getElementById('mapWrap'),usable=wrap.offsetWidth;
  for(var i=0;i<levels.length;i++){
    var wave=Math.sin(i*.75)*usable*.2;
    var dir=i%2===0?1:-1;
    var x=usable/2+dir*Math.abs(wave)+(dir>0?18:-18);
    var y=PAD_TOP+i*NODE_H+NODE_H/2;
    positions.push({x:x,y:y});
  }
  document.getElementById('mapInner').style.height=(PAD_TOP+levels.length*NODE_H+100)+'px';
}

function placeNodes(){
  var layer=document.getElementById('nodesLayer');layer.innerHTML='';
  for(var i=0;i<levels.length;i++){
    var lv=levels[i],pos=positions[i],isBoss=!!lv.boss;
    var stCls=lv.s==='completed'?'node-done':lv.s==='active'?'node-active':'node-locked';
    var nd=document.createElement('div');
    nd.className='node '+stCls+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');
    nd.style.cssText='position:absolute;left:'+pos.x+'px;top:'+pos.y+'px;transform:translate(-50%,-50%)';
    var wrap=document.createElement('div');wrap.className='hex-wrap';
    var outer=document.createElement('div');outer.className='hex-outer';
    if(lv.s==='active'){var glow=document.createElement('div');glow.className='hex-glow';outer.appendChild(glow);}
    if(lv.s==='active'){var scan=document.createElement('div');scan.className='hex-scan';outer.appendChild(scan);}
    var ripple=document.createElement('div');ripple.className='hex-ripple';outer.appendChild(ripple);
    var border=document.createElement('div');border.className='hex-border';outer.appendChild(border);
    var hex=document.createElement('div');hex.className='hex-node '+(lv.s==='completed'?'hex-done':lv.s==='active'?'hex-active':'hex-locked');
    if(lv.s==='completed')hex.innerHTML='<span style="font-size:1.1em">✓</span>';
    else if(lv.s==='active')hex.textContent=lv.icon||'🎯';
    else hex.innerHTML='<span class="material-symbols-outlined" style="font-size:1.1em;opacity:.35">lock</span>';
    if(isBoss){var tag=document.createElement('span');tag.className='boss-tag';tag.textContent='FINAL';hex.appendChild(tag);}
    outer.appendChild(hex);wrap.appendChild(outer);
    var tick=document.createElement('div');tick.className='hex-tick';wrap.appendChild(tick);
    var starsDiv=document.createElement('div');starsDiv.className='node-stars';starsDiv.textContent=lv.s==='completed'?'⭐⭐⭐':'☆☆☆';if(lv.s!=='completed')starsDiv.style.opacity='.2';wrap.appendChild(starsDiv);
    var lbl=document.createElement('div');lbl.className='node-lbl '+(lv.s==='completed'?'lbl-done':lv.s==='active'?'lbl-active':'lbl-locked');lbl.textContent='NIVEL '+lv.n;wrap.appendChild(lbl);
    nd.appendChild(wrap);
    (function(lv2,rip){nd.addEventListener('click',function(){if(lv2.s==='locked'){sfxL();return;}rip.classList.remove('go');void rip.offsetWidth;rip.classList.add('go');sfxO();openM(lv2.n,lv2.t,lv2.d,lv2.s,lv2.xp,lv2.icon,lv2.boss);})})(lv,ripple);
    layer.appendChild(nd);
  }
}

function drawPaths(){
  var svg=document.getElementById('pathSvg'),inner=document.getElementById('mapInner');
  var w=inner.offsetWidth,h=inner.offsetHeight;
  svg.setAttribute('viewBox','0 0 '+w+' '+h);svg.setAttribute('width',w);svg.setAttribute('height',h);
  svg.style.cssText='position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;pointer-events:none;z-index:1';
  var html='<defs><filter id="eGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  for(var i=0;i<levels.length-1;i++){
    var p1=positions[i],p2=positions[i+1],s1=levels[i].s,s2=levels[i+1].s;
    var state;if(s1==='completed'&&s2==='completed')state='done';else if(s1==='completed'&&s2==='active')state='active';else if(s1==='active')state='active';else state='locked';
    var dx=p2.x-p1.x,dy=p2.y-p1.y,bulge=dx*.4;
    var d='M'+p1.x+','+p1.y+' C'+(p1.x+bulge)+','+(p1.y+dy*.3)+' '+(p2.x-bulge)+','+(p2.y-dy*.3)+' '+p2.x+','+p2.y;
    html+='<path class="path-glow-'+state+'" d="'+d+'"/>';
    html+='<path class="path-'+state+'" d="'+d+'" id="epath'+i+'"/>';
    if(state==='active'){html+='<circle class="energy-dot" r="4"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#epath'+i+'"/></animateMotion></circle>';html+='<circle class="energy-dot" r="2.5" opacity=".5"><animateMotion dur="1.8s" repeatCount="indefinite" begin="-.9s"><mpath href="#epath'+i+'"/></animateMotion></circle>';}
    if(state==='done'){html+='<circle class="energy-dot" r="2" opacity=".4"><animateMotion dur="3s" repeatCount="indefinite"><mpath href="#epath'+i+'"/></animateMotion></circle>';}
  }
  svg.innerHTML=html;
}

/* ====== MODAL ====== */
function openM(n,t,d,s,xp,icon,boss){
  var m=document.getElementById('modal');
  document.getElementById('m-icon').textContent=icon||'🎯';
  document.getElementById('m-title').textContent=t;
  document.getElementById('m-desc').textContent=d;
  document.getElementById('m-xp').textContent='+ '+xp+' XP';
  var badge=document.getElementById('m-badge'),cta=document.getElementById('m-cta'),next=document.getElementById('m-next'),starsEl=document.getElementById('m-stars');
  if(s==='completed'){badge.textContent='✓ COMPLETADO';badge.style.cssText='color:#22c55e;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25)';starsEl.textContent='⭐⭐⭐';cta.textContent='🔄 REPASAR';cta.style.cssText='display:block;background:linear-gradient(135deg,#1f2937,#374151);box-shadow:none';cta.onclick=function(){goLevel(n)};next.style.display='block';next.textContent='▶ SIGUIENTE';next.onclick=function(){closeM()};}
  else{badge.textContent='● NIVEL '+n;badge.style.cssText='color:var(--a);background:rgba(var(--ar),.08);border:1px solid rgba(var(--ar),.25)';starsEl.innerHTML='<span style="opacity:.25">☆☆☆</span>';cta.textContent='▶ INICIAR';cta.style.cssText='display:block;background:linear-gradient(135deg,var(--ad),var(--a));box-shadow:0 0 16px rgba(var(--ar),.25)';cta.onclick=function(){goLevel(n)};next.style.display='none';}
  m.classList.add('show');
}
function closeM(){document.getElementById('modal').classList.remove('show')}
function goLevel(n){closeM();window.location.href='leccion.html?world='+WORLD_NUM+'&level='+n}

/* ====== AUDIO ====== */
var audioCtx,muted=false;
function initA(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();var b=audioCtx.createBuffer(1,1,22050),s=audioCtx.createBufferSource();s.buffer=b;s.connect(audioCtx.destination);s.start(0)}catch(e){}}
function sfx(f,dur){if(muted||!audioCtx)return;try{if(audioCtx.state==='suspended')audioCtx.resume();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.07;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function sfxO(){initA();sfx(440,.1);setTimeout(function(){sfx(660,.1)},80);setTimeout(function(){sfx(880,.12)},160)}
function sfxL(){initA();sfx(150,.25)}
function toggleMu(){initA();muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊'}
document.addEventListener('touchstart',initA,{once:true});
document.addEventListener('click',initA,{once:true});

/* ====== SCROLL ====== */
document.getElementById('mainScroll').addEventListener('scroll',function(){scrollY=this.scrollTop});

/* ====== ENTRY ====== */
function playEntry(){
  var te=document.getElementById('tower-entry');if(!te){startScene();return;}
  var label=te.querySelector('.te-floor-label');label.textContent='PISO '+WORLD_FLOOR;
  for(var f=1;f<=WORLD_FLOOR;f++){(function(floor){setTimeout(function(){var seg=te.querySelector('.te-seg[data-floor="'+floor+'"]');if(!seg)return;seg.classList.add(floor===WORLD_FLOOR?'target':'lit');var line=te.querySelector('.te-line');if(line)line.setAttribute('y2',seg.getAttribute('y'));},floor*110);})(f);}
  setTimeout(function(){label.classList.add('show')},WORLD_FLOOR*110+200);
  setTimeout(function(){te.classList.add('zooming');var flash=document.getElementById('eFlash');if(flash)flash.classList.add('go');},WORLD_FLOOR*110+500);
  setTimeout(function(){te.classList.add('done');setTimeout(function(){if(te.parentNode)te.parentNode.removeChild(te);startScene()},500);},WORLD_FLOOR*110+1400);
}
function startScene(){
  requestAnimationFrame(function(){requestAnimationFrame(function(){document.body.classList.remove('entering');document.body.classList.add('entered');})});
  setTimeout(function(){var idx=-1;for(var i=0;i<levels.length;i++){if(levels[i].s==='active'){idx=i;break;}}if(idx>=0&&positions[idx]){var ms=document.getElementById('mainScroll');ms.scrollTo({top:Math.max(0,positions[idx].y-ms.offsetHeight/2+100),behavior:'smooth'});}},600);
}

/* Quest */
function buildQuest(){
  var qEl=document.getElementById('quest'),act=levels.find(function(l){return l.s==='active'});
  if(!act){qEl.innerHTML='';return;}
  var t2=act.t.replace(/'/g,"\\'"),d2=act.d.replace(/'/g,"\\'");
  qEl.innerHTML='<div class="quest-box"><div class="quest-icon">'+(act.icon||'⚡')+'</div><div style="flex:1"><div class="quest-label">MÓDULO ACTIVO</div><div class="quest-title">'+act.t+'</div></div><button class="quest-btn" onclick="openM('+act.n+',\''+t2+'\',\''+d2+'\',\''+act.s+'\','+act.xp+',\''+(act.icon||'🎯')+'\','+!!act.boss+')">▶ INICIAR</button></div>';
}

/* Exit */
document.getElementById('backBtn').addEventListener('click',function(e){e.preventDefault();document.body.classList.add('exiting');document.getElementById('exitOv').classList.add('show');setTimeout(function(){window.location.href='portadanivelesacademia.html'},450);});

/* ====== INIT ====== */
function init(){initCanvas();calcPositions();placeNodes();drawPaths();buildQuest();try{draw()}catch(e){console.warn('draw err:',e)}playEntry();}
window.addEventListener('resize',function(){resizeCanvas();calcPositions();placeNodes();drawPaths()});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
