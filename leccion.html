<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>InvertProfit — Academia · Lección</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%230a0f1a' width='32' height='32' rx='6'/><text x='50%25' y='55%25' dominant-baseline='central' text-anchor='middle' font-size='18' fill='%23D4AF37'>IP</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth.js"></script>
    <script src="curriculum.js"></script>
    <script src="lesson-content.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                colors: { "primary":"#D4AF37","bg-dark":"#0a0f1a","card":"#0d1420","card-border":"#1f2937","positive":"#22c55e","negative":"#ef4444","cyan-accent":"#00d4ff" },
                fontFamily: { "sans":["Inter","sans-serif"], "mono":["Share Tech Mono","monospace"] }
            }}
        }
    </script>
    <style>
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
        body{background:#060c16;font-family:'Inter',sans-serif}

        /* ══ PROGRESS BAR TOP ══ */
        .lesson-progress-track{height:6px;background:rgba(255,255,255,0.08);width:100%}
        .lesson-progress-fill{height:100%;transition:width 0.6s cubic-bezier(.4,0,.2,1);border-radius:0 3px 3px 0}

        /* ══ STEP CARD ══ */
        .step-card{max-width:640px;width:100%;margin:0 auto;animation:step-enter 0.5s ease-out}
        @keyframes step-enter{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes step-exit{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-30px)}}
        .step-exit{animation:step-exit 0.3s ease-in forwards}

        /* ══ QUIZ OPTIONS ══ */
        .quiz-option{
            background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:16px;
            padding:16px 20px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;
        }
        .quiz-option:hover:not(.selected):not(.disabled){background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.25);transform:translateY(-2px)}
        .quiz-option.selected{border-color:#D4AF37;background:rgba(212,175,55,0.1)}
        .quiz-option.correct{border-color:#22c55e!important;background:rgba(34,197,94,0.15)!important;animation:correct-pulse 0.6s ease}
        .quiz-option.incorrect{border-color:#ef4444!important;background:rgba(239,68,68,0.1)!important;animation:shake 0.5s ease}
        .quiz-option.disabled{cursor:default;opacity:0.6}
        .quiz-option.correct.disabled{opacity:1}
        @keyframes correct-pulse{0%{transform:scale(1)}30%{transform:scale(1.03)}60%{transform:scale(0.98)}100%{transform:scale(1)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

        /* ══ XP POPUP ══ */
        .xp-popup{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            font-size:2.5rem;font-weight:900;color:#D4AF37;
            text-shadow:0 0 30px rgba(212,175,55,0.8),0 0 60px rgba(212,175,55,0.4);
            z-index:500;pointer-events:none;animation:xp-fly 1.2s ease-out forwards;
        }
        @keyframes xp-fly{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}20%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}50%{transform:translate(-50%,-80%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(0.7)}}

        /* ══ STREAK BAR ══ */
        .streak-heart{transition:all 0.3s}.streak-heart.lost{filter:grayscale(1);opacity:0.3;transform:scale(0.8)}
        .streak-heart.active{animation:heart-beat 0.5s ease}
        @keyframes heart-beat{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(0.9)}100%{transform:scale(1)}}

        /* ══ EXPLANATION BOX ══ */
        .explanation-box{animation:slide-up 0.4s ease-out;border-radius:16px;padding:16px 20px;margin-top:12px}
        .explanation-correct{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac}
        .explanation-incorrect{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
        @keyframes slide-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* ══ CONTINUE BUTTON ══ */
        .btn-continue{
            background:linear-gradient(135deg,#D4AF37,#b8960b);color:#060c16;
            font-weight:900;font-size:15px;letter-spacing:2px;text-transform:uppercase;
            padding:16px 40px;border-radius:16px;border:none;cursor:pointer;
            box-shadow:0 0 25px rgba(212,175,55,0.3),0 4px 15px rgba(0,0,0,0.3);
            transition:all 0.3s;font-family:'Share Tech Mono',monospace;
        }
        .btn-continue:hover{box-shadow:0 0 40px rgba(212,175,55,0.5);transform:translateY(-2px)}
        .btn-continue:active{transform:translateY(0)}
        .btn-continue.green{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 25px rgba(34,197,94,0.3)}

        /* ══ INTRO CARD ══ */
        .intro-emoji{font-size:5rem;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

        /* ══ SUMMARY CARD ══ */
        .summary-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;text-align:center}
        .xp-counter{font-size:3rem;font-weight:900;color:#D4AF37;font-family:'Share Tech Mono',monospace}
        @keyframes count-up{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}

        /* ══ CONFETTI ══ */
        .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
        .confetti-piece{position:absolute;top:-20px;animation:confetti-fall linear forwards}
        @keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}70%{opacity:1}100%{transform:translateY(110vh) rotate(var(--rot));opacity:0}}
        .golden-burst{position:fixed;top:50%;left:50%;width:0;height:0;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,0.6) 0%,rgba(212,175,55,0) 70%);transform:translate(-50%,-50%);z-index:9998;pointer-events:none;animation:burst-expand 0.8s ease-out forwards}
        @keyframes burst-expand{0%{width:0;height:0;opacity:1}100%{width:800px;height:800px;opacity:0}}
        .star-particle{position:absolute;font-size:1.5rem;animation:star-fly ease-out forwards;pointer-events:none}
        @keyframes star-fly{0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}50%{opacity:1;transform:translate(var(--dx),var(--dy)) scale(1.2) rotate(180deg)}100%{transform:translate(calc(var(--dx)*1.5),calc(var(--dy)*1.5 + 100px)) scale(0.3) rotate(360deg);opacity:0}}
        .celebration-text{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:3rem;font-weight:900;color:#D4AF37;text-shadow:0 0 40px rgba(212,175,55,0.8);z-index:10000;pointer-events:none;animation:celebration-pop 1.5s ease-out forwards;letter-spacing:4px}
        @keyframes celebration-pop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}50%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0}}

        /* ══ THEME SYSTEM ══ */
        body[data-theme="cartografia"] .lesson-progress-fill{background:linear-gradient(90deg,#00d4ff,#38bdf8)!important}
        body[data-theme="cartografia"] .btn-continue{background:linear-gradient(135deg,#00d4ff,#0284c7)!important}
        body[data-theme="cartografia"] .quiz-option.selected{border-color:#00d4ff;background:rgba(0,212,255,0.1)}
        body[data-theme="cartografia"] .xp-popup{color:#00d4ff;text-shadow:0 0 30px rgba(0,212,255,0.8)}
        body[data-theme="anatomia"] .lesson-progress-fill{background:linear-gradient(90deg,#818cf8,#a5b4fc)!important}
        body[data-theme="anatomia"] .btn-continue{background:linear-gradient(135deg,#818cf8,#4f46e5)!important}
        body[data-theme="sincronia"] .lesson-progress-fill{background:linear-gradient(90deg,#a78bfa,#c4b5fd)!important}
        body[data-theme="sincronia"] .btn-continue{background:linear-gradient(135deg,#a78bfa,#7c3aed)!important}
        body[data-theme="estrategia"] .lesson-progress-fill{background:linear-gradient(90deg,#34d399,#6ee7b7)!important}
        body[data-theme="estrategia"] .btn-continue{background:linear-gradient(135deg,#34d399,#059669)!important}
        body[data-theme="soberania"] .lesson-progress-fill{background:linear-gradient(90deg,#fb7185,#fda4af)!important}
        body[data-theme="soberania"] .btn-continue{background:linear-gradient(135deg,#fb7185,#be123c)!important}
        body[data-theme="legado"] .lesson-progress-fill{background:linear-gradient(90deg,#fbbf24,#fde68a)!important}
        body[data-theme="legado"] .btn-continue{background:linear-gradient(135deg,#fbbf24,#d97706)!important}

        /* ══ PARTICLES BG ══ */
        .particle{position:fixed;width:3px;height:3px;border-radius:50%;background:rgba(212,175,55,0.15);pointer-events:none;animation:drift linear infinite}
        @keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20px) scale(1);opacity:0}}
    </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden">

<!-- ══ HEADER ══ -->
<header class="border-b border-card-border bg-bg-dark/95 backdrop-blur sticky top-0 z-[60] shrink-0">
    <div class="flex items-center justify-between px-4 md:px-8 py-3">
        <div class="flex items-center gap-3">
            <a id="back-to-map" href="niveles-novato.html" class="flex items-center gap-2 px-3 py-2 rounded-xl font-black text-xs uppercase tracking-widest transition-all hover:scale-105 active:scale-95 shrink-0" style="background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.35);color:#D4AF37;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                <span class="hidden sm:inline">Volver</span>
            </a>
            <img src="images/logo_azul.png" alt="InvertProfit" class="h-10 w-auto object-contain shrink-0" style="filter:drop-shadow(0 0 10px rgba(212,175,55,0.4));" onerror="this.outerHTML='<span style=\'color:#D4AF37;font-weight:900;font-size:1.2rem;\'>IP</span>'">

<!-- ══ MAIN CONTENT ══ -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-8 min-h-[calc(100vh-70px)] relative" id="lesson-main">

    <div id="particles-bg"></div>

        <button class="btn-continue w-full" id="continue-btn" onclick="nextStep()">CONTINUAR</button>

<!-- ══ SCRIPTS ══ -->
<script>
// ── State ──
var params = new URLSearchParams(window.location.search);
var currentWorld = parseInt(params.get('world')) || 1;
var currentLevel = parseInt(params.get('level')) || 1;
var currentInfo = CURRICULUM.findLevel(currentLevel);
var nextInfo = CURRICULUM.getNextLevel(currentLevel);

var steps = LESSON_CONTENT.getSteps(currentLevel);
var currentStep = 0;
var totalXP = 0;
var correctAnswers = 0;
var totalQuizzes = 0;
var lives = 5;
var streak = 0;

// ── Theme ──
var worldThemes = {1:'genesis',2:'cartografia',3:'anatomia',4:'sincronia',5:'estrategia',6:'soberania',7:'legado'};
document.body.setAttribute('data-theme', worldThemes[currentWorld] || 'genesis');

// ── Back link ──
if (currentInfo) {
    document.getElementById('back-to-map').href = currentInfo.world.page;
    document.title = 'InvertProfit — M' + currentInfo.level.n + ': ' + currentInfo.level.t;
}

// ── Particles ──
(function(){
    var bg = document.getElementById('particles-bg');
    for(var i=0;i<15;i++){
        var p=document.createElement('div');p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.animationDuration=(8+Math.random()*12)+'s';
        p.style.animationDelay=(Math.random()*10)+'s';
        p.style.width=p.style.height=(2+Math.random()*3)+'px';
        bg.appendChild(p);
    }
})();

// ══ SOUND SYSTEM ══
function playSound(type) {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (type === 'correct') {
            [[523.25,0],[659.25,0.1],[783.99,0.2]].forEach(function(n){
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=n[0];o.type='sine';
                g.gain.setValueAtTime(0,ctx.currentTime+n[1]);
                g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+n[1]+0.04);
                g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+n[1]+0.3);
                o.start(ctx.currentTime+n[1]);o.stop(ctx.currentTime+n[1]+0.3);
            });
        } else if (type === 'incorrect') {
            var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
            o.frequency.value=200;o.type='sawtooth';
            g.gain.setValueAtTime(0.15,ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
            o.start(ctx.currentTime);o.stop(ctx.currentTime+0.4);
        } else if (type === 'click') {
            var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
            o.frequency.value=800;o.type='sine';
            g.gain.setValueAtTime(0.1,ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
            o.start(ctx.currentTime);o.stop(ctx.currentTime+0.08);
        } else if (type === 'victory') {
            var notes=[523.25,659.25,783.99,1046.50];
            notes.forEach(function(freq,i){
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=freq;o.type='sine';
                g.gain.setValueAtTime(0,ctx.currentTime+i*0.15);
                g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+i*0.15+0.05);
                g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.6);
                o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.6);
            });
            setTimeout(function(){
                [1046.50,1318.51,1567.98].forEach(function(freq){
                    var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                    o.frequency.value=freq;o.type='triangle';
                    g.gain.setValueAtTime(0.15,ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.2);
                    o.start(ctx.currentTime);o.stop(ctx.currentTime+1.2);
                });
            },600);
        } else if (type === 'levelup') {
            [261.63,329.63,392,523.25,659.25,783.99].forEach(function(f,i){
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=f;o.type='square';
                g.gain.setValueAtTime(0,ctx.currentTime+i*0.08);
                g.gain.linearRampToValueAtTime(0.12,ctx.currentTime+i*0.08+0.03);
                g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.08+0.25);
                o.start(ctx.currentTime+i*0.08);o.stop(ctx.currentTime+i*0.08+0.25);
            });
        }
    } catch(e){}
}

// ══ XP POPUP ══
function showXP(amount) {
    totalXP += amount;
    document.getElementById('xp-display').textContent = totalXP + ' XP';
    var el = document.createElement('div');
    el.className = 'xp-popup';
    el.textContent = '+' + amount + ' XP';
    document.body.appendChild(el);
    setTimeout(function(){el.remove()},1300);
}

// ══ UPDATE PROGRESS ══
function updateProgress() {
    var pct = ((currentStep + 1) / steps.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
}

// ══ UPDATE HEARTS ══
function updateHearts() {
    var hearts = document.querySelectorAll('.streak-heart');
    hearts.forEach(function(h, i) {
        if (i >= lives) { h.classList.add('lost'); h.classList.remove('active'); }
    });
}

// ══ RENDER STEP ══
function renderStep() {
    var container = document.getElementById('step-container');
    var step = steps[currentStep];
    var bottomBar = document.getElementById('bottom-bar');
    var continueBtn = document.getElementById('continue-btn');

    // Animate out old content
    var old = container.querySelector('.step-card');
    if (old) {
        old.classList.add('step-exit');
        setTimeout(function(){ buildStep(); }, 300);
    } else {
        buildStep();
    }

    function buildStep() {
        updateProgress();
        var h = '';

        if (step.type === 'intro') {
            h = '<div class="step-card text-center py-8">' +
                '<div class="intro-emoji mb-6">' + step.emoji + '</div>' +
                '<h1 class="text-3xl md:text-4xl font-black uppercase tracking-tight mb-3 text-white">' + step.title + '</h1>' +
                '<p class="text-gray-400 text-lg leading-relaxed max-w-md mx-auto">' + step.subtitle + '</p>' +
                '<div class="mt-8 flex items-center justify-center gap-6 text-sm">' +
                    '<div class="flex items-center gap-2"><span style="color:#D4AF37;font-weight:900;">📚</span><span class="text-gray-500">' + steps.filter(function(s){return s.type==='theory'}).length + ' Lecciones</span></div>' +
                    '<div class="flex items-center gap-2"><span style="color:#D4AF37;font-weight:900;">❓</span><span class="text-gray-500">' + steps.filter(function(s){return s.type==='quiz'}).length + ' Preguntas</span></div>' +
                '</div>' +
                '</div>';
            bottomBar.style.display = 'block';
            continueBtn.textContent = '¡COMENZAR!';
            continueBtn.className = 'btn-continue w-full';

        } else if (step.type === 'theory') {
            var contentHtml = step.content.replace(/\n/g, '<br>');
            h = '<div class="step-card">' +
                '<div class="text-center mb-6"><span class="text-5xl">' + step.emoji + '</span></div>' +
                '<h2 class="text-2xl font-black text-center uppercase tracking-wide mb-6 text-white">' + step.title + '</h2>' +
                '<div class="rounded-2xl p-6 leading-relaxed text-gray-300 text-base" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08)">' +
                contentHtml +
                '</div>' +
                '</div>';
            bottomBar.style.display = 'block';
            continueBtn.textContent = 'CONTINUAR';
            continueBtn.className = 'btn-continue w-full';

        } else if (step.type === 'quiz') {
            totalQuizzes++;
            h = '<div class="step-card">' +
                '<div class="text-center mb-2"><span class="text-xs font-black uppercase tracking-widest" style="color:#D4AF37;">PREGUNTA</span></div>' +
                '<h2 class="text-xl md:text-2xl font-black text-center mb-8 text-white leading-snug">' + step.question + '</h2>' +
                '<div class="flex flex-col gap-3" id="quiz-options">';
            step.options.forEach(function(opt, i) {
                h += '<div class="quiz-option flex items-center gap-3" onclick="selectAnswer(' + i + ',' + step.correct + ')" data-idx="' + i + '">' +
                    '<div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-black flex-shrink-0" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)">' + String.fromCharCode(65 + i) + '</div>' +
                    '<span class="text-white font-semibold text-sm">' + opt + '</span>' +
                '</div>';
            });
            h += '</div><div id="explanation-area"></div></div>';
            bottomBar.style.display = 'none'; // Hidden until answered
            continueBtn.textContent = 'CONTINUAR';

        } else if (step.type === 'summary') {
            var pct = totalQuizzes > 0 ? Math.round((correctAnswers / totalQuizzes) * 100) : 100;
            var stars = pct >= 90 ? '⭐⭐⭐' : (pct >= 70 ? '⭐⭐' : '⭐');
            var totalLvlXP = step.xpTotal || 0;
            h = '<div class="step-card text-center py-4">' +
                '<div class="text-6xl mb-4">🏆</div>' +
                '<h2 class="text-3xl font-black uppercase tracking-wide mb-2 text-white">' + step.title + '</h2>' +
                '<p class="text-gray-400 mb-8">Precisión: ' + pct + '%</p>' +
                '<div class="grid grid-cols-3 gap-4 mb-8">' +
                    '<div class="summary-stat"><div class="text-xs text-gray-500 mb-2 font-mono uppercase" style="font-size:10px">XP TOTAL</div><div class="xp-counter" id="xp-count-up">0</div></div>' +
                    '<div class="summary-stat"><div class="text-xs text-gray-500 mb-2 font-mono uppercase" style="font-size:10px">ESTRELLAS</div><div class="text-3xl">' + stars + '</div></div>' +
                    '<div class="summary-stat"><div class="text-xs text-gray-500 mb-2 font-mono uppercase" style="font-size:10px">PRECISIÓN</div><div class="text-3xl font-black" style="color:#22c55e">' + pct + '%</div></div>' +
                '</div>' +
                '<div class="flex flex-col gap-3 max-w-sm mx-auto">' +
                    (nextInfo ? '<button class="btn-continue green w-full" onclick="goToNextLevel()">SIGUIENTE NIVEL ⏭</button>' : '') +
                    '<button class="w-full py-3 rounded-2xl font-black uppercase tracking-wider text-sm transition hover:scale-105" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7)" onclick="goToMap()">VER MAPA</button>' +
                '</div>' +
                '</div>';
            bottomBar.style.display = 'none';

            // Trigger completion
            setTimeout(function() {
                CURRICULUM.completeLevel(currentLevel);
                playSound('victory');
                launchCelebration();
                // Animate XP counter
                animateCounter('xp-count-up', totalLvlXP);
            }, 400);
        }

        container.innerHTML = h;
        if (step.type === 'intro' || step.type === 'theory') playSound('click');
    }
}

// ══ SELECT ANSWER ══
function selectAnswer(selected, correct) {
    var options = document.querySelectorAll('.quiz-option');
    if (options[0] && options[0].classList.contains('disabled')) return; // Already answered

    var step = steps[currentStep];
    var isCorrect = selected === correct;

    // Disable all options
    options.forEach(function(opt) { opt.classList.add('disabled'); });

    // Mark selected
    options[selected].classList.add('selected');

    if (isCorrect) {
        options[selected].classList.add('correct');
        correctAnswers++;
        streak++;
        document.getElementById('streak-display').textContent = '🔥 ' + streak;
        playSound('correct');
        if (step.xp) showXP(step.xp);

        // Show explanation
        var exp = document.getElementById('explanation-area');
        exp.innerHTML = '<div class="explanation-box explanation-correct"><div class="flex items-center gap-2 mb-1"><span class="font-black text-sm">✅ ¡Correcto!</span></div><p class="text-sm opacity-90">' + step.explanation + '</p></div>';
    } else {
        options[selected].classList.add('incorrect');
        options[correct].classList.add('correct');
        streak = 0;
        lives = Math.max(0, lives - 1);
        updateHearts();
        document.getElementById('streak-display').textContent = '🔥 0';
        playSound('incorrect');

        var exp = document.getElementById('explanation-area');
        exp.innerHTML = '<div class="explanation-box explanation-incorrect"><div class="flex items-center gap-2 mb-1"><span class="font-black text-sm">❌ Incorrecto</span></div><p class="text-sm opacity-90">' + step.explanation + '</p></div>';
    }

    // Show continue button after delay
    setTimeout(function(){
        document.getElementById('bottom-bar').style.display = 'block';
        document.getElementById('continue-btn').className = 'btn-continue w-full' + (isCorrect ? ' green' : '');
        document.getElementById('continue-btn').textContent = 'CONTINUAR';
    }, 800);
}

// ══ NEXT STEP ══
function nextStep() {
    playSound('click');
    currentStep++;
    if (currentStep < steps.length) {
        renderStep();
    }
}

// ══ ANIMATE COUNTER ══
function animateCounter(id, target) {
    var el = document.getElementById(id);
    if (!el) return;
    var start = 0;
    var duration = 1500;
    var startTime = null;
    function tick(ts) {
        if (!startTime) startTime = ts;
        var progress = Math.min((ts - startTime) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = '+' + Math.round(eased * target);
        if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

// ══ CELEBRATION ══
function launchCelebration() {
    var burst = document.createElement('div');
    burst.className = 'golden-burst';
    document.body.appendChild(burst);
    setTimeout(function(){burst.remove()},900);

    var txt = document.createElement('div');
    txt.className = 'celebration-text';
    txt.textContent = '🏆 ¡COMPLETADO!';
    document.body.appendChild(txt);
    setTimeout(function(){txt.remove()},1600);

    var container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);
    var colors=['#D4AF37','#f0d060','#FFD700','#FFA500','#FF6347','#22c55e','#00d4ff','#a78bfa','#fb7185','#fbbf24'];
    var shapes=['■','●','◆','▲','★'];
    for(var i=0;i<80;i++){(function(idx){setTimeout(function(){
        var p=document.createElement('div');p.className='confetti-piece';
        p.style.left=Math.random()*100+'%';
        p.style.setProperty('--rot',(Math.random()*1080-540)+'deg');
        p.style.animationDuration=(2+Math.random()*2)+'s';
        p.style.fontSize=(10+Math.random()*16)+'px';
        p.style.color=colors[Math.floor(Math.random()*colors.length)];
        p.textContent=shapes[Math.floor(Math.random()*shapes.length)];
        container.appendChild(p);
    },idx*15)})(i)}

    for(var j=0;j<12;j++){(function(idx){
        var s=document.createElement('div');s.className='star-particle';s.textContent='⭐';
        s.style.position='fixed';s.style.top='50%';s.style.left='50%';
        var angle=(idx/12)*Math.PI*2;var dist=120+Math.random()*100;
        s.style.setProperty('--dx',Math.cos(angle)*dist+'px');
        s.style.setProperty('--dy',Math.sin(angle)*dist+'px');
        s.style.animationDuration=(1+Math.random()*0.5)+'s';
        s.style.animationDelay=(0.1+idx*0.05)+'s';
        s.style.zIndex='10000';
        document.body.appendChild(s);
        setTimeout(function(){s.remove()},2000);
    })(j)}

    setTimeout(function(){container.remove()},5000);
}

// ══ NAVIGATION ══
function goToNextLevel() {
    if (nextInfo) window.location.href = 'leccion.html?world=' + nextInfo.world.id + '&level=' + nextInfo.level.n;
}
function goToMap() {
    if (currentInfo) window.location.href = currentInfo.world.page;
    else window.location.href = 'niveles-novato.html';
}

// ══ START ══
renderStep();
</script>
