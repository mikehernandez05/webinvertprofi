<head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2236;border-radius:2px}
body{background:#050810;font-family:'Rajdhani',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ═══ ATMOSPHERE ═══ */
.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,#08061a 0%,#050810 30%,#060a14 60%,#0a0814 100%)}
.stars{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 12% 15%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 28% 42%,rgba(255,255,255,.3),transparent),
    radial-gradient(1.5px 1.5px at 45% 8%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 62% 68%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 78% 25%,rgba(212,175,55,.3),transparent),
    radial-gradient(1px 1px at 88% 55%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 35% 82%,rgba(0,229,255,.2),transparent),
    radial-gradient(1.5px 1.5px at 55% 35%,rgba(212,175,55,.25),transparent),
    radial-gradient(1px 1px at 92% 88%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 8% 72%,rgba(168,85,247,.2),transparent)}
.scan{position:fixed;inset:0;z-index:90;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.008) 3px,rgba(0,0,0,.008) 4px)}
#fxCanvas{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ═══ TOWER SPINE ═══ */
.tower-spine{position:absolute;left:50%;top:0;bottom:0;width:4px;transform:translateX(-50%);z-index:5}
.spine-done{background:linear-gradient(180deg,#D4AF37,rgba(212,175,55,.6));box-shadow:0 0 12px rgba(212,175,55,.3)}
.spine-active{background:linear-gradient(180deg,rgba(0,229,255,.6),rgba(0,229,255,.2));box-shadow:0 0 15px rgba(0,229,255,.3);animation:spinePulse 2s ease-in-out infinite}
.spine-locked{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02))}
@keyframes spinePulse{0%,100%{box-shadow:0 0 15px rgba(0,229,255,.3)}50%{box-shadow:0 0 30px rgba(0,229,255,.5)}}

/* ═══ WORLD NODE ═══ */
.wnode{position:relative;z-index:10;cursor:pointer;transition:transform .35s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.wnode:hover{transform:scale(1.03)}
.wnode:active{transform:scale(.97)!important}
.wnode.locked{cursor:not-allowed}
.wnode.locked:hover{transform:none}

/* World card base */
.wcard{position:relative;border-radius:24px;padding:24px 20px;overflow:hidden;transition:all .4s}
.wcard::before{content:'';position:absolute;inset:0;border-radius:24px;pointer-events:none;z-index:1}

/* ── COMPLETED STATE: Golden, polished ── */
.wcard-done{
  background:linear-gradient(135deg,#1a1608,#18140a,#1a1608);
  border:2px solid rgba(212,175,55,.4);
  box-shadow:0 0 30px rgba(212,175,55,.08),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(212,175,55,.1)}
.wcard-done::before{background:linear-gradient(135deg,rgba(212,175,55,.04),transparent 60%)}
.wcard-done::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#D4AF37,transparent);opacity:.4}
.flag-banner{position:absolute;top:12px;right:-8px;background:linear-gradient(135deg,#b8960b,#D4AF37);color:#0a0814;font-family:'Orbitron';font-weight:900;font-size:8px;letter-spacing:2px;padding:5px 20px 5px 12px;clip-path:polygon(0 0,100% 0,92% 50%,100% 100%,0 100%,8% 50%);z-index:20;text-transform:uppercase}
.done-glow{position:absolute;inset:-2px;border-radius:26px;background:conic-gradient(from 0deg,transparent,rgba(212,175,55,.1),transparent,rgba(212,175,55,.08),transparent);animation:doneRotate 8s linear infinite;z-index:0;pointer-events:none}
@keyframes doneRotate{to{transform:rotate(360deg)}}

/* ── ACTIVE STATE: Glowing, pulsing ── */
.wcard-active{
  background:linear-gradient(135deg,#0a1220,#0c1428,#0a1220);
  border:2px solid rgba(0,229,255,.35);
  box-shadow:0 0 40px rgba(0,229,255,.1),0 0 80px rgba(0,229,255,.04),0 8px 32px rgba(0,0,0,.4);
  animation:activeGlow 3s ease-in-out infinite}
.wcard-active::before{background:linear-gradient(135deg,rgba(0,229,255,.04),transparent 60%)}
.wcard-active::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);opacity:.5;animation:activeSweep 3s ease-in-out infinite}
@keyframes activeGlow{0%,100%{box-shadow:0 0 40px rgba(0,229,255,.1),0 8px 32px rgba(0,0,0,.4)}50%{box-shadow:0 0 60px rgba(0,229,255,.18),0 0 100px rgba(0,229,255,.06),0 8px 32px rgba(0,0,0,.4)}}
@keyframes activeSweep{0%{transform:translateX(-100%)}50%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* Beacon pulse behind active world */
.beacon{position:absolute;inset:-12px;border-radius:36px;z-index:0;pointer-events:none;
  border:1px solid rgba(0,229,255,.08);animation:beaconPulse 2.5s ease-out infinite}
.beacon:nth-child(2){animation-delay:.8s;inset:-20px;border-radius:44px}
@keyframes beaconPulse{0%{opacity:.6;transform:scale(.98)}50%{opacity:.15;transform:scale(1.04)}100%{opacity:0;transform:scale(1.08)}}

/* ── LOCKED STATE: Gray, force field ── */
.wcard-locked{
  background:linear-gradient(135deg,#0c0e14,#0e1018,#0c0e14);
  border:2px solid rgba(255,255,255,.06);
  box-shadow:0 8px 32px rgba(0,0,0,.4)}
.wcard-locked::before{background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,.008) 8px,rgba(255,255,255,.008) 9px)}

/* Energy chains SVG */
.chains{position:absolute;inset:0;z-index:15;pointer-events:none;overflow:hidden;border-radius:24px;opacity:.5}
.chain-line{stroke:rgba(255,255,255,.08);stroke-width:2;fill:none;stroke-dasharray:6 4;animation:chainFlow 2s linear infinite}
@keyframes chainFlow{to{stroke-dashoffset:-20}}

/* Force field shimmer */
.forcefield{position:absolute;inset:0;border-radius:24px;z-index:14;pointer-events:none;overflow:hidden}
.forcefield::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(100,116,139,.03),transparent);animation:fieldShimmer 4s ease-in-out infinite}
@keyframes fieldShimmer{0%,100%{transform:translateY(-100%)}50%{transform:translateY(100%)}}
.lock-hex{position:absolute;inset:0;border-radius:24px;pointer-events:none;z-index:16;
  background:repeating-conic-gradient(rgba(255,255,255,.01) 0deg,transparent 3deg,transparent 57deg,rgba(255,255,255,.01) 60deg);opacity:.3}

/* ═══ WORLD ICON ORB ═══ */
.worb{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;flex-shrink:0;transition:all .3s}
.worb-done{background:radial-gradient(circle at 35% 35%,rgba(212,175,55,.8),rgba(212,175,55,.5) 60%,rgba(212,175,55,.25));border:3px solid rgba(212,175,55,.6);box-shadow:0 0 25px rgba(212,175,55,.3),inset 0 -3px 6px rgba(0,0,0,.3)}
.worb-done::after{content:'';position:absolute;inset:4px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.2),transparent 60%)}
.worb-active{background:radial-gradient(circle at 35% 35%,rgba(0,229,255,.4),rgba(0,229,255,.15) 60%,rgba(0,229,255,.05));border:3px solid rgba(0,229,255,.4);box-shadow:0 0 30px rgba(0,229,255,.25);animation:orbPulse 2.5s ease-in-out infinite}
.worb-active::after{content:'';position:absolute;inset:4px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.15),transparent 60%)}
@keyframes orbPulse{0%,100%{box-shadow:0 0 30px rgba(0,229,255,.25)}50%{box-shadow:0 0 50px rgba(0,229,255,.4),0 0 80px rgba(0,229,255,.1)}}
.worb-locked{background:radial-gradient(circle at 35% 35%,#2a2e38,#1e2028 60%,#14161c);border:3px solid #1e222c;box-shadow:inset 0 -3px 6px rgba(0,0,0,.3);filter:grayscale(60%) brightness(.5)}

/* ═══ AMIGOTRADE MASCOT ═══ */
.amigo{position:absolute;right:-16px;bottom:-8px;z-index:25;animation:amigoFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(0,229,255,.4))}
@keyframes amigoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.amigo-body{width:48px;height:58px;position:relative}
.amigo-head{width:36px;height:32px;background:radial-gradient(circle at 40% 35%,#1a2844,#0e1628);border:2px solid rgba(0,229,255,.4);border-radius:10px 10px 8px 8px;position:absolute;top:0;left:6px;overflow:hidden}
.amigo-visor{position:absolute;top:8px;left:4px;right:4px;height:12px;border-radius:4px;background:linear-gradient(90deg,rgba(0,229,255,.15),rgba(0,229,255,.3),rgba(0,229,255,.15));border:1px solid rgba(0,229,255,.3);overflow:hidden}
.amigo-visor::after{content:'';position:absolute;width:6px;height:6px;background:rgba(0,229,255,.8);border-radius:50%;top:3px;box-shadow:0 0 6px rgba(0,229,255,.8);animation:eyeScan 3s ease-in-out infinite}
@keyframes eyeScan{0%,100%{left:3px}50%{left:calc(100% - 9px)}}
.amigo-antenna{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:2px;height:8px;background:rgba(0,229,255,.3)}
.amigo-antenna::after{content:'';position:absolute;top:-3px;left:-2px;width:6px;height:6px;border-radius:50%;background:rgba(0,229,255,.6);box-shadow:0 0 8px rgba(0,229,255,.6);animation:antennaGlow 1.5s ease-in-out infinite}
@keyframes antennaGlow{0%,100%{opacity:.5;box-shadow:0 0 4px rgba(0,229,255,.4)}50%{opacity:1;box-shadow:0 0 12px rgba(0,229,255,.8)}}
.amigo-body-lower{position:absolute;top:30px;left:8px;width:32px;height:24px;background:linear-gradient(180deg,#141e32,#0e1628);border:1.5px solid rgba(0,229,255,.2);border-radius:6px}
.amigo-arm{position:absolute;top:32px;width:8px;height:16px;background:#141e32;border:1.5px solid rgba(0,229,255,.15);border-radius:3px}
.amigo-arm-l{left:1px;transform:rotate(15deg);animation:armWave 2s ease-in-out infinite}
.amigo-arm-r{right:1px;transform:rotate(-15deg)}
@keyframes armWave{0%,100%{transform:rotate(15deg)}50%{transform:rotate(-5deg)}}
.amigo-badge{position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3);border-radius:4px;padding:1px 5px;font-family:'Share Tech Mono';font-size:6px;color:rgba(0,229,255,.8);white-space:nowrap;letter-spacing:1px}

/* ═══ PROGRESS BAR ═══ */
.wprog{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:12px}
.wprog-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.wprog-done{background:linear-gradient(90deg,#b8960b,#D4AF37)}
.wprog-active{background:linear-gradient(90deg,#0891b2,#00e5ff)}
.wprog-locked{background:rgba(255,255,255,.04)}

/* ═══ WORLD NUMBER BADGE ═══ */
.wnum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:900;font-size:11px;position:absolute;left:-14px;top:50%;transform:translateY(-50%);z-index:20}
.wnum-done{background:#D4AF37;color:#0a0814;box-shadow:0 0 12px rgba(212,175,55,.3)}
.wnum-active{background:#00e5ff;color:#0a0814;box-shadow:0 0 15px rgba(0,229,255,.4);animation:numPulse 2s ease-in-out infinite}
@keyframes numPulse{0%,100%{box-shadow:0 0 12px rgba(0,229,255,.3)}50%{box-shadow:0 0 25px rgba(0,229,255,.6)}}
.wnum-locked{background:#1e222c;color:#555;border:1px solid #2a2e38}

/* ═══ TRANSITION OVERLAY ═══ */
.zoom-ov{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s}
.zoom-ov.go{pointer-events:all;opacity:1}
.zoom-flash{position:absolute;inset:0;background:radial-gradient(circle at var(--cx,50%) var(--cy,50%),var(--fc,rgba(0,229,255,.7)) 0%,transparent 70%);opacity:0}
.zoom-flash.fire{animation:zFlash .6s ease-out forwards}
@keyframes zFlash{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2)}}
.zoom-vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.95) 100%);opacity:0}
.zoom-vig.fire{animation:zVig 1.2s ease-in-out forwards}
@keyframes zVig{0%{opacity:0}40%{opacity:1}100%{opacity:1}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:480px){.wcard{padding:18px 14px}.worb{width:56px;height:56px;font-size:1.5rem}.flag-banner{font-size:7px;padding:4px 14px 4px 10px}.amigo-body{transform:scale(.8);transform-origin:bottom right}.wnum{width:24px;height:24px;font-size:9px;left:-12px}}
@media(min-width:769px){.wcard{padding:28px 24px}.worb{width:80px;height:80px;font-size:2.2rem}}
</style>
</head>
<body class="text-white min-h-screen">
<div class="atmo"></div>
<div class="stars"></div>
<canvas id="fxCanvas"></canvas>
<div class="scan"></div>

<!-- ═══ HEADER ═══ -->
<header class="border-b border-white/5 bg-black/70 backdrop-blur-xl sticky top-0 z-[60]">
<div class="flex items-center justify-between px-4 md:px-8 py-3">
  <div class="flex items-center gap-3">
    <a href="index.html" class="w-8 h-8 rounded-lg flex items-center justify-center border border-white/10 hover:border-white/20 transition" style="background:rgba(212,175,55,.05)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></a>
    <div>
      <div class="flex items-center gap-2">
        <img src="images/logo_azul.png" alt="IP" class="h-8 w-auto" style="filter:drop-shadow(0 0 8px rgba(212,175,55,.3))" onerror="this.outerHTML='<span style=\'color:#D4AF37;font-weight:900;font-size:1rem;font-family:Orbitron\'>IP</span>'">
        <span class="font-display font-black text-sm tracking-[3px] text-white">VOID NEXUS</span>
      </div>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <div class="text-center hidden sm:block"><div class="text-[7px] font-bold text-gray-500 tracking-[2px] uppercase">Total XP</div><div class="text-xs font-display font-black text-yellow-400" id="totalXP">0</div></div>
    <div class="text-center hidden sm:block"><div class="text-[7px] font-bold text-gray-500 tracking-[2px] uppercase">Niveles</div><div class="text-xs font-display font-black text-cyan-400" id="totalLvl">0/89</div></div>
    <div class="text-center"><div class="text-[7px] font-bold text-gray-500 tracking-[2px] uppercase">Rank</div><div class="text-xs font-display font-black text-white" id="rankText">Novato</div></div>
  </div>
</div>
</header>

<!-- ═══ MAIN TOWER ═══ -->
<main class="relative z-10 max-w-lg mx-auto px-4 pt-8 pb-24">
  <!-- Title -->
  <div class="text-center mb-10">
    <div class="text-[9px] font-black tracking-[5px] uppercase text-gray-500 mb-2">SELECCIONA TU DESTINO</div>
    <h1 class="font-display text-3xl md:text-4xl font-black uppercase tracking-tight text-white mb-2" style="text-shadow:0 0 30px rgba(212,175,55,.3)">TORRE NEXUS</h1>

  <div class="relative" id="tower" style="padding-left:20px">

<!-- Transition overlay -->

  <div class="zoom-vig" id="zVig"></div>

<!-- ═══ SCRIPT ═══ -->
<script>
// ── World configs ──
var WDATA = [
  {id:1,name:'Génesis',tag:'MUNDO 01',sub:'Despertar del Trader',desc:'Los fundamentos del mercado. Tu primer paso.',emoji:'🔥',color:'#ff6a00',rgb:'255,106,0',page:'niveles-novato.html',rank:'Aprendiz',levels:10,first:1,last:10},
  {id:2,name:'Cartografía',tag:'MUNDO 02',sub:'Cartógrafo del Mercado',desc:'Análisis técnico y patrones de velas.',emoji:'⛏️',color:'#3b82f6',rgb:'59,130,246',page:'niveles-intermedio.html',rank:'Cartógrafo',levels:12,first:11,last:22},
  {id:3,name:'Anatomía',tag:'MUNDO 03',sub:'Anatomía Institucional',desc:'Smart Money y operativa institucional.',emoji:'🧠',color:'#a855f7',rgb:'168,85,247',page:'niveles-experto.html',rank:'Cirujano',levels:12,first:23,last:34},
  {id:4,name:'Sincronía',tag:'MUNDO 04',sub:'Arquitecto Digital',desc:'Indicadores y operativa sincronizada.',emoji:'🤖',color:'#06b6d4',rgb:'6,182,212',page:'niveles-mundo4.html',rank:'Arquitecto',levels:15,first:46,last:60},
  {id:5,name:'Estrategia',tag:'MUNDO 05',sub:'El Decano',desc:'Macroeconomía, derivados y psicología.',emoji:'🌍',color:'#10b981',rgb:'16,185,129',page:'niveles-mundo5.html',rank:'Decano',levels:15,first:61,last:75},
  {id:6,name:'Soberanía',tag:'MUNDO 06',sub:'El Cazador',desc:'Smart Money, Wyckoff e institucional.',emoji:'🎯',color:'#f43f5e',rgb:'244,63,94',page:'niveles-mundo6.html',rank:'Cazador',levels:15,first:76,last:90},
  {id:7,name:'Legado',tag:'MUNDO 07',sub:'Grand Master',desc:'Estadística, algoritmos y certificación final.',emoji:'👑',color:'#eab308',rgb:'234,179,8',page:'niveles-mundo7.html',rank:'Grand Master',levels:10,first:91,last:100}
];

// ── Determine states ──
var totalComp=CURRICULUM.getCompletedCount();
var totalAll=CURRICULUM.getAllLevels().length;
document.getElementById('totalLvl').textContent=totalComp+'/'+totalAll;

var ranks=['Novato','Aprendiz','Cartógrafo','Cirujano','Arquitecto','Decano','Cazador','Grand Master'];
var currentRankIdx=0;

WDATA.forEach(function(w){
  var unlocked=CURRICULUM.isWorldUnlocked(w.id);
  var comp=CURRICULUM.getCompletedInWorld(w.id);
  w.completed=comp;
  w.total=w.levels;
  if(!unlocked){w.state='locked'}
  else if(comp>=w.levels){w.state='completed'}
  else{w.state='active'}
  if(w.state==='completed')currentRankIdx=w.id;
  else if(w.state==='active'&&currentRankIdx<w.id)currentRankIdx=w.id-1;
});
document.getElementById('rankText').textContent=ranks[Math.min(currentRankIdx,ranks.length-1)];

// ── Build tower (bottom to top: world 1 at bottom) ──
var container=document.getElementById('worldNodes');
var reversed=WDATA.slice().reverse(); // World 7 at top, World 1 at bottom

var html='';
reversed.forEach(function(w,idx){
  var st=w.state;
  var cardCls=st==='completed'?'wcard-done':(st==='active'?'wcard-active':'wcard-locked');
  var orbCls=st==='completed'?'worb-done':(st==='active'?'worb-active':'worb-locked');
  var numCls=st==='completed'?'wnum-done':(st==='active'?'wnum-active':'wnum-locked');
  var pct=w.total>0?Math.round(w.completed/w.total*100):0;
  var progCls=st==='completed'?'wprog-done':(st==='active'?'wprog-active':'wprog-locked');

  html+='<div class="wnode'+(st==='locked'?' locked':'')+'" data-id="'+w.id+'" data-state="'+st+'" data-page="'+w.page+'" data-rgb="'+w.rgb+'" onclick="goWorld(this)">';

  // Beacon pulses for active
  if(st==='active')html+='<div class="beacon"></div><div class="beacon"></div>';

  // Number badge
  html+='<div class="wnum '+numCls+'">'+w.id+'</div>';

  html+='<div class="wcard '+cardCls+'">';

  // Completed: golden glow ring + conquest flag
  if(st==='completed'){
    html+='<div class="done-glow"></div>';
    html+='<div class="flag-banner">⚑ CONQUISTADO</div>';
  }

  // Locked: chains + force field
  if(st==='locked'){

  }

  // Content
  html+='<div class="flex items-center gap-4 relative z-10">';
  html+='<div class="worb '+orbCls+'">'+w.emoji+'</div>';
  html+='<div class="flex-1 min-w-0">';
  html+='<div class="text-[8px] font-bold tracking-[3px] uppercase '+(st==='locked'?'text-gray-600':'text-gray-500')+'">'+w.tag+'</div>';
  html+='<h3 class="font-display text-lg md:text-xl font-black uppercase tracking-tight '+(st==='locked'?'text-gray-600':'text-white')+'" style="line-height:1.2">'+w.sub+'</h3>';
  html+='<p class="text-xs '+(st==='locked'?'text-gray-700':'text-gray-500')+' mt-0.5">'+w.desc+'</p>';

  // Progress
  html+='<div class="wprog"><div class="wprog-fill '+progCls+'" style="width:'+pct+'%"></div></div>';
  html+='<div class="flex justify-between mt-1">';
  html+='<span class="text-[9px] font-bold '+(st==='locked'?'text-gray-700':'text-gray-500')+'">'+w.completed+'/'+w.total+' niveles</span>';
  if(st==='completed')html+='<span class="text-[9px] font-bold text-yellow-500">✓ 100%</span>';
  else if(st==='active')html+='<span class="text-[9px] font-bold" style="color:#00e5ff">'+pct+'%</span>';
  else html+='<span class="text-[9px] font-bold text-gray-700"><span class="material-symbols-outlined text-[10px]" style="vertical-align:middle">lock</span> Bloqueado</span>';
  html+='</div>';

  html+='</div></div>'; // end flex, end info

  // AmigoTrade mascot for active world
  if(st==='active'){
    html+='<div class="amigo"><div class="amigo-body">';
    html+='<div class="amigo-antenna"></div>';
    html+='<div class="amigo-head"><div class="amigo-visor"></div></div>';
    html+='<div class="amigo-body-lower"></div>';
    html+='<div class="amigo-arm amigo-arm-l"></div>';
    html+='<div class="amigo-arm amigo-arm-r"></div>';
    html+='<div class="amigo-badge">AMIGO</div>';
    html+='</div></div>';
  }

  html+='</div>'; // wcard
  html+='</div>'; // wnode
});

// ── Build spines ──
// After layout, calculate positions for connecting spines
setTimeout(function(){
  var nodes=document.querySelectorAll('.wnode');
  var spineC=document.getElementById('spines');
  spineC.innerHTML='';
  for(var i=0;i<nodes.length-1;i++){
    var a=nodes[i],b=nodes[i+1];
    var aR=a.getBoundingClientRect(),bR=b.getBoundingClientRect();
    var towerR=document.getElementById('tower').getBoundingClientRect();
    var top=aR.bottom-towerR.top;
    var h=bR.top-aR.bottom;
    var stA=a.dataset.state,stB=b.dataset.state;
    var cls=(stA==='completed'&&stB==='completed')?'spine-done':
            (stA==='completed'&&stB==='active')||(stA==='active'&&stB==='completed')?'spine-active':'spine-locked';
    var sp=document.createElement('div');
    sp.className='tower-spine '+cls;
    sp.style.top=top+'px';
    sp.style.height=Math.max(h,0)+'px';
    spineC.appendChild(sp);
  }
},100);

// ── Navigate to world ──
var isTransitioning=false;
function goWorld(el){
  if(isTransitioning)return;
  var state=el.dataset.state;
  if(state==='locked'){
    // Shake
    el.style.transition='transform .1s';
    el.style.transform='translateX(-4px)';
    setTimeout(function(){el.style.transform='translateX(4px)'},80);
    setTimeout(function(){el.style.transform=''},160);
    sfxLock();
    return;
  }
  isTransitioning=true;
  var rgb=el.dataset.rgb;
  var page=el.dataset.page;

  sfxGo();

  // Flash transition
  var rect=el.getBoundingClientRect();
  var cx=(rect.left+rect.width/2)/innerWidth*100+'%';
  var cy=(rect.top+rect.height/2)/innerHeight*100+'%';
  var ov=document.getElementById('zOv');
  var fl=document.getElementById('zFlash');
  var vi=document.getElementById('zVig');
  fl.style.setProperty('--cx',cx);fl.style.setProperty('--cy',cy);
  fl.style.setProperty('--fc','rgba('+rgb+',.7)');
  ov.classList.add('go');

  // Card zoom
  el.style.transition='transform .6s cubic-bezier(.175,.885,.32,1.275),opacity .5s';
  el.style.transform='scale(1.12)';el.style.zIndex='100';

  setTimeout(function(){fl.classList.add('fire')},50);
  setTimeout(function(){vi.classList.add('fire')},300);
  setTimeout(function(){el.style.transform='scale(2.5)';el.style.opacity='0'},500);
  setTimeout(function(){location.href=page},950);
}

// ── SFX ──
function sfxGo(){try{var c=new(AudioContext||webkitAudioContext)();
  [660,880,1100,1320].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,c.currentTime+i*.06);g.gain.linearRampToValueAtTime(.12,c.currentTime+i*.06+.03);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.06+.3);o.start(c.currentTime+i*.06);o.stop(c.currentTime+i*.06+.3)})}catch(e){}}
function sfxLock(){try{var c=new(AudioContext||webkitAudioContext)();var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=150;o.type='sawtooth';g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.start();o.stop(c.currentTime+.2)}catch(e){}}

// ── Floating dust particles ──
(function(){
  var cv=document.getElementById('fxCanvas'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;
  function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
  addEventListener('resize',rs);rs();
  var pts=[];for(var i=0;i<30;i++)pts.push({x:Math.random()*W,y:Math.random()*H,s:.5+Math.random()*1.5,vy:-.15-Math.random()*.35,vx:(Math.random()-.5)*.2,ph:Math.random()*6.28,sp:.008+Math.random()*.015,c:['rgba(212,175,55,','rgba(0,229,255,','rgba(168,85,247,','rgba(255,255,255,'][Math.random()*4|0]});
  function f(){x.clearRect(0,0,W,H);
    pts.forEach(function(p){p.ph+=p.sp;p.x+=p.vx+Math.sin(p.ph)*.3;p.y+=p.vy;
      if(p.y<-10){p.y=H+10;p.x=Math.random()*W}if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;
      var a=.2+.15*Math.sin(p.ph*2);
      x.beginPath();x.arc(p.x,p.y,p.s,0,6.28);x.fillStyle=p.c+a+')';x.fill();
      x.beginPath();x.arc(p.x,p.y,p.s*3,0,6.28);x.fillStyle=p.c+(a*.08)+')';x.fill()});
    requestAnimationFrame(f)}f()})();
