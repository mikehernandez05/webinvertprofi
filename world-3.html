<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" name="viewport"/>
<title>InvertProfit — Mundo 3: Experto</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%230a0f1a' width='32' height='32' rx='6'/><text x='50%25' y='55%25' dominant-baseline='central' text-anchor='middle' font-size='18' fill='%23D4AF37'>IP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
:root{--a:#a855f7;--ad:#7c3aed;--ar:168,85,247}
*{box-sizing:border-box}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a1030;border-radius:2px}
body{background:#06041a;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ═══ ATMOSPHERE — LABORATORY ═══ */
.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,#0a0018 0%,#06041a 20%,#080420 50%,#0c0028 80%,#06041a 100%)}
.atmo::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 35% at 50% 20%,rgba(124,58,237,.06),transparent 60%)}
.atmo::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 75% 40%,rgba(168,85,247,.03),transparent 40%),
             radial-gradient(circle at 25% 70%,rgba(124,58,237,.04),transparent 40%)}
#fxC{position:fixed;inset:0;z-index:1;pointer-events:none}
.scan{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.01) 3px,rgba(0,0,0,.01) 4px)}

/* ═══ LAB DECORATIONS ═══ */
.world-deco{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.lab-grid{position:absolute;inset:0;opacity:.02;
  background:linear-gradient(rgba(168,85,247,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,.4) 1px,transparent 1px);
  background-size:80px 80px}

/* DNA helix strands */
.dna-strand{position:fixed;z-index:3;pointer-events:none;opacity:.04}
.dna-l{left:8px;top:15%;width:16px;height:300px}
.dna-r{right:8px;top:40%;width:16px;height:250px}
.dna-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(var(--ar),.6);animation:dnaPulse 3s ease-in-out infinite}
@keyframes dnaPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* Pulse rings — heartbeat monitor */
.pulse-ring{position:absolute;border-radius:50%;border:1px solid rgba(var(--ar),.06);animation:pulseExpand 4s ease-out infinite}
.pr-1{width:250px;height:250px;top:15%;left:5%}
.pr-2{width:180px;height:180px;bottom:25%;right:8%;animation-delay:2s}
.pr-3{width:120px;height:120px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1s}
@keyframes pulseExpand{0%{transform:scale(.5);opacity:.1}100%{transform:scale(2.5);opacity:0}}

/* EKG line */
.ekg-line{position:fixed;top:50%;left:0;right:0;height:2px;z-index:3;pointer-events:none;overflow:hidden}
.ekg-line svg{width:200%;height:40px;margin-top:-20px;animation:ekgScroll 4s linear infinite;opacity:.06}
@keyframes ekgScroll{to{transform:translateX(-50%)}}

/* Microscope overlay */
.micro-overlay{position:fixed;z-index:3;pointer-events:none;border-radius:50%;border:2px solid rgba(var(--ar),.03);top:30%;right:15%;width:120px;height:120px}
.micro-overlay::before{content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(var(--ar),.02)}
.micro-overlay::after{content:'+';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(var(--ar),.04);font-size:30px;font-weight:100}

/* ═══ HERO — SURGICAL LAB ═══ */
.world-hero{position:relative;z-index:10;padding:20px 16px 12px;text-align:center;overflow:hidden}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 16px;border-radius:999px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(135deg,rgba(var(--ar),.1),rgba(var(--ar),.03));border:1px solid rgba(var(--ar),.2);color:var(--a);
  box-shadow:0 0 20px rgba(var(--ar),.08)}
.hero-badge .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Brain scan panel */
.brain-panel{margin:12px auto;max-width:300px;border-radius:16px;padding:12px 16px;
  background:linear-gradient(135deg,rgba(var(--ar),.05),rgba(0,0,0,.3));border:1px solid rgba(var(--ar),.1);backdrop-filter:blur(8px)}
.brain-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.brain-panel-header .bp-title{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;color:rgba(var(--ar),.7);letter-spacing:2px}
.brain-panel-header .bp-status{font-family:'Share Tech Mono',monospace;font-size:9px;color:#22c55e;display:flex;align-items:center;gap:4px}
.brain-panel-header .bp-status::before{content:'';width:5px;height:5px;border-radius:50%;background:#22c55e;animation:dotPulse 1.5s infinite}
.brain-bars{display:flex;gap:3px;align-items:flex-end;height:30px}
.brain-bars .bb{width:8px;border-radius:2px 2px 0 0;background:linear-gradient(180deg,var(--a),var(--ad));animation:brainBar 2s ease-in-out infinite}
.bb:nth-child(1){height:60%;animation-delay:0s}.bb:nth-child(2){height:80%;animation-delay:.2s}.bb:nth-child(3){height:45%;animation-delay:.4s}
.bb:nth-child(4){height:90%;animation-delay:.6s}.bb:nth-child(5){height:55%;animation-delay:.8s}.bb:nth-child(6){height:70%;animation-delay:1s}
.bb:nth-child(7){height:85%;animation-delay:1.2s}.bb:nth-child(8){height:40%;animation-delay:1.4s}
@keyframes brainBar{0%,100%{opacity:.5}50%{opacity:1}}

.hero-icon{font-size:3.5rem;margin:8px 0;filter:drop-shadow(0 0 25px rgba(var(--ar),.5));animation:heroFloat 3s ease-in-out infinite}
@keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#fff;margin:4px 0;text-shadow:0 0 30px rgba(var(--ar),.3)}
.hero-sub{color:#555;font-size:12px;font-family:'Share Tech Mono',monospace}

/* Floating panels */
.float-panel{position:fixed;z-index:5;pointer-events:none;padding:8px 10px;border-radius:10px;backdrop-filter:blur(6px);
  background:rgba(6,4,26,.85);border:1px solid rgba(var(--ar),.1)}
.fp-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(var(--ar),.4);text-transform:uppercase;letter-spacing:2px}
.fp-value{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--a)}

.fp-neural{top:20%;right:8px}.fp-neural .fp-value{font-size:10px;color:rgba(var(--ar),.8)}
.fp-flow{bottom:28%;left:8px}
.fp-inst{top:55%;right:8px}
.fp-inst .inst-icon{font-size:18px}

/* ═══ PATH + NODES + MODAL (shared) ═══ */
.map-wrap{max-width:440px;margin:0 auto;padding:0 12px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-done{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 6px rgba(var(--ar),.4));stroke-linecap:round}
.path-active{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 8px rgba(var(--ar),.5));stroke-linecap:round;stroke-dasharray:10 6;animation:dashAnim 1s linear infinite}
.path-locked{stroke:rgba(255,255,255,.06);stroke-width:3;fill:none;stroke-linecap:round}
@keyframes dashAnim{to{stroke-dashoffset:-32}}
.node{position:absolute;z-index:15;cursor:pointer;transition:transform .25s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.node:active{transform:translate(-50%,-50%) scale(.9)!important}.node.locked{cursor:not-allowed;filter:saturate(.2) brightness(.5)}.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}
.node-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative;transition:all .3s;box-shadow:0 4px 15px rgba(0,0,0,.4)}
.nc-done{background:radial-gradient(circle at 35% 35%,#c084fc,rgba(var(--ar),.7) 50%,#4c1d95);border:3px solid rgba(var(--ar),.7);
  box-shadow:0 0 20px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.4),inset 0 2px 4px rgba(196,181,253,.2)}
.nc-done::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.3),transparent 60%);pointer-events:none}
.nc-active{background:radial-gradient(circle at 35% 35%,#d8b4fe,rgba(var(--ar),.5) 50%,#581c87);border:3px solid var(--a);animation:activePulse 2s ease-in-out infinite;
  box-shadow:0 0 30px rgba(var(--ar),.6),0 0 60px rgba(var(--ar),.15),0 4px 15px rgba(0,0,0,.4)}
.nc-active::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.35),transparent 60%);pointer-events:none}
@keyframes activePulse{0%,100%{box-shadow:0 0 30px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4);transform:scale(1)}50%{box-shadow:0 0 50px rgba(var(--ar),.7),0 0 80px rgba(var(--ar),.2);transform:scale(1.08)}}
.nc-locked{background:radial-gradient(circle at 35% 35%,#1e1a2e,#14102a 60%,#0a0818);border:3px solid #201a30;box-shadow:0 4px 15px rgba(0,0,0,.6),inset 0 -3px 6px rgba(0,0,0,.4)}
.node-boss .node-circle{width:78px;height:78px;font-size:1.8rem}
.boss-tag{position:absolute;top:-6px;right:-6px;font-size:8px;font-weight:900;font-family:'Orbitron',sans-serif;border-radius:999px;padding:2px 8px;z-index:20;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;box-shadow:0 0 12px rgba(var(--ar),.4)}
.boss-tag.locked{background:#1f2530;color:#555;box-shadow:none}
.node-lbl{text-align:center;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.node-lbl.lbl-done{color:rgba(var(--ar),.7)}.node-lbl.lbl-active{color:var(--a)}.node-lbl.lbl-locked{color:#333}
.node-stars{text-align:center;font-size:10px;margin-top:2px}.star-on{color:#fbbf24}.star-off{color:#333}

.quest-box{border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(var(--ar),.06),rgba(0,0,0,.4));border:1px solid rgba(var(--ar),.12);backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(var(--ar),.04)}
.quest-box .quest-icon{font-size:1.4rem;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:rgba(var(--ar),.06);border:1px solid rgba(var(--ar),.12)}
.quest-box .quest-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--ar),.4);text-transform:uppercase;letter-spacing:3px}
.quest-box .quest-title{font-size:13px;color:#ccc;font-weight:700}
.quest-box .quest-btn{padding:8px 16px;border-radius:12px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:10px;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;box-shadow:0 0 15px rgba(var(--ar),.3);transition:all .2s}
.quest-box .quest-btn:hover{transform:scale(1.05)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-box{background:linear-gradient(135deg,#0e0820,#120a28,#0e0820);border:1px solid rgba(var(--ar),.25);border-radius:24px;padding:28px;max-width:400px;width:calc(100% - 2rem);
  box-shadow:0 0 80px rgba(var(--ar),.08),0 25px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(var(--ar),.1)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--ar),.2);background:rgba(6,4,26,.9);color:var(--a);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.3)}.mu-btn.off{color:#444;border-color:#1f2530}
header{border-image:linear-gradient(90deg,transparent,rgba(var(--ar),.3),transparent) 1}
@media(max-width:374px){.node-circle{width:52px;height:52px;font-size:1.15rem}.node-boss .node-circle{width:64px;height:64px}.node-lbl{font-size:8px}.map-wrap{max-width:340px}.hero-title{font-size:1.3rem}}
@media(min-width:375px) and (max-width:480px){.node-circle{width:58px;height:58px;font-size:1.3rem}.node-boss .node-circle{width:70px;height:70px}}
@media(min-width:769px){.map-wrap{max-width:500px}.node-circle{width:70px;height:70px;font-size:1.6rem}.node-boss .node-circle{width:86px;height:86px;font-size:2rem}.hero-title{font-size:2rem}}
@media(hover:none){.node:active{transform:translate(-50%,-50%) scale(.92)!important}}
</style>
</head>

<script>
var A='#a855f7',AR='168,85,247',WN=3;

var actLv=levels.find(function(l){return l.s==='active'});if(actLv){var tE2=actLv.t.replace(/'/g,"\\'"),dE2=actLv.d.replace(/'/g,"\\'");document.getElementById('quest').innerHTML='<div class="quest-box"><div class="quest-icon">🧠</div><div class="flex-1"><div class="quest-label">NIVEL ACTUAL</div><div class="quest-title">'+actLv.t+'</div></div><button onclick="openM('+actLv.n+',\''+tE2+'\',\''+dE2+'\',\'active\','+actLv.xp+')" class="quest-btn">▶ JUGAR</button></div>'}

var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);[0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o.type=i<2?'sine':'triangle';o.frequency.value=49*Math.pow(2,s/12);f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;o.connect(f);f.connect(g);g.connect(mg);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});var sc=[0,1,4,5,7,8,11],ni=0;(function play(){if(!sOn){setTimeout(play,2000);return}var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);var fr=49*2*Math.pow(2,semi/12);var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}
function sfxC(){sfx(880,.1);setTimeout(function(){sfx(660,.07)},35)}function sfxL(){sfx(150,.15)}
function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.08:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇'}
document.addEventListener('click',function(){initA()},{once:true});

function openM(n,t,d,s,xp){sfxO();var ic=icons[levels.findIndex(function(l){return l.n===n})]||'🔥';document.getElementById('m-icon').textContent=ic;var b=document.getElementById('m-badge'),c=document.getElementById('m-cta'),nx=document.getElementById('m-next');var nxt=levels.find(function(l){return l.n===n+1});if(s==='completed'){b.textContent='✓ COMPLETADO';b.style.cssText='background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.25)';document.getElementById('m-stars').textContent='⭐⭐⭐';c.textContent='🔄 REPASAR';c.style.cssText='background:rgba(34,197,94,.08);color:#22c55e;border:1px solid rgba(34,197,94,.2);width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';c.onclick=function(){location.href='leccion.html?world=3&level='+n};if(nxt){nx.classList.remove('hidden');nx.textContent='▶ SIGUIENTE';nx.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';nx.onclick=function(){location.href='leccion.html?world=3&level='+nxt.n}}else nx.classList.add('hidden')}else if(s==='active'){b.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--a);animation:activePulse 1s infinite;margin-right:4px"></span> EN PROGRESO';b.style.cssText='background:rgba(var(--ar),.1);color:var(--a);border:1px solid rgba(var(--ar),.2)';document.getElementById('m-stars').textContent='⭐⭐⭐';c.textContent='▶ JUGAR';c.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';c.onclick=function(){location.href='leccion.html?world=3&level='+n};nx.classList.add('hidden')}else{b.textContent='🔒 BLOQUEADO';b.style.cssText='background:rgba(107,114,1 // ═══ WORLD FX — PLASMA ORBS + NEURAL SPARKS ═══
(function(){var cv=document.getElementById('fxC'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',rs);rs();
  var orbs=[];for(var i=0;i<25;i++)orbs.push({x:Math.random()*W,y:Math.random()*H,s:2+Math.random()*4,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,ph:Math.random()*6.28,sp:.008+Math.random()*.015});
  var sparks=[];for(var i=0;i<8;i++)sparks.push({x:0,y:0,tx:0,ty:0,a:0,t:0,m:60+Math.random()*120});
  function reSpark(s){s.x=Math.random()*W;s.y=Math.random()*H;s.tx=s.x+(Math.random()-.5)*100;s.ty=s.y+(Math.random()-.5)*100;s.t=0;s.m=40+Math.random()*80;s.a=.4+Math.random()*.4}
  sparks.forEach(reSpark);
  function f(){x.clearRect(0,0,W,H);
    orbs.forEach(function(o){o.ph+=o.sp;o.x+=o.vx+Math.sin(o.ph)*.2;o.y+=o.vy+Math.cos(o.ph)*.2;
      if(o.x<-20)o.x=W+20;if(o.x>W+20)o.x=-20;if(o.y<-20)o.y=H+20;if(o.y>H+20)o.y=-20;
      var a=.15+.1*Math.sin(o.ph*2);x.beginPath();x.arc(o.x,o.y,o.s,0,6.28);x.fillStyle='rgba(168,85,247,'+a+')';x.fill();
      x.beginPath();x.arc(o.x,o.y,o.s*4,0,6.28);x.fillStyle='rgba(168,85,247,'+(a*.06)+')';x.fill()});
    sparks.forEach(function(s){s.t++;if(s.t>s.m){reSpark(s);return}var p=s.t/s.m;var cx=s.x+(s.tx-s.x)*p,cy=s.y+(s.ty-s.y)*p;
      x.beginPath();x.moveTo(s.x,s.y);x.lineTo(cx,cy);x.strokeStyle='rgba(168,85,247,'+(s.a*(1-p)*.15)+')';x.lineWidth=1;x.stroke();
      x.beginPath();x.arc(cx,cy,2,0,6.28);x.fillStyle='rgba(200,150,255,'+(s.a*(1-p)*.3)+')';x.fill()});
    requestAnimationFrame(f)}f()})();
