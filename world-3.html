<style>
:root{
  --a:#00e5ff;--ad:#0097a7;--ar:0,229,255;
  --gold:#CBA052;--goldr:203,160,82;
  --bg:#00050f;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:#e2e8f0;font-family:'Rajdhani',sans-serif;overflow:hidden}

/* === MAIN SCROLL === */
#mainScroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:1}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* === ENTRY/EXIT === */
body.entering #mainScroll{opacity:0}
body.entered #mainScroll{animation:fadeIn .6s ease-out forwards}
body.exiting #mainScroll{transition:all .45s;opacity:0;transform:scale(.97);filter:blur(2px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* === HEADER === */
.hdr{position:sticky;top:0;z-index:60;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(6,10,20,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.hdr-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.5);text-decoration:none;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:1px;transition:color .2s}
.hdr-back:hover{color:var(--a)}
.hdr-stats{display:flex;align-items:center;gap:12px;font-family:'Share Tech Mono',monospace;font-size:.72rem;color:rgba(255,255,255,.45)}
.prog-track{height:4px;background:rgba(255,255,255,.03)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ad),var(--a));transition:width .6s;border-radius:0 2px 2px 0;box-shadow:0 0 8px rgba(var(--ar),.3)}

/* === HERO === */
.hero-wrap{text-align:center;padding:20px 16px 12px;position:relative;z-index:5}
.hero-badge{display:inline-block;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:3px;color:var(--a);background:rgba(var(--ar),.07);border:1px solid rgba(var(--ar),.18);padding:4px 16px;border-radius:4px;margin-bottom:8px}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(var(--ar),.25)}
.hero-sub{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:rgba(var(--ar),.5);letter-spacing:2px;margin-top:4px}

/* === QUEST === */
.quest-box{display:flex;align-items:center;gap:12px;background:rgba(var(--ar),.05);border:1px solid rgba(var(--ar),.12);border-radius:10px;padding:10px 14px;margin:0 16px 8px}
.quest-icon{font-size:1.6rem}
.quest-label{font-family:'Share Tech Mono',monospace;font-size:.5rem;color:rgba(var(--ar),.4);letter-spacing:2px}
.quest-title{font-family:'Orbitron',sans-serif;font-size:.75rem;color:#fff;margin-top:2px}
.quest-btn{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:2px;color:#fff;background:linear-gradient(135deg,var(--ad),var(--a));border:none;padding:8px 16px;border-radius:6px;cursor:pointer;white-space:nowrap;box-shadow:0 0 12px rgba(var(--ar),.25);transition:all .2s}
.quest-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.4);transform:translateY(-1px)}

/* === MAP === */
.map-wrap{position:relative;width:100%;max-width:500px;margin:0 auto;padding:10px 0 140px;z-index:5}
.map-inner{position:relative}
#pathSvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#nodesLayer{position:relative;z-index:5}

/* ============================
   HEX NODES — PREMIUM SCI-FI
   ============================ */
.node{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;z-index:5;
  transition:filter .25s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.4,0,.2,1);
}
.node:hover{filter:brightness(1.5) contrast(1.1)!important;transform:translate(-50%,-50%) scale(1.14)!important}
.node:hover .hex-glow{opacity:1!important;transform:scale(1.18)!important}
.node:hover .hex-border{opacity:1!important}
.node:hover .hex-halo{opacity:.7!important;transform:scale(1.15)!important}
.node:hover .node-particles{opacity:1!important}
.node:active{transform:translate(-50%,-50%) scale(.85)!important}
.node.locked{cursor:default}
.node.locked:hover{filter:saturate(.1) brightness(.32)!important;transform:translate(-50%,-50%)!important}
.node.locked:hover .hex-glow,.node.locked:hover .hex-halo,.node.locked:hover .node-particles{opacity:0!important}

/* hex container */
.hex-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.hex-outer{position:relative}

/* hex shape */
.hex-node{
  position:relative;width:72px;height:66px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;font-weight:700;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  z-index:2;transition:all .25s;
}
.hex-node::before,.hex-node::after{
  content:'';position:absolute;inset:0;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}
.hex-node::before{z-index:-2}
.hex-node::after{z-index:-1}

/* NEON BORDER */
.hex-border{
  position:absolute;inset:-4px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  z-index:1;transition:opacity .3s;
}

/* ENERGY HALO — outer atmospheric glow */
.hex-halo{
  position:absolute;inset:-28px;border-radius:50%;z-index:-1;pointer-events:none;
  background:radial-gradient(circle,rgba(var(--ar),.15) 0%,rgba(var(--ar),.05) 40%,transparent 70%);
  transition:opacity .4s,transform .4s;
}

/* MICRO PARTICLES container */
.node-particles{
  position:absolute;inset:-36px;z-index:0;pointer-events:none;overflow:visible;transition:opacity .3s;
}
.node-particles .mp{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:rgba(var(--ar),.7);
  filter:drop-shadow(0 0 3px rgba(var(--ar),.8));
}
.node-particles .mp:nth-child(1){top:8%;left:15%;animation:mpFloat 3s ease-in-out infinite}
.node-particles .mp:nth-child(2){top:65%;left:5%;animation:mpFloat 3.7s ease-in-out infinite .5s}
.node-particles .mp:nth-child(3){top:20%;right:10%;animation:mpFloat 2.8s ease-in-out infinite 1s}
.node-particles .mp:nth-child(4){bottom:12%;right:18%;animation:mpFloat 3.3s ease-in-out infinite 1.5s}
.node-particles .mp:nth-child(5){top:45%;left:2%;animation:mpFloat 4s ease-in-out infinite .8s}
.node-particles .mp:nth-child(6){bottom:5%;left:40%;animation:mpFloat 3.5s ease-in-out infinite 1.2s}
@keyframes mpFloat{
  0%,100%{transform:translateY(0) scale(1);opacity:.6}
  25%{transform:translateY(-8px) scale(1.3);opacity:1}
  50%{transform:translateY(-4px) scale(.8);opacity:.4}
  75%{transform:translateY(-12px) scale(1.1);opacity:.9}
}

/* --- COMPLETED --- */
.hex-done{color:#fff;text-shadow:0 0 10px rgba(var(--ar),.7),0 0 25px rgba(var(--ar),.3)}
.hex-done::before{background:linear-gradient(135deg,rgba(var(--ar),.45),rgba(var(--ar),.12))}
.hex-done::after{background:radial-gradient(circle at 40% 35%,rgba(var(--ar),.15),#0d1117 65%)}
.node-done .hex-border{background:linear-gradient(135deg,rgba(var(--ar),.6),rgba(var(--ar),.2))}
.node-done .hex-halo{opacity:.25}
.node-done .node-particles{opacity:.3}
.node-done{
  filter:drop-shadow(0 0 8px rgba(var(--ar),.5)) drop-shadow(0 0 24px rgba(var(--ar),.2)) drop-shadow(0 0 45px rgba(var(--ar),.08));
  animation:hexIdleDone 4s ease-in-out infinite;
}
@keyframes hexIdleDone{
  0%,100%{filter:drop-shadow(0 0 8px rgba(var(--ar),.5)) drop-shadow(0 0 24px rgba(var(--ar),.2)) drop-shadow(0 0 45px rgba(var(--ar),.08))}
  50%{filter:drop-shadow(0 0 12px rgba(var(--ar),.6)) drop-shadow(0 0 30px rgba(var(--ar),.25)) drop-shadow(0 0 55px rgba(var(--ar),.1))}
}

/* --- ACTIVE --- */
.hex-active{color:#fff;text-shadow:0 0 18px rgba(var(--ar),1),0 0 40px rgba(var(--ar),.5)}
.hex-active::before{background:linear-gradient(135deg,rgba(var(--ar),.7),rgba(var(--ar),.22))}
.hex-active::after{background:radial-gradient(circle at 40% 35%,rgba(var(--ar),.25),#0d1117 55%)}
.node-active .hex-border{background:linear-gradient(135deg,rgba(var(--ar),.95),rgba(var(--ar),.5));animation:borderPulse 1.8s ease-in-out infinite}
.node-active .hex-halo{opacity:.5;animation:haloPulse 2.4s ease-in-out infinite}
.node-active .node-particles{opacity:.8}
.node-active{
  filter:drop-shadow(0 0 18px rgba(var(--ar),.85)) drop-shadow(0 0 50px rgba(var(--ar),.4)) drop-shadow(0 0 80px rgba(var(--ar),.15)) drop-shadow(0 0 120px rgba(var(--ar),.06));
  animation:hexPulse 2s ease-in-out infinite;
}
@keyframes hexPulse{
  0%,100%{filter:drop-shadow(0 0 18px rgba(var(--ar),.85)) drop-shadow(0 0 50px rgba(var(--ar),.4)) drop-shadow(0 0 80px rgba(var(--ar),.15)) drop-shadow(0 0 120px rgba(var(--ar),.06))}
  50%{filter:drop-shadow(0 0 28px rgba(var(--ar),1)) drop-shadow(0 0 65px rgba(var(--ar),.55)) drop-shadow(0 0 100px rgba(var(--ar),.22)) drop-shadow(0 0 150px rgba(var(--ar),.08))}
}
@keyframes borderPulse{0%,100%{opacity:.8}50%{opacity:1}}
@keyframes haloPulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.65;transform:scale(1.12)}}

/* --- LOCKED --- */
.hex-locked{color:rgba(255,255,255,.18)}
.hex-locked::before{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.015))}
.hex-locked::after{background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.02),#0d1117 72%)}
.node-locked .hex-border{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.025))}
.node-locked .hex-halo{opacity:0}
.node-locked .node-particles{opacity:0}
.node-locked{filter:saturate(.1) brightness(.32)}

/* Scan ring */
.hex-scan{position:absolute;inset:-8px;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);z-index:1;overflow:hidden}
.hex-scan::before{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 0%,rgba(var(--ar),1) 5%,rgba(var(--ar),.6) 8%,transparent 14%);
  animation:hexScan 2.2s linear infinite;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}
@keyframes hexScan{to{transform:rotate(360deg)}}

/* Secondary scan — slower counter-rotate */
.hex-scan2{position:absolute;inset:-12px;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);z-index:0;overflow:hidden;opacity:.3}
.hex-scan2::before{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 180deg,transparent 0%,rgba(var(--ar),.6) 4%,transparent 10%);
  animation:hexScan2 3.5s linear infinite;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}
@keyframes hexScan2{to{transform:rotate(-360deg)}}

/* Outer glow ring */
.hex-glow{
  position:absolute;inset:-18px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  background:rgba(var(--ar),.1);animation:glowPulse 2s ease-in-out infinite;z-index:0;
  transition:opacity .3s,transform .3s;
}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* Energy ripple on click — double wave */
.hex-ripple{
  position:absolute;inset:-20px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  background:rgba(var(--ar),.4);z-index:0;opacity:0;
  transform:scale(.6);pointer-events:none;
}
.hex-ripple.go{animation:rippleOut .5s ease-out forwards}
@keyframes rippleOut{0%{opacity:.7;transform:scale(.7)}100%{opacity:0;transform:scale(1.6)}}
.hex-ripple2{
  position:absolute;inset:-30px;
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  background:rgba(var(--ar),.2);z-index:-1;opacity:0;
  transform:scale(.5);pointer-events:none;
}
.hex-ripple2.go{animation:rippleOut2 .7s ease-out .1s forwards}
@keyframes rippleOut2{0%{opacity:.5;transform:scale(.6)}100%{opacity:0;transform:scale(1.8)}}

/* Labels */
.hex-tick{width:2px;height:14px;background:rgba(var(--ar),.25);margin:4px auto 0;box-shadow:0 0 6px rgba(var(--ar),.15)}
.node-stars{font-size:.55rem;letter-spacing:1px;opacity:.7;text-align:center;margin-top:2px}
.node-lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;text-align:center;letter-spacing:.5px;white-space:nowrap;margin-top:1px}
.lbl-done{color:rgba(var(--ar),.7);text-shadow:0 0 6px rgba(var(--ar),.2)}
.lbl-active{color:rgba(var(--ar),1);text-shadow:0 0 12px rgba(var(--ar),.5)}
.lbl-locked{color:rgba(255,255,255,.12)}

/* Boss */
.node-boss .hex-node{width:90px;height:82px;font-size:1.8rem}
.node-boss .hex-border{inset:-6px}
.node-boss .hex-scan{inset:-11px}
.node-boss .hex-scan2{inset:-15px}
.node-boss .hex-glow{inset:-24px}
.node-boss .hex-halo{inset:-40px}
.boss-tag{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:.42rem;letter-spacing:2px;color:var(--a);background:rgba(var(--ar),.1);border:1px solid rgba(var(--ar),.3);padding:1px 8px;border-radius:3px;white-space:nowrap;box-shadow:0 0 12px rgba(var(--ar),.15)}

/* === ENERGY PATHS === */
.path-done{stroke:rgba(var(--ar),.55);stroke-width:3;fill:none;filter:drop-shadow(0 0 6px rgba(var(--ar),.35))}
.path-active{stroke:rgba(var(--ar),.9);stroke-width:3.5;fill:none;stroke-dasharray:14 8;animation:dashFlow 1s linear infinite;filter:drop-shadow(0 0 8px rgba(var(--ar),.6))}
.path-locked{stroke:rgba(255,255,255,.06);stroke-width:1.5;fill:none;stroke-dasharray:4 6}
.path-glow-done{stroke:rgba(var(--ar),.18);stroke-width:14;fill:none;filter:url(#eGlow)}
.path-glow-active{stroke:rgba(var(--ar),.3);stroke-width:18;fill:none;filter:url(#eGlow);animation:pathGlowPulse 1.8s ease-in-out infinite}
.path-glow-locked{stroke:rgba(255,255,255,.015);stroke-width:6;fill:none;filter:url(#eGlow)}
.energy-dot{fill:rgba(var(--ar),1);filter:drop-shadow(0 0 8px rgba(var(--ar),1)) drop-shadow(0 0 16px rgba(var(--ar),.5))}
@keyframes dashFlow{to{stroke-dashoffset:-22}}
@keyframes pathGlowPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* === TOWER INDICATOR === */
.tower-ind{position:fixed;bottom:20px;left:10px;z-index:55;display:flex;flex-direction:column;align-items:center;gap:3px}
.tower-segs{display:flex;flex-direction:column;gap:2px}
.tower-seg{width:16px;height:7px;border-radius:2px;background:rgba(255,255,255,.06);cursor:pointer;transition:all .3s}
.tower-seg.below{background:rgba(var(--ar),.15)}
.tower-seg.cur{background:var(--a);box-shadow:0 0 8px rgba(var(--ar),.5);animation:tPulse 2.5s ease-in-out infinite}
@keyframes tPulse{0%,100%{box-shadow:0 0 6px rgba(var(--ar),.4)}50%{box-shadow:0 0 14px rgba(var(--ar),.7)}}
.tower-num{font-family:'Orbitron',sans-serif;font-size:.55rem;color:var(--a)}
.tower-lbl{font-family:'Share Tech Mono',monospace;font-size:.35rem;color:rgba(var(--ar),.35);letter-spacing:2px}

/* === MODAL === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal-box{background:linear-gradient(180deg,#111827,#0d1117);border:1px solid rgba(var(--ar),.2);border-radius:16px;padding:24px;max-width:380px;width:100%;text-align:center;transform:scale(.88) translateY(20px);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 0 50px rgba(var(--ar),.1),0 0 100px rgba(0,0,0,.5)}
.modal-bg.show .modal-box{transform:scale(1) translateY(0)}
.m-badge{display:inline-block;font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:2px;padding:3px 12px;border-radius:20px}
.m-icon{font-size:3rem;margin:12px 0 8px}
.m-title{font-family:'Orbitron',sans-serif;font-size:.95rem;color:#fff;margin-bottom:6px}
.m-desc{font-size:.82rem;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:12px}
.m-stars{font-size:1rem;margin-bottom:6px;letter-spacing:4px}
.m-xp{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:rgba(var(--ar),.6);margin-bottom:14px}
.m-cta{width:100%;font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:2px;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.m-cta:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(var(--ar),.4)}
.m-next{width:100%;font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:1px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:10px;border-radius:8px;cursor:pointer;transition:all .2s}
.m-next:hover{background:rgba(255,255,255,.08);color:#fff}

/* === TOWER ENTRY OVERLAY === */
#tower-entry{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity .5s}
#tower-entry svg{width:80px;height:280px}
.te-seg{fill:rgba(255,255,255,.04);stroke:rgba(255,255,255,.06);stroke-width:.5;transition:all .3s}
.te-seg.lit{fill:rgba(var(--ar),.12);stroke:rgba(var(--ar),.35)}
.te-seg.target{fill:rgba(var(--ar),.25);stroke:var(--a);stroke-width:1;animation:tePulse .7s ease-in-out 2}
@keyframes tePulse{50%{fill:rgba(var(--ar),.45);filter:drop-shadow(0 0 8px rgba(var(--ar),.5))}}
.te-line{stroke:rgba(var(--ar),.5);stroke-width:1.5;transition:y2 .6s cubic-bezier(.4,0,.2,1)}
.te-floor-label{font-family:'Orbitron',sans-serif;font-size:.75rem;color:var(--a);letter-spacing:3px;opacity:0;transition:opacity .4s}
.te-floor-label.show{opacity:1}
#tower-entry.zooming{transform:scale(5);transition:transform .8s cubic-bezier(.4,0,.2,1),opacity .3s ease .6s}
#tower-entry.done{opacity:0;pointer-events:none}

#eFlash{position:fixed;inset:0;z-index:199;background:radial-gradient(circle,rgba(var(--ar),.15),transparent 70%);opacity:0;pointer-events:none}
#eFlash.go{animation:flashOut .7s ease-out forwards}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
#exitOv{position:fixed;inset:0;z-index:150;background:#000;opacity:0;pointer-events:none;transition:opacity .4s}
#exitOv.show{opacity:1}

/* Mute */

/* ====== CANVAS ====== */
var cv,ctx,W,H,DPR;
var stars=[],particles=[],matrixCols=[],vehicles=[];
var frameCount=0,scrollY=0;

function initCanvas(){
  cv=document.getElementById('bgCanvas');ctx=cv.getContext('2d');resizeCanvas();
  for(var i=0;i<220;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.2,b:Math.random(),sp:Math.random()*.005+.001});
  var pc=W<500?60:100;
  for(var i=0;i<pc;i++)particles.push(mkP());
  var cols=Math.floor(W/18);
  for(var i=0;i<cols;i++){var m={x:i*18,y:Math.random()*H*2,sp:Math.random()*1.4+.3,chars:[]};for(var j=0;j<8;j++)m.chars.push({c:Math.random()>.5?String.fromCharCode(48+Math.floor(Math.random()*10)):'.', o:Math.random()*.25});matrixCols.push(m);}
  for(var i=0;i<4;i++)vehicles.push({x:Math.random()*W,y:H*(.08+Math.random()*.2),vx:(Math.random()-.5)*.4,sz:3+Math.random()*4,o:.15+Math.random()*.15});
}
function resizeCanvas(){DPR=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
function mkP(){var ar=getAR();return{x:Math.random()*W,y:H+Math.random()*100,vx:(Math.random()-.5)*.3,vy:-Math.random()*.7-.15,r:Math.random()*2+.3,life:1,type:Math.floor(Math.random()*3),color:ar};}
function getAR(){try{return getComputedStyle(document.documentElement).getPropertyValue('--ar').trim()||'255,106,0'}catch(e){return'255,106,0'}}

function draw(){
  requestAnimationFrame(draw);
  try{
  frameCount++;ctx.clearRect(0,0,W,H);
  var t=frameCount*.008,ar=getAR(),cx2=W*.5;
  var sOff=scrollY*.15;

  /* SKY — richer, not pure black */
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050a18');bg.addColorStop(.15,'#0a1228');bg.addColorStop(.4,'#0f1830');bg.addColorStop(.7,'#0c1425');bg.addColorStop(1,'#080c1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  /* NEBULA — rich atmospheric layers */
  var nb=ctx.createRadialGradient(cx2,H*.1,0,cx2,H*.1,W*.7);
  nb.addColorStop(0,'rgba('+ar+',.25)');nb.addColorStop(.3,'rgba('+ar+',.12)');nb.addColorStop(.6,'rgba('+ar+',.04)');nb.addColorStop(1,'transparent');
  ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);
  var nb2=ctx.createRadialGradient(W*.2,H*.35,0,W*.2,H*.35,W*.45);
  nb2.addColorStop(0,'rgba(100,50,200,.12)');nb2.addColorStop(.5,'rgba(70,30,150,.05)');nb2.addColorStop(1,'transparent');
  ctx.fillStyle=nb2;ctx.fillRect(0,0,W,H);
  var nb3=ctx.createRadialGradient(W*.8,H*.3,0,W*.8,H*.3,W*.4);
  nb3.addColorStop(0,'rgba(0,140,180,.08)');nb3.addColorStop(1,'transparent');
  ctx.fillStyle=nb3;ctx.fillRect(0,0,W,H);
  /* Central tower glow — BIG */
  var nb5=ctx.createRadialGradient(cx2,H*.35,0,cx2,H*.35,W*.45);
  nb5.addColorStop(0,'rgba('+ar+',.15)');nb5.addColorStop(.4,'rgba('+ar+',.06)');nb5.addColorStop(1,'transparent');
  ctx.fillStyle=nb5;ctx.fillRect(0,0,W,H);

  /* STARS */
  for(var i=0;i<stars.length;i++){var s=stars[i];var fl=.5+.5*Math.sin(t*40*s.sp+s.b*6.28);var sr=Math.max(.2,s.r*fl);ctx.beginPath();ctx.arc(s.x*W,s.y*H,sr,0,6.28);ctx.fillStyle='rgba(255,255,255,'+(fl*.7)+')';ctx.fill();if(s.r>1){ctx.beginPath();ctx.arc(s.x*W,s.y*H,sr*3,0,6.28);ctx.fillStyle='rgba(255,255,255,'+(fl*.08)+')';ctx.fill();}}

  /* GOD RAYS — VISIBLE golden columns */
  ctx.save();ctx.globalAlpha=.2+.08*Math.sin(t*.35);
  for(var r=0;r<9;r++){var ang=-.45+r*.1;var rw=.025+.012*Math.sin(t*.2+r);
  ctx.beginPath();ctx.moveTo(cx2,0);ctx.lineTo(cx2+Math.sin(ang)*H*1.2,H);ctx.lineTo(cx2+Math.sin(ang+rw)*H*1.2,H);ctx.closePath();
  var rayG=ctx.createLinearGradient(cx2,0,cx2,H*.6);
  rayG.addColorStop(0,'rgba('+ar+',.15)');rayG.addColorStop(.4,'rgba('+ar+',.06)');rayG.addColorStop(1,'transparent');
  ctx.fillStyle=rayG;ctx.fill();}
  ctx.restore();

  /* TOWER — SOLID STRUCTURAL MEGA-BUILDING */
  var tY=H*.05-sOff,tH=H*.9,wB=W*.82,wT=W*.1;

  /* Atmospheric halo behind tower */
  var halo=ctx.createRadialGradient(cx2,tY+tH*.35,0,cx2,tY+tH*.35,wB*.9);
  halo.addColorStop(0,'rgba('+ar+',.2)');halo.addColorStop(.3,'rgba('+ar+',.08)');halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo;ctx.fillRect(0,0,W,H);
  /* Industrial warmth from base */
  var halo3=ctx.createRadialGradient(cx2,tY+tH*.85,0,cx2,tY+tH*.85,wB*.6);
  halo3.addColorStop(0,'rgba(255,100,30,.15)');halo3.addColorStop(.4,'rgba(255,60,10,.05)');halo3.addColorStop(1,'transparent');
  ctx.fillStyle=halo3;ctx.fillRect(0,0,W,H);

  /* Draw 7 tower sections — SOLID OPAQUE */
  for(var s2=0;s2<7;s2++){
    var frac=s2/7,nFrac=(s2+1)/7;
    var yT=tY+tH*(1-nFrac),yB=tY+tH*(1-frac);
    var wBs=wT+(wB-wT)*Math.pow(1-frac,.6),wTs=wT+(wB-wT)*Math.pow(1-nFrac,.6);
    var isCur=(s2+1)===WORLD_FLOOR,isBelow=(s2+1)<WORLD_FLOOR,secH=yB-yT;
    var lx1=cx2-wBs/2,lx2=cx2-wTs/2,rx1=cx2+wTs/2,rx2=cx2+wBs/2;

    /* SOLID BASE FILL — dark metallic, fully opaque */
    ctx.beginPath();ctx.moveTo(lx1,yB);ctx.lineTo(lx2,yT);ctx.lineTo(rx1,yT);ctx.lineTo(rx2,yB);ctx.closePath();
    var baseFill=ctx.createLinearGradient(cx2-wBs/2,0,cx2+wBs/2,0);
    baseFill.addColorStop(0,'rgba(15,20,35,.95)');baseFill.addColorStop(.15,'rgba(25,35,55,.92)');baseFill.addColorStop(.5,'rgba(35,45,70,.88)');baseFill.addColorStop(.85,'rgba(25,35,55,.92)');baseFill.addColorStop(1,'rgba(15,20,35,.95)');
    ctx.fillStyle=baseFill;ctx.fill();

    /* Colored overlay for current/below floors */
    if(isCur||isBelow){
      ctx.beginPath();ctx.moveTo(lx1,yB);ctx.lineTo(lx2,yT);ctx.lineTo(rx1,yT);ctx.lineTo(rx2,yB);ctx.closePath();
      var colOv=ctx.createLinearGradient(cx2,yT,cx2,yB);
      if(isCur){colOv.addColorStop(0,'rgba('+ar+',.35)');colOv.addColorStop(.5,'rgba('+ar+',.2)');colOv.addColorStop(1,'rgba('+ar+',.12)');}
      else{colOv.addColorStop(0,'rgba('+ar+',.1)');colOv.addColorStop(1,'rgba('+ar+',.05)');}
      ctx.fillStyle=colOv;ctx.fill();
    }

    /* 3D metallic sheen — lighter center strip */
    ctx.beginPath();ctx.moveTo(lx1,yB);ctx.lineTo(lx2,yT);ctx.lineTo(rx1,yT);ctx.lineTo(rx2,yB);ctx.closePath();
    var sheen=ctx.createLinearGradient(cx2-wBs/2,0,cx2+wBs/2,0);
    sheen.addColorStop(0,'transparent');sheen.addColorStop(.3,'rgba(180,200,230,.04)');sheen.addColorStop(.5,'rgba(200,220,250,.07)');sheen.addColorStop(.7,'rgba(180,200,230,.04)');sheen.addColorStop(1,'transparent');
    ctx.fillStyle=sheen;ctx.fill();

    /* Strong edge borders */
    ctx.strokeStyle=isCur?'rgba('+ar+',.8)':isBelow?'rgba('+ar+',.25)':'rgba(100,120,160,.2)';ctx.lineWidth=isCur?3:1.2;ctx.stroke();

    /* HORIZONTAL BANDS — 3 per section for structural detail */
    for(var hb=0;hb<3;hb++){
      var hbY=yT+secH*(.2+hb*.28);
      var hbW1=wTs+(wBs-wTs)*((hbY-yT)/secH);
      ctx.beginPath();ctx.moveTo(cx2-hbW1/2,hbY);ctx.lineTo(cx2+hbW1/2,hbY);
      ctx.strokeStyle=isCur?'rgba('+ar+',.15)':'rgba(100,120,160,.08)';ctx.lineWidth=.8;ctx.stroke();
    }

    /* PLATFORM LEDGES between floors — protruding edges */
    if(s2>0){
      var ledgeExt=12;
      ctx.beginPath();ctx.moveTo(cx2-wBs/2-ledgeExt,yB);ctx.lineTo(cx2+wBs/2+ledgeExt,yB);
      ctx.strokeStyle=isCur?'rgba('+ar+',.5)':'rgba(140,160,190,.15)';ctx.lineWidth=3;ctx.stroke();
      /* Ledge thickness */
      ctx.fillStyle=isCur?'rgba('+ar+',.06)':'rgba(80,100,130,.06)';
      ctx.fillRect(cx2-wBs/2-ledgeExt,yB-2,wBs+ledgeExt*2,5);
      /* Ledge highlight */
      ctx.fillStyle=isCur?'rgba('+ar+',.12)':'rgba(160,180,210,.05)';
      ctx.fillRect(cx2-wBs/2-ledgeExt,yB-2,wBs+ledgeExt*2,1.5);
    }

    /* VERTICAL PANEL LINES — structural */
    var panels=Math.max(5,Math.floor(wBs/25));
    for(var p=1;p<panels;p++){
      var px=cx2-wBs*.44+(wBs*.88)*(p/panels);
      var pxT=cx2-wTs*.44+(wTs*.88)*(p/panels);
      ctx.beginPath();ctx.moveTo(px,yB);ctx.lineTo(pxT,yT);
      ctx.strokeStyle=isCur?'rgba('+ar+',.06)':'rgba(100,120,160,.04)';ctx.lineWidth=.5;ctx.stroke();
    }

    /* WINDOWS — rows of bright slots */
    var wRows=2;
    for(var wr=0;wr<wRows;wr++){
      var wrY=yT+secH*(.18+wr*.35);var wrH=secH*.22;
      var wc=Math.max(6,Math.floor(wBs/22));
      var rowW=wTs+(wBs-wTs)*((wrY-yT)/secH);
      for(var p=0;p<wc;p++){
        var px2=cx2-rowW*.4+(rowW*.8)*(p/(Math.max(1,wc-1)));
        var pw=3.5+wBs*.006;
        var fl2=isCur?(.65+.3*Math.sin(t*2.8+p*1.7+s2+wr*3)):(isBelow?(.2+.08*Math.sin(t*1.5+p+s2)):.03);
        ctx.fillStyle='rgba('+ar+','+fl2+')';ctx.fillRect(px2-pw/2,wrY,pw,wrH);
        /* Window frame */
        ctx.strokeStyle='rgba('+ar+','+(fl2*.4)+')';ctx.lineWidth=.4;ctx.strokeRect(px2-pw/2-.5,wrY-.5,pw+1,wrH+1);
        /* Top highlight */
        if(isCur||isBelow){ctx.fillStyle='rgba('+ar+','+(fl2*.5)+')';ctx.fillRect(px2-pw/2-1,wrY-1,pw+2,1.5);}
        /* Glow halo for current */
        if(isCur&&fl2>.6){var wgr=ctx.createRadialGradient(px2,wrY+wrH/2,0,px2,wrY+wrH/2,pw*4);wgr.addColorStop(0,'rgba('+ar+','+(fl2*.3)+')');wgr.addColorStop(1,'transparent');ctx.fillStyle=wgr;ctx.fillRect(px2-pw*4,wrY-pw*2,pw*8,wrH+pw*4);}
      }
    }

    /* CROSS-BRACING — X pattern on wider sections */

  /* MATRIX RAIN */
  ctx.save();ctx.font='10px "Share Tech Mono",monospace';
  for(var i=0;i<matrixCols.length;i++){var mc=matrixCols[i];mc.y+=mc.sp;if(mc.y>H*2+60)mc.y=-40;for(var j=0;j<mc.chars.length;j++){var cy4=mc.y+j*14-scrollY*.25;if(cy4<-10||cy4>H+10)continue;ctx.fillStyle='rgba('+ar+','+(mc.chars[j].o*.2)+')';ctx.fillText(mc.chars[j].c,mc.x,cy4);}}
  ctx.restore();

  /* FOG LAYERS — atmospheric depth like a video game */
  /* Lower fog — warm industrial haze */
  var fogLow=ctx.createLinearGradient(0,baseY-40,0,baseY+20);
  fogLow.addColorStop(0,'transparent');fogLow.addColorStop(.3,'rgba(255,100,40,.04)');fogLow.addColorStop(.7,'rgba(200,80,30,.08)');fogLow.addColorStop(1,'rgba(150,60,20,.05)');
  ctx.fillStyle=fogLow;ctx.fillRect(0,baseY-40,W,60);
  /* Mid fog — subtle bluish */
  var fogMid=ctx.createLinearGradient(0,tY+tH*.4,0,tY+tH*.7);
  fogMid.addColorStop(0,'transparent');fogMid.addColorStop(.5,'rgba(30,50,80,.06)');fogMid.addColorStop(1,'transparent');
  ctx.fillStyle=fogMid;ctx.fillRect(0,tY+tH*.4,W,tH*.3);
  /* Side vignette — darker edges for focus */
  var vigL=ctx.createLinearGradient(0,0,W*.2,0);vigL.addColorStop(0,'rgba(0,0,5,.4)');vigL.addColorStop(1,'transparent');
  ctx.fillStyle=vigL;ctx.fillRect(0,0,W*.2,H);
  var vigR=ctx.createLinearGradient(W,0,W*.8,0);vigR.addColorStop(0,'rgba(0,0,5,.4)');vigR.addColorStop(1,'transparent');
  ctx.fillStyle=vigR;ctx.fillRect(W*.8,0,W*.2,H);

  /* CLOUDS — MASSIVE GOLDEN VOLUMETRIC — REALLY VISIBLE */
  ctx.save();
  var cloudData=[
    {x:.12,y:.0,rx:.35,ry:.14,o:.55},
    {x:.5,y:.02,rx:.45,ry:.16,o:.5},
    {x:.88,y:.0,rx:.33,ry:.13,o:.52},
    {x:.3,y:.06,rx:.28,ry:.11,o:.45},
    {x:.7,y:.05,rx:.3,ry:.12,o:.48},
    {x:.5,y:.12,rx:.25,ry:.09,o:.35},
    {x:.18,y:.14,rx:.22,ry:.08,o:.3},
    {x:.82,y:.13,rx:.24,ry:.08,o:.32}
  ];
  for(var ci=0;ci<cloudData.length;ci++){
    var cd=cloudData[ci];
    var cx3=W*cd.x+Math.sin(t*.06+ci*1.8)*W*.015;
    var cy5=H*cd.y-sOff*.04+Math.sin(t*.05+ci*.9)*H*.006;
    var rx=W*cd.rx;var ry=H*cd.ry;
    /* Main body — warm golden tones */
    var cg=ctx.createRadialGradient(cx3,cy5,0,cx3,cy5,rx);
    cg.addColorStop(0,'rgba(210,170,100,'+cd.o+')');
    cg.addColorStop(.2,'rgba(180,140,80,'+(cd.o*.7)+')');
    cg.addColorStop(.4,'rgba(150,120,70,'+(cd.o*.4)+')');
    cg.addColorStop(.65,'rgba(100,80,50,'+(cd.o*.15)+')');
    cg.addColorStop(1,'transparent');
    ctx.save();ctx.scale(1,ry/rx);
    ctx.fillStyle=cg;ctx.fillRect(cx3-rx,(cy5/ry*rx)-rx,rx*2,rx*2);
    ctx.restore();
    /* Sub-clusters for 3D volume */
    for(var sc=0;sc<4;sc++){
      var scx=cx3+Math.cos(ci*2.1+sc*1.57)*rx*.45;
      var scy=cy5+Math.sin(ci*1.7+sc*1.3)*ry*.35;
      var srx=rx*.5;var sry=ry*.55;
      var scg=ctx.createRadialGradient(scx,scy,0,scx,scy,srx);
      scg.addColorStop(0,'rgba(200,160,90,'+(cd.o*.6)+')');
      scg.addColorStop(.4,'rgba(160,130,80,'+(cd.o*.25)+')');
      scg.addColorStop(1,'transparent');
      ctx.save();ctx.scale(1,sry/srx);
      ctx.fillStyle=scg;ctx.fillRect(scx-srx,(scy/sry*srx)-srx,srx*2,srx*2);
      ctx.restore();
    }
  }
  ctx.restore();

  }catch(e){}
}

/* ====== NODES ====== */
var NODE_H=120,PAD_TOP=30;
var positions=[];

function calcPositions(){
  positions=[];
  var wrap=document.getElementById('mapWrap'),usable=wrap.offsetWidth;
  for(var i=0;i<levels.length;i++){
    var wave=Math.sin(i*.75)*usable*.2;
    var dir=i%2===0?1:-1;
    var x=usable/2+dir*Math.abs(wave)+(dir>0?18:-18);
    var y=PAD_TOP+i*NODE_H+NODE_H/2;
    positions.push({x:x,y:y});
  }
  document.getElementById('mapInner').style.height=(PAD_TOP+levels.length*NODE_H+100)+'px';
}

function placeNodes(){
  var layer=document.getElementById('nodesLayer');layer.innerHTML='';
  for(var i=0;i<levels.length;i++){
    var lv=levels[i],pos=positions[i],isBoss=!!lv.boss;
    var stCls=lv.s==='completed'?'node-done':lv.s==='active'?'node-active':'node-locked';
    var nd=document.createElement('div');
    nd.className='node '+stCls+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');
    nd.style.cssText='position:absolute;left:'+pos.x+'px;top:'+pos.y+'px;transform:translate(-50%,-50%)';
    var wrap=document.createElement('div');wrap.className='hex-wrap';
    var outer=document.createElement('div');outer.className='hex-outer';
    /* Halo atmosférico */
    if(lv.s!=='locked'){var halo=document.createElement('div');halo.className='hex-halo';outer.appendChild(halo);}
    /* Micro partículas */
    if(lv.s!=='locked'){var pts=document.createElement('div');pts.className='node-particles';for(var mp=0;mp<6;mp++){var dot=document.createElement('div');dot.className='mp';pts.appendChild(dot);}outer.appendChild(pts);}
    /* Glow ring */
    if(lv.s==='active'||lv.s==='completed'){var glow=document.createElement('div');glow.className='hex-glow';outer.appendChild(glow);}
    /* Scan rings */
    if(lv.s==='active'){var scan=document.createElement('div');scan.className='hex-scan';outer.appendChild(scan);var scan2=document.createElement('div');scan2.className='hex-scan2';outer.appendChild(scan2);}
    /* Ripple waves */
    var ripple=document.createElement('div');ripple.className='hex-ripple';outer.appendChild(ripple);
    var ripple2=document.createElement('div');ripple2.className='hex-ripple2';outer.appendChild(ripple2);
    var border=document.createElement('div');border.className='hex-border';outer.appendChild(border);
    var hex=document.createElement('div');hex.className='hex-node '+(lv.s==='completed'?'hex-done':lv.s==='active'?'hex-active':'hex-locked');
    if(lv.s==='completed')hex.innerHTML='<span style="font-size:1.1em">✓</span>';
    else if(lv.s==='active')hex.textContent=lv.icon||'🎯';
    else hex.innerHTML='<span class="material-symbols-outlined" style="font-size:1.1em;opacity:.35">lock</span>';
    if(isBoss){var tag=document.createElement('span');tag.className='boss-tag';tag.textContent='FINAL';hex.appendChild(tag);}
    outer.appendChild(hex);wrap.appendChild(outer);
    var tick=document.createElement('div');tick.className='hex-tick';wrap.appendChild(tick);
    var starsDiv=document.createElement('div');starsDiv.className='node-stars';starsDiv.textContent=lv.s==='completed'?'⭐⭐⭐':'☆☆☆';if(lv.s!=='completed')starsDiv.style.opacity='.2';wrap.appendChild(starsDiv);
    var lbl=document.createElement('div');lbl.className='node-lbl '+(lv.s==='completed'?'lbl-done':lv.s==='active'?'lbl-active':'lbl-locked');lbl.textContent='NIVEL '+lv.n;wrap.appendChild(lbl);
    nd.appendChild(wrap);
    (function(lv2,rip,rip2){nd.addEventListener('click',function(){if(lv2.s==='locked'){sfxL();return;}rip.classList.remove('go');rip2.classList.remove('go');void rip.offsetWidth;rip.classList.add('go');rip2.classList.add('go');sfxO();openM(lv2.n,lv2.t,lv2.d,lv2.s,lv2.xp,lv2.icon,lv2.boss);})})(lv,ripple,ripple2);
    layer.appendChild(nd);
  }
}

function drawPaths(){
  var svg=document.getElementById('pathSvg'),inner=document.getElementById('mapInner');
  var w=inner.offsetWidth,h=inner.offsetHeight;
  svg.setAttribute('viewBox','0 0 '+w+' '+h);svg.setAttribute('width',w);svg.setAttribute('height',h);
  svg.style.cssText='position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;pointer-events:none;z-index:1';
  var html='<defs><filter id="eGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  for(var i=0;i<levels.length-1;i++){
    var p1=positions[i],p2=positions[i+1],s1=levels[i].s,s2=levels[i+1].s;
    var state;if(s1==='completed'&&s2==='completed')state='done';else if(s1==='completed'&&s2==='active')state='active';else if(s1==='active')state='active';else state='locked';
    var dx=p2.x-p1.x,dy=p2.y-p1.y,bulge=dx*.4;
    var d='M'+p1.x+','+p1.y+' C'+(p1.x+bulge)+','+(p1.y+dy*.3)+' '+(p2.x-bulge)+','+(p2.y-dy*.3)+' '+p2.x+','+p2.y;
    html+='<path class="path-glow-'+state+'" d="'+d+'"/>';
    html+='<path class="path-'+state+'" d="'+d+'" id="epath'+i+'"/>';
    if(state==='active'){html+='<circle class="energy-dot" r="4"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#epath'+i+'"/></animateMotion></circle>';html+='<circle class="energy-dot" r="2.5" opacity=".5"><animateMotion dur="1.8s" repeatCount="indefinite" begin="-.9s"><mpath href="#epath'+i+'"/></animateMotion></circle>';}
    if(state==='done'){html+='<circle class="energy-dot" r="2" opacity=".4"><animateMotion dur="3s" repeatCount="indefinite"><mpath href="#epath'+i+'"/></animateMotion></circle>';}
  }
  svg.innerHTML=html;
}

/* ====== MODAL ====== */
function openM(n,t,d,s,xp,icon,boss){
  var m=document.getElementById('modal');
  document.getElementById('m-icon').textContent=icon||'🎯';
  document.getElementById('m-title').textContent=t;
  document.getElementById('m-desc').textContent=d;
  document.getElementById('m-xp').textContent='+ '+xp+' XP';
  var badge=document.getElementById('m-badge'),cta=document.getElementById('m-cta'),next=document.getElementById('m-next'),starsEl=document.getElementById('m-stars');
  if(s==='completed'){badge.textContent='✓ COMPLETADO';badge.style.cssText='color:#22c55e;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25)';starsEl.textContent='⭐⭐⭐';cta.textContent='🔄 REPASAR';cta.style.cssText='display:block;background:linear-gradient(135deg,#1f2937,#374151);box-shadow:none';cta.onclick=function(){goLevel(n)};next.style.display='block';next.textContent='▶ SIGUIENTE';next.onclick=function(){closeM()};}
  else{badge.textContent='● NIVEL '+n;badge.style.cssText='color:var(--a);background:rgba(var(--ar),.08);border:1px solid rgba(var(--ar),.25)';starsEl.innerHTML='<span style="opacity:.25">☆☆☆</span>';cta.textContent='▶ INICIAR';cta.style.cssText='display:block;background:linear-gradient(135deg,var(--ad),var(--a));box-shadow:0 0 16px rgba(var(--ar),.25)';cta.onclick=function(){goLevel(n)};next.style.display='none';}
  m.classList.add('show');
}
function closeM(){document.getElementById('modal').classList.remove('show')}
function goLevel(n){closeM();window.location.href='leccion.html?world='+WORLD_NUM+'&level='+n}

/* ====== AUDIO ====== */
var audioCtx,muted=false;
function initA(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();var b=audioCtx.createBuffer(1,1,22050),s=audioCtx.createBufferSource();s.buffer=b;s.connect(audioCtx.destination);s.start(0)}catch(e){}}
function sfx(f,dur){if(muted||!audioCtx)return;try{if(audioCtx.state==='suspended')audioCtx.resume();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.07;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function sfxO(){initA();sfx(440,.1);setTimeout(function(){sfx(660,.1)},80);setTimeout(function(){sfx(880,.12)},160)}
function sfxL(){initA();sfx(150,.25)}
function toggleMu(){initA();muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊'}
document.addEventListener('touchstart',initA,{once:true});
document.addEventListener('click',initA,{once:true});

/* ====== SCROLL ====== */
document.getElementById('mainScroll').addEventListener('scroll',function(){scrollY=this.scrollTop});

/* ====== ENTRY ====== */
function playEntry(){
  var te=document.getElementById('tower-entry');if(!te){startScene();return;}
  var label=te.querySelector('.te-floor-label');label.textContent='PISO '+WORLD_FLOOR;
  for(var f=1;f<=WORLD_FLOOR;f++){(function(floor){setTimeout(function(){var seg=te.querySelector('.te-seg[data-floor="'+floor+'"]');if(!seg)return;seg.classList.add(floor===WORLD_FLOOR?'target':'lit');var line=te.querySelector('.te-line');if(line)line.setAttribute('y2',seg.getAttribute('y'));},floor*110);})(f);}
  setTimeout(function(){label.classList.add('show')},WORLD_FLOOR*110+200);
  setTimeout(function(){te.classList.add('zooming');var flash=document.getElementById('eFlash');if(flash)flash.classList.add('go');},WORLD_FLOOR*110+500);
  setTimeout(function(){te.classList.add('done');setTimeout(function(){if(te.parentNode)te.parentNode.removeChild(te);startScene()},500);},WORLD_FLOOR*110+1400);
}
function startScene(){
  requestAnimationFrame(function(){requestAnimationFrame(function(){document.body.classList.remove('entering');document.body.classList.add('entered');})});
  setTimeout(function(){var idx=-1;for(var i=0;i<levels.length;i++){if(levels[i].s==='active'){idx=i;break;}}if(idx>=0&&positions[idx]){var ms=document.getElementById('mainScroll');ms.scrollTo({top:Math.max(0,positions[idx].y-ms.offsetHeight/2+100),behavior:'smooth'});}},600);
}

/* Quest */
function buildQuest(){
  var qEl=document.getElementById('quest'),act=levels.find(function(l){return l.s==='active'});
  if(!act){qEl.innerHTML='';return;}
  var t2=act.t.replace(/'/g,"\\'"),d2=act.d.replace(/'/g,"\\'");
  qEl.innerHTML='<div class="quest-box"><div class="quest-icon">'+(act.icon||'⚡')+'</div><div style="flex:1"><div class="quest-label">MÓDULO ACTIVO</div><div class="quest-title">'+act.t+'</div></div><button class="quest-btn" onclick="openM('+act.n+',\''+t2+'\',\''+d2+'\',\''+act.s+'\','+act.xp+',\''+(act.icon||'🎯')+'\','+!!act.boss+')">▶ INICIAR</button></div>';
}

/* Exit */
document.getElementById('backBtn').addEventListener('click',function(e){e.preventDefault();document.body.classList.add('exiting');document.getElementById('exitOv').classList.add('show');setTimeout(function(){window.location.href='portadanivelesacademia.html'},450);});

/* ====== INIT ====== */
function init(){initCanvas();calcPositions();placeNodes();drawPaths();buildQuest();try{draw()}catch(e){console.warn('draw err:',e)}playEntry();}
window.addEventListener('resize',function(){resizeCanvas();calcPositions();placeNodes();drawPaths()});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
