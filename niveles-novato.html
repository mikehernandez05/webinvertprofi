<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Tower</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080b14;--surface:#0d1117;--border:rgba(56,189,248,.12);
    --text:#e2e8f0;--muted:#64748b;--cyan:#22d3ee;--green:#4ade80;
    --purple:#a78bfa;--orange:#fb923c;
    --font-display:'Segoe UI',system-ui,sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-display)}
  
  .page{max-width:1400px;margin:0 auto;padding:2rem}
  .page h1{font-size:1.875rem;font-weight:700;letter-spacing:.08em;
    text-shadow:0 0 14px rgba(34,211,238,.3)}
  .page .subtitle{font-size:.8rem;letter-spacing:.15em;color:var(--muted);margin-top:.25rem}
  .header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1rem}
  .header-actions{display:flex;gap:.5rem;align-items:center}
  .zoom-label{font-size:10px;color:rgba(100,116,139,.6);margin-right:.5rem}
  .icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    border-radius:8px;border:1px solid rgba(100,116,139,.3);background:transparent;
    color:var(--muted);cursor:pointer;transition:color .2s}
  .icon-btn:hover{color:var(--text)}

  .main{display:flex;gap:1.5rem}

  /* Viewport */
  .viewport{flex:7;min-width:0;height:680px;position:relative;overflow:hidden;
    border-radius:12px;border:1px solid rgba(56,189,248,.1);background:#060810;
    cursor:grab;user-select:none}
  .viewport.panning{cursor:grabbing}

  /* World */
  .world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  .world img{display:block;width:100%;height:100%;pointer-events:none;-webkit-user-drag:none}
  .vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(6,8,16,.5) 100%)}

  /* SVG layer */
  .connections{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}

  /* Node */
  .node{position:absolute;display:flex;flex-direction:column;align-items:center;
    transform:translate(-50%,-50%);z-index:10;border:none;background:none;
    cursor:pointer;padding:0;outline:none;touch-action:none}
  .node.locked{opacity:.4;cursor:default}
  .node .glow{position:absolute;width:64px;height:64px;top:-8px;left:-8px;border-radius:50%;
    background:radial-gradient(circle,rgba(34,211,238,.1),transparent 70%);filter:blur(6px);z-index:-1}
  .node.selected .glow{background:radial-gradient(circle,rgba(34,211,238,.3),transparent 70%)}
  .node.locked .glow{display:none}
  .hex{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);transition:transform .2s,filter .2s}
  .hex-inner{width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%)}
  .node.locked .hex{background:linear-gradient(135deg,hsl(220 15% 18%),hsl(220 15% 12%))}
  .node.locked .hex-inner{background:hsl(220 15% 8%)}
  .node.completed .hex{background:linear-gradient(135deg,hsl(190 40% 25%),hsl(220 30% 18%))}
  .node.completed .hex-inner{background:hsl(220 25% 10%)}
  .node.unlocked .hex{background:linear-gradient(135deg,hsl(190 80% 35%),hsl(270 70% 40%));
    filter:drop-shadow(0 0 5px rgba(34,211,238,.4))}
  .node.unlocked .hex-inner{background:hsl(220 30% 8%)}
  .node.selected .hex{transform:scale(1.15);filter:drop-shadow(0 0 8px rgba(34,211,238,.7))}
  .hex-inner svg{width:18px;height:18px}
  .node-label{margin-top:2px;font-size:9px;font-weight:700;letter-spacing:.05em;white-space:nowrap;
    text-align:center;text-shadow:0 0 5px rgba(34,211,238,.4),0 1px 3px rgba(0,0,0,.9)}
  .node.locked .node-label{color:hsl(220 10% 30%);text-shadow:0 1px 2px rgba(0,0,0,.5)}

  /* Panel */
  .panel{width:320px;flex-shrink:0;border-radius:12px;align-self:flex-start;position:sticky;top:2rem;
    border:1px solid rgba(56,189,248,.1);background:linear-gradient(180deg,hsl(220 28% 9%),hsl(220 25% 7%))}
  .panel-empty{padding:1.5rem;display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:280px;text-align:center;color:var(--muted)}
  .panel-empty .icon-circle{width:56px;height:56px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;background:hsl(220 20% 12%);margin-bottom:.75rem}
  .panel-content{padding:1.5rem}
  .panel-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
  .panel-hex{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
    background:linear-gradient(135deg,hsl(190 80% 30%),hsl(270 70% 35%))}
  .panel-hex-inner{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:hsl(220 30% 8%)}
  .panel-hex-inner svg{width:20px;height:20px;color:var(--cyan)}
  .panel-title{font-size:1rem;font-weight:700;letter-spacing:.04em;
    text-shadow:0 0 8px rgba(34,211,238,.3)}
  .panel-badge{display:inline-block;font-size:.7rem;font-weight:600;padding:.125rem .5rem;
    border-radius:9999px;margin-top:.25rem}
  .panel-badge.completed{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
  .panel-badge.unlocked{background:rgba(34,211,238,.15);color:#67e8f9;border:1px solid rgba(34,211,238,.3)}
  .panel-desc{font-size:.875rem;color:var(--muted);line-height:1.6;margin-bottom:1.25rem}
  .panel-btn{width:100%;padding:.625rem 0;border-radius:8px;border:none;font-size:.875rem;
    font-weight:700;letter-spacing:.08em;color:#fff;cursor:pointer;
    box-shadow:0 0 16px rgba(34,211,238,.25)}
  .panel-btn.completed{background:linear-gradient(135deg,hsl(140 60% 35%),hsl(160 50% 30%))}
  .panel-btn.unlocked{background:linear-gradient(135deg,hsl(190 100% 45%),hsl(270 80% 50%))}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div>
      <h1>Nexus Tower</h1>
      <p class="subtitle">VERTICAL PROGRESS MAP</p>
    </div>
    <div class="header-actions">
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="icon-btn" id="resetBtn" title="Reset view">↺</button>
    </div>
  </div>

  <div class="main">
    <div class="viewport" id="viewport">
      <div class="world" id="world">
        <!-- BG image -->
        <img src="nexus-tower-bg.png" alt="" id="bgImg" draggable="false">
        <div class="vignette"></div>
        <!-- SVG connections injected here -->
        <svg class="connections" id="svgLayer" viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs>
            <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="0.5" result="b1"/>
              <feGaussianBlur stdDeviation="1.2" result="b2"/>
              <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="gla" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="0.8" result="b1"/>
              <feGaussianBlur stdDeviation="1.8" result="b2"/>
              <feMerge><feMergeNode in="b2"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <g id="connGroup"></g>
        </svg>
        <!-- Nodes injected here -->
        <div id="nodesLayer"></div>
      </div>
    </div>

    <aside class="panel" id="panel">
      <div class="panel-empty" id="panelEmpty">
        <div class="icon-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)"><path d="m8 3 4 8 5-5 2 15H2L8 3z"/></svg>
        </div>
        <p>Select a node to view details</p>
      </div>
      <div class="panel-content" id="panelContent" style="display:none"></div>
    </aside>
  </div>
</div>

<script>
// ============ CONFIG ============
const CURRENT_LEVEL = 4;
const ZOOM_MIN = 0.7;
const ZOOM_MAX = 3.5;

// SVG icon paths (inline)
const ICONS = {
  flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14 0-5.5 3-7-.5 1.5 0 2.5 1 3.5 1 1 2 2 2 4a4.5 4.5 0 0 1-9 0Z"/>',
  database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>',
  cpu: '<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>',
  chart: '<line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/>',
  network: '<rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3M12 12V8"/>',
  mountain: '<path d="m8 3 4 8 5-5 2 15H2L8 3z"/>',
  wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>',
  globe: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
  lock: '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
};

function svgIcon(name, color) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`;
}

const levels = [
  { id:1, title:"Stage 1: Forge", desc:"Ignite the foundational systems. Begin smelting raw potential into structured power.", x:50, y:90, icon:"flame" },
  { id:2, title:"Stage 1: Forge", desc:"Reinforce the forge. Secondary ignition chamber online.", x:25, y:82, icon:"flame" },
  { id:3, title:"Resource Acquisition", desc:"Harvest critical resources from the surrounding sectors.", x:50, y:74, icon:"database" },
  { id:4, title:"Processing Unit", desc:"Activate the processing core. Transform raw data into intelligence.", x:75, y:64, icon:"cpu" },
  { id:5, title:"Stage 2: Core", desc:"The central nexus awakens. All subsystems converge here.", x:50, y:56, icon:"chart" },
  { id:6, title:"Network Integration", desc:"Establish inter-node communication channels.", x:25, y:48, icon:"network" },
  { id:7, title:"Data Optimization", desc:"Refine algorithms and streamline data flow.", x:50, y:42, icon:"chart" },
  { id:8, title:"Stage 3: Summit", desc:"Breach the upper atmosphere. Summit protocols accessible.", x:75, y:33, icon:"mountain" },
  { id:9, title:"Wealth Management", desc:"Deploy financial matrices. Control digital assets.", x:50, y:26, icon:"wallet" },
  { id:10, title:"Global Dominance", desc:"Achieve total network sovereignty. The Nexus Tower is yours.", x:25, y:18, icon:"globe" },
];

const connections = [
  { from:1, to:2, color:"hsl(30,100%,55%)" },
  { from:1, to:3, color:"hsl(30,100%,55%)" },
  { from:2, to:3, color:"hsl(30,100%,55%)" },
  { from:3, to:4, color:"hsl(140,80%,50%)" },
  { from:3, to:5, color:"hsl(190,100%,55%)" },
  { from:4, to:5, color:"hsl(190,100%,55%)" },
  { from:5, to:6, color:"hsl(270,80%,60%)" },
  { from:5, to:7, color:"hsl(190,100%,55%)" },
  { from:6, to:7, color:"hsl(270,80%,60%)" },
  { from:7, to:8, color:"hsl(140,80%,50%)" },
  { from:7, to:9, color:"hsl(190,100%,55%)" },
  { from:8, to:9, color:"hsl(140,80%,50%)" },
  { from:9, to:10, color:"hsl(270,80%,60%)" },
];

function getStatus(id) {
  if (id < CURRENT_LEVEL) return "completed";
  if (id === CURRENT_LEVEL) return "unlocked";
  return "locked";
}
const statusLabels = { completed:"Completed", unlocked:"Unlocked", locked:"Locked" };

// ============ DOM ============
const viewport = document.getElementById("viewport");
const world = document.getElementById("world");
const bgImg = document.getElementById("bgImg");
const connGroup = document.getElementById("connGroup");
const nodesLayer = document.getElementById("nodesLayer");
const panelEmpty = document.getElementById("panelEmpty");
const panelContent = document.getElementById("panelContent");
const zoomLabel = document.getElementById("zoomLabel");
const resetBtn = document.getElementById("resetBtn");

let zoom = 1, panX = 0, panY = 0;
let imgW = 0, imgH = 0;
let selected = null;
let isPanning = false, panStartX = 0, panStartY = 0, panOrigX = 0, panOrigY = 0;

// ============ RENDER ============
function renderConnections() {
  connGroup.innerHTML = "";
  connections.forEach((conn, i) => {
    const a = levels[conn.from - 1], b = levels[conn.to - 1];
    const bothOk = getStatus(conn.from) !== "locked" && getStatus(conn.to) !== "locked";
    const isActive = selected !== null && conn.from <= selected && conn.to <= selected;
    const locked = !bothOk;

    // Outer glow line
    const l1 = document.createElementNS("http://www.w3.org/2000/svg","line");
    l1.setAttribute("x1", a.x); l1.setAttribute("y1", a.y);
    l1.setAttribute("x2", b.x); l1.setAttribute("y2", b.y);
    l1.setAttribute("stroke", locked ? "hsl(220,15%,20%)" : conn.color);
    l1.setAttribute("stroke-width", isActive ? "1" : bothOk ? "0.6" : "0.2");
    l1.setAttribute("stroke-opacity", isActive ? "0.5" : bothOk ? "0.25" : "0.1");
    if (isActive) l1.setAttribute("filter", "url(#gla)");
    else if (bothOk) l1.setAttribute("filter", "url(#gl)");
    connGroup.appendChild(l1);

    // Core line
    const l2 = document.createElementNS("http://www.w3.org/2000/svg","line");
    l2.setAttribute("x1", a.x); l2.setAttribute("y1", a.y);
    l2.setAttribute("x2", b.x); l2.setAttribute("y2", b.y);
    l2.setAttribute("stroke", locked ? "hsl(220,15%,25%)" : conn.color);
    l2.setAttribute("stroke-width", isActive ? "0.4" : "0.2");
    l2.setAttribute("stroke-opacity", isActive ? "1" : bothOk ? "0.6" : "0.08");
    connGroup.appendChild(l2);
  });
}

function renderNodes() {
  nodesLayer.innerHTML = "";
  levels.forEach(level => {
    const status = getStatus(level.id);
    const isSelected = selected === level.id;
    const btn = document.createElement("button");
    btn.className = `node ${status}${isSelected ? " selected" : ""}`;
    btn.style.left = level.x + "%";
    btn.style.top = level.y + "%";
    if (status === "locked") btn.disabled = true;

    const iconName = status === "locked" ? "lock" : status === "completed" ? "check" : level.icon;
    const iconColor = status === "locked" ? "hsl(220,10%,30%)" : status === "completed" ? "hsl(140,80%,50%)" : "hsl(190,100%,60%)";

    btn.innerHTML = `
      <div class="glow"></div>
      <div class="hex"><div class="hex-inner">${svgIcon(iconName, iconColor)}</div></div>
      <span class="node-label">${level.title}</span>
    `;

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (status === "locked") return;
      selected = level.id;
      render();
    });

    nodesLayer.appendChild(btn);
  });
}

function renderPanel() {
  if (selected === null) {
    panelEmpty.style.display = "";
    panelContent.style.display = "none";
    return;
  }
  panelEmpty.style.display = "none";
  panelContent.style.display = "";

  const level = levels.find(l => l.id === selected);
  const status = getStatus(level.id);
  const iconColor = "hsl(190,100%,60%)";

  panelContent.innerHTML = `
    <div class="panel-header">
      <div class="panel-hex"><div class="panel-hex-inner">${svgIcon(level.icon, iconColor)}</div></div>
      <div>
        <div class="panel-title">${level.title}</div>
        <span class="panel-badge ${status}">${statusLabels[status]}</span>
      </div>
    </div>
    <p class="panel-desc">${level.desc}</p>
    <button class="panel-btn ${status}">${status === "completed" ? "Review" : "Start"}</button>
  `;
}

function applyTransform() {
  world.style.width = imgW + "px";
  world.style.height = imgH + "px";
  world.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  zoomLabel.textContent = Math.round(zoom * 100) + "%";
}

function render() {
  renderConnections();
  renderNodes();
  renderPanel();
  applyTransform();
}

// ============ INIT ZOOM ============
function initView() {
  const vpW = viewport.clientWidth;
  const vpH = viewport.clientHeight;
  const fitH = vpH / imgH;
  const fitMinW = (vpW * 0.75) / imgW;
  zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.max(fitH, fitMinW)));
  const scaledW = imgW * zoom;
  const scaledH = imgH * zoom;
  panX = (vpW - scaledW) / 2;
  panY = scaledH <= vpH ? (vpH - scaledH) / 2 : 0;
  render();
}

bgImg.addEventListener("load", () => {
  imgW = bgImg.naturalWidth;
  imgH = bgImg.naturalHeight;
  initView();
});
// If cached
if (bgImg.complete && bgImg.naturalWidth) {
  imgW = bgImg.naturalWidth;
  imgH = bgImg.naturalHeight;
  initView();
}

resetBtn.addEventListener("click", initView);
viewport.addEventListener("dblclick", initView);
window.addEventListener("resize", initView);

// ============ PAN ============
viewport.addEventListener("pointerdown", (e) => {
  if (e.target.closest(".node")) return;
  isPanning = true;
  viewport.classList.add("panning");
  panStartX = e.clientX; panStartY = e.clientY;
  panOrigX = panX; panOrigY = panY;
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener("pointermove", (e) => {
  if (!isPanning) return;
  panX = panOrigX + (e.clientX - panStartX);
  panY = panOrigY + (e.clientY - panStartY);
  applyTransform();
});
viewport.addEventListener("pointerup", () => {
  isPanning = false;
  viewport.classList.remove("panning");
});

// ============ ZOOM ============
viewport.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom * delta));
  const ratio = next / zoom;
  panX = mx - ratio * (mx - panX);
  panY = my - ratio * (my - panY);
  zoom = next;
  applyTransform();
}, { passive: false });
</script>
</body>
</html>
