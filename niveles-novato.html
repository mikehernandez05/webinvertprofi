<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Tower – Mapa de Niveles</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#000}

/* ── Fullscreen background ── */
.map{
  position:fixed;inset:0;width:100vw;height:100vh;
  background:url('/images/NivelesPortada.jpg') 50% 45%/cover no-repeat;
  overflow:hidden;
}
.map::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,transparent 50%,rgba(0,0,0,.35) 100%);
  pointer-events:none;
}

/* ── World (zoom container) ── */
#world{
  position:absolute;inset:0;width:100%;height:100%;
  transform-origin:0 0;
  transition:transform .6s cubic-bezier(.25,.8,.25,1);
  pointer-events:none;
}
#world>*{pointer-events:auto}

@media(prefers-reduced-motion:reduce){
  #world{transition:none!important}
  .node .ring{animation:none!important}
  .warp-overlay{transition:none!important}
}

/* ── SVG connections ── */
.connections{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}

/* ── Warp overlay ── */
.warp-overlay{
  position:fixed;inset:0;z-index:9000;pointer-events:none;
  background:radial-gradient(circle at var(--wx,50%) var(--wy,50%),
    rgba(56,189,248,.3) 0%,rgba(139,92,246,.2) 30%,rgba(0,0,0,.7) 100%);
  opacity:0;transition:opacity .3s ease;
  backdrop-filter:blur(0px);
}
.warp-overlay.active{
  opacity:1;
  backdrop-filter:blur(8px);
}

/* ── Back button ── */
.btn-back{
  position:fixed;top:20px;left:20px;z-index:9999;
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:10px;border:1px solid rgba(56,189,248,.15);
  background:rgba(10,14,24,.7);backdrop-filter:blur(16px);
  color:#e2e8f0;font-size:13px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;transition:background .2s,border-color .2s;
  text-decoration:none;
}
.btn-back:hover{background:rgba(10,14,24,.9);border-color:rgba(56,189,248,.3)}
.btn-back svg{width:16px;height:16px}

/* ── Nodes ── */
.node{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  transform:translate(-50%,-50%);z-index:10;border:none;background:none;
  padding:0;outline:none;cursor:pointer;
}
.node.locked{cursor:not-allowed}

/* Glow ring */
.node .ring{
  width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  transition:transform .25s,box-shadow .25s;
}
.node.completed .ring{
  background:linear-gradient(135deg,hsl(140 70% 30%),hsl(160 60% 25%));
  box-shadow:0 0 12px rgba(74,222,128,.4),0 0 24px rgba(74,222,128,.15);
}
.node.unlocked .ring{
  background:linear-gradient(135deg,hsl(190 90% 40%),hsl(270 70% 45%));
  box-shadow:0 0 14px rgba(34,211,238,.5),0 0 28px rgba(167,139,250,.25);
  animation:pulse 2.2s ease-in-out infinite;
}
.node.locked .ring{
  background:linear-gradient(135deg,hsl(220 15% 22%),hsl(220 15% 16%));
  box-shadow:0 0 6px rgba(0,0,0,.3);
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 14px rgba(34,211,238,.5),0 0 28px rgba(167,139,250,.25)}
  50%{box-shadow:0 0 22px rgba(34,211,238,.7),0 0 40px rgba(167,139,250,.35)}
}

/* Zoom pulse on selected node */
@keyframes zoomPulse{
  0%{box-shadow:0 0 14px rgba(34,211,238,.5),0 0 28px rgba(167,139,250,.25);transform:scale(1)}
  50%{box-shadow:0 0 40px rgba(34,211,238,.9),0 0 80px rgba(167,139,250,.5);transform:scale(1.2)}
  100%{box-shadow:0 0 60px rgba(255,255,255,.8),0 0 100px rgba(34,211,238,.6);transform:scale(1.15)}
}
.node.zooming .ring{
  animation:zoomPulse .6s ease-out forwards!important;
}

.node .inner{
  width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:hsl(220 30% 8%);
}
.node .inner svg{width:22px;height:22px}
.node:hover:not(.locked) .ring{transform:scale(1.12)}

/* Level number badge */
.node .lvl-num{
  position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;z-index:11;
}
.node.completed .lvl-num{background:hsl(140 70% 35%)}
.node.unlocked .lvl-num{background:hsl(190 90% 42%)}
.node.locked .lvl-num{background:hsl(220 15% 25%);color:hsl(220 10% 45%)}

.node-label{
  margin-top:4px;font-size:10px;font-weight:700;letter-spacing:.06em;white-space:nowrap;
  text-align:center;color:#e2e8f0;
  text-shadow:0 0 6px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.6);
}
.node.locked .node-label{color:hsl(220 10% 35%)}

/* ── Tooltip ── */
.tooltip{
  position:fixed;z-index:200;padding:8px 14px;border-radius:8px;
  background:rgba(10,14,24,.9);backdrop-filter:blur(12px);
  border:1px solid rgba(251,146,60,.3);
  color:#fb923c;font-size:12px;font-weight:600;letter-spacing:.04em;
  pointer-events:none;opacity:0;transition:opacity .2s;
  white-space:nowrap;
}
.tooltip.show{opacity:1}

/* ── HUD ── */
.hud{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:8px;align-items:center;
  padding:6px 14px;border-radius:12px;
  background:rgba(10,14,24,.7);backdrop-filter:blur(16px);
  border:1px solid rgba(56,189,248,.1);
}
.hud-label{font-size:11px;color:hsl(200 20% 55%);letter-spacing:.08em;font-weight:600}
.hud-progress{display:flex;gap:4px;margin-left:6px}
.hud-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid hsl(220 15% 25%);background:transparent}
.hud-dot.done{background:hsl(140 70% 40%);border-color:hsl(140 70% 40%)}
.hud-dot.current{background:hsl(190 90% 50%);border-color:hsl(190 90% 50%);box-shadow:0 0 6px rgba(34,211,238,.6)}
</style>
</head>
<body>

<!-- Botón Volver -->
<a class="btn-back" href="portadanivelesacademia.html">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  Volver
</a>

<div class="map" id="map">
  <div id="world">
    <svg class="connections" id="svgLayer" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="0.4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="connGroup"></g>
    </svg>
    <div id="nodesLayer"></div>
  </div>
</div>

<!-- Warp overlay -->
<div class="warp-overlay" id="warpOverlay"></div>

<div class="tooltip" id="tooltip">🔒 Bloqueado — completa el nivel anterior</div>

<div class="hud" id="hud">
  <span class="hud-label">PROGRESO</span>
  <div class="hud-progress" id="hudProgress"></div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
var STORAGE_KEY = 'academy_progress_novato';
var MAX_LEVEL = 10;
var isNavigating = false;

var ICONS = {
  flame:'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14 0-5.5 3-7-.5 1.5 0 2.5 1 3.5 1 1 2 2 2 4a4.5 4.5 0 0 1-9 0Z"/>',
  database:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>',
  cpu:'<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>',
  chart:'<line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/>',
  network:'<rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3M12 12V8"/>',
  lock:'<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
};
function svgIcon(name, color) {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
}

// Levels — posiciones en % sobre el viewport
var levels = [
  { id:1,  title:"Stage 1: Forge",       x:42, y:88, icon:"flame",    href:"niveles-novato.html" },
  { id:2,  title:"Stage 1: Forge",       x:58, y:80, icon:"flame",    href:"niveles-mundo4.html" },
  { id:3,  title:"Resource Acquisition", x:45, y:71, icon:"database", href:"niveles-mundo5.html" },
  { id:4,  title:"Processing Unit",      x:62, y:62, icon:"cpu",      href:"niveles-mundo6.html" },
  { id:5,  title:"Stage 2: Core",        x:50, y:53, icon:"chart",    href:"niveles-mundo7.html" },
  { id:6,  title:"Network Integration",  x:38, y:45, icon:"network",  href:"nivel-6.html" },
  { id:7,  title:"Data Optimization",    x:52, y:38, icon:"chart",    href:"nivel-7.html" },
  { id:8,  title:"Stage 3: Summit",      x:58, y:30, icon:"flame",    href:"nivel-8.html" },
  { id:9,  title:"Wealth Management",    x:50, y:22, icon:"database", href:"nivel-9.html" },
  { id:10, title:"Global Dominance",     x:42, y:14, icon:"network",  href:"nivel-10.html" },
];

var connections = [
  {from:1,to:2},{from:2,to:3},{from:3,to:4},{from:4,to:5},
  {from:5,to:6},{from:6,to:7},{from:7,to:8},{from:8,to:9},{from:9,to:10},
];

// ═══════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════
function getProgress() {
  var v = localStorage.getItem(STORAGE_KEY);
  return v ? Math.max(1, Math.min(MAX_LEVEL, parseInt(v, 10))) : 1;
}
function setProgress(n) {
  localStorage.setItem(STORAGE_KEY, String(Math.max(1, Math.min(MAX_LEVEL, n))));
}
window.unlockNextLevel = function() {
  var cur = getProgress();
  if (cur < MAX_LEVEL) setProgress(cur + 1);
};
window.resetProgress = function() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
};
function getStatus(id) {
  var p = getProgress();
  if (id < p) return 'completed';
  if (id === p) return 'unlocked';
  return 'locked';
}

// ═══════════════════════════════════════
// ZOOM + WARP NAVIGATION
// ═══════════════════════════════════════
var world = document.getElementById('world');
var warpOverlay = document.getElementById('warpOverlay');
var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function navigateToLevel(level, btnEl) {
  if (isNavigating) return;
  isNavigating = true;

  // If reduced motion, navigate immediately
  if (reducedMotion) {
    window.location.href = level.href;
    return;
  }

  // 1) Add zooming class to the clicked node
  btnEl.classList.add('zooming');

  // 2) Calculate zoom transform to center on node
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var nodeX = (level.x / 100) * vw;
  var nodeY = (level.y / 100) * vh;
  var scale = 1.8;
  var tx = (vw / 2) - nodeX * scale;
  var ty = (vh / 2) - nodeY * scale;

  world.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';

  // 3) Set warp center to node position
  warpOverlay.style.setProperty('--wx', level.x + '%');
  warpOverlay.style.setProperty('--wy', level.y + '%');

  // 4) After zoom starts, trigger warp
  setTimeout(function() {
    warpOverlay.classList.add('active');
  }, 350);

  // 5) Navigate after full animation
  setTimeout(function() {
    window.location.href = level.href;
  }, 900);
}

// ═══════════════════════════════════════
// DOM
// ═══════════════════════════════════════
var connGroup = document.getElementById('connGroup');
var nodesLayer = document.getElementById('nodesLayer');
var tooltip = document.getElementById('tooltip');
var hudProgress = document.getElementById('hudProgress');

function connColor(from, to) {
  var sA = getStatus(from), sB = getStatus(to);
  if (sA === 'completed' && sB === 'completed') return {color:'hsl(140,70%,45%)', opacity:'0.7', width:'0.5'};
  if (sA !== 'locked' && sB !== 'locked') return {color:'hsl(190,100%,55%)', opacity:'0.5', width:'0.4'};
  return {color:'hsl(220,15%,22%)', opacity:'0.15', width:'0.25'};
}

function renderConnections() {
  connGroup.innerHTML = '';
  connections.forEach(function(c) {
    var a = levels[c.from-1], b = levels[c.to-1];
    var style = connColor(c.from, c.to);
    var l1 = document.createElementNS('http://www.w3.org/2000/svg','line');
    l1.setAttribute('x1',a.x); l1.setAttribute('y1',a.y);
    l1.setAttribute('x2',b.x); l1.setAttribute('y2',b.y);
    l1.setAttribute('stroke',style.color);
    l1.setAttribute('stroke-width', String(parseFloat(style.width)*2.5));
    l1.setAttribute('stroke-opacity', String(parseFloat(style.opacity)*0.4));
    l1.setAttribute('filter','url(#glow)');
    connGroup.appendChild(l1);
    var l2 = document.createElementNS('http://www.w3.org/2000/svg','line');
    l2.setAttribute('x1',a.x); l2.setAttribute('y1',a.y);
    l2.setAttribute('x2',b.x); l2.setAttribute('y2',b.y);
    l2.setAttribute('stroke',style.color);
    l2.setAttribute('stroke-width',style.width);
    l2.setAttribute('stroke-opacity',style.opacity);
    connGroup.appendChild(l2);
  });
}

function renderNodes() {
  nodesLayer.innerHTML = '';
  levels.forEach(function(level) {
    var status = getStatus(level.id);
    var btn = document.createElement('button');
    btn.className = 'node ' + status;
    btn.style.left = level.x + '%';
    btn.style.top = level.y + '%';

    var iconName = status === 'locked' ? 'lock' : status === 'completed' ? 'check' : level.icon;
    var iconColor = status === 'locked' ? 'hsl(220,10%,35%)' : status === 'completed' ? 'hsl(140,80%,55%)' : 'hsl(190,100%,65%)';

    btn.innerHTML =
      '<div class="ring"><div class="inner">' + svgIcon(iconName, iconColor) + '</div></div>' +
      '<span class="lvl-num">' + level.id + '</span>' +
      '<span class="node-label">' + level.title + '</span>';

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (status === 'locked') {
        showTooltip(e.clientX, e.clientY);
        return;
      }
      navigateToLevel(level, btn);
    });

    btn.addEventListener('mouseenter', function(e) {
      if (status === 'locked') showTooltip(e.clientX, e.clientY);
    });
    btn.addEventListener('mouseleave', hideTooltip);

    nodesLayer.appendChild(btn);
  });
}

function renderHUD() {
  hudProgress.innerHTML = '';
  levels.forEach(function(level) {
    var dot = document.createElement('div');
    dot.className = 'hud-dot';
    var s = getStatus(level.id);
    if (s === 'completed') dot.classList.add('done');
    if (s === 'unlocked') dot.classList.add('current');
    hudProgress.appendChild(dot);
  });
}

// ═══════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════
var tooltipTimer;
function showTooltip(x, y) {
  clearTimeout(tooltipTimer);
  tooltip.style.left = (x + 14) + 'px';
  tooltip.style.top = (y - 36) + 'px';
  tooltip.classList.add('show');
  tooltipTimer = setTimeout(hideTooltip, 2000);
}
function hideTooltip() {
  tooltip.classList.remove('show');
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderConnections();
renderNodes();
renderHUD();
</script>
</body>
</html>
