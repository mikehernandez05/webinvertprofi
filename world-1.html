<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
:root{--a:#ff6a00;--ad:#cc4400;--ar:255,106,0;--gold:#CBA052;--goldr:203,160,82}
*{box-sizing:border-box}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a0800;border-radius:2px}
body{background:#0c0400;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* BASE ATMOSPHERE */
.world-base{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 88% 90%,rgba(0,50,110,.2),transparent 65%),
    radial-gradient(ellipse 45% 40% at 12% 15%,rgba(60,45,0,.22),transparent 60%),
    radial-gradient(ellipse 80% 80% at 50% 50%,#130800,#0c0400 75%)}

/* THE WORLD SCENE SVG */
#worldScene{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}

/* FX CANVAS */
#fxC{position:fixed;inset:0;z-index:3;pointer-events:none}
.scan{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 3px)}

/* HUD PANELS */
.hud-panel{position:fixed;z-index:6;pointer-events:none;padding:8px 10px;border-radius:10px;
  background:rgba(4,8,16,.9);backdrop-filter:blur(6px)}
.hud-psi{top:20%;right:10px;border:1px solid rgba(var(--ar),.18)}
.hud-rpm{bottom:28%;left:10px;border:1px solid rgba(var(--goldr),.14)}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;opacity:.45}
.hud-val{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;line-height:1.3}
.hud-bar{width:38px;height:2px;border-radius:1px;background:rgba(255,255,255,.06);margin-top:4px;overflow:hidden}
.hud-fill{height:100%;border-radius:1px;animation:hFill 4s ease-in-out infinite}
@keyframes hFill{0%,100%{width:52%}50%{width:90%}}

/* HERO */
.world-hero{position:relative;z-index:10;text-align:center;padding:24px 16px 16px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 16px;border-radius:999px;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:rgba(var(--ar),.06);border:1px solid rgba(var(--ar),.16);color:var(--a);margin-bottom:12px;
  box-shadow:0 0 24px rgba(var(--ar),.07),inset 0 0 12px rgba(var(--ar),.04)}
.hero-badge .bdot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:bpulse 2s ease-in-out infinite}
@keyframes bpulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.hero-icon{font-size:3.8rem;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(var(--ar),.5));animation:hfloat 4s ease-in-out infinite}
@keyframes hfloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(10deg)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.55rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;
  color:#fff;margin:4px 0;text-shadow:0 0 40px rgba(var(--ar),.4),0 2px 4px rgba(0,0,0,.7)}
.hero-sub{color:#2a4055;font-size:12px;font-family:'Share Tech Mono',monospace;letter-spacing:2px}

/* CANDY CRUSH PATH */
.map-wrap{max-width:440px;margin:0 auto;padding:0 12px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-done{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 6px rgba(var(--ar),.5));stroke-linecap:round}
.path-active{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 10px rgba(var(--ar),.65));stroke-linecap:round;stroke-dasharray:10 6;animation:dashAnim 1s linear infinite}
.path-locked{stroke:rgba(255,255,255,.04);stroke-width:3;fill:none;stroke-linecap:round}
@keyframes dashAnim{to{stroke-dashoffset:-32}}

/* NODE — MECHANICAL STATIONS */
.node{position:absolute;z-index:15;cursor:pointer;transition:transform .25s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.node:active{transform:translate(-50%,-50%) scale(.88)!important}
.node.locked{cursor:not-allowed;filter:saturate(.1) brightness(.3)}
.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}

/* Station mounting brackets */
.node-mount{position:relative;display:inline-flex;align-items:center;justify-content:center}
.nb{position:absolute;width:13px;height:13px;border-color:rgba(var(--ar),.38);border-style:solid;transition:border-color .3s}
.nb-tl{top:-5px;left:-5px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.nb-tr{top:-5px;right:-5px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.nb-bl{bottom:-5px;left:-5px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.nb-br{bottom:-5px;right:-5px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
.node-boss .nb{width:17px;height:17px;border-width:2.5px}
.node-boss .nb-tl{top:-7px;left:-7px}.node-boss .nb-tr{top:-7px;right:-7px}
.node-boss .nb-bl{bottom:-7px;left:-7px}.node-boss .nb-br{bottom:-7px;right:-7px}
.nc-active~.nb,.node.nc-active .nb{border-color:rgba(var(--ar),.65)!important}

.node-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.65)}

/* Done — gunmetal steel + gold accent */
.nc-done{
  background:radial-gradient(circle at 35% 30%,#1e3548,#0d1e2e 55%,#071018);
  border:2.5px solid rgba(var(--goldr),.5);
  box-shadow:0 0 18px rgba(var(--goldr),.18),0 4px 20px rgba(0,0,0,.65),inset 0 -2px 6px rgba(0,0,0,.5),inset 0 2px 5px rgba(var(--goldr),.1)}
.nc-done::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,.22),transparent 55%);pointer-events:none}

/* Active — electric core */
.nc-active{
  background:radial-gradient(circle at 35% 30%,#4a1800,rgba(130,40,0,.38) 50%,#020c16);
  border:2.5px solid var(--a);
  animation:aPulse 2s ease-in-out infinite;
  box-shadow:0 0 32px rgba(var(--ar),.55),0 0 70px rgba(var(--ar),.12),0 4px 20px rgba(0,0,0,.65),inset 0 -2px 6px rgba(0,0,0,.4)}
.nc-active::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,.32),transparent 55%);pointer-events:none}
@keyframes aPulse{0%,100%{box-shadow:0 0 28px rgba(var(--ar),.45),0 4px 20px rgba(0,0,0,.65);transform:scale(1)}50%{box-shadow:0 0 55px rgba(var(--ar),.65),0 0 100px rgba(var(--ar),.14);transform:scale(1.07)}}

/* Locked — dark steel */
.nc-locked{
  background:radial-gradient(circle at 35% 30%,#0c1520,#080f18 55%,#0a0400);
  border:2.5px solid #201000;
  box-shadow:0 4px 20px rgba(0,0,0,.85),inset 0 -2px 6px rgba(0,0,0,.5)}

.node-boss .node-circle{width:80px;height:80px;font-size:1.85rem}
.boss-tag{position:absolute;top:-8px;right:-8px;font-size:8px;font-weight:900;font-family:'Orbitron',sans-serif;
  border-radius:999px;padding:2px 8px;z-index:20;letter-spacing:.5px;
  background:linear-gradient(135deg,#8a6015,var(--gold));color:#0c0400;
  box-shadow:0 0 14px rgba(var(--goldr),.4)}
.boss-tag.locked{background:#0d1a28;color:#1e2d3e;box-shadow:none}

/* Station platform */
.node-platform{width:100%;margin-top:4px}
.node-platform::before{content:'';display:block;height:2px;background:linear-gradient(90deg,transparent,rgba(var(--ar),.38),transparent);border-radius:1px}
.node-platform::after{content:'';display:block;margin-top:3px;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ar),.14),transparent);border-radius:1px}
.node.locked .node-platform::before,.node.locked .node-platform::after{background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent)}

.node-lbl{text-align:center;margin-top:5px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.node-lbl.lbl-done{color:rgba(var(--goldr),.6)}.node-lbl.lbl-active{color:var(--a)}.node-lbl.lbl-locked{color:#1a2d40}
.node-stars{text-align:center;font-size:10px;margin-top:2px}
.star-on{color:var(--gold)}.star-off{color:#1a2d40}

/* QUEST BOX */
.quest-box{border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(var(--ar),.04),rgba(var(--ar),.01));
  border:1px solid rgba(var(--ar),.11);
  box-shadow:0 0 30px rgba(var(--ar),.03),inset 0 1px 0 rgba(var(--ar),.06);
  backdrop-filter:blur(8px)}
.quest-icon{flex-shrink:0;font-size:1.4rem;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:rgba(var(--ar),.05);border:1px solid rgba(var(--ar),.11);animation:aPulse 2s ease-in-out infinite}
.quest-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(var(--ar),.4);text-transform:uppercase;letter-spacing:3px}
.quest-title{font-size:13px;color:#bbc;font-weight:700}
.quest-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:9px;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0c0400;
  box-shadow:0 0 16px rgba(var(--ar),.28);transition:all .2s}
.quest-btn:hover{transform:scale(1.05);box-shadow:0 0 28px rgba(var(--ar),.5)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.modal-box{background:linear-gradient(135deg,#160800,#0d0500,#160800);
  border:1px solid rgba(var(--ar),.16);border-radius:22px;padding:26px;max-width:400px;width:calc(100% - 2rem);
  box-shadow:0 0 80px rgba(var(--ar),.05),0 30px 60px rgba(0,0,0,.75),inset 0 1px 0 rgba(var(--ar),.07)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(var(--ar),.16);background:rgba(4,8,16,.92);color:var(--a);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.3)}
.mu-btn.off{color:#1a2d40;border-color:#0d1e30}
header{border-image:linear-gradient(90deg,transparent,rgba(var(--ar),.2),transparent) 1}

@media(max-width:374px){.node-circle{width:52px;height:52px;font-size:1.1rem}.node-boss .node-circle{width:66px;height:66px}.node-lbl{font-size:8px}.map-wrap{max-width:340px}.hero-title{font-size:1.25rem}}
@media(min-width:375px) and (max-width:480px){.node-circle{width:58px;height:58px;font-size:1.3rem}.node-boss .node-circle{width:72px;height:72px}}
@media(min-width:769px){.map-wrap{max-width:500px}.node-circle{width:70px;height:70px;font-size:1.6rem}.node-boss .node-circle{width:88px;height:88px;font-size:2rem}.hero-title{font-size:2rem}}
@media(hover:none){.node:active{transform:translate(-50%,-50%) scale(.9)!important}}
</style>
</head>

<script>
var A='#ff6a00',AR='255,106,0',WN=1;
var levels=window._wL=[{"n":1,"t":"¿Qué es Invertir?","d":"Tu primer paso hacia tu libertad financiera.","xp":150},{"n":2,"t":"Tipos de Activos","d":"Acciones, forex, crypto, commodities.","xp":150},{"n":3,"t":"Tu Primera Cuenta","d":"Crea tu cuenta de broker paso a paso.","xp":150},{"n":4,"t":"Leer un Gráfico","d":"Entiende los ejes, el tiempo y el precio.","xp":150},{"n":5,"t":"Velas Japonesas","d":"El lenguaje visual del mercado.","xp":200},{"n":6,"t":"⚡ BOSS: Primera Op","d":"Ejecuta tu primera operación real.","xp":350,"boss":"BOSS"},{"n":7,"t":"Soportes y Resistencias","d":"Los muros invisibles del precio.","xp":150},{"n":8,"t":"Tendencias","d":"Alcista, bajista, lateral.","xp":150},{"n":9,"t":"Gestión de Riesgo","d":"Protege tu capital desde el día 1.","xp":150},{"n":10,"t":"🏆 FINAL","d":"Examen Principiante.","xp":500,"boss":"FINAL"}];
var icons=["⚙️","📦","🏦","📈","🕯️","⚡","🔩","📊","🛡️","🏆"];
levels.forEach(function(l){l.s=CURRICULUM.getLevelStatus(l.n)});

var cc=levels.filter(function(l){return l.s==='completed'}).length;
var totalXP=levels.reduce(function(a,l){return a+(l.s==='completed'?l.xp:0)},0);
document.getElementById('comp-ct').textContent=cc+'/'+levels.length;
document.getElementById('xp-ct').textContent=totalXP.toLocaleString()+' XP';
document.getElementById('prog-bar').style.width=Math.round(cc/levels.length*100)+'%';

var N=levels.length,MAP_W,NODE_H=110,PAD_TOP=40,nodePos=[];
function calcPositions(){
  MAP_W=document.getElementById('mapWrap').offsetWidth;nodePos=[];
  var margin=50,usable=MAP_W-margin*2;
  for(var i=0;i<N;i++){
    var row=Math.floor(i/3),col=i%3,goingRight=row%2===0;
    var xNorm=goingRight?col/2:(2-col)/2;
    var rawX=margin+xNorm*usable,wave=Math.sin(i*0.8)*usable*0.12;
    nodePos.push({x:Math.max(margin,Math.min(MAP_W-margin,rawX+wave)),y:PAD_TOP+(N-1-i)*NODE_H})}}
calcPositions();
var totalH=PAD_TOP+N*NODE_H+60;
document.getElementById('nodesLayer').style.height=totalH+'px';
document.getElementById('pathSvg').setAttribute('height',totalH);
document.getElementById('pathSvg').style.height=totalH+'px';

function drawPaths(){
  calcPositions();var svg=document.getElementById('pathSvg');svg.innerHTML='';
  for(var i=0;i<N-1;i++){
    var a_=nodePos[i],b_=nodePos[i+1],sA=levels[i].s,sB=levels[i+1].s;
    var cls=(sA==='completed'&&sB==='completed')?'path-done':(sA==='completed'&&sB==='active')?'path-active':'path-locked';
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    var midY=(a_.y+b_.y)/2;
    path.setAttribute('d','M '+a_.x+' '+a_.y+' C '+a_.x+' '+midY+', '+b_.x+' '+midY+', '+b_.x+' '+b_.y);
    path.setAttribute('class',cls);svg.appendChild(path)}}
drawPaths();
window.addEventListener('resize',function(){drawPaths();placeNodes();buildScene()});

function placeNodes(){
  calcPositions();var layer=document.getElementById('nodesLayer');layer.innerHTML='';
  for(var i=0;i<N;i++){
    var lv=levels[i],p=nodePos[i],isBoss=!!lv.boss;
    var nd=document.createElement('div');
    nd.className='node'+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');
    nd.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;transform:translate(-50%,-50%)';
    var circCls=lv.s==='completed'?'nc-done':(lv.s==='active'?'nc-active':'nc-locked');
    var content=lv.s==='completed'?'✓':(lv.s==='active'?(icons[i]||'⚙️'):'<span class="material-symbols-outlined text-gray-600" style="font-size:1.2em">lock</span>');
    var bossTag='';if(isBoss){bossTag='<span class="'+(lv.s==='locked'?'boss-tag locked':'boss-tag')+'">'+lv.boss+'</span>'}

var sceneGears=[];
var pistonRod=null,pistonBaseY=0,pistonOffset=0,pistonDir=1,pistonAmp=38,pistonSpd=0.55;
var conduitLines=[];

function nsv(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag)}
function rnd(n){return Math.round(n*10)/10}

// True toothed gear outline path
function gearPath(cx,cy,R,r,hR,teeth){
  var s=Math.PI*2/teeth,tw=s*0.42,d='';
  for(var i=0;i<teeth;i++){
    var a=i*s,a0=a-tw/2,a1=a+tw/2,a2=(i+1)*s-tw/2;
    if(i===0)d+='M'+rnd(cx+r*Math.cos(a0))+','+rnd(cy+r*Math.sin(a0));
    else d+='L'+rnd(cx+r*Math.cos(a0))+','+rnd(cy+r*Math.sin(a0));
    d+='L'+rnd(cx+R*Math.cos(a0))+','+rnd(cy+R*Math.sin(a0));
    d+='A'+R+','+R+',0,0,1,'+rnd(cx+R*Math.cos(a1))+','+rnd(cy+R*Math.sin(a1));
    d+='L'+rnd(cx+r*Math.cos(a1))+','+rnd(cy+r*Math.sin(a1));
    if(i<teeth-1)d+='A'+r+','+r+',0,0,1,'+rnd(cx+r*Math.cos(a2))+','+rnd(cy+r*Math.sin(a2))}
  d+='Z';
  if(hR>0){
    d+=' M'+rnd(cx+hR)+','+rnd(cy);
    d+='A'+hR+','+hR+',0,1,0,'+rnd(cx-hR)+','+rnd(cy);
    d+='A'+hR+','+hR+',0,1,0,'+rnd(cx+hR)+','+rnd(cy)+'Z'}
  return d}

function makeGear(svg,cx,cy,R,r,hR,teeth,strokeCol,fillCol,opacity,rpm,dir){
  var g=nsv('g');
  var p=nsv('path');
  p.setAttribute('d',gearPath(cx,cy,R,r,hR,teeth));
  p.setAttribute('fill',fillCol);p.setAttribute('stroke',strokeCol);
  p.setAttribute('stroke-width','1.2');p.setAttribute('fill-rule','evenodd');
  p.setAttribute('opacity',opacity);g.appendChild(p);
  // Spokes
  var ns2=6;
  for(var i=0;i<ns2;i++){
    var a=(i/ns2)*Math.PI*2;
    var sp=nsv('line');
    sp.setAttribute('x1',rnd(cx+(hR+5)*Math.cos(a)));sp.setAttribute('y1',rnd(cy+(hR+5)*Math.sin(a)));
    sp.setAttribute('x2',rnd(cx+(r-10)*Math.cos(a)));sp.setAttribute('y2',rnd(cy+(r-10)*Math.sin(a)));
    sp.setAttribute('stroke',strokeCol);sp.setAttribute('stroke-width','1.5');
    sp.setAttribute('opacity',opacity);g.appendChild(sp)}
  // Hub ring
  var hub=nsv('circle');hub.setAttribute('cx',cx);hub.setAttribute('cy',cy);hub.setAttribute('r',hR);
  hub.setAttribute('fill',fillCol);hub.setAttribute('stroke',strokeCol);hub.setAttribute('stroke-width','1.8');
  hub.setAttribute('opacity',opacity);g.appendChild(hub);
  // Hub dot
  var hdot=nsv('circle');hdot.setAttribute('cx',cx);hdot.setAttribute('cy',cy);hdot.setAttribute('r',5);
  hdot.setAttribute('fill',strokeCol);hdot.setAttribute('opacity',String(parseFloat(opacity)*0.7));
  g.appendChild(hdot);
  svg.appendChild(g);
  sceneGears.push({g:g,cx:cx,cy:cy,rpm:rpm,dir:dir,angle:Math.random()*360});
  return g}

function makePipe(svg,x1,y1,x2,y2,thick,col,op){
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return;
  var nx=-dy/len*thick/2,ny=dx/len*thick/2;
  var body=nsv('path');
  body.setAttribute('d','M'+(x1+nx)+','+(y1+ny)+' L'+(x2+nx)+','+(y2+ny)+' L'+(x2-nx)+','+(y2-ny)+' L'+(x1-nx)+','+(y1-ny)+'Z');
  body.setAttribute('fill','#110600');body.setAttribute('stroke',col);body.setAttribute('stroke-width','1');
  body.setAttribute('opacity',op);svg.appendChild(body);
  // Inner glow line
  var gl=nsv('line');gl.setAttribute('x1',x1);gl.setAttribute('y1',y1);gl.setAttribute('x2',x2);gl.setAttribute('y2',y2);
  gl.setAttribute('stroke',col);gl.setAttribute('stroke-width','1.2');gl.setAttribute('opacity',String(parseFloat(op)*0.35));
  svg.appendChild(gl);
  // End flanges
  [0,1].forEach(function(e){
    var bx=e?x2:x1,by=e?y2:y1;
    var fl=nsv('path');
    fl.setAttribute('d','M'+(bx+nx*1.4)+','+(by+ny*1.4)+' L'+(bx-nx*1.4)+','+(by-ny*1.4));
    fl.setAttribute('stroke',col);fl.setAttribute('stroke-width','3');
    fl.setAttribute('stroke-linecap','round');fl.setAttribute('opacity',op);
    svg.appendChild(fl)})}

function makeJoint(svg,cx,cy,r,col,op){
  var c=nsv('circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
  c.setAttribute('fill','#110600');c.setAttribute('stroke',col);c.setAttribute('stroke-width','2');
  c.setAttribute('opacity',op);svg.appendChild(c);
  var d=nsv('circle');d.setAttribute('cx',cx);d.setAttribute('cy',cy);d.setAttribute('r',r*0.35);
  d.setAttribute('fill',col);d.setAttribute('opacity',String(parseFloat(op)*0.55));
  svg.appendChild(d)}

function makeBeam(svg,x1,y1,x2,y2,h,col,op){
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return;
  var nx=-dy/len,ny=dx/len;
  var hh=h/2;
  // Top flange
  var t1=nsv('line');t1.setAttribute('x1',x1+nx*hh);t1.setAttribute('y1',y1+ny*hh);
  t1.setAttribute('x2',x2+nx*hh);t1.setAttribute('y2',y2+ny*hh);
  t1.setAttribute('stroke',col);t1.setAttribute('stroke-width','3');t1.setAttribute('opacity',op);svg.appendChild(t1);
  // Bottom flange
  var t2=nsv('line');t2.setAttribute('x1',x1-nx*hh);t2.setAttribute('y1',y1-ny*hh);
  t2.setAttribute('x2',x2-nx*hh);t2.setAttribute('y2',y2-ny*hh);
  t2.setAttribute('stroke',col);t2.setAttribute('stroke-width','3');t2.setAttribute('opacity',op);svg.appendChild(t2);
  // Web
  var w=nsv('line');w.setAttribute('x1',x1);w.setAttribute('y1',y1);w.setAttribute('x2',x2);w.setAttribute('y2',y2);
  w.setAttribute('stroke',col);w.setAttribute('stroke-width','1.5');w.setAttribute('opacity',String(parseFloat(op)*0.4));
  svg.appendChild(w)}

function makeRivet(svg,cx,cy,col,op){
  var c=nsv('circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',4);
  c.setAttribute('fill','#110600');c.setAttribute('stroke',col);c.setAttribute('stroke-width','1.5');
  c.setAttribute('opacity',op);svg.appendChild(c);
  var i=nsv('circle');i.setAttribute('cx',cx);i.setAttribute('cy',cy);i.setAttribute('r',1.5);
  i.setAttribute('fill',col);i.setAttribute('opacity',String(parseFloat(op)*0.65));
  svg.appendChild(i)}

function makeGauge(svg,cx,cy,r,col,op){
  var bg=nsv('circle');bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',r);
  bg.setAttribute('fill','#0e0500');bg.setAttribute('stroke',col);bg.setAttribute('stroke-width','2');
  bg.setAttribute('opacity',op);svg.appendChild(bg);
  for(var i=0;i<12;i++){
    var a=-Math.PI*0.75+(i/11)*Math.PI*1.5,isM=i%3===0;
    var t=nsv('line');
    t.setAttribute('x1',rnd(cx+(isM?r*0.55:r*0.7)*Math.cos(a)));t.setAttribute('y1',rnd(cy+(isM?r*0.55:r*0.7)*Math.sin(a)));
    t.setAttribute('x2',rnd(cx+(r-3)*Math.cos(a)));t.setAttribute('y2',rnd(cy+(r-3)*Math.sin(a)));
    t.setAttribute('stroke',col);t.setAttribute('stroke-width',isM?'1.5':'0.7');
    t.setAttribute('opacity',String(parseFloat(op)*0.65));svg.appendChild(t)}
  var na=-Math.PI*0.75+Math.PI*1.5*0.65;
  var nd2=nsv('line');nd2.setAttribute('x1',cx);nd2.setAttribute('y1',cy);
  nd2.setAttribute('x2',rnd(cx+(r-5)*Math.cos(na)));nd2.setAttribute('y2',rnd(cy+(r-5)*Math.sin(na)));
  nd2.setAttribute('stroke',col);nd2.setAttribute('stroke-width','2');nd2.setAttribute('opacity',op);
  nd2.setAttribute('stroke-linecap','round');svg.appendChild(nd2);
  var c2=nsv('circle');c2.setAttribute('cx',cx);c2.setAttribute('cy',cy);c2.setAttribute('r',3);
  c2.setAttribute('fill',col);c2.setAttribute('opacity',op);svg.appendChild(c2)}

function makeConduit(svg,pts,col,thick,op){
  var ptStr=pts.map(function(p){return p[0]+','+p[1]}).join(' ');
  // Outer glow
  var glow=nsv('polyline');glow.setAttribute('points',ptStr);
  glow.setAttribute('stroke',col);glow.setAttribute('stroke-width',thick*5);
  glow.setAttribute('fill','none');glow.setAttribute('opacity',String(parseFloat(op)*0.06));
  glow.setAttribute('stroke-linecap','round');glow.setAttribute('stroke-linejoin','round');
  svg.appendChild(glow);
  // Main flow line
  var line=nsv('polyline');line.setAttribute('points',ptStr);
  line.setAttribute('stroke',col);line.setAttribute('stroke-width',thick);
  line.setAttribute('fill','none');line.setAttribute('opacity',op);
  line.setAttribute('stroke-linecap','round');line.setAttribute('stroke-linejoin','round');
  line.setAttribute('stroke-dasharray','22 14');
  conduitLines.push(line);svg.appendChild(line);
  return line}

function buildScene(){

  // ── PIPE NETWORK ──

  makePipe(svg,W*0.075,0,W*0.075,H*0.65,14,cyan,'0.55');

  // Secondary horizontal pipe

  makeJoint(svg,W*0.925,H*0.64,9,gold,'0.65');
  // Branch pipes connecting main to secondary
  makePipe(svg,W*0.075,H*0.28,W*0.22,H*0.64,9,'rgba(255,106,0,0.22)','0.45');
  makePipe(svg,W*0.925,H*0.28,W*0.78,H*0.64,9,'rgba(255,106,0,0.22)','0.45');
  makeJoint(svg,W*0.22,H*0.64,7,'rgba(255,106,0,0.48)','0.58');

  // Rivets at key structural intersections
  [[W*0.075,H*0.28],[W*0.925,H*0.28],[W*0.055,H*0.64],[W*0.925,H*0.64]].forEach(function(rp){
    for(var ri=0;ri<4;ri++){
      var a=ri*Math.PI/2+Math.PI/4;
      makeRivet(svg,rp[0]+18*Math.cos(a),rp[1]+18*Math.sin(a),cyan,'0.5')}});

  // ── ENERGY CONDUITS ──
  // Main vertical energy spine
  makeConduit(svg,[[W*0.5,H*0.04],[W*0.5,H*0.27],[W*0.44,H*0.30],[W*0.44,H*0.63],[W*0.5,H*0.66],[W*0.5,H*0.96]],
    'rgba(255,106,0,1)','2.5','0.6');
  // Right diagonal conduit
  makeConduit(svg,[[W*0.9,H*0.1],[W*0.78,H*0.28],[W*0.82,H*0.64],[W*0.9,H*0.82]],
    'rgba(203,160,82,0.9)','2','0.42');
  // Left diagonal conduit
  makeConduit(svg,[[W*0.1,H*0.82],[W*0.18,H*0.64],[W*0.14,H*0.28]],

    'rgba(255,106,0,0.28)','rgba(5,12,22,0.68)','1',15,'cw');

  // Cylinder caps
  [0,1].forEach(function(e){
    var capY=e?pisTopY+pisCylH:pisTopY;
    var cap=nsv('rect');cap.setAttribute('x',pisX-15);cap.setAttribute('y',capY-5);
    cap.setAttribute('width','30');cap.setAttribute('height','10');cap.setAttribute('rx','3');
    cap.setAttribute('fill','#1a0800');cap.setAttribute('stroke','rgba(255,106,0,0.55)');
    cap.setAttribute('stroke-width','1.5');svg.appendChild(cap)});
  // Connecting rod (animated)

  rod.setAttribute('stroke','rgba(255,106,0,0.5)');rod.setAttribute('stroke-width','1.5');
  svg.appendChild(rod);

  // Piston axle connector line to gear
  var axle=nsv('line');axle.setAttribute('x1',pisX);axle.setAttribute('y1',pisTopY+pisCylH+8);
  axle.setAttribute('x2',W*0.9);axle.setAttribute('y2',H*0.48);
  axle.setAttribute('stroke','rgba(255,106,0,0.18)');axle.setAttribute('stroke-width','2.5');
  axle.setAttribute('stroke-dasharray','8 5');svg.appendChild(axle);

  // ── AXLE SHAFTS connecting gears ──
  var shaftAlpha=nsv('line');
  shaftAlpha.setAttribute('x1',W*1.08-Ra*0.9);shaftAlpha.setAttribute('y1',H*1.18-Ra*0.9);

  // ── STEAM VENT CAPS ──
  [[W*0.075,H*0.28],[W*0.925,H*0.28],[W*0.075,H*0.64]].forEach(function(v){
    var vc=nsv('rect');vc.setAttribute('x',v[0]-7);vc.setAttribute('y',v[1]-5);
    vc.setAttribute('width','14');vc.setAttribute('height','10');vc.setAttribute('rx','3');
    vc.setAttribute('fill','#120600');vc.setAttribute('stroke','rgba(255,106,0,0.5)');
    vc.setAttribute('stroke-width','1.5');svg.appendChild(vc)});
}

buildScene();

// ── UNIFIED ANIMATION LOOP ──
var conduitOff=0,lastT=performance.now();
(function tick(now){
  var dt=(now-lastT)/1000;lastT=now;

  // Rotate all gears
  sceneGears.forEach(function(g){
    var spd=(g.dir==='cw'?1:-1)*g.rpm/60;
    g.angle+=spd*dt*360;
    g.g.setAttribute('transform','rotate('+rnd(g.angle)+','+g.cx+','+g.cy+')')});

  // Piston stroke
  if(pistonRod){
    pistonOffset+=pistonDir*pistonSpd*dt*100;
    if(pistonOffset>=pistonAmp){pistonOffset=pistonAmp;pistonDir=-1}
    if(pistonOffset<=0){pistonOffset=0;pistonDir=1}
    pistonRod.setAttribute('y',rnd(pistonBaseY+pistonOffset))}

  // Conduit flow
  conduitOff-=35*dt;
  conduitLines.forEach(function(c){c.setAttribute('stroke-dashoffset',conduitOff)});

  requestAnimationFrame(tick)})(performance.now());

// ── CANVAS PARTICLES: sparks + steam ──
(function(){
  var cv=document.getElementById('fxC'),ctx=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;
  function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
  addEventListener('resize',rs);rs();

  var P=[];
  for(var i=0;i<75;i++)P.push({x:0,y:0,vx:0,vy:0,life:0,maxLife:1,sz:0,type:0,r:0,g:0,b:0,delay:Math.random()*300});

  function reset(p){
    var rng=Math.random();
    if(rng<0.45){
      // Cyan electric sparks
      p.type=0;p.x=Math.random()*W;p.y=Math.random()*H;
      p.vx=(Math.random()-.5)*2.8;p.vy=-1.2-Math.random()*2.8;
      p.sz=0.7+Math.random()*1.8;p.maxLife=35+Math.random()*110;
      p.r=0;p.g=190+Math.random()*65|0;p.b=245
    }else if(rng<0.7){
      // Gold sparks
      p.type=1;p.x=Math.random()*W;p.y=H*0.28+Math.random()*H*0.65;
      p.vx=(Math.random()-.5)*3.5;p.vy=-1.5-Math.random()*2.5;
      p.sz=0.7+Math.random()*1.4;p.maxLife=25+Math.random()*75;
      p.r=230+Math.random()*25|0;p.g=155+Math.random()*55|0;p.b=25
    }else{
      // Steam wisps at pipe vents
      p.type=2;
      var vx2=[W*0.075,W*0.925];
      p.x=vx2[Math.random()<0.5?0:1]+(Math.random()-.5)*12;
      p.y=H*0.27;
      p.vx=(Math.random()-.5)*0.7;p.vy=-(0.35+Math.random()*0.7);
      p.sz=4+Math.random()*6;p.maxLife=90+Math.random()*140;
      p.r=160;p.g=200;p.b=220}
    p.life=0}

  P.forEach(reset);
  var t=0;
  function draw(){
    t++;ctx.clearRect(0,0,W,H);
    P.forEach(function(p){
      if(t<p.delay)return;
      p.life++;if(p.life>p.maxLife){reset(p);p.delay=0;return}
      var prog=p.life/p.maxLife;
      p.x+=p.vx+(p.type<2?Math.sin(p.life*.09)*.4:0);
      p.y+=p.vy;
      var alpha=(1-prog)*(prog<0.1?prog/0.1:1);
      if(p.type===2){
        ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(1+prog*5),0,6.28);
        ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+(alpha*0.16)+')';ctx.fill()
      }else{
        var a2=alpha*0.88;
        ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,6.28);
        ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+a2+')';ctx.fill();
        ctx.beginPath();ctx.arc(p.x,p.y,p.sz*5.5,0,6.28);
        ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+(a2*.06)+')';ctx.fill()}});

    // Random electric arc flashes
    if(t%20===0){
      var ax=W*0.08+Math.random()*W*0.84,ay=H*0.08+Math.random()*H*0.84;
      var al=12+Math.random()*55,aa=Math.random()*Math.PI*2;
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+Math.cos(aa)*al,ay+Math.sin(aa)*al);
      ctx.strokeStyle='rgba(255,106,0,0.2)';ctx.lineWidth=0.6;ctx.stroke();
      ctx.beginPath();ctx.arc(ax,ay,1.8,0,6.28);ctx.fillStyle='rgba(255,140,0,0.65)';ctx.fill()}

    // Pulse rings (energy discharge)
    if(t%55===0){
      var px=W*0.15+Math.random()*W*0.7,py=H*0.2+Math.random()*H*0.6;
      ctx.beginPath();ctx.arc(px,py,14,0,6.28);
      ctx.strokeStyle='rgba(255,106,0,0.12)';ctx.lineWidth=1;ctx.stroke()}

    requestAnimationFrame(draw)}draw()})();

// ═══ AUDIO ═══
var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);
  [0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    o.type=i<2?'sine':'triangle';o.frequency.value=55*Math.pow(2,s/12);f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;
    o.connect(f);f.connect(g);g.connect(mg);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});
  var sc=[0,3,5,7,10],ni=0;(function play(){if(!sOn){setTimeout(play,2000);return}var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);var fr=55*2*Math.pow(2,semi/12);var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}
function sfxC(){sfx(880,.1);setTimeout(function(){sfx(660,.07)},35)}
function sfxL(){sfx(150,.15)}
function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.08:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇'}
document.addEventListener('click',function(){initA()},{once:true});
