<style>
:root{--a:#ff6a00;--ad:#cc4400;--ar:255,106,0;--gold:#CBA052;--goldr:203,160,82}
*{box-sizing:border-box}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a0800;border-radius:2px}
body{background:#0c0400;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* BASE ATMOSPHERE */
.world-base{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 88% 90%,rgba(0,50,110,.2),transparent 65%),
    radial-gradient(ellipse 45% 40% at 12% 15%,rgba(60,45,0,.22),transparent 60%),
    radial-gradient(ellipse 80% 80% at 50% 50%,#130800,#0c0400 75%)}

/* THE WORLD SCENE SVG */
#worldScene{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}

/* FX CANVAS */
#fxC{position:fixed;inset:0;z-index:3;pointer-events:none}
.scan{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 3px)}

/* HUD PANELS */
.hud-panel{position:fixed;z-index:6;pointer-events:none;padding:8px 10px;border-radius:10px;
  background:rgba(4,8,16,.9);backdrop-filter:blur(6px)}
.hud-psi{top:20%;right:10px;border:1px solid rgba(var(--ar),.18)}
.hud-rpm{bottom:28%;left:10px;border:1px solid rgba(var(--goldr),.14)}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;opacity:.45}
.hud-val{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;line-height:1.3}
.hud-bar{width:38px;height:2px;border-radius:1px;background:rgba(255,255,255,.06);margin-top:4px;overflow:hidden}
.hud-fill{height:100%;border-radius:1px;animation:hFill 4s ease-in-out infinite}
@keyframes hFill{0%,100%{width:52%}50%{width:90%}}

/* HERO */
.world-hero{position:relative;z-index:10;text-align:center;padding:24px 16px 16px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 16px;border-radius:999px;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:rgba(var(--ar),.06);border:1px solid rgba(var(--ar),.16);color:var(--a);margin-bottom:12px;
  box-shadow:0 0 24px rgba(var(--ar),.07),inset 0 0 12px rgba(var(--ar),.04)}
.hero-badge .bdot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:bpulse 2s ease-in-out infinite}
@keyframes bpulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.hero-icon{font-size:3.8rem;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(var(--ar),.5));animation:hfloat 4s ease-in-out infinite}
@keyframes hfloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(10deg)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.55rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;
  color:#fff;margin:4px 0;text-shadow:0 0 40px rgba(var(--ar),.4),0 2px 4px rgba(0,0,0,.7)}
.hero-sub{color:#2a4055;font-size:12px;font-family:'Share Tech Mono',monospace;letter-spacing:2px}

/* ═══ ENERGY PATH SYSTEM ═══ */
.map-wrap{max-width:440px;margin:0 auto;padding:0 12px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-glow-done{stroke:rgba(var(--ar),.12);stroke-width:14;fill:none;stroke-linecap:round;filter:blur(4px)}
.path-glow-active{stroke:rgba(var(--ar),.18);stroke-width:16;fill:none;stroke-linecap:round;filter:blur(5px);animation:glowPulse 2s ease-in-out infinite}
.path-done{stroke:var(--a);stroke-width:2.5;fill:none;filter:drop-shadow(0 0 4px rgba(var(--ar),.6));stroke-linecap:round}
.path-active{stroke:var(--a);stroke-width:3;fill:none;filter:drop-shadow(0 0 8px rgba(var(--ar),.8));stroke-linecap:round;stroke-dasharray:12 8;animation:dashAnim .8s linear infinite}
.path-locked{stroke:rgba(255,255,255,.03);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-dasharray:4 6}
@keyframes dashAnim{to{stroke-dashoffset:-40}}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* ═══ HEXAGONAL NODE SYSTEM ═══ */
.node{position:absolute;z-index:15;cursor:pointer;transition:transform .25s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.node:active{transform:translate(-50%,-50%) scale(.88)!important}
.node.locked{cursor:not-allowed}.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}

/* Hex clip-path (flat-top) */
.hex-clip{clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}

/* Hex node structure: outer glow border → inner face → content */
.hex-node{position:relative;width:70px;height:64px;display:flex;align-items:center;justify-content:center;font-size:1.45rem}
.hex-node::before{content:'';position:absolute;inset:-2.5px;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}
.hex-node::after{content:'';position:absolute;inset:0;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}
.hex-node>*{position:relative;z-index:2}

/* Done hex — steel with gold neon edge */
.hex-done{filter:drop-shadow(0 0 5px rgba(var(--goldr),.25)) drop-shadow(0 0 12px rgba(var(--goldr),.08))}
.hex-done::before{background:linear-gradient(180deg,rgba(var(--goldr),.55),rgba(var(--goldr),.2))}
.hex-done::after{background:linear-gradient(170deg,#192838,#0d1a26 60%,#081018)}

/* Active hex — PROTAGONIST — intense neon glow */
.hex-active{filter:drop-shadow(0 0 14px rgba(var(--ar),.65)) drop-shadow(0 0 40px rgba(var(--ar),.18));animation:hexPulse 2.2s ease-in-out infinite}
.hex-active::before{background:linear-gradient(180deg,var(--a),var(--ad) 80%)}
.hex-active::after{background:radial-gradient(ellipse at 50% 30%,#3a1800,#1a0a00 60%,#0c0400)}
@keyframes hexPulse{0%,100%{filter:drop-shadow(0 0 10px rgba(var(--ar),.45)) drop-shadow(0 0 30px rgba(var(--ar),.12))}
  50%{filter:drop-shadow(0 0 20px rgba(var(--ar),.85)) drop-shadow(0 0 55px rgba(var(--ar),.25))}}

/* Active hex scan ring */
.hex-scan{position:absolute;inset:-10px;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
  border:1.5px solid rgba(var(--ar),.2);animation:hexScan 3s linear infinite;pointer-events:none}
.hex-scan::after{content:'';position:absolute;top:-2px;left:50%;width:6px;height:6px;border-radius:50%;
  background:var(--a);box-shadow:0 0 8px var(--a);transform:translateX(-50%)}
@keyframes hexScan{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Locked hex — dark dormant */
.hex-locked{filter:drop-shadow(0 0 1px rgba(255,255,255,.02))}
.hex-locked::before{background:rgba(255,255,255,.04)}
.hex-locked::after{background:linear-gradient(170deg,#0e1520,#0a0e16 60%,#060a10)}

/* Boss hex — larger */
.node-boss .hex-node{width:86px;height:78px;font-size:1.75rem}
.boss-tag{position:absolute;top:-6px;right:-6px;font-size:7px;font-weight:900;font-family:'Orbitron',sans-serif;
  border-radius:3px;padding:2px 7px;z-index:20;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0c0400;
  box-shadow:0 0 12px rgba(var(--ar),.4),0 0 3px rgba(var(--ar),.8)}
.boss-tag.locked{background:#0d1a28;color:#1e2d3e;box-shadow:none}

/* Hex connector line below node */
.hex-tick{width:2px;height:8px;margin:4px auto 0;background:linear-gradient(180deg,rgba(var(--ar),.25),transparent);border-radius:1px}
.node.locked .hex-tick{background:linear-gradient(180deg,rgba(255,255,255,.04),transparent)}

.node-lbl{text-align:center;margin-top:4px;font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
.node-lbl.lbl-done{color:rgba(var(--goldr),.55)}.node-lbl.lbl-active{color:var(--a)}.node-lbl.lbl-locked{color:rgba(255,255,255,.08)}
.node-stars{text-align:center;font-size:9px;margin-top:1px}
.star-on{color:var(--gold)}.star-off{color:#1a2d40}

/* QUEST BOX */
.quest-box{border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(var(--ar),.04),rgba(var(--ar),.01));
  border:1px solid rgba(var(--ar),.11);
  box-shadow:0 0 30px rgba(var(--ar),.03),inset 0 1px 0 rgba(var(--ar),.06);
  backdrop-filter:blur(8px)}
.quest-icon{flex-shrink:0;font-size:1.4rem;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:rgba(var(--ar),.05);border:1px solid rgba(var(--ar),.11);animation:aPulse 2s ease-in-out infinite}
.quest-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(var(--ar),.4);text-transform:uppercase;letter-spacing:3px}
.quest-title{font-size:13px;color:#bbc;font-weight:700}
.quest-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:9px;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0c0400;
  box-shadow:0 0 16px rgba(var(--ar),.28);transition:all .2s}
.quest-btn:hover{transform:scale(1.05);box-shadow:0 0 28px rgba(var(--ar),.5)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.modal-box{background:linear-gradient(135deg,#160800,#0d0500,#160800);
  border:1px solid rgba(var(--ar),.16);border-radius:22px;padding:26px;max-width:400px;width:calc(100% - 2rem);
  box-shadow:0 0 80px rgba(var(--ar),.05),0 30px 60px rgba(0,0,0,.75),inset 0 1px 0 rgba(var(--ar),.07)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(var(--ar),.16);background:rgba(4,8,16,.92);color:var(--a);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.3)}
.mu-btn.off{color:#1a2d40;border-color:#0d1e30}
header{border-image:linear-gradient(90deg,transparent,rgba(var(--ar),.2),transparent) 1}

@media(max-width:374px){.hex-node{width:56px;height:51px;font-size:1.05rem}.node-boss .hex-node{width:68px;height:62px}.node-lbl{font-size:7px}.map-wrap{max-width:340px}.hero-title{font-size:1.25rem}}
@media(min-width:375px) and (max-width:480px){.hex-node{width:62px;height:57px;font-size:1.2rem}.node-boss .hex-node{width:76px;height:69px}}
@media(min-width:769px){.map-wrap{max-width:500px}.hex-node{width:76px;height:69px;font-size:1.6rem}.node-boss .hex-node{width:94px;height:86px;font-size:2rem}.hero-title{font-size:2rem}}
@media(hover:none){.node:active{transform:translate(-50%,-50%) scale(.9)!important}}

/* ═══ TOWER SYSTEM ═══ */
.tower-ind{position:fixed;bottom:20px;left:10px;z-index:55;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.tower-segs{display:flex;flex-direction:column;gap:2px}
.tower-seg{width:4px;height:8px;border-radius:1px;background:rgba(255,255,255,.04);transition:background .3s}
.tower-seg.below{background:rgba(var(--ar),.14)}
.tower-seg.cur{background:var(--a);box-shadow:0 0 6px rgba(var(--ar),.5);animation:tPulse 2.5s ease-in-out infinite}
@keyframes tPulse{0%,100%{box-shadow:0 0 4px rgba(var(--ar),.3)}50%{box-shadow:0 0 12px rgba(var(--ar),.8)}}
.tower-num{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;color:var(--a);line-height:1}
.tower-lbl{font-family:'Share Tech Mono',monospace;font-size:6px;letter-spacing:1.5px;color:rgba(var(--ar),.3)}

.lava-glow{position:fixed;bottom:0;left:0;right:0;height:28%;z-index:1;pointer-events:none;
  background:linear-gradient(to top,rgba(255,50,0,.06),rgba(255,106,0,.015) 50%,transparent)}
.lava-glow::before{content:'';position:absolute;bottom:0;left:15%;right:15%;height:3px;border-radius:50%;
  background:rgba(255,70,0,.2);filter:blur(8px);animation:lBr 4s ease-in-out infinite}
@keyframes lBr{0%,100%{opacity:.3;transform:scaleX(.85)}50%{opacity:.8;transform:scaleX(1.15)}}

/* Entrance animation */
body.entering .world-base,body.entering #worldScene,body.entering #fxC,body.entering .lava-glow,
body.entering header,body.entering main,body.entering .hud-panel,body.entering .tower-ind,body.entering .scan{opacity:0!important}
@keyframes twIn{from{opacity:0}to{opacity:1}}
@keyframes twUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes twDn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
body.entered .world-base,body.entered #worldScene,body.entered #fxC,body.entered .lava-glow,body.entered .scan{animation:twIn .9s ease-out both}
body.entered header{animation:twDn .55s ease-out .12s both}
body.entered main{animation:twUp .65s ease-out .22s both}
body.entered .hud-panel{animation:twIn .5s ease-out .38s both}
body.entered .tower-ind{animation:twIn .5s ease-out .5s both}
.entr-flash{position:fixed;inset:0;z-index:999;pointer-events:none}
.entr-flash.go{animation:eF .55s ease-out both}
@keyframes eF{from{opacity:1;background:rgba(var(--ar),.12)}to{opacity:0;background:rgba(var(--ar),0)}}

/* Exit transition */
.exit-ov{position:fixed;inset:0;z-index:998;pointer-events:none;opacity:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(var(--ar),.03),rgba(0,0,0,.98) 70%);transition:opacity .45s ease-in}
.exit-ov.go{opacity:1}
body.exiting .world-base,body.exiting #worldScene,body.exiting #fxC,body.exiting .scan,
body.exiting header,body.exiting main,body.exiting .hud-panel,
body.exiting .tower-ind,body.exiting .lava-glow{transition:all .4s ease-in!important;transform:scale(.96);opacity:.12!important;filter:blur(1.5px)}
/* ── TOWER ENTRY/EXIT OVERLAY ── */
#tower-entry{position:fixed;inset:0;z-index:195;display:flex;align-items:center;justify-content:center;background:#000;pointer-events:none;opacity:1;transition:opacity .5s ease}
#tower-entry.done{opacity:0}
#tower-entry svg{width:80px;height:280px;opacity:.25}
#tower-entry .te-seg{fill:rgba(255,255,255,.04);transition:all .3s ease}
#tower-entry .te-seg.lit{fill:rgba(var(--ar),.25);filter:drop-shadow(0 0 6px rgba(var(--ar),.4))}
#tower-entry .te-seg.target{fill:rgba(var(--ar),.6);filter:drop-shadow(0 0 14px rgba(var(--ar),.7)) drop-shadow(0 0 28px rgba(var(--ar),.3));animation:tePulse .8s ease-in-out infinite}
@keyframes tePulse{0%,100%{opacity:.8}50%{opacity:1}}
#tower-entry .te-line{stroke:var(--a);stroke-width:2;fill:none;stroke-dasharray:4 3;transition:all .6s cubic-bezier(.4,0,.2,1)}
.te-floor-label{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:clamp(12px,3vw,18px);font-weight:900;color:var(--a);letter-spacing:4px;text-transform:uppercase;opacity:0;transition:opacity .4s ease .3s;text-shadow:0 0 20px rgba(var(--ar),.5)}
#tower-entry.zooming .te-floor-label{opacity:1}
#tower-entry.zooming{transform:scale(4);transition:transform 1s cubic-bezier(.4,0,.2,1),opacity .4s ease .8s}
#tower-entry.zooming.done{opacity:0}
</style>
</head>

<!-- HUD PANELS -->

</div>

<!-- HEADER -->
<header class="border-b border-white/5 bg-black/75 backdrop-blur-xl sticky top-0 z-[60]">
<div class="flex items-center justify-between px-4 md:px-8 py-3">
  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded-xl font-black text-xs uppercase tracking-widest transition hover:scale-105" style="background:rgba(var(--ar),.06);border:1px solid rgba(var(--ar),.16);color:var(--a)">

// ═══════════════════════════════════════════════
// MECHANICAL WORLD SCENE BUILDER

var sceneGears=[];
var pistonRod=null,pistonBaseY=0,pistonOffset=0,pistonDir=1,pistonAmp=38,pistonSpd=0.55;
var conduitLines=[];

function nsv(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag)}
function rnd(n){return Math.round(n*10)/10}

// True toothed gear outline path
function gearPath(cx,cy,R,r,hR,teeth){
  var s=Math.PI*2/teeth,tw=s*0.42,d='';
  for(var i=0;i<teeth;i++){
    var a=i*s,a0=a-tw/2,a1=a+tw/2,a2=(i+1)*s-tw/2;
    if(i===0)d+='M'+rnd(cx+r*Math.cos(a0))+','+rnd(cy+r*Math.sin(a0));
    else d+='L'+rnd(cx+r*Math.cos(a0))+','+rnd(cy+r*Math.sin(a0));
    d+='L'+rnd(cx+R*Math.cos(a0))+','+rnd(cy+R*Math.sin(a0));
    d+='A'+R+','+R+',0,0,1,'+rnd(cx+R*Math.cos(a1))+','+rnd(cy+R*Math.sin(a1));
    d+='L'+rnd(cx+r*Math.cos(a1))+','+rnd(cy+r*Math.sin(a1));
    if(i<teeth-1)d+='A'+r+','+r+',0,0,1,'+rnd(cx+r*Math.cos(a2))+','+rnd(cy+r*Math.sin(a2))}
  d+='Z';
  if(hR>0){
    d+=' M'+rnd(cx+hR)+','+rnd(cy);
    d+='A'+hR+','+hR+',0,1,0,'+rnd(cx-hR)+','+rnd(cy);
    d+='A'+hR+','+hR+',0,1,0,'+rnd(cx+hR)+','+rnd(cy)+'Z'}
  return d}

function makeGear(svg,cx,cy,R,r,hR,teeth,strokeCol,fillCol,opacity,rpm,dir){
  var g=nsv('g');
  var p=nsv('path');
  p.setAttribute('d',gearPath(cx,cy,R,r,hR,teeth));
  p.setAttribute('fill',fillCol);p.setAttribute('stroke',strokeCol);
  p.setAttribute('stroke-width','1.2');p.setAttribute('fill-rule','evenodd');
  p.setAttribute('opacity',opacity);g.appendChild(p);
  // Spokes
  var ns2=6;
  for(var i=0;i<ns2;i++){
    var a=(i/ns2)*Math.PI*2;
    var sp=nsv('line');
    sp.setAttribute('x1',rnd(cx+(hR+5)*Math.cos(a)));sp.setAttribute('y1',rnd(cy+(hR+5)*Math.sin(a)));
    sp.setAttribute('x2',rnd(cx+(r-10)*Math.cos(a)));sp.setAttribute('y2',rnd(cy+(r-10)*Math.sin(a)));
    sp.setAttribute('stroke',strokeCol);sp.setAttribute('stroke-width','1.5');
    sp.setAttribute('opacity',opacity);g.appendChild(sp)}
  // Hub ring
  var hub=nsv('circle');hub.setAttribute('cx',cx);hub.setAttribute('cy',cy);hub.setAttribute('r',hR);
  hub.setAttribute('fill',fillCol);hub.setAttribute('stroke',strokeCol);hub.setAttribute('stroke-width','1.8');
  hub.setAttribute('opacity',opacity);g.appendChild(hub);
  // Hub dot
  var hdot=nsv('circle');hdot.setAttribute('cx',cx);hdot.setAttribute('cy',cy);hdot.setAttribute('r',5);
  hdot.setAttribute('fill',strokeCol);hdot.setAttribute('opacity',String(parseFloat(opacity)*0.7));
  g.appendChild(hdot);
  svg.appendChild(g);
  sceneGears.push({g:g,cx:cx,cy:cy,rpm:rpm,dir:dir,angle:Math.random()*360});
  return g}

function makePipe(svg,x1,y1,x2,y2,thick,col,op){
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return;
  var nx=-dy/len*thick/2,ny=dx/len*thick/2;
  var body=nsv('path');
  body.setAttribute('d','M'+(x1+nx)+','+(y1+ny)+' L'+(x2+nx)+','+(y2+ny)+' L'+(x2-nx)+','+(y2-ny)+' L'+(x1-nx)+','+(y1-ny)+'Z');
  body.setAttribute('fill','#110600');body.setAttribute('stroke',col);body.setAttribute('stroke-width','1');
  body.setAttribute('opacity',op);svg.appendChild(body);
  // Inner glow line
  var gl=nsv('line');gl.setAttribute('x1',x1);gl.setAttribute('y1',y1);gl.setAttribute('x2',x2);gl.setAttribute('y2',y2);
  gl.setAttribute('stroke',col);gl.setAttribute('stroke-width','1.2');gl.setAttribute('opacity',String(parseFloat(op)*0.35));
  svg.appendChild(gl);
  // End flanges
  [0,1].forEach(function(e){
    var bx=e?x2:x1,by=e?y2:y1;
    var fl=nsv('path');
    fl.setAttribute('d','M'+(bx+nx*1.4)+','+(by+ny*1.4)+' L'+(bx-nx*1.4)+','+(by-ny*1.4));
    fl.setAttribute('stroke',col);fl.setAttribute('stroke-width','3');
    fl.setAttribute('stroke-linecap','round');fl.setAttribute('opacity',op);
    svg.appendChild(fl)})}

function makeJoint(svg,cx,cy,r,col,op){
  var c=nsv('circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
  c.setAttribute('fill','#110600');c.setAttribute('stroke',col);c.setAttribute('stroke-width','2');
  c.setAttribute('opacity',op);svg.appendChild(c);
  var d=nsv('circle');d.setAttribute('cx',cx);d.setAttribute('cy',cy);d.setAttribute('r',r*0.35);
  d.setAttribute('fill',col);d.setAttribute('opacity',String(parseFloat(op)*0.55));
  svg.appendChild(d)}

function makeBeam(svg,x1,y1,x2,y2,h,col,op){
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return;
  var nx=-dy/len,ny=dx/len;
  var hh=h/2;
  // Top flange
  var t1=nsv('line');t1.setAttribute('x1',x1+nx*hh);t1.setAttribute('y1',y1+ny*hh);
  t1.setAttribute('x2',x2+nx*hh);t1.setAttribute('y2',y2+ny*hh);
  t1.setAttribute('stroke',col);t1.setAttribute('stroke-width','3');t1.setAttribute('opacity',op);svg.appendChild(t1);
  // Bottom flange
  var t2=nsv('line');t2.setAttribute('x1',x1-nx*hh);t2.setAttribute('y1',y1-ny*hh);
  t2.setAttribute('x2',x2-nx*hh);t2.setAttribute('y2',y2-ny*hh);
  t2.setAttribute('stroke',col);t2.setAttribute('stroke-width','3');t2.setAttribute('opacity',op);svg.appendChild(t2);
  // Web
  var w=nsv('line');w.setAttribute('x1',x1);w.setAttribute('y1',y1);w.setAttribute('x2',x2);w.setAttribute('y2',y2);
  w.setAttribute('stroke',col);w.setAttribute('stroke-width','1.5');w.setAttribute('opacity',String(parseFloat(op)*0.4));
  svg.appendChild(w)}

function makeRivet(svg,cx,cy,col,op){
  var c=nsv('circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',4);
  c.setAttribute('fill','#110600');c.setAttribute('stroke',col);c.setAttribute('stroke-width','1.5');
  c.setAttribute('opacity',op);svg.appendChild(c);
  var i=nsv('circle');i.setAttribute('cx',cx);i.setAttribute('cy',cy);i.setAttribute('r',1.5);
  i.setAttribute('fill',col);i.setAttribute('opacity',String(parseFloat(op)*0.65));
  svg.appendChild(i)}

function makeGauge(svg,cx,cy,r,col,op){
  var bg=nsv('circle');bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',r);
  bg.setAttribute('fill','#0e0500');bg.setAttribute('stroke',col);bg.setAttribute('stroke-width','2');
  bg.setAttribute('opacity',op);svg.appendChild(bg);
  for(var i=0;i<12;i++){
    var a=-Math.PI*0.75+(i/11)*Math.PI*1.5,isM=i%3===0;
    var t=nsv('line');
    t.setAttribute('x1',rnd(cx+(isM?r*0.55:r*0.7)*Math.cos(a)));t.setAttribute('y1',rnd(cy+(isM?r*0.55:r*0.7)*Math.sin(a)));
    t.setAttribute('x2',rnd(cx+(r-3)*Math.cos(a)));t.setAttribute('y2',rnd(cy+(r-3)*Math.sin(a)));
    t.setAttribute('stroke',col);t.setAttribute('stroke-width',isM?'1.5':'0.7');
    t.setAttribute('opacity',String(parseFloat(op)*0.65));svg.appendChild(t)}
  var na=-Math.PI*0.75+Math.PI*1.5*0.65;
  var nd2=nsv('line');nd2.setAttribute('x1',cx);nd2.setAttribute('y1',cy);
  nd2.setAttribute('x2',rnd(cx+(r-5)*Math.cos(na)));nd2.setAttribute('y2',rnd(cy+(r-5)*Math.sin(na)));
  nd2.setAttribute('stroke',col);nd2.setAttribute('stroke-width','2');nd2.setAttribute('opacity',op);
  nd2.setAttribute('stroke-linecap','round');svg.appendChild(nd2);
  var c2=nsv('circle');c2.setAttribute('cx',cx);c2.setAttribute('cy',cy);c2.setAttribute('r',3);
  c2.setAttribute('fill',col);c2.setAttribute('opacity',op);svg.appendChild(c2)}

function makeConduit(svg,pts,col,thick,op){
  var ptStr=pts.map(function(p){return p[0]+','+p[1]}).join(' ');
  // Outer glow
  var glow=nsv('polyline');glow.setAttribute('points',ptStr);
  glow.setAttribute('stroke',col);glow.setAttribute('stroke-width',thick*5);
  glow.setAttribute('fill','none');glow.setAttribute('opacity',String(parseFloat(op)*0.06));
  glow.setAttribute('stroke-linecap','round');glow.setAttribute('stroke-linejoin','round');
  svg.appendChild(glow);
  // Main flow line
  var line=nsv('polyline');line.setAttribute('points',ptStr);
  line.setAttribute('stroke',col);line.setAttribute('stroke-width',thick);
  line.setAttribute('fill','none');line.setAttribute('opacity',op);
  line.setAttribute('stroke-linecap','round');line.setAttribute('stroke-linejoin','round');
  line.setAttribute('stroke-dasharray','22 14');
  conduitLines.push(line);svg.appendChild(line);
  return line}

function buildScene(){
  var svg=document.getElementById('worldScene');
  svg.innerHTML='';sceneGears=[];conduitLines=[];pistonRod=null;
  var W=window.innerWidth,H=window.innerHeight;
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('width',W);svg.setAttribute('height',H);

  var vd=vbuf.getChannelData(0);for(var i=0;i<vd.length;i++)vd[i]=(Math.random()*2-1);
  var vs=actx.createBufferSource();vs.buffer=vbuf;vs.loop=true;
  var vhp=actx.createBiquadFilter(),vlp=actx.createBiquadFilter(),vg=actx.createGain();
  vhp.type='highpass';vhp.frequency.value=1600;
  vlp.type='lowpass';vlp.frequency.value=6000;
  vg.gain.value=.24;
  vs.connect(vhp);vhp.connect(vlp);vlp.connect(vg);vg.connect(ambG);vs.start();
  var vplfo=actx.createOscillator(),vplg=actx.createGain();
  vplfo.type='sine';vplfo.frequency.value=.08;vplg.gain.value=.16;
  vplfo.connect(vplg);vplg.connect(vg.gain);vplfo.start();

  // ── 5. CONDUCTOS DE ENERGÍA — buzz eléctrico 60/120/180 Hz ─────
  // Las líneas de energía naranja que fluyen por el canvas
  // generan el zumbido eléctrico característico de alto voltaje
  [60,120,180].forEach(function(f,i){
    var o=actx.createOscillator(),g=actx.createGain(),bp=actx.createBiquadFilter();
    o.type='sawtooth';o.frequency.value=f;
    bp.type='bandpass';bp.frequency.value=f;bp.Q.value=18;
    g.gain.value=[.18,.10,.06][i];
    o.connect(bp);bp.connect(g);g.connect(ambG);o.start();
  });
}

    else nx.classList.add('hidden');
  }else if(s==='active'){b.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--a);animation:aPulse 1s infinite;margin-right:4px"></span> EN PROGRESO';
    b.style.cssText='background:rgba(var(--ar),.08);color:var(--a);border:1px solid rgba(var(--ar),.2)';document.getElementById('m-stars').textContent='⭐⭐⭐';
    c.textContent='▶ INICIAR';c.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0c0400;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';
    c.onclick=function(){location.href='leccion.html?world=1&level='+n};nx.classList.add('hidden');
  }else{b.textContent='🔒 BLOQUEADO';b.style.cssText='background:rgba(107,114,128,.08);color:#6b7280;border:1px solid rgba(107,114,128,.15)';
    document.getElementById('m-stars').textContent='☆☆☆';c.style.display='none';nx.classList.add('hidden')}
  document.getElementById('m-title').textContent='Nivel '+n+': '+t;document.getElementById('m-desc').textContent=d;document.getElementById('m-xp').textContent='+'+xp+' XP';
  document.getElementById('modal').classList.remove('hidden')}
function closeM(){document.getElementById('modal').classList.add('hidden');document.getElementById('m-cta').style.display=''}
</script>
