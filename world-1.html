<style>
:root{--a:#ff6a00;--ad:#cc4400;--ar:255,106,0}
*{box-sizing:border-box}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2236;border-radius:2px}
body{background:#0c0604;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ŌĢÉŌĢÉŌĢÉ ATMOSPHERE ŌĆö FORGE ŌĢÉŌĢÉŌĢÉ */
.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,#1a0800 0%,#0c0604 20%,#120804 50%,#1a0a00 80%,#0c0604 100%)}
.atmo::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 95%,rgba(255,80,0,.1),transparent 60%)}
.atmo::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(255,106,0,.04),transparent 40%),
             radial-gradient(circle at 80% 60%,rgba(204,68,0,.05),transparent 40%)}
#fxC{position:fixed;inset:0;z-index:1;pointer-events:none}
.scan{position:fixed;inset:0;z-index:80;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.01) 3px,rgba(0,0,0,.01) 4px)}

/* ŌĢÉŌĢÉŌĢÉ FORGE DECORATIONS ŌĢÉŌĢÉŌĢÉ */
.world-deco{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.forge-glow{position:absolute;bottom:-20%;left:10%;width:80%;height:40%;
  background:radial-gradient(ellipse at center,rgba(255,80,0,.06),transparent 70%);
  animation:forgeBreath 4s ease-in-out infinite}
@keyframes forgeBreath{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

/* Animated gears */
.gear-deco{position:absolute;opacity:.04;animation:gearSpin 30s linear infinite}
.gear-1{top:8%;right:-3%;width:220px;height:220px}
.gear-2{bottom:15%;left:-4%;width:160px;height:160px;animation-direction:reverse;animation-duration:22s}
.gear-3{top:45%;right:3%;width:100px;height:100px;opacity:.025;animation-duration:18s}
@keyframes gearSpin{to{transform:rotate(360deg)}}

/* Industrial pipes */
.pipe-left,.pipe-right{position:fixed;top:0;width:4px;height:100%;z-index:3;pointer-events:none}
.pipe-left{left:6px;background:linear-gradient(180deg,transparent,rgba(var(--ar),.12) 15%,rgba(var(--ar),.08) 50%,rgba(var(--ar),.12) 85%,transparent)}
.pipe-right{right:6px;background:linear-gradient(180deg,transparent,rgba(var(--ar),.12) 15%,rgba(var(--ar),.08) 50%,rgba(var(--ar),.12) 85%,transparent)}
.pipe-left::before,.pipe-right::before,.pipe-left::after,.pipe-right::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;left:-3px;
  background:rgba(var(--ar),.25);box-shadow:0 0 12px rgba(var(--ar),.3)}
.pipe-left::before{top:20%}.pipe-left::after{top:70%}.pipe-right::before{top:40%}.pipe-right::after{top:85%}

/* Molten metal drip */
.drip{position:fixed;z-index:4;pointer-events:none;width:3px;background:linear-gradient(180deg,rgba(var(--ar),.6),rgba(var(--ar),.1),transparent);border-radius:0 0 2px 2px;animation:dripDown 6s ease-in infinite}
.drip-1{left:6px;top:20%;height:40px;animation-delay:0s}
.drip-2{right:6px;top:40%;height:30px;animation-delay:3s}
@keyframes dripDown{0%{opacity:0;transform:translateY(-10px)}10%{opacity:1}80%{opacity:.5}100%{opacity:0;transform:translateY(80px)}}

/* Lava cracks */
.lava-crack{position:fixed;z-index:2;pointer-events:none;opacity:.06}
.lava-crack svg{width:100%;height:100%}
.lc-1{bottom:0;left:5%;width:200px;height:100px}
.lc-2{bottom:0;right:10%;width:150px;height:80px}

/* ŌĢÉŌĢÉŌĢÉ HERO SECTION ŌĢÉŌĢÉŌĢÉ */
.world-hero{position:relative;z-index:10;text-align:center;padding:24px 16px 16px;overflow:hidden}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 16px;border-radius:999px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:rgba(var(--ar),.08);border:1px solid rgba(var(--ar),.2);color:var(--a);margin-bottom:12px;
  box-shadow:0 0 20px rgba(var(--ar),.1),inset 0 0 15px rgba(var(--ar),.05)}
.hero-badge .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.hero-icon{font-size:4rem;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(var(--ar),.4));animation:heroFloat 3s ease-in-out infinite}
@keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#fff;margin:4px 0;text-shadow:0 0 30px rgba(var(--ar),.3),0 2px 4px rgba(0,0,0,.5)}
.hero-sub{color:#777;font-size:13px;font-family:'Share Tech Mono',monospace}

/* Floating forge panel */
.forge-panel{position:fixed;z-index:5;pointer-events:none}
.fp-temp{top:18%;right:12px;padding:8px 12px;border-radius:12px;background:rgba(12,6,4,.85);border:1px solid rgba(var(--ar),.15);backdrop-filter:blur(4px)}
.fp-temp .fp-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--ar),.5);text-transform:uppercase;letter-spacing:2px}
.fp-temp .fp-value{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--a);text-shadow:0 0 10px rgba(var(--ar),.3)}
.fp-temp .fp-bar{width:40px;height:3px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:4px;overflow:hidden}
.fp-temp .fp-bar-fill{height:100%;width:65%;background:linear-gradient(90deg,var(--ad),var(--a));border-radius:2px;animation:barPulse 3s ease-in-out infinite}
@keyframes barPulse{0%,100%{width:55%}50%{width:80%}}

.fp-anvil{bottom:25%;left:12px;padding:8px 12px;border-radius:12px;background:rgba(12,6,4,.85);border:1px solid rgba(var(--ar),.12);backdrop-filter:blur(4px)}
.fp-anvil .fp-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--ar),.4);text-transform:uppercase;letter-spacing:2px}
.fp-anvil .fp-value{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:rgba(var(--ar),.7)}

/* ŌĢÉŌĢÉŌĢÉ CANDY CRUSH PATH ŌĢÉŌĢÉŌĢÉ */
.map-wrap{max-width:440px;margin:0 auto;padding:0 12px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.path-done{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 6px rgba(var(--ar),.4));stroke-linecap:round}
.path-active{stroke:var(--a);stroke-width:4;fill:none;filter:drop-shadow(0 0 8px rgba(var(--ar),.5));stroke-linecap:round;stroke-dasharray:10 6;animation:dashAnim 1s linear infinite}
.path-locked{stroke:rgba(255,255,255,.06);stroke-width:3;fill:none;stroke-linecap:round}
@keyframes dashAnim{to{stroke-dashoffset:-32}}

/* ŌĢÉŌĢÉŌĢÉ NODE ŌĢÉŌĢÉŌĢÉ */
.node{position:absolute;z-index:15;cursor:pointer;transition:transform .25s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.node:active{transform:translate(-50%,-50%) scale(.9)!important}
.node.locked{cursor:not-allowed;filter:saturate(.2) brightness(.5)}
.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}
.node-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative;transition:all .3s;box-shadow:0 4px 15px rgba(0,0,0,.4)}

.nc-done{background:radial-gradient(circle at 35% 35%,#ffaa44,rgba(var(--ar),.8) 50%,#8b4513);border:3px solid rgba(var(--ar),.7);
  box-shadow:0 0 20px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,200,100,.3)}
.nc-done::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.3),transparent 60%);pointer-events:none}

.nc-active{background:radial-gradient(circle at 35% 35%,#ff8833,rgba(var(--ar),.6) 50%,#661a00);border:3px solid var(--a);
  animation:activePulse 2s ease-in-out infinite;
  box-shadow:0 0 30px rgba(var(--ar),.6),0 0 60px rgba(var(--ar),.15),0 4px 15px rgba(0,0,0,.4),inset 0 -3px 6px rgba(0,0,0,.3)}
.nc-active::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.35),transparent 60%);pointer-events:none}
@keyframes activePulse{0%,100%{box-shadow:0 0 30px rgba(var(--ar),.5),0 4px 15px rgba(0,0,0,.4);transform:scale(1)}50%{box-shadow:0 0 50px rgba(var(--ar),.7),0 0 80px rgba(var(--ar),.2);transform:scale(1.08)}}

.nc-locked{background:radial-gradient(circle at 35% 35%,#2a2520,#1a1510 60%,#0d0a06);border:3px solid #2a2218;
  box-shadow:0 4px 15px rgba(0,0,0,.6),inset 0 -3px 6px rgba(0,0,0,.4)}

.node-boss .node-circle{width:78px;height:78px;font-size:1.8rem}
.boss-tag{position:absolute;top:-6px;right:-6px;font-size:8px;font-weight:900;font-family:'Orbitron',sans-serif;border-radius:999px;padding:2px 8px;z-index:20;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;box-shadow:0 0 12px rgba(var(--ar),.4)}
.boss-tag.locked{background:#1f2530;color:#555;box-shadow:none}

.node-lbl{text-align:center;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.node-lbl.lbl-done{color:rgba(var(--ar),.7)}.node-lbl.lbl-active{color:var(--a)}.node-lbl.lbl-locked{color:#333}
.node-stars{text-align:center;font-size:10px;margin-top:2px}
.star-on{color:#fbbf24}.star-off{color:#333}

/* ŌĢÉŌĢÉŌĢÉ QUEST BOX ŌĆö FORGE STYLE ŌĢÉŌĢÉŌĢÉ */
.quest-box{border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(var(--ar),.06),rgba(var(--ar),.02));
  border:1px solid rgba(var(--ar),.15);
  box-shadow:0 0 30px rgba(var(--ar),.05),inset 0 1px 0 rgba(var(--ar),.08);
  backdrop-filter:blur(8px)}
.quest-box .quest-icon{font-size:1.5rem;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:rgba(var(--ar),.08);border:1px solid rgba(var(--ar),.15);animation:activePulse 2s ease-in-out infinite}
.quest-box .quest-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--ar),.5);text-transform:uppercase;letter-spacing:3px}
.quest-box .quest-title{font-size:13px;color:#ddd;font-weight:700}
.quest-box .quest-btn{padding:8px 16px;border-radius:12px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:10px;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;
  box-shadow:0 0 15px rgba(var(--ar),.3);transition:all .2s}
.quest-box .quest-btn:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(var(--ar),.5)}

/* ŌĢÉŌĢÉŌĢÉ MODAL ŌĢÉŌĢÉŌĢÉ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-box{background:linear-gradient(135deg,#1a0e04,#0d0806,#1a0e04);border:1px solid rgba(var(--ar),.25);border-radius:24px;padding:28px;max-width:400px;width:calc(100% - 2rem);
  box-shadow:0 0 80px rgba(var(--ar),.08),0 25px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(var(--ar),.1)}

.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--ar),.2);background:rgba(12,6,4,.9);color:var(--a);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.3)}
.mu-btn.off{color:#444;border-color:#1f2530}

header{border-image:linear-gradient(90deg,transparent,rgba(var(--ar),.3),transparent) 1}

@media(max-width:374px){.node-circle{width:52px;height:52px;font-size:1.15rem}.node-boss .node-circle{width:64px;height:64px}.node-lbl{font-size:8px}.map-wrap{max-width:340px}.hero-title{font-size:1.3rem}}
@media(min-width:375px) and (max-width:480px){.node-circle{width:58px;height:58px;font-size:1.3rem}.node-boss .node-circle{width:70px;height:70px}}
@media(min-width:769px){.map-wrap{max-width:500px}.node-circle{width:70px;height:70px;font-size:1.6rem}.node-boss .node-circle{width:86px;height:86px;font-size:2rem}.hero-title{font-size:2rem}}
@media(hover:none){.node:active{transform:translate(-50%,-50%) scale(.92)!important}}
</style>
</head>

<script>
var A='#ff6a00',AR='255,106,0',WN=1;

var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);
  [0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    o.type=i<2?'sine':'triangle';o.frequency.value=55*Math.pow(2,s/12);f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;
    o.connect(f);f.connect(g);g.connect(mg);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});
  var sc=[0,3,5,7,10],ni=0;(function play(){if(!sOn){setTimeout(play,2000);return}var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);var fr=55*2*Math.pow(2,semi/12);var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}

function sfxL(){sfx(150,.15)}
function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}

// ŌĢÉŌĢÉŌĢÉ WORLD FX ŌĆö FORGE EMBERS + SPARKS ŌĢÉŌĢÉŌĢÉ
(function(){var cv=document.getElementById('fxC'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;
  function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
  addEventListener('resize',rs);rs();
  var em=[];for(var i=0;i<50;i++)em.push({x:0,y:0,s:0,vx:0,vy:0,l:0,m:1,r:0,g:0,d:Math.random()*200});
  function re(e){e.x=W*.05+Math.random()*W*.9;e.y=H+5;e.s=1.5+Math.random()*3;e.vx=(Math.random()-.5)*.8;e.vy=-(1.5+Math.random()*3);e.l=0;e.m=80+Math.random()*200;e.r=220+Math.random()*35|0;e.g=40+Math.random()*80|0}
  em.forEach(re);var t=0;
  function f(){t++;x.clearRect(0,0,W,H);
    em.forEach(function(e){if(t<e.d)return;e.l++;if(e.l>e.m){re(e);e.d=0;return}
      var p=e.l/e.m;e.x+=e.vx+Math.sin(e.l*.04)*.3;e.y+=e.vy*(1-p*.4);
      var a=(1-p)*(p<.1?p/.1:1)*0.7;var sz=e.s*(1-p*.5);
      x.beginPath();x.arc(e.x,e.y,sz,0,6.28);x.fillStyle='rgba('+e.r+','+e.g+',0,'+a+')';x.fill();
      x.beginPath();x.arc(e.x,e.y,sz*4,0,6.28);x.fillStyle='rgba('+e.r+','+e.g+',0,'+(a*.12)+')';x.fill()});
    if(t%30===0){var sx=W*.1+Math.random()*W*.8,sy=H*.85+Math.random()*H*.1;
      x.beginPath();x.arc(sx,sy,2,0,6.28);x.fillStyle='rgba(255,220,60,.9)';x.fill();
      x.beginPath();x.arc(sx,sy,8,0,6.28);x.fillStyle='rgba(255,180,30,.12)';x.fill()}
    requestAnimationFrame(f)}f()})();
