<style>
:root{
  --v:#a855f7; --vr:168,85,247; --vd:#7c3aed;
  --m:#e879f9; --mr:232,121,249; --mh:#d946ef;
  --b:#818cf8; --br:129,140,248;
  --w:#ffffff;
  --a:#a855f7; --ar:168,85,247; --ad:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0d001f;border-radius:2px}
html,body{height:100%;background:#04000c}
body{overflow-x:hidden;-webkit-font-smoothing:antialiased;font-family:'Rajdhani',sans-serif;color:#fff}

/* ── MASTER CANVAS (single layer for max control) ── */
#cvMaster{position:fixed;inset:0;z-index:1;pointer-events:none}
#cvLightning{position:fixed;inset:0;z-index:2;pointer-events:none}
.scanfilm{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(6,0,18,.016) 2px,rgba(6,0,18,.016) 3px)}

/* ── HUD ── */
.hud{position:fixed;z-index:7;pointer-events:none;font-family:'Share Tech Mono',monospace}
.hbox{background:rgba(4,0,12,.92);backdrop-filter:blur(16px);border-radius:8px;padding:8px 11px}
.hud-tl{top:17%;left:9px;border:1px solid rgba(var(--mr),.3)}
.hud-tr{top:22%;right:9px;border:1px solid rgba(var(--vr),.28)}
.hud-bl{bottom:27%;left:9px;border:1px solid rgba(var(--br),.25)}
.hlbl{font-size:6.5px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px;color:rgba(var(--mr),.55)}
.hlbl-v{color:rgba(var(--vr),.55)}.hlbl-b{color:rgba(var(--br),.55)}
.hval{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;line-height:1.2}
.hval-m{color:var(--m)}.hval-v{color:var(--v)}.hval-b{color:var(--b)}
.htiny{font-size:7px;opacity:.38;margin-top:2px;letter-spacing:1px}
.hbar{width:42px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:4px;overflow:hidden}
.hfill{height:100%;border-radius:1px;animation:hpulse 2.8s ease-in-out infinite}
.hfill-m{background:var(--mh);width:82%}
.hfill-v{background:var(--v);width:65%;animation-delay:.7s}
.hfill-b{background:var(--b);width:77%;animation-delay:1.4s}
@keyframes hpulse{0%,100%{opacity:.45}50%{opacity:1}}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:60;border-bottom:1px solid rgba(var(--mr),.07);background:rgba(4,0,12,.94);backdrop-filter:blur(24px)}

/* ── HERO ── */
.hero-wrap{position:relative;z-index:10;text-align:center;padding:28px 16px 14px}
.world-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 18px;border-radius:999px;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:rgba(var(--mr),.06);border:1px solid rgba(var(--mr),.22);color:var(--m);margin-bottom:14px;
  box-shadow:0 0 30px rgba(var(--mr),.08),inset 0 0 20px rgba(var(--vr),.04)}
.wbd{width:6px;height:6px;border-radius:50%;background:var(--mh);
  box-shadow:0 0 10px var(--mh),0 0 20px rgba(var(--mr),.5);animation:wbp 1.8s ease-in-out infinite}
@keyframes wbp{0%,100%{opacity:.3;transform:scale(.6)}50%{opacity:1;transform:scale(1.5)}}
.hero-icon{font-size:4rem;display:block;margin-bottom:10px;
  filter:drop-shadow(0 0 30px rgba(var(--mr),.9)) drop-shadow(0 0 70px rgba(var(--vr),.5)) drop-shadow(0 0 120px rgba(var(--mr),.2));
  animation:hfl 3.5s ease-in-out infinite}
@keyframes hfl{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.06)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;text-transform:uppercase;
  letter-spacing:2px;color:#fff;
  text-shadow:0 0 30px rgba(var(--mr),1),0 0 80px rgba(var(--vr),.6),0 0 140px rgba(var(--mr),.3),0 2px 4px rgba(0,0,0,1)}
.hero-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;
  color:rgba(var(--mr),.28);margin-top:6px}

/* ── MAP PATHS ── */
.map-wrap{max-width:440px;margin:0 auto;padding:0 14px;position:relative;z-index:10}
#pathSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:5}

/* ── HEXAGONAL NODES ── */
.hex-node{position:relative;width:70px;height:64px;display:flex;align-items:center;justify-content:center;font-size:1.45rem}
.hex-node::before{content:'';position:absolute;inset:-2.5px;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}
.hex-node::after{content:'';position:absolute;inset:0;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}
.hex-node>*{position:relative;z-index:2}
.hex-done::before{background:linear-gradient(180deg,var(--m),var(--ad) 80%)}
.hex-done::after{background:radial-gradient(ellipse at 50% 30%,#1a0a38,#0e0428 60%,#080218)}
.hex-done{filter:drop-shadow(0 0 6px rgba(var(--mr),.3))}
.hex-active{filter:drop-shadow(0 0 14px rgba(var(--mr),.65)) drop-shadow(0 0 40px rgba(var(--mr),.18));animation:hexPulse 2.2s ease-in-out infinite}
.hex-active::before{background:linear-gradient(180deg,var(--mh),var(--v) 80%)}
.hex-active::after{background:radial-gradient(ellipse at 50% 30%,#2a0848,#180428 60%,#0c0218)}
@keyframes hexPulse{0%,100%{filter:drop-shadow(0 0 14px rgba(var(--mr),.55)) drop-shadow(0 0 40px rgba(var(--mr),.15));transform:scale(1)}50%{filter:drop-shadow(0 0 28px rgba(var(--mr),.85)) drop-shadow(0 0 65px rgba(var(--mr),.28));transform:scale(1.08)}}
.hex-locked::before{background:rgba(255,255,255,.04)}
.hex-locked::after{background:radial-gradient(ellipse at 50% 30%,#0a0620,#060414 60%,#030210)}
.hex-locked{filter:saturate(.1) brightness(.35)}
.hex-scan{position:absolute;inset:-14px;border:1.5px solid rgba(var(--mr),.35);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);animation:hexScan 4s linear infinite;pointer-events:none}
@keyframes hexScan{to{transform:rotate(360deg)}}
.hex-scan::after{content:'';position:absolute;top:-3px;left:50%;width:5px;height:5px;margin-left:-2.5px;background:var(--mh);border-radius:50%;box-shadow:0 0 8px var(--mh),0 0 18px rgba(var(--mr),.8)}
.hex-tick{width:1px;height:6px;background:rgba(var(--mr),.15);margin:3px auto 0}

/* ── ENERGY PATHS ── */
.path-glow-done{stroke:rgba(var(--mr),.25);stroke-width:10;fill:none;stroke-linecap:round;filter:blur(6px)}
.path-glow-active{stroke:rgba(var(--mr),.35);stroke-width:12;fill:none;stroke-linecap:round;filter:blur(8px)}
.path-done{stroke:rgba(var(--mr),.88);stroke-width:3;fill:none;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(var(--mr),.8)) drop-shadow(0 0 14px rgba(var(--mr),.4))}
.path-active{stroke:var(--mh);stroke-width:3;fill:none;stroke-linecap:round;filter:drop-shadow(0 0 12px rgba(var(--mr),1)) drop-shadow(0 0 28px rgba(var(--mr),.6));stroke-dasharray:8 5;animation:dsh .9s linear infinite}
.path-locked{stroke:rgba(255,255,255,.05);stroke-width:2;fill:none;stroke-linecap:round}
@keyframes dsh{to{stroke-dashoffset:-26}}

.node{position:absolute;z-index:15;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.node:active{transform:translate(-50%,-50%) scale(.84)!important}
.node.locked{cursor:not-allowed}.node.locked:active{transform:translate(-50%,-50%) scale(1)!important}
.node-boss .hex-node{width:84px;height:77px;font-size:1.75rem}
.boss-tag{position:absolute;top:-10px;right:-10px;font-size:7px;font-weight:900;font-family:'Orbitron',sans-serif;border-radius:999px;padding:2px 8px;z-index:20;letter-spacing:.5px;background:linear-gradient(135deg,var(--vd),var(--mh));color:#04000c;box-shadow:0 0 18px rgba(var(--mr),.6),0 0 36px rgba(var(--mr),.2)}
.boss-tag.locked{background:#100826;color:#1e0e40;box-shadow:none}
.node-lbl{text-align:center;margin-top:4px;font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.lbl-done{color:rgba(var(--mr),.5)}.lbl-active{color:var(--mh)}.lbl-locked{color:#0e0825}
.node-stars{text-align:center;font-size:10px;margin-top:1px}
.son{color:var(--m)}.soff{color:#0a0820}

/* ── TOWER INDICATOR ── */
.tower-ind{position:fixed;bottom:20px;left:10px;z-index:65;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 5px;background:rgba(4,0,12,.85);border:1px solid rgba(var(--mr),.12);backdrop-filter:blur(8px)}
.tower-segs{display:flex;flex-direction:column;gap:2px}
.tower-seg{width:12px;height:5px;background:rgba(255,255,255,.04);transition:all .3s}
.tower-seg.lit{background:rgba(var(--mr),.3)}
.tower-seg.cur{background:var(--mh);box-shadow:0 0 8px rgba(var(--mr),.6);animation:tsCur 2s ease-in-out infinite}
@keyframes tsCur{0%,100%{opacity:.7}50%{opacity:1}}
.tower-num{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--mh);line-height:1;margin-top:4px}
.tower-lbl{font-family:'Share Tech Mono',monospace;font-size:6px;color:rgba(var(--mr),.35);letter-spacing:2px;text-transform:uppercase}

/* ── ENTRANCE / EXIT ── */
body.entering{opacity:0}body.entering *{animation-play-state:paused!important}
body.entered .hero-wrap{animation:twIn .6s ease-out both}
body.entered header{animation:twDn .5s ease-out both;animation-delay:.1s}
body.entered .map-wrap{animation:twUp .7s ease-out both;animation-delay:.25s}
body.entered #quest{animation:twUp .6s ease-out both;animation-delay:.4s}
@keyframes twIn{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
@keyframes twUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes twDn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.entr-flash{position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at 50% 40%,rgba(168,85,247,.25),transparent 70%);opacity:0;pointer-events:none;transition:opacity .4s}
.entr-flash.go{opacity:1;transition:opacity 0s;animation:flashOut .65s ease-out forwards}
@keyframes flashOut{to{opacity:0}}
.exit-ov{position:fixed;inset:0;z-index:190;background:#04000c;opacity:0;pointer-events:none;transition:opacity .4s}
.exit-ov.go{opacity:1}

/* ── QUEST ── */
.quest-box{border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(var(--vr),.06),rgba(0,0,0,.65));
  border:1px solid rgba(var(--mr),.16);backdrop-filter:blur(16px);
  box-shadow:inset 0 1px 0 rgba(var(--mr),.08),0 0 40px rgba(var(--mr),.04)}
.qico{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;background:rgba(var(--mr),.08);border:1px solid rgba(var(--mr),.18);animation:nap 2s ease-in-out infinite}
.qlbl{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(var(--mr),.38);text-transform:uppercase;letter-spacing:3px}
.qtitle{font-size:13px;color:#b080d0;font-weight:700;margin-top:1px}
.qbtn{flex-shrink:0;padding:9px 13px;border-radius:8px;font-family:'Orbitron',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-size:9px;cursor:pointer;border:none;background:linear-gradient(135deg,var(--vd),var(--mh));color:#04000c;box-shadow:0 0 24px rgba(var(--mr),.45),0 0 50px rgba(var(--vr),.15);transition:all .2s}
.qbtn:hover{transform:scale(1.07);box-shadow:0 0 40px rgba(var(--mr),.7),0 0 80px rgba(var(--vr),.25)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(18px)}
.modal-box{background:linear-gradient(145deg,#0c0028,#060014,#0c0028);border:1px solid rgba(var(--mr),.2);border-radius:22px;padding:28px;max-width:400px;width:calc(100% - 2rem);box-shadow:0 0 120px rgba(var(--mr),.06),0 0 60px rgba(var(--vr),.04),0 40px 80px rgba(0,0,0,.95),inset 0 1px 0 rgba(var(--mr),.08)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--mr),.2);background:rgba(4,0,12,.95);color:var(--m);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--mr),.4)}
.mu-btn.off{color:#0e0825;border-color:#100828}

@media(max-width:374px){.hex-node{width:56px;height:51px;font-size:1.1rem}.node-boss .hex-node{width:68px;height:62px}.node-lbl{font-size:8px}.hero-title{font-size:1.25rem}}
@media(min-width:769px){.hex-node{width:78px;height:71px;font-size:1.6rem}.node-boss .hex-node{width:94px;height:86px;font-size:2rem}.hero-title{font-size:2rem}.map-wrap{max-width:500px}}
/* ── TOWER ENTRY/EXIT OVERLAY ── */
#tower-entry{position:fixed;inset:0;z-index:195;display:flex;align-items:center;justify-content:center;background:#000;pointer-events:none;opacity:1;transition:opacity .5s ease}
#tower-entry.done{opacity:0}
#tower-entry svg{width:80px;height:280px;opacity:.25}
#tower-entry .te-seg{fill:rgba(255,255,255,.04);transition:all .3s ease}
#tower-entry .te-seg.lit{fill:rgba(var(--ar),.25);filter:drop-shadow(0 0 6px rgba(var(--ar),.4))}
#tower-entry .te-seg.target{fill:rgba(var(--ar),.6);filter:drop-shadow(0 0 14px rgba(var(--ar),.7)) drop-shadow(0 0 28px rgba(var(--ar),.3));animation:tePulse .8s ease-in-out infinite}
@keyframes tePulse{0%,100%{opacity:.8}50%{opacity:1}}
#tower-entry .te-line{stroke:var(--a);stroke-width:2;fill:none;stroke-dasharray:4 3;transition:all .6s cubic-bezier(.4,0,.2,1)}
.te-floor-label{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:clamp(12px,3vw,18px);font-weight:900;color:var(--a);letter-spacing:4px;text-transform:uppercase;opacity:0;transition:opacity .4s ease .3s;text-shadow:0 0 20px rgba(var(--ar),.5)}
#tower-entry.zooming .te-floor-label{opacity:1}
#tower-entry.zooming{transform:scale(4);transition:transform 1s cubic-bezier(.4,0,.2,1),opacity .4s ease .8s}
#tower-entry.zooming.done{opacity:0}
</style>
</head>

// ══════════════════════════════════════════════════
// MASTER CANVAS — Centro de Mando Holográfico: Sala de Control
// Pantallas holográficas con datos de mercado, consola semicircular,
// grid en perspectiva, techo abovedado y rayos de proyección
// ══════════════════════════════════════════════════
(function(){
  var cv=document.getElementById('cvMaster'),ctx=cv.getContext('2d');
  var W,H,T=0,dpr=Math.min(devicePixelRatio||1,2);
  var isMob=innerWidth<600;

  function resize(){
    W=innerWidth;H=innerHeight;
    cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    isMob=W<600;
    cdlData=genCdl(isMob?18:30);
    volData=genVol(isMob?12:20);
    tickerData=genTicker(isMob?6:10);
  }
  addEventListener('resize',resize);

  // ── Colores ──
  var VIO='rgba(168,85,247,', CYAN='rgba(34,211,238,', WHT='rgba(224,231,255,';
  var DBLU='rgba(30,58,138,', SCRN='rgba(10,5,30,';

  // ── Datos de mercado simulados ──
  function genCdl(n){var c=[],p=100+Math.random()*50;for(var i=0;i<n;i++){var o=p,d=Math.random()>0.5?1:-1,b=Math.random()*8+1,cl=o+d*b,h=Math.max(o,cl)+Math.random()*4,l=Math.min(o,cl)-Math.random()*4;c.push({o:o,h:h,l:l,c:cl,bull:cl>o});p=cl+(Math.random()-.5)*3;}return c;}
  function genVol(n){var v=[];for(var i=0;i<n;i++)v.push(0.2+Math.random()*0.8);return v;}
  function genTicker(n){var t=[];var syms=['BTC','ETH','SPX','NQ','EUR','GBP','JPY','GOLD','OIL','AAPL'];for(var i=0;i<n;i++){var pr=10+Math.random()*5e4;var ch=(Math.random()-.5)*8;t.push({sym:syms[i%syms.length],price:pr.toFixed(2),chg:ch.toFixed(2),up:ch>0});}return t;}
  var cdlData=genCdl(30),volData=genVol(20),tickerData=genTicker(10);
  // Regenerar datos periódicamente
  var regenT=0;

  // ── Pantallas holográficas (posiciones relativas) ──
  function getScreens(){
    var cx=W/2,fl=H*0.62;
    if(isMob) return[
      {x:cx-W*0.28,y:fl-H*0.38,w:W*0.56,h:H*0.26,type:'candle',label:'MERCADO'},
      {x:cx-W*0.38,y:fl-H*0.24,w:W*0.24,h:H*0.14,type:'wave',label:'PRECIO'},
      {x:cx+W*0.14,y:fl-H*0.24,w:W*0.24,h:H*0.14,type:'volume',label:'VOLUMEN'}
    ];
    return[
      {x:cx-W*0.22,y:fl-H*0.42,w:W*0.44,h:H*0.28,type:'candle',label:'MERCADO EN VIVO'},
      {x:cx-W*0.44,y:fl-H*0.30,w:W*0.18,h:H*0.18,type:'wave',label:'PRECIO RT'},
      {x:cx+W*0.26,y:fl-H*0.30,w:W*0.18,h:H*0.18,type:'volume',label:'VOLUMEN'},
      {x:cx-W*0.44,y:fl-H*0.10,w:W*0.18,h:H*0.10,type:'ticker',label:'ACTIVOS'},
      {x:cx+W*0.26,y:fl-H*0.10,w:W*0.18,h:H*0.10,type:'ticker2',label:'DATOS'}
    ];
  }

  // ── Floor grid en perspectiva ──
  function drawFloor(){
    var fl=H*0.62,vx=W/2;
    var fgr=ctx.createLinearGradient(0,fl,0,H);
    fgr.addColorStop(0,'rgba(20,0,50,0.55)');
    fgr.addColorStop(0.5,'rgba(10,0,30,0.75)');
    fgr.addColorStop(1,'rgba(2,0,8,0.9)');
    ctx.fillStyle=fgr;ctx.fillRect(0,fl,W,H-fl);
    ctx.save();
    for(var i=0;i<22;i++){
      var t=i/22,et=Math.pow(t,1.7);
      var fy=fl+(H-fl)*et;
      var fw=(fy-fl)/(H-fl)*W*0.7;
      ctx.strokeStyle=VIO+(0.03+0.06*t)+')';ctx.lineWidth=0.6;
      ctx.beginPath();ctx.moveTo(vx-fw,fy);ctx.lineTo(vx+fw,fy);ctx.stroke();
    }
    for(var i=0;i<=20;i++){
      var bx=W*0.02+i*(W*0.96/20);
      ctx.strokeStyle=VIO+'0.025)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(bx,H);ctx.lineTo(vx,fl);ctx.stroke();
    }
    ctx.restore();
    // Horizon glow
    ctx.shadowColor='rgba(168,85,247,0.8)';ctx.shadowBlur=20;
    ctx.strokeStyle=VIO+'0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,fl);ctx.lineTo(W,fl);ctx.stroke();
    ctx.shadowBlur=0;
  }

  // ── Techo abovedado ──
  function drawCeiling(){
    var vx=W/2,fl=H*0.62;
    ctx.save();
    // Arcos del techo
    for(var a=0;a<5;a++){
      var ay=H*0.02+a*H*0.06;
      var aw=W*0.15+a*W*0.12;
      ctx.strokeStyle=VIO+(0.06-a*0.008)+')';ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(vx-aw,fl*0.15+ay);
      ctx.quadraticCurveTo(vx,ay-H*0.02,vx+aw,fl*0.15+ay);
      ctx.stroke();
    }
    // Grid del techo
    for(var i=0;i<=14;i++){
      var t=i/14,et=Math.pow(1-t,2.2);
      var cy2=fl*0.15*et;
      var fw=W*0.55*(1-et);
      ctx.strokeStyle='rgba(100,40,200,0.02)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(vx-fw,cy2+H*0.02);ctx.lineTo(vx+fw,cy2+H*0.02);ctx.stroke();
    }
    // Paneles laterales
    for(var s=-1;s<=1;s+=2){
      for(var p=0;p<6;p++){
        var py=H*0.08+p*H*0.08;
        var px=vx+s*(W*0.42+p*W*0.01);
        var pw=W*0.04,ph=H*0.05;
        ctx.strokeStyle=VIO+'0.04)';ctx.lineWidth=0.6;
        ctx.strokeRect(px-pw/2,py,pw,ph);
        // Luz indicadora
        var ic=Math.sin(T*0.03+p*1.2+s)>0.3?CYAN:VIO;
        ctx.fillStyle=ic+'0.15)';ctx.fillRect(px-pw/2+2,py+2,pw-4,ph-4);
      }
    }
    ctx.restore();
  }

  // ── Consola semicircular ──
  function drawConsole(){
    var cx=W/2,cy=H*0.72,rw=W*0.38,rh=H*0.06;
    ctx.save();
    // Forma semicircular
    ctx.beginPath();
    ctx.ellipse(cx,cy,rw,rh,0,Math.PI,0);
    var cgr=ctx.createLinearGradient(cx-rw,cy-rh,cx+rw,cy);
    cgr.addColorStop(0,'rgba(15,5,40,0.9)');
    cgr.addColorStop(0.5,'rgba(30,10,60,0.95)');
    cgr.addColorStop(1,'rgba(15,5,40,0.9)');
    ctx.fillStyle=cgr;ctx.fill();
    // Borde superior
    ctx.strokeStyle=VIO+'0.6)';ctx.lineWidth=1.5;
    ctx.stroke();
    // Luces en la consola
    var lc=isMob?8:16;
    for(var i=0;i<lc;i++){
      var a=Math.PI+i/(lc-1)*Math.PI;
      var lx=cx+Math.cos(a)*rw*0.85;
      var ly=cy+Math.sin(a)*rh*0.7;
      var on=Math.sin(T*0.05+i*0.8)>0;
      ctx.fillStyle=on?CYAN+'0.7)':VIO+'0.2)';
      ctx.beginPath();ctx.arc(lx,ly,isMob?1.5:2.5,0,Math.PI*2);ctx.fill();
    }
    // Barra frontal de la consola
    ctx.fillStyle='rgba(20,8,50,0.8)';
    ctx.fillRect(cx-rw*0.9,cy,rw*1.8,H*0.025);
    ctx.strokeStyle=VIO+'0.3)';ctx.lineWidth=0.8;
    ctx.strokeRect(cx-rw*0.9,cy,rw*1.8,H*0.025);
    ctx.restore();
  }

  // ── Dibujar pantalla holográfica individual ──
  function drawScreen(s){
    ctx.save();
    // Fondo de pantalla
    ctx.fillStyle=SCRN+'0.85)';
    ctx.fillRect(s.x,s.y,s.w,s.h);
    // Bordes violeta con glow
    ctx.shadowColor='rgba(168,85,247,0.6)';ctx.shadowBlur=12;
    ctx.strokeStyle=VIO+'0.7)';ctx.lineWidth=1.5;
    ctx.strokeRect(s.x,s.y,s.w,s.h);
    ctx.shadowBlur=0;
    // Esquinas brillantes
    var cs=6;
    ctx.strokeStyle=CYAN+'0.8)';ctx.lineWidth=2;
    [[s.x,s.y,1,1],[s.x+s.w,s.y,-1,1],[s.x,s.y+s.h,1,-1],[s.x+s.w,s.y+s.h,-1,-1]].forEach(function(c){
      ctx.beginPath();ctx.moveTo(c[0],c[1]+c[3]*cs);ctx.lineTo(c[0],c[1]);ctx.lineTo(c[0]+c[2]*cs,c[1]);ctx.stroke();
    });
    // Etiqueta
    ctx.font=(isMob?'8':'10')+'px Share Tech Mono';
    ctx.fillStyle=CYAN+'0.9)';
    ctx.fillText(s.label,s.x+6,s.y+12);
    // Contenido según tipo
    var pad=4,ix=s.x+pad,iy=s.y+18,iw=s.w-pad*2,ih=s.h-22;
    if(s.type==='candle') drawCandles(ix,iy,iw,ih);
    else if(s.type==='wave') drawWave(ix,iy,iw,ih);
    else if(s.type==='volume') drawVolume(ix,iy,iw,ih);
    else if(s.type==='ticker') drawTicker(ix,iy,iw,ih,0);
    else if(s.type==='ticker2') drawTicker(ix,iy,iw,ih,5);
    ctx.restore();
  }

  // ── Gráfico de velas japonesas ──
  function drawCandles(x,y,w,h){
    var d=cdlData,n=d.length;
    var mn=Infinity,mx=-Infinity;
    for(var i=0;i<n;i++){mn=Math.min(mn,d[i].l);mx=Math.max(mx,d[i].h);}
    var rng=mx-mn||1;
    var bw=w/n*0.6,gap=w/n;
    // Grid de fondo
    ctx.strokeStyle=VIO+'0.08)';ctx.lineWidth=0.5;
    for(var g=0;g<5;g++){var gy=y+g*h/4;ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x+w,gy);ctx.stroke();}
    for(var i=0;i<n;i++){
      var c=d[i],cx=x+i*gap+gap/2;
      var oY=y+h-(c.o-mn)/rng*h, cY=y+h-(c.c-mn)/rng*h;
      var hY=y+h-(c.h-mn)/rng*h, lY=y+h-(c.l-mn)/rng*h;
      var col=c.bull?'rgba(34,197,94,':'rgba(239,68,68,';
      // Mecha
      ctx.strokeStyle=col+'0.7)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(cx,hY);ctx.lineTo(cx,lY);ctx.stroke();
      // Cuerpo
      var top=Math.min(oY,cY),bod=Math.abs(oY-cY)||1;
      ctx.fillStyle=col+'0.85)';ctx.fillRect(cx-bw/2,top,bw,bod);
      ctx.strokeStyle=col+'0.5)';ctx.lineWidth=0.5;ctx.strokeRect(cx-bw/2,top,bw,bod);
    }
    // Línea de precio actual (última vela)
    var last=d[n-1];
    var lastY=y+h-(last.c-mn)/rng*h;
    ctx.setLineDash([3,3]);
    ctx.strokeStyle=CYAN+'0.6)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(x,lastY);ctx.lineTo(x+w,lastY);ctx.stroke();
    ctx.setLineDash([]);
    // Precio actual texto
    ctx.font=(isMob?'7':'9')+'px Share Tech Mono';
    ctx.fillStyle=CYAN+'0.9)';
    ctx.fillText(last.c.toFixed(2),x+w-38,lastY-3);
  }

  // ── Onda sinusoidal animada (precio en tiempo real) ──
  function drawWave(x,y,w,h){
    var cy=y+h/2,amp=h*0.35;
    // Grid
    ctx.strokeStyle=VIO+'0.06)';ctx.lineWidth=0.4;
    ctx.beginPath();ctx.moveTo(x,cy);ctx.lineTo(x+w,cy);ctx.stroke();
    // Onda principal
    ctx.beginPath();
    for(var i=0;i<=w;i++){
      var t=i/w;
      var v=Math.sin(t*6+T*0.04)*0.6+Math.sin(t*14+T*0.07)*0.25+Math.sin(t*3-T*0.02)*0.15;
      var py=cy-v*amp;
      if(i===0)ctx.moveTo(x+i,py);else ctx.lineTo(x+i,py);
    }
    ctx.strokeStyle=CYAN+'0.8)';ctx.lineWidth=1.5;ctx.stroke();
    // Glow de la onda
    ctx.shadowColor='rgba(34,211,238,0.5)';ctx.shadowBlur=8;
    ctx.stroke();ctx.shadowBlur=0;
    // Punto final animado
    var endV=Math.sin(6+T*0.04)*0.6+Math.sin(14+T*0.07)*0.25+Math.sin(3-T*0.02)*0.15;
    var endY=cy-endV*amp;
    ctx.fillStyle=CYAN+'0.9)';
    ctx.beginPath();ctx.arc(x+w,endY,3,0,Math.PI*2);ctx.fill();
  }

  // ── Barras de volumen ──
  function drawVolume(x,y,w,h){
    var d=volData,n=d.length;
    var bw=w/n*0.7,gap=w/n;
    for(var i=0;i<n;i++){
      var bh=d[i]*h*0.85;
      var bx=x+i*gap+gap*0.15;
      var by=y+h-bh;
      var pulse=Math.sin(T*0.03+i*0.5)*0.15+0.85;
      var col=i%3===0?CYAN:VIO;
      ctx.fillStyle=col+(0.4*pulse)+')';
      ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle=col+'0.6)';ctx.lineWidth=0.5;
      ctx.strokeRect(bx,by,bw,bh);
    }
  }

  // ── Ticker de precios ──
  function drawTicker(x,y,w,h,offset){
    var d=tickerData;
    var rows=Math.min(isMob?3:5,d.length-offset);
    var rh=h/rows;
    ctx.font=(isMob?'7':'9')+'px Share Tech Mono';
    for(var i=0;i<rows;i++){
      var t=d[(i+offset)%d.length];
      var ry=y+i*rh;
      // Fondo alterno
      if(i%2===0){ctx.fillStyle=VIO+'0.04)';ctx.fillRect(x,ry,w,rh);}
      // Símbolo
      ctx.fillStyle=WHT+'0.9)';ctx.fillText(t.sym,x+3,ry+rh*0.7);
      // Precio
      ctx.fillStyle=WHT+'0.6)';ctx.fillText(t.price,x+w*0.35,ry+rh*0.7);
      // Cambio
      var cc=t.up?'rgba(34,197,94,':'rgba(239,68,68,';
      ctx.fillStyle=cc+'0.9)';
      ctx.fillText((t.up?'+':'')+t.chg+'%',x+w*0.72,ry+rh*0.7);
    }
  }

  // ── Rayos de proyección (consola → pantallas) ──
  function drawBeams(){
    var cx=W/2,cy=H*0.70;
    var screens=getScreens();
    ctx.save();
    screens.forEach(function(s){
      var sx=s.x+s.w/2,sy=s.y+s.h;
      var gr=ctx.createLinearGradient(cx,cy,sx,sy);
      gr.addColorStop(0,VIO+'0.12)');
      gr.addColorStop(0.5,VIO+'0.04)');
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(cx-W*0.03,cy);
      ctx.lineTo(s.x,sy);
      ctx.lineTo(s.x+s.w,sy);
      ctx.lineTo(cx+W*0.03,cy);
      ctx.closePath();
      ctx.fillStyle=gr;ctx.fill();
    });
    ctx.restore();
  }

  // ── Atmósfera ──
  function drawAtmo(){
    var atm=[
      [W*0.5,H*0.35,W*0.9,'rgba(30,0,80,0.45)'],
      [W*0.5,H*0.3,W*0.6,'rgba(60,0,130,0.08)'],
      [W*0.3,H*0.6,W*0.4,'rgba(120,0,180,0.03)'],
      [W*0.7,H*0.2,W*0.3,'rgba(60,0,200,0.04)']
    ];
    atm.forEach(function(r){
      var g=ctx.createRadialGradient(r[0],r[1],0,r[0],r[1],r[2]);
      g.addColorStop(0,r[3]);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });
  }

  // ── Frame principal ──
  function draw(){
    T++;
    regenT++;
    // Regenerar datos cada ~5 segundos
    if(regenT>300){regenT=0;cdlData=genCdl(isMob?18:30);volData=genVol(isMob?12:20);tickerData=genTicker(isMob?6:10);}
    ctx.clearRect(0,0,W,H);
    drawAtmo();
    drawCeiling();
    drawFloor();
    drawBeams();
    var screens=getScreens();
    screens.forEach(drawScreen);
    drawConsole();
    requestAnimationFrame(draw);
  }
  resize();draw();
})();

// ══════════════════════════════════════════════════
// EFFECTS CANVAS — Partículas de datos, scan lines, glitch,
// halos holográficos y data streams
// ══════════════════════════════════════════════════
(function(){
  var cv=document.getElementById('cvLightning'),ctx=cv.getContext('2d');
  var W,H,T=0,dpr=Math.min(devicePixelRatio||1,2);
  var isMob=innerWidth<600;
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);isMob=W<600;}
  addEventListener('resize',resize);resize();

  var VIO='rgba(168,85,247,',CYAN='rgba(34,211,238,';

  // ── Pantallas (mismas posiciones que cvMaster) ──
  function getScreens(){
    var cx=W/2,fl=H*0.62;
    if(isMob) return[
      {x:cx-W*0.28,y:fl-H*0.38,w:W*0.56,h:H*0.26},
      {x:cx-W*0.38,y:fl-H*0.24,w:W*0.24,h:H*0.14},
      {x:cx+W*0.14,y:fl-H*0.24,w:W*0.24,h:H*0.14}
    ];
    return[
      {x:cx-W*0.22,y:fl-H*0.42,w:W*0.44,h:H*0.28},
      {x:cx-W*0.44,y:fl-H*0.30,w:W*0.18,h:H*0.18},
      {x:cx+W*0.26,y:fl-H*0.30,w:W*0.18,h:H*0.18},
      {x:cx-W*0.44,y:fl-H*0.10,w:W*0.18,h:H*0.10},
      {x:cx+W*0.26,y:fl-H*0.10,w:W*0.18,h:H*0.10}
    ];
  }

  // ── Partículas de datos flotantes ──
  var PCOUNT=isMob?30:60;
  var parts=[];
  function rsp(p){
    var isC=Math.random()>0.5;
    p.col=isC?CYAN:VIO;
    p.x=Math.random()*W;p.y=Math.random()*H;
    p.vx=(Math.random()-.5)*0.6;p.vy=(Math.random()-.5)*0.4;
    p.r=0.5+Math.random()*2;p.life=0;p.ml=120+Math.random()*200;
    p.sq=Math.random()>0.6; // cuadrado o círculo
    return p;
  }
  for(var i=0;i<PCOUNT;i++)parts.push(rsp({}));

  // ── Data streams (tipo matrix pero sutil, violeta) ──
  var STREAMS=isMob?6:14;
  var streams=[];
  function rss(s){
    s.x=Math.random()*W;s.y=-Math.random()*H*0.3;
    s.speed=0.5+Math.random()*1.5;s.len=3+Math.floor(Math.random()*8);
    s.chars=[];
    for(var i=0;i<s.len;i++)s.chars.push(String.fromCharCode(48+Math.floor(Math.random()*10)));
    s.alpha=0.15+Math.random()*0.25;
    return s;
  }
  for(var i=0;i<STREAMS;i++)streams.push(rss({}));

  // ── Scan line state ──
  var scanY=[];
  var screens=getScreens();
  for(var i=0;i<screens.length;i++)scanY.push(Math.random());

  // ── Glitch timer ──
  var glitchTimer=0,glitchTarget=-1,glitchIntensity=0;

  function draw(){
    T++;
    ctx.clearRect(0,0,W,H);
    var scr=getScreens();

    // ── Halos holográficos alrededor de pantallas ──
    scr.forEach(function(s){
      var cx=s.x+s.w/2,cy=s.y+s.h/2;
      var rw=s.w*0.6,rh=s.h*0.6;
      var pulse=(Math.sin(T*0.02)+1)/2*0.08+0.04;
      var hg=ctx.createRadialGradient(cx,cy,Math.min(rw,rh)*0.3,cx,cy,Math.max(rw,rh)*1.2);
      hg.addColorStop(0,VIO+pulse+')');
      hg.addColorStop(0.5,VIO+(pulse*0.4)+')');
      hg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=hg;
      ctx.fillRect(s.x-s.w*0.3,s.y-s.h*0.3,s.w*1.6,s.h*1.6);
    });

    // ── Scan lines moviéndose en cada pantalla ──
    scr.forEach(function(s,idx){
      if(idx>=scanY.length)scanY.push(0);
      scanY[idx]+=0.004+idx*0.001;
      if(scanY[idx]>1)scanY[idx]=0;
      var sy=s.y+scanY[idx]*s.h;
      var sg=ctx.createLinearGradient(s.x,sy-4,s.x,sy+4);
      sg.addColorStop(0,'rgba(0,0,0,0)');
      sg.addColorStop(0.5,VIO+'0.12)');
      sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg;
      ctx.fillRect(s.x,sy-4,s.w,8);
      // Líneas horizontales tenues (CRT effect)
      for(var l=0;l<s.h;l+=3){
        ctx.fillStyle='rgba(0,0,0,0.04)';
        ctx.fillRect(s.x,s.y+l,s.w,1);
      }
    });

    // ── Glitch aleatorio ──
    glitchTimer--;
    if(glitchTimer<=0){
      glitchTimer=60+Math.floor(Math.random()*180);
      glitchTarget=Math.floor(Math.random()*scr.length);
      glitchIntensity=0.1+Math.random()*0.2;
    }
    if(glitchTimer>glitchTimer*0.85&&glitchTarget>=0&&glitchTarget<scr.length){
      var gs=scr[glitchTarget];
      // Desplazamiento horizontal aleatorio
      for(var g=0;g<3;g++){
        var gy=gs.y+Math.random()*gs.h;
        var gh=2+Math.random()*6;
        var gx=(Math.random()-.5)*8;
        ctx.fillStyle=VIO+glitchIntensity+')';
        ctx.fillRect(gs.x+gx,gy,gs.w,gh);
      }
      // Flash blanco breve
      if(Math.random()>0.8){
        ctx.fillStyle='rgba(224,231,255,0.03)';
        ctx.fillRect(gs.x,gs.y,gs.w,gs.h);
      }
    }

    // ── Partículas de datos ──
    parts.forEach(function(p){
      p.life++;if(p.life>p.ml){rsp(p);return;}
      var pr=p.life/p.ml;
      var al=(pr<0.1?pr/0.1:pr>0.85?(1-pr)/0.15:1)*0.7;
      p.x+=p.vx+Math.sin(p.life*0.03)*0.3;
      p.y+=p.vy+Math.cos(p.life*0.025)*0.2;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.fillStyle=p.col+al+')';
      if(p.sq){ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);}
      else{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    });

    // ── Data streams (caída tipo matrix, violeta sutil) ──
    ctx.font='10px Share Tech Mono';
    streams.forEach(function(s){
      s.y+=s.speed;
      if(s.y>H+100)rss(s);
      for(var i=0;i<s.len;i++){
        var cy=s.y-i*14;
        if(cy<0||cy>H)continue;
        var fade=1-i/s.len;
        ctx.fillStyle=VIO+(s.alpha*fade)+')';
        // Cambiar carácter aleatoriamente
        if(Math.random()<0.05)s.chars[i]=String.fromCharCode(48+Math.floor(Math.random()*10));
        ctx.fillText(s.chars[i],s.x,cy);
      }
      // Cabeza brillante
      if(s.y>0&&s.y<H){
        ctx.fillStyle=CYAN+(s.alpha*1.5)+')';
        ctx.fillText(s.chars[0],s.x,s.y);
      }
    });

    // ── Conexiones entre pantallas (líneas de datos) ──
    if(!isMob&&scr.length>=3){
      for(var i=0;i<scr.length-1;i++){
        var a=scr[i],b=scr[i+1];
        var ax=a.x+a.w,ay=a.y+a.h/2;
        var bx=b.x,by=b.y+b.h/2;
        // Pulso viajero
        var pt=(T*0.01+i*0.3)%1;
        var px=ax+(bx-ax)*pt,py=ay+(by-ay)*pt;
        ctx.strokeStyle=VIO+'0.06)';ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
        ctx.fillStyle=CYAN+'0.6)';
        ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

// ══════════════════════════════════════════════════
// MAP — SYNC NODES & PATHS
// ══════════════════════════════════════════════════
var N=levels.length,MAP_W,NODE_H=110,PAD_TOP=40,nodePos=[];
function calcPositions(){
  MAP_W=document.getElementById('mapWrap').offsetWidth;nodePos=[];
  var margin=54,usable=MAP_W-margin*2;
  for(var i=0;i<N;i++){
    var row=Math.floor(i/3),col=i%3,goingRight=row%2===0;
    var xNorm=goingRight?col/2:(2-col)/2;
    var rawX=margin+xNorm*usable,wave=Math.sin(i*0.8)*usable*0.11;
    nodePos.push({x:Math.max(margin,Math.min(MAP_W-margin,rawX+wave)),y:PAD_TOP+(N-1-i)*NODE_H});}}
calcPositions();
var totalH=PAD_TOP+N*NODE_H+60;
document.getElementById('nodesLayer').style.height=totalH+'px';
document.getElementById('pathSvg').setAttribute('height',totalH);
document.getElementById('pathSvg').style.height=totalH+'px';

function drawPaths(){
  calcPositions();var svg=document.getElementById('pathSvg');svg.innerHTML='';
  var A='rgba(var(--mr),1)'.replace('var(--mr)','232,121,249');
  for(var i=0;i<N-1;i++){
    var a_=nodePos[i],b_=nodePos[i+1],sA=levels[i].s,sB=levels[i+1].s;
    var cls=(sA==='completed'&&sB==='completed')?'path-done':(sA==='completed'&&sB==='active')?'path-active':'path-locked';
    var midY=(a_.y+b_.y)/2;
    var d='M '+a_.x+' '+a_.y+' C '+a_.x+' '+midY+', '+b_.x+' '+midY+', '+b_.x+' '+b_.y;
    // Glow layer
    if(cls!=='path-locked'){
      var glow=document.createElementNS('http://www.w3.org/2000/svg','path');
      glow.setAttribute('d',d);
      glow.setAttribute('class',cls==='path-done'?'path-glow-done':'path-glow-active');
      svg.appendChild(glow);}
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);path.setAttribute('class',cls);svg.appendChild(path);
    // Animated dot for active path
    if(cls==='path-active'){
      var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('r','3');dot.setAttribute('fill','#d946ef');
      dot.setAttribute('filter','url(#dotGlow)');
      var anim=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      anim.setAttribute('dur','1.8s');anim.setAttribute('repeatCount','indefinite');
      anim.setAttribute('path',d);
      dot.appendChild(anim);svg.appendChild(dot);}}
  // SVG filter for dot glow
  if(!svg.querySelector('defs')){
    var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
    defs.innerHTML='<filter id="dotGlow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
    svg.insertBefore(defs,svg.firstChild);}}
drawPaths();
window.addEventListener('resize',function(){drawPaths();placeNodes();});

function placeNodes(){
  calcPositions();var layer=document.getElementById('nodesLayer');layer.innerHTML='';
  for(var i=0;i<N;i++){
    var lv=levels[i],p=nodePos[i],isBoss=!!lv.boss;
    var nd=document.createElement('div');
    nd.className='node'+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');
    nd.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;transform:translate(-50%,-50%)';

    var bossTag=isBoss?'<span class="'+(lv.s==='locked'?'boss-tag locked':'boss-tag')+'">'+lv.boss+'</span>':'';

placeNodes();

var actLv=levels.find(function(l){return l.s==='active'});
if(actLv){

// ══════════════════════════════════════════════════
// AUDIO — harmonic resonance, deep cinematic
// ══════════════════════════════════════════════════
var actx,mg,sOn=true;
(function(){function u(){if(actx&&actx.state==='suspended')actx.resume();var c=new(AudioContext||webkitAudioContext)();var b=c.createBuffer(1,1,22050);var s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);if(c.state==='suspended')c.resume();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();
function initA(){if(actx){if(actx.state==='suspended')actx.resume();return;}actx=new(AudioContext||webkitAudioContext)();if(actx.state==='suspended')actx.resume();mg=actx.createGain();mg.gain.value=.07;mg.connect(actx.destination);
  // Deep sub drone
  [0,7,19].forEach(function(s,i){
    var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    o.type=i===0?'sine':i===1?'sawtooth':'triangle';
    o.frequency.value=55*Math.pow(2,s/12);
    f.type='lowpass';f.frequency.value=300+i*100;f.Q.value=1.5;
    g.gain.value=.009;
    o.connect(f);f.connect(g);g.connect(mg);o.start();
    var lfo=actx.createOscillator(),lg=actx.createGain();
    lfo.type='sine';lfo.frequency.value=.035+i*.01;lg.gain.value=2;
    lfo.connect(lg);lg.connect(o.frequency);lfo.start();});
  // Melodic arpeggio (minor pentatonic feel)
  var sc=[0,3,7,10,15,19],ni=0;
  (function play(){if(!sOn){setTimeout(play,2000);return;}
    var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);
    var fr=55*2*Math.pow(2,semi/12);
    var o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';o.frequency.value=fr;
    g.gain.setValueAtTime(.013,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.8);
    o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.8);
    ni++;setTimeout(play,1600+Math.random()*1200);})();}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d);}
function sfxL(){sfx(110,.18);}
function sfxO(){[440,554,784].forEach(function(f,i){setTimeout(function(){sfx(f,.2);},i*65);});}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.07:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇';}
document.addEventListener('click',function(){initA();},{once:true});
