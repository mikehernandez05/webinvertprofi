/* ══════════════════════════════════════
   DARK ATMOSPHERIC BACKGROUND V4
   Sin formas, sin siluetas, puro ambiente
   ══════════════════════════════════════ */
body{background:#040608;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Full atmosphere - 3 zone gradient + colored glows */
.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    /* Golden warm top */
    radial-gradient(ellipse 90% 30% at 50% -5%,rgba(160,110,30,.14),rgba(120,80,20,.06) 50%,transparent 75%),
    /* Cyan tech mid */
    radial-gradient(ellipse 60% 25% at 50% 48%,rgba(0,160,200,.03),transparent 65%),
    /* Fire bottom */
    radial-gradient(ellipse 80% 25% at 50% 105%,rgba(180,50,0,.12),rgba(140,35,0,.05) 50%,transparent 75%),
    /* Main vertical gradient */
    linear-gradient(180deg,
      #12100a 0%,#0e0c08 5%,#0a0a0c 12%,
      #080a14 22%,#060a18 35%,#050a1a 48%,
      #060a18 60%,#080a14 72%,
      #0a0808 82%,#0e0804 90%,#120a04 96%,#140c02 100%)}

/* Subtle animated glow pulses */
.glow-top{position:fixed;top:-15%;left:50%;transform:translateX(-50%);width:100%;height:40%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 45% 50% at 50% 30%,rgba(200,160,60,.06),transparent 70%);
  animation:glP 5s ease-in-out infinite alternate}
.glow-bot{position:fixed;bottom:-10%;left:50%;transform:translateX(-50%);width:100%;height:35%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at 50% 70%,rgba(200,60,0,.06),transparent 70%);
  animation:glP 4s ease-in-out infinite alternate-reverse}
.glow-mid{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);width:50%;height:25%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse,rgba(167,139,250,.025),transparent 65%);
  animation:glP 6s ease-in-out infinite alternate}
@keyframes glP{0%{opacity:.4}100%{opacity:1}}

/* Vignette */
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 55% 60% at 50% 50%,transparent 15%,rgba(4,6,8,.55) 55%,rgba(2,3,5,.88) 100%)}

/* FX canvas */
#fxCanvas{position:fixed;inset:0;z-index:2;pointer-events:none;width:100%;height:100%}

/* Scanlines */
.scan{position:fixed;inset:0;z-index:70;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.012) 3px,rgba(0,0,0,.012) 4px)}

/* Particles */
.ptcl{position:fixed;border-radius:50%;pointer-events:none;z-index:3}
@keyframes ptrise{0%{opacity:0;transform:translateY(0)}10%{opacity:.6}50%{opacity:1}85%{opacity:.4}100%{opacity:0;transform:translateY(-100vh)}}
.ember{position:fixed;border-radius:50%;pointer-events:none;z-index:3;filter:blur(.5px)}
@keyframes embrise{0%{opacity:0;transform:translateY(0) scale(1)}12%{opacity:1}65%{opacity:.5}100%{opacity:0;transform:translateY(-35vh) scale(.15)}}

/* ══ LEVEL MAP ══ */
.level-node{position:relative;z-index:10;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);-webkit-tap-highlight-color:transparent}
.level-node:hover .node-btn{transform:scale(1.15)}
.level-node.locked{cursor:not-allowed;opacity:.4}
.level-node.locked:hover .node-btn{transform:none}

.node-btn{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;transition:all .3s;position:relative;border:3px solid}
.node-btn.completed{
  background:radial-gradient(circle at 35% 35%,#c4b5fd 0%,#a78bfa 50%,#7c3aed 100%);
  box-shadow:0 0 20px rgba(167,139,250,.5),0 4px 15px rgba(0,0,0,.5);
  border-color:rgba(167,139,250,.6)}
.node-btn.active{
  background:radial-gradient(circle at 35% 35%,#fbbf24 0%,#D4AF37 40%,#92400e 100%);
  box-shadow:0 0 28px rgba(212,175,55,.7),0 4px 15px rgba(0,0,0,.5);
  border-color:rgba(212,175,55,.9);animation:apulse 2s ease-in-out infinite}
.node-btn.locked-node{
  background:radial-gradient(circle at 35% 35%,#374151 0%,#1f2937 60%,#111827 100%);
  box-shadow:0 4px 15px rgba(0,0,0,.5);border-color:rgba(75,85,99,.4)}
@keyframes apulse{0%,100%{box-shadow:0 0 28px rgba(212,175,55,.7),0 4px 15px rgba(0,0,0,.5);transform:scale(1)}50%{box-shadow:0 0 48px rgba(212,175,55,.9),0 0 70px rgba(212,175,55,.3);transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}.float-anim{animation:float 3s ease-in-out infinite}
.star-row{font-size:.75rem;line-height:1}

/* ══ MODAL ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:#111827;border:1px solid rgba(167,139,250,.3);border-radius:24px;padding:28px;max-width:420px;width:calc(100% - 2rem);box-shadow:0 0 50px rgba(167,139,250,.12)}

/* ══ SOUND BTN ══ */
.snd-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:42px;height:42px;border-radius:50%;border:1px solid rgba(167,139,250,.3);background:rgba(10,15,26,.85);backdrop-filter:blur(8px);color:#a78bfa;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 0 12px rgba(167,139,250,.15)}
.snd-btn:hover{box-shadow:0 0 22px rgba(167,139,250,.3)}
.snd-btn.off{color:#444;border-color:rgba(255,255,255,.06)}

   RESPONSIVE — MOBILE FIRST
   ══════════════════════════════════════ */

/* ── Desktop (1025px+) ── */

/* ── Boss node responsive overrides ── */
@media(max-width:374px){.boss-node{width:68px!important;height:68px!important;font-size:1.4rem!important}}
@media(min-width:375px) and (max-width:480px){.boss-node{width:76px!important;height:76px!important;font-size:1.6rem!important}}
@media(min-width:481px) and (max-width:768px){.boss-node{width:82px!important;height:82px!important;font-size:1.7rem!important}}
@media(min-width:769px){.boss-node{width:90px!important;height:90px!important;font-size:1.8rem!important}}

/* ── Landscape phones ── */
@media(max-height:500px) and (orientation:landscape){

/* ── Touch targets (all mobile) ── */

  .snd-btn{width:44px;height:44px}
  .level-node:hover .node-btn{transform:none}
}
</style>

  <script>
  (function(){
    var levels=window._wLevels=[{"n":46,"t":"Medias Móviles: El Promedio de la Masa","d":"SMA, EMA. El indicador más utilizado del mundo.","xp":200},{"n":47,"t":"RSI y Estocástico: Detectando el Agotamiento","d":"Sobrecompra y sobreventa. Señales de reversión.","xp":200},{"n":48,"t":"Bandas de Bollinger y Desviación Estándar","d":"Volatilidad visual. Cuándo el precio se estira demasiado.","xp":200},{"n":49,"t":"El MACD: El Pulso de la Tendencia","d":"Convergencia y divergencia. El latido del mercado.","xp":200},{"n":50,"t":"Fibonacci: El Retroceso Maestro","d":"Los niveles áureos del mercado. 38.2%, 50%, 61.8%.","xp":250},{"n":51,"t":"Extensiones de Fibonacci para Targets","d":"Proyecta objetivos de precio con precisión matemática.","xp":200},{"n":52,"t":"Microestructura: El Libro de Órdenes","d":"Dentro del motor del mercado. Level 2 y profundidad.","xp":250},{"n":53,"t":"Tape Reading: Lectura de la Cinta","d":"El arte de leer el flujo de órdenes en tiempo real.","xp":250},{"n":54,"t":"Filtro de Señales con 94% de Confianza","d":"Combina indicadores para crear señales de alta probabilidad.","xp":300},{"n":55,"t":"Estrategia de Scalping (Minutos)","d":"Operaciones rápidas. Entrar y salir como un rayo.","xp":200},{"n":56,"t":"Estrategia de Day Trading (Horas)","d":"Opera intradía sin llevar posiciones a la noche.","xp":200},{"n":57,"t":"Estrategia de Swing Trading (Días/Semanas)","d":"Captura movimientos medianos. La estrategia del equilibrio.","xp":200},{"n":58,"t":"Estrategia de Position Trading (Meses/Años)","d":"La visión macro. Inversión con convicción a largo plazo.","xp":200},{"n":59,"t":"Gestión de la Salida: Trail Stop Inteligente","d":"Saber salir es más importante que saber entrar.","xp":250},{"n":60,"t":"⚡ BOSS: Operativa Sincronizada 100% IA","d":"Despliega una estrategia híbrida completa. LOGRO: Arquitecto Digital 🏗️","xp":500,"boss":"BOSS"}];
    levels.forEach(function(l){l.s=CURRICULUM.getLevelStatus(l.n);});
    var icons=["📊","📉","📈","💓","🔢","🎯","📖","🎞️","🎰","⚡","☀️","🌊","🏔️","🚪","🏆"];
    var pattern=[18,38,58,72,58,38,18,8,18,38,58,72,58,38,18];

    // Update stats
    var compCount=levels.filter(function(l){return l.s==='completed'}).length;
    var compXp=levels.reduce(function(a,l){return a+(l.s==='completed'?l.xp:0)},0);
    document.getElementById('comp-count').textContent=compCount+'/'+levels.length;
    document.getElementById('xp-count').textContent=compXp.toLocaleString();
    document.getElementById('prog-bar').style.width=Math.round(compCount/levels.length*100)+'%';

    var completedDot='background:#a78bfa;box-shadow:0 0 6px rgba(167,139,250,.6);';
    var activeDot='background:#D4AF37;box-shadow:0 0 8px rgba(212,175,55,.8);';

    var h='';

      var isBoss=!!lv.boss;

      var bossClass=isBoss?' boss-node':'';

      if(lv.s==='completed'){

        nodeContent=bossTag+(isBoss?icons[i]:'✓');

        nodeClass='node-btn active'+bossClass+(isBoss?' relative':'');
        if(isBoss){nodeStyleExtra='';bossTag='<span style="position:absolute;top:-8px;right:-8px;font-size:.6rem;background:#D4AF37;color:#0a0f1a;border-radius:999px;padding:2px 7px;font-weight:900;">'+lv.boss+'</span>';}
        nodeContent=bossTag+icons[i];
      }else{
        nodeClass='node-btn locked-node'+bossClass+(isBoss?' relative':'');
        if(isBoss){nodeStyleExtra='opacity:.5;';bossTag='<span style="position:absolute;top:-8px;right:-8px;font-size:.6rem;background:#374151;color:#6b7280;border-radius:999px;padding:2px 7px;font-weight:900;">'+lv.boss+'</span>';}
        nodeContent=bossTag+'<span class="material-symbols-outlined text-gray-500 text-2xl">lock</span>';

      var starClass=lv.s==='completed'?'star-row':'star-row text-gray-700';
      var lblColor=lv.s==='locked'?'color:#555':(isBoss?'color:#a78bfa':'color:#888');
      var clickAttr=lv.s==='locked'?'onclick="sfxLock()"':'onclick="sfxClick();openModal('+lv.n+',\''+tEsc+'\',\''+dEsc+'\',\''+lv.s+'\','+lv.xp+')"';
      var wrapClass=lv.s==='locked'?'level-node locked text-center inline-block':'level-node text-center inline-block';

      h+='<div class="w-full" style="padding-left:'+pattern[i%pattern.length]+'%">';
      h+='<div class="'+wrapClass+'" '+clickAttr+' onmouseenter="sfxHover()">';
      h+='<div class="flex flex-col items-center gap-2">';
      h+='<div class="'+nodeClass+'" style="'+nodeStyleExtra+'">'+nodeContent+'</div>';
      h+='<div class="'+starClass+'">⭐⭐⭐</div>';
      h+='<div class="text-[10px] font-black uppercase tracking-wider" style="'+lblColor+'">Niv '+lv.n+'</div>';
      h+='</div></div></div>';

      if(i<levels.length-1){
        var nextS=levels[i+1].s;
        var dc=(lv.s==='completed'&&nextS==='completed')?completedDot:(lv.s==='completed'&&nextS==='active')?activeDot:lockedDot;
        var curP=pattern[i%pattern.length]+5;var nextP=pattern[(i+1)%pattern.length]+5;
        h+='<div class="w-full flex flex-col gap-1.5 sm:gap-2 py-2 sm:py-2.5">';
        for(var s=1;s<=3;s++){var pct=curP+(nextP-curP)*(s/4);h+='<div class="connect-dot" style="width:8px;height:8px;border-radius:50%;margin-left:'+pct+'%;'+dc+'"></div>';}
        h+='</div>';
      }
    });
    document.getElementById('level-map').innerHTML=h;

    // Quest card
    var activeLevel=levels.find(function(l){return l.s==='active'});
    if(activeLevel){
      var qi=levels.indexOf(activeLevel);
      document.getElementById('quest-card').innerHTML='<div class="rounded-2xl p-4 flex items-center gap-3" style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);"><div class="text-3xl float-anim">⚡</div><div class="flex-1"><p class="text-[9px] font-black tracking-[4px] uppercase mb-1" style="color:rgba(167,139,250,.5)">NIVEL ACTUAL</p><p class="text-sm text-gray-300">Completa <strong style="color:#a78bfa">'+activeLevel.t+'</strong></p></div><button onclick="sfxClick();openModal('+activeLevel.n+',\''+activeLevel.t.replace(/'/g,"\\'")+'\'  ,\''+activeLevel.d.replace(/'/g,"\\'")+'\'  ,\'active\','+activeLevel.xp+')" class="shrink-0 px-4 py-2 rounded-xl font-black uppercase tracking-wider text-xs transition hover:scale-105" style="background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#0a0f1a;">▶ JUGAR</button></div>';
    }
  })();
  </script>
</main>

<!-- LEVEL MODAL -->
<div id="level-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" style="margin:auto 12px">
    <div class="flex items-center justify-between mb-3 sm:mb-4">
      <span id="modal-badge" class="inline-flex items-center gap-1.5 px-2.5 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px] font-black uppercase tracking-wider"></span>
      <button onclick="closeModal()" class="text-gray-500 hover:text-white transition p-1"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="text-4xl sm:text-5xl text-center mb-2 sm:mb-3" id="modal-icon">🤖</div>
    <h3 class="text-base sm:text-lg font-black text-center uppercase tracking-tight mb-2" style="font-family:Orbitron,sans-serif;color:#a78bfa" id="modal-title"></h3>
    <p class="text-gray-400 text-xs sm:text-sm text-center mb-3 sm:mb-4 leading-relaxed" id="modal-desc"></p>
    <div class="flex justify-center gap-1 mb-3 sm:mb-4 text-sm" id="modal-stars">⭐⭐⭐</div>
    <div class="flex items-center justify-between mb-3 sm:mb-4 rounded-xl px-3 sm:px-4 py-2.5 sm:py-3" style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.15);">
      <span class="text-[9px] sm:text-[10px] font-bold text-gray-500 uppercase tracking-wider">XP a ganar</span>
      <span class="font-black text-sm sm:text-base" style="color:#a78bfa" id="modal-xp"></span>
    </div>
    <div class="flex flex-col gap-2">
      <button id="modal-cta" class="w-full py-3 rounded-2xl font-black uppercase tracking-wider text-sm transition hover:scale-105 hover:brightness-110"></button>
      <button id="modal-next" class="hidden w-full py-3 rounded-2xl font-black uppercase tracking-wider text-sm transition hover:scale-105 hover:brightness-110"></button>
    </div>
  </div>
</div>

<!-- SOUND BUTTON -->
<button class="snd-btn" id="snd-btn" onclick="toggleSound()">🔊</button>

<script>
// ══ AUDIO ENGINE ══
var actx,mgain,sOn=true;
function initA(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();mgain=actx.createGain();mgain.gain.value=.22;mgain.connect(actx.destination);
  [55,82.5,110].forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain(),fi=actx.createBiquadFilter();o.type=i<2?'sine':'triangle';o.frequency.value=f;fi.type='lowpass';fi.frequency.value=160+i*35;fi.Q.value=1;g.gain.value=.01;o.connect(fi);fi.connect(g);g.connect(mgain);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.07+i*.03;lg.gain.value=1.2;l.connect(lg);lg.connect(o.frequency);l.start()});}
function sfx(freq,dur,type,vol){if(!actx||!sOn)return;type=type||'sine';vol=vol||.1;var o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.setValueAtTime(freq,actx.currentTime);g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);o.connect(g);g.connect(mgain);o.start();o.stop(actx.currentTime+dur);}
function sfxClick(){sfx(880,.1);setTimeout(function(){sfx(660,.07,'sine',.05)},35);}
function sfxHover(){sfx(1200,.05,'sine',.025);}
function sfxOpen(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.16,'sine',.07)},i*50)});}
function sfxLock(){sfx(150,.16,'square',.05);}
function toggleSound(){initA();sOn=!sOn;var b=document.getElementById('snd-btn');b.textContent=sOn?'🔊':'🔇';b.classList.toggle('off',!sOn);if(mgain)mgain.gain.value=sOn?.22:0;}
document.addEventListener('click',function(){initA()},{once:true});

// ══ MODAL ══
function openModal(num,title,desc,status,xp){
  sfxOpen();
  var badge=document.getElementById('modal-badge');
  var cta=document.getElementById('modal-cta');
  var nextBtn=document.getElementById('modal-next');
  var nextLevel=window._wLevels.find(function(l){return l.n===num+1;});
  var icons=["📊","📉","📈","💓","🔢","🎯","📖","🎞️","🎰","⚡","☀️","🌊","🏔️","🚪","🏆"];
  var idx=window._wLevels.findIndex(function(l){return l.n===num;});
  document.getElementById('modal-icon').textContent=icons[idx]||'🤖';

  if(status==='completed'){
    badge.textContent='✓ Completado';
    badge.style.cssText='background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);';
    document.getElementById('modal-stars').textContent='⭐⭐⭐';
    cta.textContent='🔄 REPASAR NIVEL';
    cta.style.cssText='background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer;';
    cta.onclick=function(){window.location.href='leccion.html?world=4&level='+num;};
    if(nextLevel){nextBtn.classList.remove('hidden');nextBtn.textContent='▶ SIGUIENTE NIVEL (Niv '+nextLevel.n+')';nextBtn.style.cssText='background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer;';nextBtn.onclick=function(){window.location.href='leccion.html?world=4&level='+nextLevel.n;};}
    else{nextBtn.classList.add('hidden');}
  }else if(status==='active'){
    badge.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#D4AF37;animation:apulse 1s ease-in-out infinite;margin-right:4px"></span> En Progreso';
    badge.style.cssText='background:rgba(212,175,55,.15);color:#D4AF37;border:1px solid rgba(212,175,55,.3);';
    document.getElementById('modal-stars').textContent='⭐⭐⭐ (por ganar)';
    cta.textContent='▶ JUGAR NIVEL';
    cta.style.cssText='background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer;';
    cta.onclick=function(){window.location.href='leccion.html?world=4&level='+num;};
    nextBtn.classList.add('hidden');
  }else{
    badge.textContent='🔒 Bloqueado';
    badge.style.cssText='background:rgba(107,114,128,.12);color:#6b7280;border:1px solid rgba(107,114,128,.25);';
    document.getElementById('modal-stars').textContent='⭐⭐⭐';
    cta.style.display='none';nextBtn.classList.add('hidden');
  }
  document.getElementById('modal-title').textContent='Nivel '+num+': '+title;
  document.getElementById('modal-desc').textContent=desc;
  document.getElementById('modal-xp').textContent='+'+xp+' XP';
  document.getElementById('level-modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('level-modal').classList.add('hidden');document.getElementById('modal-cta').style.display='';}

// ══ FX CANVAS ══
(function(){
var cv=document.getElementById('fxCanvas'),ctx=cv.getContext('2d');
var dpr=window.devicePixelRatio||1,W,H;
function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
window.addEventListener('resize',resize);resize();

// Matrix rain
var mCols=Math.floor(W/14),mDrops=[];
for(var i=0;i<mCols;i++) mDrops[i]=Math.random()*-60;
var mChars='01アイウエオカキクケコサシスセソ'.split('');

// Embers
var embers=[];
for(var i=0;i<30;i++) embers.push({x:0,y:0,s:0,vx:0,vy:0,life:9999,max:1,r:0,g:0,d:Math.random()*200});
function resetEmber(e){
  e.x=W*.1+Math.random()*W*.8;e.y=H+5;e.s=1+Math.random()*2.5;
  e.vx=(Math.random()-.5)*.5;e.vy=-(1.2+Math.random()*2);
  e.life=0;e.max=100+Math.random()*250;
  e.r=200+Math.floor(Math.random()*55);e.g=30+Math.floor(Math.random()*70);}
embers.forEach(resetEmber);

// Energy pulses
var pulses=[];
for(var i=0;i<5;i++) pulses.push({y:H*.6,sp:.2+Math.random()*.6,ph:Math.random()*6.28,mx:.03+Math.random()*.03});

var tick=0;
function frame(){
  tick++;
  ctx.clearRect(0,0,W,H);

  // Matrix rain (tech zone)
  ctx.font='10px monospace';
  for(var i=0;i<mCols;i++){
    if(mDrops[i]<0){mDrops[i]+=.25;continue;}
    var y=mDrops[i]*14;
    if(y>H*.22&&y<H*.7){
      var fade=1-Math.abs(y-H*.46)/(H*.24);
      ctx.fillStyle='rgba(0,229,255,'+(0.035*fade)+')';
      ctx.fillText(mChars[Math.floor(Math.random()*mChars.length)],i*14,y);
    }
    mDrops[i]+=.3+Math.random()*.25;
    if(mDrops[i]*14>H*.72) mDrops[i]=Math.random()*-30;
  }

  // Energy pulses
  pulses.forEach(function(p){
    p.ph+=.018;
    var a=p.mx*(.5+.5*Math.sin(p.ph));
    ctx.save();
    ctx.strokeStyle='rgba(0,229,255,'+a+')';ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(W*.2,p.y);ctx.lineTo(W*.8,p.y);ctx.stroke();
    ctx.strokeStyle='rgba(0,229,255,'+(a*.25)+')';ctx.lineWidth=5;ctx.filter='blur(2px)';
    ctx.beginPath();ctx.moveTo(W*.2,p.y);ctx.lineTo(W*.8,p.y);ctx.stroke();
    ctx.restore();
    p.y-=p.sp;
    if(p.y<H*.18){p.y=H*.58+Math.random()*H*.12;p.ph=Math.random()*6.28;}
  });

  // Embers
  embers.forEach(function(e){
    if(tick<e.d)return;
    e.life++;
    if(e.life>e.max){resetEmber(e);e.d=0;return;}
    var p=e.life/e.max;
    e.x+=e.vx+Math.sin(e.life*.04)*.25;
    e.y+=e.vy*(1-p*.4);
    var a=(1-p)*(p<.08?p/.08:1);
    var sz=e.s*(1-p*.5);
    ctx.beginPath();ctx.arc(e.x,e.y,sz,0,6.28);
    ctx.fillStyle='rgba('+e.r+','+e.g+',0,'+(a*.65)+')';ctx.fill();
    ctx.beginPath();ctx.arc(e.x,e.y,sz*3.5,0,6.28);
    ctx.fillStyle='rgba('+e.r+','+e.g+',0,'+(a*.1)+')';ctx.fill();
  });

  // Sparks
  if(tick%70===0){
    var sx=W*.2+Math.random()*W*.6,sy=H*.82+Math.random()*H*.12;
    ctx.beginPath();ctx.arc(sx,sy,1.5,0,6.28);
    ctx.fillStyle='rgba(255,210,60,.85)';ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,10,0,6.28);
    ctx.fillStyle='rgba(255,190,50,.12)';ctx.fill();
  }

  requestAnimationFrame(frame);
}
frame();
})();

// ══ PARTICLES ══
(function(){
  var cols=['#a78bfa','#00e5ff','#ffd700','#39ff14','#c4b5fd'];
  for(var i=0;i<18;i++){
    var p=document.createElement('div');p.className='ptcl';var c=cols[i%cols.length];
    var sz=1.5+Math.random()*2.5;
    p.style.cssText='left:'+Math.random()*100+'%;top:'+(30+Math.random()*70)+'%;width:'+sz+'px;height:'+sz+'px;background:'+c+';box-shadow:0 0 '+(4+Math.random()*4)+'px '+c+';animation:ptrise '+(10+Math.random()*16)+'s linear infinite;animation-delay:'+Math.random()*12+'s';
    document.body.appendChild(p);
  }
})();

// ══ CSS EMBERS ══
(function(){
  for(var i=0;i<12;i++){
    var e=document.createElement('div');e.className='ember';
    var sz=2+Math.random()*3;
    var r=200+Math.floor(Math.random()*55),g=30+Math.floor(Math.random()*70);
    e.style.cssText='left:'+(8+Math.random()*84)+'%;bottom:'+(1+Math.random()*6)+'%;width:'+sz+'px;height:'+sz+'px;background:rgb('+r+','+g+',0);box-shadow:0 0 6px rgba('+r+','+g+',0,.5);animation:embrise '+(4+Math.random()*7)+'s ease-out infinite;animation-delay:'+Math.random()*6+'s';
    document.body.appendChild(e);
  }
})();

// ══ DONE ══
</script>
