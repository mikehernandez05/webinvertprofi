<style>

html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#000}

.btn-back:hover{background:rgba(10,14,24,.9);border-color:rgba(56,189,248,.3)}
.btn-back svg{width:16px;height:16px}
.world-banner{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9998;padding:8px 24px;border-radius:12px;background:rgba(10,14,24,.8);backdrop-filter:blur(16px);border:1px solid rgba(212,175,55,.25);text-align:center}
.world-banner .world-name{font-size:15px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#D4AF37;text-shadow:0 0 12px rgba(212,175,55,.3)}
.world-banner .world-sub{font-size:10px;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.06em;margin-top:2px}
.node{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-50%);z-index:10;border:none;background:none;padding:0;outline:none;cursor:pointer}
.node.locked{cursor:not-allowed}
.node .ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .25s,box-shadow .25s}
.node.completed .ring{background:linear-gradient(135deg,hsl(140 70% 30%),hsl(160 60% 25%));box-shadow:0 0 12px rgba(74,222,128,.4),0 0 24px rgba(74,222,128,.15)}

.node.boss.active .ring{background:linear-gradient(135deg,hsl(35 90% 45%),hsl(15 80% 40%));box-shadow:0 0 20px rgba(245,158,11,.5),0 0 40px rgba(245,158,11,.2);animation:pulseBoss 2s ease-in-out infinite}

// CONFIG
// ═══════════════════════════════════════
var isNavigating = false;
var meta = WORLD_META[WORLD_ID] || WORLD_META[1];
var worldLevels = LEVEL_DATA[WORLD_ID] || LEVEL_DATA[1];

document.title = 'InvertProfit — ' + meta.name;

// ═══════════════════════════════════════
// GENERATE NODE POSITIONS (zigzag path bottom→top)
// ═══════════════════════════════════════
function generatePositions(count) {
  var positions = [];
  var yStart = 90, yEnd = 10;
  var yStep = (yStart - yEnd) / Math.max(count - 1, 1);
  for (var i = 0; i < count; i++) {
    var y = yStart - (i * yStep);
    var xBase = (i % 2 === 0) ? 42 : 58;
    var xVar = Math.sin(i * 1.3) * 6;
    positions.push({ x: Math.round(xBase + xVar), y: Math.round(y) });
  }
  return positions;
}

var positions = generatePositions(worldLevels.length);

var levels = worldLevels.map(function(lv, i) {
  return {
    id: i + 1, levelNum: lv.n, title: lv.t, desc: lv.d, xp: lv.xp,
    boss: lv.boss || null, x: positions[i].x, y: positions[i].y,
    href: 'leccion.html?world=' + WORLD_ID + '&level=' + lv.n
  };
});

var connections = [];
for (var i = 1; i < levels.length; i++) connections.push({ from: i, to: i + 1 });

function svgIcon(name, color) {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||ICONS.book)+'</svg>';
}
function getLevelIcon(idx, total) {
  if (idx === total - 1) return 'trophy';
  if (idx % 5 === 0) return 'flame';
  if (idx % 3 === 0) return 'target';
  return 'book';
}

// ═══════════════════════════════════════
// STATUS
// ═══════════════════════════════════════
function getStatus(levelNum) { return CURRICULUM.getLevelStatus(levelNum); }

// ═══════════════════════════════════════
// ZOOM + WARP
// ═══════════════════════════════════════
var worldEl = document.getElementById('world');
var warpOverlay = document.getElementById('warpOverlay');
var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function navigateToLevel(level, btnEl) {
  if (isNavigating) return;
  isNavigating = true;
  if (reducedMotion) { window.location.href = level.href; return; }
  btnEl.classList.add('zooming');
  var vw = window.innerWidth, vh = window.innerHeight;
  var nodeX = (level.x / 100) * vw, nodeY = (level.y / 100) * vh;
  var scale = 2.2;
  worldEl.style.transform = 'translate(' + ((vw/2) - nodeX*scale) + 'px,' + ((vh/2) - nodeY*scale) + 'px) scale(' + scale + ')';
  warpOverlay.style.setProperty('--wx', level.x + '%');
  warpOverlay.style.setProperty('--wy', level.y + '%');
  setTimeout(function() { warpOverlay.classList.add('active'); }, 350);
  setTimeout(function() { window.location.href = level.href; }, 900);
}

var nodesLayer = document.getElementById('nodesLayer');
var tooltip = document.getElementById('tooltip');
var hudProgress = document.getElementById('hudProgress');

function connColor(fi, ti) {
  var sA = getStatus(levels[fi].levelNum), sB = getStatus(levels[ti].levelNum);
  if (sA === 'completed' && sB === 'completed') return {color:'hsl(140,70%,45%)',opacity:'0.7',width:'0.5'};
  if (sA !== 'locked' && sB !== 'locked') return {color:'hsl(190,100%,55%)',opacity:'0.5',width:'0.4'};
  return {color:'hsl(220,15%,22%)',opacity:'0.15',width:'0.25'};
}

function renderConnections() {
  connGroup.innerHTML = '';
  connections.forEach(function(c) {
    var a = levels[c.from-1], b = levels[c.to-1], style = connColor(c.from-1, c.to-1);
    var l1 = document.createElementNS('http://www.w3.org/2000/svg','line');
    l1.setAttribute('x1',a.x);l1.setAttribute('y1',a.y);l1.setAttribute('x2',b.x);l1.setAttribute('y2',b.y);
    l1.setAttribute('stroke',style.color);l1.setAttribute('stroke-width',String(parseFloat(style.width)*2.5));
    l1.setAttribute('stroke-opacity',String(parseFloat(style.opacity)*0.4));l1.setAttribute('filter','url(#glow)');
    connGroup.appendChild(l1);
    var l2 = document.createElementNS('http://www.w3.org/2000/svg','line');
    l2.setAttribute('x1',a.x);l2.setAttribute('y1',a.y);l2.setAttribute('x2',b.x);l2.setAttribute('y2',b.y);
    l2.setAttribute('stroke',style.color);l2.setAttribute('stroke-width',style.width);l2.setAttribute('stroke-opacity',style.opacity);
    connGroup.appendChild(l2);
  });
}

function renderNodes() {
  nodesLayer.innerHTML = '';
  levels.forEach(function(level, idx) {
    var status = getStatus(level.levelNum);
    var isBoss = !!level.boss;
    var btn = document.createElement('button');
    btn.className = 'node ' + status + (isBoss ? ' boss' : '');
    btn.style.left = level.x + '%'; btn.style.top = level.y + '%';
    var iconName, iconColor;
    if (status === 'locked') { iconName='lock'; iconColor='hsl(220,10%,35%)'; }
    else if (status === 'completed') { iconName='check'; iconColor='hsl(140,80%,55%)'; }
    else { iconName = isBoss ? 'zap' : getLevelIcon(idx, levels.length); iconColor = isBoss ? 'hsl(35,100%,65%)' : 'hsl(190,100%,65%)'; }
    btn.innerHTML =
      '<div class="ring"><div class="inner">' + svgIcon(iconName, iconColor) + '</div></div>' +
      '<span class="lvl-num">' + (idx+1) + '</span>' +
      '<span class="node-label">' + level.title + '</span>' +
      '<span class="node-xp">' + level.xp + ' XP</span>';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (status === 'locked') { showTooltip(e.clientX, e.clientY); return; }
      navigateToLevel(level, btn);
    });
    btn.addEventListener('mouseenter', function(e) { if (status === 'locked') showTooltip(e.clientX, e.clientY); });
    btn.addEventListener('mouseleave', hideTooltip);
    nodesLayer.appendChild(btn);
  });
}

function renderHUD() {
  hudProgress.innerHTML = '';
  levels.forEach(function(level) {
    var dot = document.createElement('div');
    dot.className = 'hud-dot';
    if (level.boss) dot.classList.add('boss-dot');
    var s = getStatus(level.levelNum);
    if (s === 'completed') dot.classList.add('done');
    if (s === 'active') dot.classList.add('current');
    hudProgress.appendChild(dot);
  });
}

// ═══════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════
var tooltipTimer;
function showTooltip(x, y) { clearTimeout(tooltipTimer); tooltip.style.left=(x+14)+'px'; tooltip.style.top=(y-36)+'px'; tooltip.classList.add('show'); tooltipTimer=setTimeout(hideTooltip,2000); }
function hideTooltip() { tooltip.classList.remove('show'); }

// ═══════════════════════════════════════
// SECURITY + INIT
// ═══════════════════════════════════════
if (!CURRICULUM.isWorldUnlocked(WORLD_ID)) {
  window.location.replace('portadanivelesacademia.html');
} else {
  renderConnections();
  renderNodes();
  renderHUD();
}
</script>
</body>
</html>
