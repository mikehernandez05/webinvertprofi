<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Torre de los Mundos</title>
    <style>
        body {
            background-color: #050508; /* Color oscuro del fondo de la imagen */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evita barras de desplazamiento si no son necesarias */
        }

        /* Contenedor principal que mantiene la proporción */
        .image-container {
            position: relative;
            width: auto;
            height: 95vh; /* Ocupa casi toda la altura de la pantalla */
            max-width: 100%;
        }

        /* La imagen original */
        .main-image {
            height: 100%;
            width: auto;
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Estilo para las zonas donde se puede hacer clic */
        .hotspot {
            position: absolute;
            /* background-color: rgba(255, 0, 0, 0.3); /* DESCOMENTA ESTA LINEA PARA VER LAS ZONAS ROJAS Y AJUSTARLAS */
            cursor: pointer;
            z-index: 10;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        /* Efecto visual al pasar el mouse por encima de una zona */
        .hotspot:hover {
            background-color: rgba(255, 255, 255, 0.1); /* Luz blanca sutil */
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); /* Resplandor dorado */
            border: 1px solid rgba(255, 215, 0, 0.7);
        }

        /* --- POSICIONES EXACTAS DE LOS BOTONES (Ajustadas a ojo según la imagen) --- */
        /* Los porcentajes son relativos al tamaño de la imagen */

        #spot-m7 { /* LEGADO */
            top: 12%; left: 20%;
            width: 18%; height: 8%;
        }
        #spot-m6 { /* SOBERANÍA */
            top: 23%; left: 16%;
            width: 18%; height: 8%;
        }
        #spot-m5 { /* ESTRATEGIA */
            top: 35%; left: 13%;
            width: 18%; height: 8%;
        }
        #spot-m4 { /* SINCRONÍA */
            top: 46%; left: 10%;
            width: 18%; height: 8%;
        }
        #spot-m3 { /* ANATOMÍA */
            top: 58%; left: 8%;
            width: 18%; height: 8%;
        }
        #spot-m2 { /* CARTOGRAFÍA */
            top: 71%; left: 5%;
            width: 18%; height: 8%;
        }
        #spot-m1 { /* GÉNESIS */
            top: 85%; left: 2%;
            width: 18%; height: 8%;
        }

    </style>
</head>
<body>

    <div class="image-container">
        <img src="torre-completa.jpg" alt="Torre de los Mundos" class="main-image">

        <a class="hotspot" id="spot-m7" onclick="alert('Seleccionado: Mundo 7 - Legado')"></a>
        <a class="hotspot" id="spot-m6" onclick="alert('Seleccionado: Mundo 6 - Soberanía')"></a>
        <a class="hotspot" id="spot-m5" onclick="alert('Seleccionado: Mundo 5 - Estrategia')"></a>
        <a class="hotspot" id="spot-m4" onclick="alert('Seleccionado: Mundo 4 - Sincronía')"></a>
        <a class="hotspot" id="spot-m3" onclick="alert('Seleccionado: Mundo 3 - Anatomía')"></a>
        <a class="hotspot" id="spot-m2" onclick="alert('Seleccionado: Mundo 2 - Cartografía')"></a>
        <a class="hotspot" id="spot-m1" onclick="alert('Seleccionado: Mundo 1 - Génesis')"></a>
    </div>

</body>
</html>
