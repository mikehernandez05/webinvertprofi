<style>

body{background:#0a0804;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.atmo{position:fixed;inset:0;z-index:0;pointer-events:none;

/* ═══ ROYAL/CROWN DECORATIONS ═══ */
.world-deco{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}

/* Crown glow */
.crown-glow{position:absolute;top:3%;left:50%;transform:translateX(-50%);width:200px;height:100px;

/* Royal pillars */
.royal-pillar{position:fixed;top:0;width:3px;height:100%;z-index:3;pointer-events:none;

.rp-l{left:10px}.rp-r{right:10px}

.filigree{position:fixed;top:0;left:50%;transform:translateX(-50%);width:300px;height:3px;z-index:4;pointer-events:none;

.nc-done::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.35),transparent 60%);pointer-events:none}
.nc-active{background:radial-gradient(circle at 35% 35%,#fde047,rgba(var(--ar),.6) 50%,#713f12);border:3px solid var(--a);animation:activePulse 2s ease-in-out infinite;

.quest-box{border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;

.quest-box .quest-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(var(--ar),.5);text-transform:uppercase;letter-spacing:3px}

  background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;box-shadow:0 0 20px rgba(var(--ar),.4);transition:all .2s}
.quest-box .quest-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(var(--ar),.6)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-box{background:linear-gradient(135deg,#1a1408,#14100a,#1a1408);border:1px solid rgba(var(--ar),.3);border-radius:24px;padding:28px;max-width:400px;width:calc(100% - 2rem);
  box-shadow:0 0 80px rgba(var(--ar),.1),0 25px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(var(--ar),.15)}
.mu-btn{position:fixed;bottom:16px;right:16px;z-index:110;width:44px;height:44px;border-radius:50%;border:1px solid rgba(var(--ar),.2);background:rgba(10,8,4,.9);color:var(--a);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.mu-btn:hover{box-shadow:0 0 20px rgba(var(--ar),.3)}.mu-btn.off{color:#444;border-color:#1f2530}
header{border-image:linear-gradient(90deg,transparent,rgba(var(--ar),.4),transparent) 1}
@media(max-width:374px){.node-circle{width:52px;height:52px;font-size:1.15rem}.node-boss .node-circle{width:64px;height:64px}.node-lbl{font-size:8px}.map-wrap{max-width:340px}.hero-title{font-size:1.4rem}}
@media(min-width:375px) and (max-width:480px){.node-circle{width:58px;height:58px;font-size:1.3rem}.node-boss .node-circle{width:70px;height:70px}}

</style>
</head>

<script>
var A='#eab308',AR='234,179,8',WN=7;
var levels=window._wL=[{"n": 91, "t": "Estadística", "d": "Esperanza matemática.", "xp": 250}, {"n": 92, "t": "Teoría de Juegos", "d": "Nash y más.", "xp": 250}, {"n": 93, "t": "Ingeniería Riesgo", "d": "Gestión de drawdown.", "xp": 300}, {"n": 94, "t": "Bots & Algos", "d": "Automatiza tu trading.", "xp": 300}, {"n": 95, "t": "Portafolios Quant", "d": "Sharpe, Sortino.", "xp": 300}, {"n": 96, "t": "Correlación Beta", "d": "Intermercado.", "xp": 250}, {"n": 97, "t": "Plan Retiro", "d": "Libertad financiera.", "xp": 250}, {"n": 98, "t": "100 Operaciones", "d": "Historial real.", "xp": 500}, {"n": 99, "t": "Ética & Legado", "d": "Filosofía de vida.", "xp": 250}, {"n": 100, "t": "🏆 GRADUACIÓN", "d": "Certificación Grand Master.", "xp": 1000, "boss": "FINAL"}];
var icons=["📐", "♟️", "🛡️", "🤖", "📊", "🌐", "🏖️", "📋", "⭐", "🏆"];
levels.forEach(function(l){l.s=CURRICULUM.getLevelStatus(l.n)});
var cc=levels.filter(function(l){return l.s==='completed'}).length;var cx=levels.reduce(function(a,l){return a+(l.s==='completed'?l.xp:0)},0);
document.getElementById('comp-ct').textContent=cc+'/'+levels.length;document.getElementById('xp-ct').textContent=cx.toLocaleString()+' XP';
document.getElementById('prog-bar').style.width=Math.round(cc/levels.length*100)+'%';
document.getElementById('cert-fill').style.width=Math.round(cc/levels.length*100)+'%';

var N=levels.length,MAP_W,NODE_H=110,PAD_TOP=40,nodePos=[];
function calcPositions(){MAP_W=document.getElementById('mapWrap').offsetWidth;nodePos=[];var margin=50,usable=MAP_W-margin*2;for(var i=0;i<N;i++){var row=Math.floor(i/3),col=i%3,goingRight=row%2===0;var xNorm=goingRight?col/2:(2-col)/2;var rawX=margin+xNorm*usable,wave=Math.sin(i*0.8)*usable*0.12;nodePos.push({x:Math.max(margin,Math.min(MAP_W-margin,rawX+wave)),y:PAD_TOP+(N-1-i)*NODE_H})}}
calcPositions();var totalH=PAD_TOP+N*NODE_H+60;document.getElementById('nodesLayer').style.height=totalH+'px';document.getElementById('pathSvg').setAttribute('height',totalH);document.getElementById('pathSvg').style.height=totalH+'px';
function drawPaths(){calcPositions();var svg=document.getElementById('pathSvg');svg.innerHTML='';for(var i=0;i<N-1;i++){var a_=nodePos[i],b_=nodePos[i+1],sA=levels[i].s,sB=levels[i+1].s;var cls=(sA==='completed'&&sB==='completed')?'path-done':(sA==='completed'&&sB==='active')?'path-active':'path-locked';var path=document.createElementNS('http://www.w3.org/2000/svg','path');var midY=(a_.y+b_.y)/2;path.setAttribute('d','M '+a_.x+' '+a_.y+' C '+a_.x+' '+midY+', '+b_.x+' '+midY+', '+b_.x+' '+b_.y);path.setAttribute('class',cls);svg.appendChild(path)}}
drawPaths();window.addEventListener('resize',function(){drawPaths();placeNodes()});
function placeNodes(){calcPositions();var layer=document.getElementById('nodesLayer');layer.innerHTML='';for(var i=0;i<N;i++){var lv=levels[i],p=nodePos[i],isBoss=!!lv.boss;var nd=document.createElement('div');nd.className='node'+(isBoss?' node-boss':'')+(lv.s==='locked'?' locked':'');nd.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;transform:translate(-50%,-50%)';var circCls=lv.s==='completed'?'nc-done':(lv.s==='active'?'nc-active':'nc-locked');var content=lv.s==='completed'?'✓':(lv.s==='active'?(icons[i]||'🔥'):'<span class="material-symbols-outlined text-gray-600" style="font-size:1.2em">lock</span>');var bossTag='';if(isBoss){bossTag='<span class="'+(lv.s==='locked'?'boss-tag locked':'boss-tag')+'">'+lv.boss+'</span>'}var starHtml=lv.s==='completed'?'<span class="star-on">⭐</span><span class="star-on">⭐</span><span class="star-on">⭐</span>':'<span class="star-off">☆</span><span class="star-off">☆</span><span class="star-off">☆</span>';var lblCls=lv.s==='completed'?'lbl-done':(lv.s==='active'?'lbl-active':'lbl-locked');var tE=lv.t.replace(/'/g,"\\'"),dE=lv.d.replace(/'/g,"\\'");if(lv.s!=='locked')nd.setAttribute('onclick',"openM("+lv.n+",'"+tE+"','"+dE+"','"+lv.s+"',"+lv.xp+")");else nd.setAttribute('onclick','sfxL()');nd.innerHTML='<div style="position:relative;display:flex;flex-direction:column;align-items:center"><div class="node-circle '+circCls+'" style="position:relative">'+content+bossTag+'</div><div class="node-stars">'+starHtml+'</div><div class="node-lbl '+lblCls+'">'+lv.n+'</div></div>';layer.appendChild(nd)}}

var actx,mg,sOn=true;
function initA(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();mg=actx.createGain();mg.gain.value=.08;mg.connect(actx.destination);[0,7,12].forEach(function(s,i){var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o.type=i<2?'sine':'triangle';o.frequency.value=82*Math.pow(2,s/12);f.type='lowpass';f.frequency.value=180+i*50;f.Q.value=.7;g.gain.value=.012;o.connect(f);f.connect(g);g.connect(mg);o.start();var l=actx.createOscillator(),lg=actx.createGain();l.type='sine';l.frequency.value=.06+i*.02;lg.gain.value=1.5;l.connect(lg);lg.connect(o.frequency);l.start()});var sc=[0,2,4,7,9,12],ni=0;(function play(){if(!sOn){setTimeout(play,2000);return}var semi=sc[ni%sc.length]+12*Math.floor(ni/sc.length);var fr=82*2*Math.pow(2,semi/12);var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+2.5);ni++;setTimeout(play,2500+Math.random()*1500)})()}
function sfx(fr,d){if(!actx||!sOn)return;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=fr;g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+d)}
function sfxC(){sfx(880,.1);setTimeout(function(){sfx(660,.07)},35)}function sfxL(){sfx(150,.15)}function sfxO(){[660,880,1100].forEach(function(f,i){setTimeout(function(){sfx(f,.15)},i*50)})}
function toggleMu(){initA();sOn=!sOn;mg.gain.value=sOn?.08:0;document.getElementById('muBtn').className='mu-btn'+(sOn?'':' off');document.getElementById('muBtn').textContent=sOn?'🔊':'🔇'}
document.addEventListener('click',function(){initA()},{once:true});
function openM(n,t,d,s,xp){sfxO();var ic=icons[levels.findIndex(function(l){return l.n===n})]||'🔥';document.getElementById('m-icon').textContent=ic;var b=document.getElementById('m-badge'),c=document.getElementById('m-cta'),nx=document.getElementById('m-next');var nxt=levels.find(function(l){return l.n===n+1});if(s==='completed'){b.textContent='✓ COMPLETADO';b.style.cssText='background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.25)';document.getElementById('m-stars').textContent='⭐⭐⭐';c.textContent='🔄 REPASAR';c.style.cssText='background:rgba(34,197,94,.08);color:#22c55e;border:1px solid rgba(34,197,94,.2);width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';c.onclick=function(){location.href='leccion.html?world=7&level='+n};if(nxt){nx.classList.remove('hidden');nx.textContent='▶ SIGUIENTE';nx.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';nx.onclick=function(){location.href='leccion.html?world=7&level='+nxt.n}}else nx.classList.add('hidden')}else if(s==='active'){b.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--a);animation:activePulse 1s infinite;margin-right:4px"></span> EN PROGRESO';b.style.cssText='background:rgba(var(--ar),.1);color:var(--a);border:1px solid rgba(var(--ar),.2)';document.getElementById('m-stars').textContent='⭐⭐⭐';c.textContent='▶ JUGAR';c.style.cssText='background:linear-gradient(135deg,var(--ad),var(--a));color:#0a0f1a;width:100%;padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:14px;cursor:pointer';c.onclick=function(){location.href='leccion.html?world=7&level='+n};nx.classList.add('hidden')}else{b.textContent='🔒 BLOQUEADO';b.style.cssText='background:rgba(107,114,128,.08);color:#6b7280;border:1px solid rgba(107,114,128,.15)';document.getElementById('m-stars').textContent='☆☆☆';c.style.display='none';nx.classList.add('hidden')}document.getElementById('m-title').textContent='Nivel '+n+': '+t;document.getElementById('m-desc').textContent=d;document.getElementById('m-xp').textContent='+'+xp+' XP';document.getElementById('modal').classList.remove('hidden')}

// ═══ WORLD FX — GOLDEN DUST + LIGHT RAYS ═══
(function(){var cv=document.getElementById('fxC'),x=cv.getContext('2d'),W,H,dpr=devicePixelRatio||1;function rs(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',rs);rs();
  var pts=[];for(var i=0;i<50;i++)pts.push({x:Math.random()*W,y:Math.random()*H,s:.5+Math.random()*2.5,vy:-.2-Math.random()*.5,ph:Math.random()*6.28,sp:.01+Math.random()*.02});
  var rays=[{x:W*.3,a:0},{x:W*.5,a:.3},{x:W*.7,a:.6}];
  function f(){x.clearRect(0,0,W,H);
    // Light rays from top
    rays.forEach(function(r){r.a+=.003;var a=.015+.01*Math.sin(r.a);
      var g=x.createLinearGradient(r.x,0,r.x,H*.6);g.addColorStop(0,'rgba(234,179,8,'+a+')');g.addColorStop(1,'rgba(234,179,8,0)');
      x.save();x.globalAlpha=1;x.beginPath();x.moveTo(r.x-20,0);x.lineTo(r.x+20,0);x.lineTo(r.x+50,H*.6);x.lineTo(r.x-50,H*.6);x.closePath();x.fillStyle=g;x.fill();x.restore()});
    // Golden dust
    pts.forEach(function(p){p.ph+=p.sp;p.x+=Math.sin(p.ph)*.5;p.y+=p.vy;if(p.y<-10){p.y=H+10;p.x=Math.random()*W}
      var a=.25+.2*Math.sin(p.ph*2);x.beginPath();x.arc(p.x,p.y,p.s,0,6.28);x.fillStyle='rgba(234,179,8,'+a+')';x.fill();
      x.beginPath();x.arc(p.x,p.y,p.s*3,0,6.28);x.fillStyle='rgba(234,179,8,'+(a*.08)+')';x.fill()});
    requestAnimationFrame(f)}f()})();
